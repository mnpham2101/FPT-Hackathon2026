de></td></tr>\n      <tr><td><code>0xFF</code></td><td>Error</td><td>Lỗi runtime (busy, timeout, abort…)</td></tr>\n    </tbody>\n  </table>\n  <p class=\"paragraph\">\n    Mỗi frame: <code>[1 byte tag][4 bytes length LE][payload]</code>. Chỉ được <strong>một request in-flight</strong> tại một thờ điểm.\n  </p>\n\n  <h3 class=\"section-subtitle\">Cấu hình địa chỉ</h3>\n  <table>\n    <thead>\n      <tr><th>addr_mode</th><th>Chế độ địa chỉ</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>0</code></td><td>Normal 11-bit</td></tr>\n      <tr><td><code>1</code></td><td>Normal 29-bit</td></tr>\n      <tr><td><code>2</code></td><td>Extended</td></tr>\n      <tr><td><code>3</code></td><td>Mixed 11-bit</td></tr>\n      <tr><td><code>4</code></td><td>Mixed 29-bit</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Ví dụ Python client</h3>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>Python</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>import socket\nimport struct\n\nSOCK = \"/run/nydus/uds-can_main.sock\"\n\ndef frame(tag, payload):\n    return bytes([tag]) + struct.pack(\"&lt;I\", len(payload)) + payload\n\n# 1. Cấu hình: Normal11, tester TX = 0x7E0, ECU RX = 0x7E8, classic CAN, P2 = 1000ms\nconfig = bytes([0]) + struct.pack(\"&lt;I\", 0x7E0) + struct.pack(\"&lt;I\", 0x7E8) + bytes([0]) + struct.pack(\"&lt;H\", 1000)\n\nwith socket.socket(socket.AF_UNIX, socket.SOCK_STREAM) as s:\n    s.connect(SOCK)\n    s.sendall(frame(0x01, config))\n\n    # 2. Gửi ReadDID VIN (0x22 F1 90)\n    s.sendall(frame(0x10, bytes([0x22, 0xF1, 0x90])))\n\n    # 3. Đọc response frame\n    header = s.recv(5)\n    tag, length = header[0], struct.unpack(\"&lt;I\", header[1:])[0]\n    resp = s.recv(length)\n\n    if tag == 0x20:\n        print(\"Response:\", resp.hex())\n        # 62 F1 90 ... = positive; 7F 22 31 = NRC\n    else:\n        print(\"Error frame tag:\", hex(tag))</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Ví dụ request phổ biến</h3>\n  <table>\n    <thead>\n      <tr><th>Service</th><th>Request (hex)</th><th>Response (+0x40) / NRC</th></tr>\n    </thead>\n    <tbody>\n      <tr><td>ReadDID VIN</td><td><code>22 F1 90</code></td><td><code>62 F1 90 …</code></td></tr>\n      <tr><td>ReadDTC by status</td><td><code>19 02 FF</code></td><td><code>59 02 FF …</code></td></tr>\n      <tr><td>Session control (extended)</td><td><code>10 03</code></td><td><code>50 03 …</code></td></tr>\n      <tr><td>ECU reset (hard)</td><td><code>11 01</code></td><td><code>51 01</code></td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Lưu ý khi dùng</h3>\n  <ul>\n    <li>Chỉ có <strong>một request in-flight</strong>; nếu gửi request mới trong khi đang chờ, runtime có thể drop hoặc trả error frame.</li>\n    <li>Runtime tự xử lý ISO-TP segmentation (Single Frame, First Frame, Consecutive Frame, Flow Control).</li>\n    <li>Client nhận về UDS PDU đã được assemble; không cần tự ghép frame CAN.</li>\n    <li>Muốn mô phỏng ECU thay vì làm tester, dùng <a href=\"#mod-uds-vsomeip\">UDS Server trong Script Node</a>.</li>\n  </ul>\n\n\n</section>\n",
    "en": "<section id=\"mod-uds-client-en\">\n  <h2 class=\"section-title\">UDS Client — ISO-TP Socket</h2>\n  <p class=\"paragraph\">\n    Starting in M3, every wired <a href=\"#mod-can-bus-node-en\">CAN Bus pin</a> gets an ISO-TP Unix socket exposed by the runtime at\n    <code>/run/nydus/uds-&lt;pin_name&gt;.sock</code>. Any Container Node (or process in the pod) can connect to this socket to send/receive\n    <strong>raw UDS PDUs</strong> (ISO 14229) without handling ISO-TP segmentation itself.\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">💡</div>\n    <div class=\"banner-content\">\n      <strong>Different from UDS Server</strong>\n      The <a href=\"#mod-uds-vsomeip-en\">UDS Server</a> is used inside a Script Node to <em>simulate an ECU</em>.\n      The UDS Client here is a <em>tester/gateway</em> that sends requests (ReadDID, ReadDTC, SessionControl…) and reads responses from a real/virtual ECU.\n    </div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Socket path</h3>\n  <p class=\"paragraph\">\n    If a Container Node has a pin named <code>can_main</code> wired to a CAN Bus Node, the runtime creates:\n  </p>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>socket path</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>/run/nydus/uds-can_main.sock</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Wire protocol</h3>\n  <p class=\"paragraph\">\n    The protocol is a simple framed message over the Unix domain socket:\n  </p>\n  <table>\n    <thead>\n      <tr><th>Tag</th><th>Meaning</th><th>Payload</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>0x01</code></td><td>Config (send first)</td><td><code>addr_mode tx_id rx_id can_fd p2_ms</code></td></tr>\n      <tr><td><code>0x10</code></td><td>Request</td><td>Raw UDS request PDU, e.g. <code>22 F1 90</code></td></tr>\n      <tr><td><code>0x20</code></td><td>Response</td><td>Raw UDS response PDU, e.g. <code>62 F1 90 …</code></td></tr>\n      <tr><td><code>0xFF</code></td><td>Error</td><td>Runtime error (busy, timeout, abort…)</td></tr>\n    </tbody>\n  </table>\n  <p class=\"paragraph\">\n    Each frame: <code>[1 byte tag][4 bytes length LE][payload]</code>. Only <strong>one request in-flight</strong> is allowed at a time.\n  </p>\n\n  <h3 class=\"section-subtitle\">Address configuration</h3>\n  <table>\n    <thead>\n      <tr><th>addr_mode</th><th>Addressing mode</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>0</code></td><td>Normal 11-bit</td></tr>\n      <tr><td><code>1</code></td><td>Normal 29-bit</td></tr>\n      <tr><td><code>2</code></td><td>Extended</td></tr>\n      <tr><td><code>3</code></td><td>Mixed 11-bit</td></tr>\n      <tr><td><code>4</code></td><td>Mixed 29-bit</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Python client example</h3>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>Python</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>import socket\nimport struct\n\nSOCK = \"/run/nydus/uds-can_main.sock\"\n\ndef frame(tag, payload):\n    return bytes([tag]) + struct.pack(\"&lt;I\", len(payload)) + payload\n\n# 1. Configure: Normal11, tester TX = 0x7E0, ECU RX = 0x7E8, classic CAN, P2 = 1000ms\nconfig = bytes([0]) + struct.pack(\"&lt;I\", 0x7E0) + struct.pack(\"&lt;I\", 0x7E8) + bytes([0]) + struct.pack(\"&lt;H\", 1000)\n\nwith socket.socket(socket.AF_UNIX, socket.SOCK_STREAM) as s:\n    s.connect(SOCK)\n    s.sendall(frame(0x01, config))\n\n    # 2. Send ReadDID VIN (0x22 F1 90)\n    s.sendall(frame(0x10, bytes([0x22, 0xF1, 0x90])))\n\n    # 3. Read response frame\n    header = s.recv(5)\n    tag, length = header[0], struct.unpack(\"&lt;I\", header[1:])[0]\n    resp = s.recv(length)\n\n    if tag == 0x20:\n        print(\"Response:\", resp.hex())\n        # 62 F1 90 ... = positive; 7F 22 31 = NRC\n    else:\n        print(\"Error frame tag:\", hex(tag))</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Common request examples</h3>\n  <table>\n    <thead>\n      <tr><th>Service</th><th>Request (hex)</th><th>Response (+0x40) / NRC</th></tr>\n    </thead>\n    <tbody>\n      <tr><td>ReadDID VIN</td><td><code>22 F1 90</code></td><td><code>62 F1 90 …</code></td></tr>\n      <tr><td>ReadDTC by status</td><td><code>19 02 FF</code></td><td><code>59 02 FF …</code></td></tr>\n      <tr><td>Session control (extended)</td><td><code>10 03</code></td><td><code>50 03 …</code></td></tr>\n      <tr><td>ECU reset (hard)</td><td><code>11 01</code></td><td><code>51 01</code></td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Usage notes</h3>\n  <ul>\n    <li>Only <strong>one request in-flight</strong> is supported; sending a new request while another is pending may be dropped or return an error frame.</li>\n    <li>The runtime handles ISO-TP segmentation (Single Frame, First Frame, Consecutive Frame, Flow Control) automatically.</li>\n    <li>The client receives fully assembled UDS PDUs and does not need to reassemble CAN frames.</li>\n    <li>To simulate an ECU instead of acting as a tester, use the <a href=\"#mod-uds-vsomeip-en\">UDS Server in a Script Node</a>.</li>\n  </ul>\n\n\n</section>\n"
  },
  "script-node-examples": {
    "vi": "<section id=\"mod-script-node-examples\">\n  <h2 class=\"section-title\">Ví Dụ Thực Tế</h2>\n\n  <details class=\"feature-list\">\n  <summary>4 recipe hoàn chỉnh (bấm để mở/đóng)</summary>\n  <details>\n    <summary>1. CAN ↔ KUKSA Gateway</summary>\n    <pre class=\"code-block\"><code>-- Khi CAN EngineSpeed thay đổi, publish lên KUKSA\npins.can0.db.EngSpeed:on_change(function(v)\n  pins.kuksa:publish(\"Vehicle.Powertrain.CombustionEngine.Speed\", v)\nend)\n\n-- Khi KUKSA yêu cầu bật AC, gửi CAN command\npins.kuksa.vss.Vehicle.Cabin.HVAC.IsAirConditioningActive:on_actuate(function(v)\n  pins.can0.db.ACCommand:publish(v and 1 or 0)\nend)</code></pre>\n  </details>\n\n  <details>\n    <summary>2. SOME/IP SD Offer</summary>\n    <pre class=\"code-block\"><code>local udp = nydus.net.udp(\"0.0.0.0\", 30490)\nlocal offer = nydus.someip.build_sd_offer({\n  service_id = 0x1234,\n  instance_id = 0x5678,\n  major_version = 1,\n  ttl = 3,\n  minor_version = 0,\n  endpoint = { address = \"192.168.1.10\", port = 30509, protocol = \"udp\" }\n})\nudp_sock:send_to(offer, \"224.0.0.1\", 30490)</code></pre>\n  </details>\n\n  <details>\n    <summary>3. VHAL Bridge tới Zenoh</summary>\n    <pre class=\"code-block\"><code>pins.vhal0:on_change(function(ev)\n  pins.vss:publish(\"cmd/\" .. ev.id, ev.value)\nend)\n\npins.vss:on_change(\"state/vehicle/speed\", function(path, value)\n  pins.vhal0:push(vhal.prop.PERF_VEHICLE_SPEED, vhal.area.window.FRONT_WINDSHIELD, value)\nend)</code></pre>\n  </details>\n\n  <details>\n    <summary>4. GPIO Hazard → VSS</summary>\n    <pre class=\"code-block\"><code>pins.gpio0:on(\"btn_hazard\", function(value)\n  pins.kuksa:publish(\"Vehicle.Body.HazardLights.Switch\", value == 1)\nend)</code></pre>\n  </details>\n</details>\n</section>",
    "en": "<section id=\"mod-script-node-examples-en\">\n  <h2 class=\"section-title\">Real-World Examples</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-editor.png\" alt=\"The Script Editor with a complete bridge example.\">\n    <figcaption>The Script Editor with a complete bridge example.</figcaption>\n  </figure>\n\n\n  <details class=\"feature-list\">\n  <summary>4 complete recipes (click to expand/collapse)</summary>\n  <details>\n    <summary>1. CAN ↔ KUKSA Gateway</summary>\n    <pre class=\"code-block\"><code>-- When CAN EngineSpeed changes, publish to KUKSA\npins.can0.db.EngSpeed:on_change(function(v)\n  pins.kuksa:publish(\"Vehicle.Powertrain.CombustionEngine.Speed\", v)\nend)\n\n-- When KUKSA requests AC, send a CAN command\npins.kuksa.vss.Vehicle.Cabin.HVAC.IsAirConditioningActive:on_actuate(function(v)\n  pins.can0.db.ACCommand:publish(v and 1 or 0)\nend)</code></pre>\n  </details>\n\n  <details>\n    <summary>2. SOME/IP SD Offer</summary>\n    <pre class=\"code-block\"><code>local udp = nydus.net.udp(\"0.0.0.0\", 30490)\nlocal offer = nydus.someip.build_sd_offer({\n  service_id = 0x1234,\n  instance_id = 0x5678,\n  major_version = 1,\n  ttl = 3,\n  minor_version = 0,\n  endpoint = { address = \"192.168.1.10\", port = 30509, protocol = \"udp\" }\n})\nudp_sock:send_to(offer, \"224.0.0.1\", 30490)</code></pre>\n  </details>\n\n  <details>\n    <summary>3. VHAL Bridge to Zenoh</summary>\n    <pre class=\"code-block\"><code>pins.vhal0:on_change(function(ev)\n  pins.vss:publish(\"cmd/\" .. ev.id, ev.value)\nend)\n\npins.vss:on_change(\"state/vehicle/speed\", function(path, value)\n  pins.vhal0:push(vhal.prop.PERF_VEHICLE_SPEED, vhal.area.window.FRONT_WINDSHIELD, value)\nend)</code></pre>\n  </details>\n\n  <details>\n    <summary>4. GPIO Hazard → VSS</summary>\n    <pre class=\"code-block\"><code>pins.gpio0:on(\"btn_hazard\", function(value)\n  pins.kuksa:publish(\"Vehicle.Body.HazardLights.Switch\", value == 1)\nend)</code></pre>\n  </details>\n</details>\n</section>"
  },
  "skycraft-node": {
    "vi": "<section id=\"mod-skycraft-node\">\n  <h2 class=\"section-title\">Skycraft Node — Máy ảo Guest</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-skycraft.png\" alt=\"Ví dụ kết nối Skycraft node.\">\n    <figcaption>Ví dụ kết nối Skycraft node.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    <strong>Skycraft</strong> chạy máy ảo guest trong room. Đây là cách chính để đưa Android Automotive (AAOS), Automotive Grade Linux (AGL) hoặc Linux guest vào blueprint. VM kết nối các Nydus pin qua runtime của CarSky.\n  </p>\n\n  <h3 class=\"section-subtitle\">Loại guest hỗ trợ</h3>\n  <table>\n    <thead><tr><th>OS</th><th>Boot mode</th><th>Use case điển hình</th></tr></thead>\n    <tbody>\n      <tr><td><code>android</code></td><td>Bios (Android emulator)</td><td>Android Automotive IVI / cluster</td></tr>\n      <tr><td><code>agl</code></td><td>Kernel</td><td>Automotive Grade Linux</td></tr>\n      <tr><td><code>linux</code></td><td>Kernel hoặc bios</td><td>Linux guest tùy chỉnh</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Artifact image cho VM</h3>\n  <p class=\"paragraph\">\n    Skycraft không tự build image OS; nó download các artifact đã build sẵn từ CarSky artifact store khi deploy. Các file cần thiết phụ thuộc vào guest OS.\n  </p>\n\n  <h3 class=\"section-subtitle\">Android — cần 2 file</h3>\n  <p class=\"paragraph\">\n    Một artifact version cho Android Skycraft phải chứa đúng hai <strong>role</strong> file:\n  </p>\n  <table>\n    <thead><tr><th>Role</th><th>File</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>image</code></td><td><code>aosp_*-img-*.zip</code></td><td>AOSP Android emulator composite image zip. Chứa <code>system.img</code>, <code>vendor.img</code>, <code>super.img</code>, <code>boot.img</code>, v.v.</td></tr>\n      <tr><td><code>host_package</code></td><td><code>cvd-host_package.tar.gz</code></td><td>Android emulator host tools package. Cung cấp <code>cvd</code>, bootloader và script assemble disks trên host.</td></tr>\n    </tbody>\n  </table>\n  <p class=\"paragraph\">\n    Trong Rework, tạo artifact loại <strong>VM Image</strong>, upload zip và tarball, gán role là <code>image</code> và <code>host_package</code>, sau đó chọn artifact version đó trong Inspector của Skycraft node.\n  </p>\n\n  <h3 class=\"section-subtitle\">AGL / Linux — kernel + rootfs</h3>\n  <p class=\"paragraph\">\n    Với guest boot bằng kernel (AGL hoặc Linux tùy chỉnh), artifact version phải chứa:\n  </p>\n  <table>\n    <thead><tr><th>Role</th><th>File</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>kernel</code></td><td><code>Image</code> / <code>bzImage</code></td><td>Kernel binary của guest.</td></tr>\n      <tr><td><code>rootfs</code></td><td><code>rootfs.ext4</code> / <code>rootfs.ext4.xz</code></td><td>Root filesystem image. Có thể raw hoặc nén (<code>.xz</code>, <code>.gz</code>).</td></tr>\n    </tbody>\n  </table>\n  <p class=\"paragraph\">\n    Khi deploy, operator init-container copy kernel và giải nén rootfs vào thư mục <code>/disks</code> của VM, sau đó boot trực tiếp từ kernel và rootfs image.\n  </p>\n\n  <h3 class=\"section-subtitle\">Cấu hình image trong blueprint</h3>\n  <p class=\"paragraph\">\n    Khối <code>image</code> của Skycraft node thường viết dưới dạng artifact reference (khuyên dùng).\n  </p>\n  <pre class=\"code-block\"><code>// Android — artifact reference (Rework tự sinh)\n{\n  \"image\": {\n    \"artifactId\": \"aosp-ivi\",\n    \"versionId\": \"v2026.07.15-01\",\n    \"os\": \"android\",\n    \"arch\": \"x86_64\"\n  }\n}\n\n// AGL — artifact reference\n{\n  \"image\": {\n    \"artifactId\": \"agl-demo\",\n    \"versionId\": \"v2026.07.10\",\n    \"os\": \"agl\",\n    \"arch\": \"x86_64\"\n  }\n}</code></pre>\n\n  <h3 class=\"section-subtitle\">Các loại pin</h3>\n  <p class=\"paragraph\">\n    Skycraft hỗ trợ các pin:\n  </p>\n  <ul>\n    <li><strong>vhal</strong> — Guest AAOS kết nối như VHAL client tới Script Node đóng vai trò VehicleServer.</li>\n    <li><strong>kuksa</strong> — Guest kết nối tới node KUKSA Databroker.</li>\n    <li><strong>ethernet</strong> — Guest NIC tham gia Ethernet Bridge; IP lấy từ subnet của bridge.</li>\n    <li><strong>video</strong> — Camera/video input được forward vào guest.</li>\n    <li><strong>usb</strong> — USB pass-through từ Device Proxy node (ảnh .img hoặc USB vật lý từ xa).</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Kết nối điển hình</h3>\n  <pre class=\"code-block\"><code>Skycraft (IVI)\n  vhal0  ──target──▶ Script Node (VHAL server)\n  kuksa0 ──target──▶ KUKSA Broker\n  eth0   ──target──▶ Ethernet Bridge\n  usb0   ──target──▶ Device Proxy</code></pre>\n\n  <h3 class=\"section-subtitle\">Lưu ý</h3>\n  <ul>\n    <li>Mỗi Skycraft node cần <code>prefix</code> duy nhất trong room; nó quyết định tên media track như <code>{prefix}-screen</code> và <code>{prefix}-audio</code>.</li>\n    <li>Skycraft pod expose ADB trên một port cố định; dùng Rework device panel hoặc CarSky Gateway ADB tunnel để kết nối.</li>\n    <li>VHAL proxy là per-VM, nên nhiều Skycraft node có thể target cùng một Script Node trên các port khác nhau.</li>\n    <li>Thay đổi <code>version</code> của artifact sẽ trigger re-provision disk VM và restart pod.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-skycraft-node-en\">\n  <h2 class=\"section-title\">Skycraft Node — Guest VM</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-skycraft.png\" alt=\"Skycraft node wiring example.\">\n    <figcaption>Skycraft node wiring example.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    <strong>Skycraft</strong> runs a guest virtual machine inside the room. It is the primary way to bring Android Automotive (AAOS), Automotive Grade Linux (AGL), or a generic Linux guest into a blueprint. The VM connects to Nydus pins through the CarSky runtime.\n  </p>\n\n  <h3 class=\"section-subtitle\">Supported guest types</h3>\n  <table>\n    <thead><tr><th>OS</th><th>Boot mode</th><th>Typical use</th></tr></thead>\n    <tbody>\n      <tr><td><code>android</code></td><td>Bios (Android emulator)</td><td>Android Automotive IVI / cluster</td></tr>\n      <tr><td><code>agl</code></td><td>Kernel</td><td>Automotive Grade Linux</td></tr>\n      <tr><td><code>linux</code></td><td>Kernel or bios</td><td>Custom Linux guest</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">VM image artifacts</h3>\n  <p class=\"paragraph\">\n    Skycraft does not build OS images itself; it downloads pre-built artifacts from the CarSky artifact store at deploy time. The required files depend on the guest OS.\n  </p>\n\n  <h3 class=\"section-subtitle\">Android — two files</h3>\n  <p class=\"paragraph\">\n    An Android Skycraft artifact version must contain exactly two file <strong>roles</strong>:\n  </p>\n  <table>\n    <thead><tr><th>Role</th><th>File</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>image</code></td><td><code>aosp_*-img-*.zip</code></td><td>AOSP Android emulator composite image zip. Contains <code>system.img</code>, <code>vendor.img</code>, <code>super.img</code>, <code>boot.img</code>, etc.</td></tr>\n      <tr><td><code>host_package</code></td><td><code>cvd-host_package.tar.gz</code></td><td>Android emulator host tools package. Provides <code>cvd</code>, bootloader, and the scripts that assemble disks on the host.</td></tr>\n    </tbody>\n  </table>\n  <p class=\"paragraph\">\n    In Rework, create an artifact of type <strong>VM Image</strong>, upload the zip and tarball, tag their roles as <code>image</code> and <code>host_package</code>, then select that artifact version in the Skycraft node's Inspector.\n  </p>\n\n  <h3 class=\"section-subtitle\">AGL / Linux — kernel + rootfs</h3>\n  <p class=\"paragraph\">\n    For kernel-boot guests (AGL or custom Linux), the artifact version must contain:\n  </p>\n  <table>\n    <thead><tr><th>Role</th><th>File</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>kernel</code></td><td><code>Image</code> / <code>bzImage</code></td><td>Guest kernel binary.</td></tr>\n      <tr><td><code>rootfs</code></td><td><code>rootfs.ext4</code> / <code>rootfs.ext4.xz</code></td><td>Root filesystem image. May be raw or compressed (<code>.xz</code>, <code>.gz</code>).</td></tr>\n    </tbody>\n  </table>\n  <p class=\"paragraph\">\n    At deploy time the operator init-container copies the kernel and decompresses the rootfs into the VM's <code>/disks</code> directory, then boots directly from the kernel and rootfs image.\n  </p>\n\n  <h3 class=\"section-subtitle\">Blueprint image configuration</h3>\n  <p class=\"paragraph\">\n    The Skycraft node's <code>image</code> block is usually written as an artifact reference (recommended).\n  </p>\n  <pre class=\"code-block\"><code>// Android — artifact reference (what Rework writes)\n{\n  \"image\": {\n    \"artifactId\": \"aosp-ivi\",\n    \"versionId\": \"v2026.07.15-01\",\n    \"os\": \"android\",\n    \"arch\": \"x86_64\"\n  }\n}\n\n// AGL — artifact reference\n{\n  \"image\": {\n    \"artifactId\": \"agl-demo\",\n    \"versionId\": \"v2026.07.10\",\n    \"os\": \"agl\",\n    \"arch\": \"x86_64\"\n  }\n}</code></pre>\n\n  <h3 class=\"section-subtitle\">Pins</h3>\n  <p class=\"paragraph\">\n    A Skycraft node supports these pin kinds:\n  </p>\n  <ul>\n    <li><strong>vhal</strong> — Guest AAOS connects as a VHAL client to a Script Node acting as VehicleServer.</li>\n    <li><strong>kuksa</strong> — Guest connects to a KUKSA Databroker node.</li>\n    <li><strong>ethernet</strong> — Guest NIC joins an Ethernet Bridge; IP is taken from the bridge subnet.</li>\n    <li><strong>video</strong> — Camera/video input forwarded into the guest.</li>\n    <li><strong>usb</strong> — USB pass-through from a Device Proxy node (virtual images or remote physical USB).</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Typical wiring</h3>\n  <pre class=\"code-block\"><code>Skycraft (IVI)\n  vhal0  ──target──▶ Script Node (VHAL server)\n  kuksa0 ──target──▶ KUKSA Broker\n  eth0   ──target──▶ Ethernet Bridge\n  usb0   ──target──▶ Device Proxy</code></pre>\n\n  <h3 class=\"section-subtitle\">Notes</h3>\n  <ul>\n    <li>Each Skycraft node needs a unique <code>prefix</code> in the room; it determines media track names such as <code>{prefix}-screen</code> and <code>{prefix}-audio</code>.</li>\n    <li>The Skycraft pod exposes ADB on a fixed port; use Rework's device panel or CarSky Gateway ADB tunnel to connect.</li>\n    <li>The VHAL proxy is per-VM, so multiple Skycraft nodes can target the same Script Node on different ports.</li>\n    <li>Changing the artifact <code>version</code> triggers re-provisioning of VM disks and a pod restart.</li>\n  </ul>\n</section>\n"
  },
  "ethernet-bridge": {
    "vi": "<section id=\"mod-ethernet-bridge\">\n  <h2 class=\"section-title\">Ethernet Bridge Node</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-ethernet-bridge.png\" alt=\"Cấu hình Ethernet Bridge node.\">\n    <figcaption>Cấu hình Ethernet Bridge node.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    Node <strong>Ethernet Bridge</strong> tạo một broadcast domain L2 ảo trong room. Bất kỳ node nào có pin <code>ethernet</code> đều có thể tham gia: Script Node, Container, Skycraft VM và Outpost endpoint. Nó hoạt động như một software switch không quản lý.\n  </p>\n\n  <h3 class=\"section-subtitle\">Cấu hình</h3>\n  <pre class=\"code-block\"><code>{\n  \"ethBridge\": {\n    \"bridgeMode\": \"linux\",\n    \"subnet\": \"10.99.0.0/24\",\n    \"port\": 29400\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Trường</th><th>Mặc định</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>bridgeMode</code></td><td><code>\"linux\"</code></td><td>Backend: <code>linux</code> (kernel bridge) hoặc <code>ovs</code> (virtual switch).</td></tr>\n      <tr><td><code>subnet</code></td><td><code>\"10.99.0.0/24\"</code></td><td>Subnet để auto-assign IP. Bridge sử dụng <code>.1</code>.</td></tr>\n      <tr><td><code>port</code></td><td><code>29400</code></td><td>TCP port của bridge listener.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Kết nối ethernet pin</h3>\n  <p class=\"paragraph\">\n    Thêm pin <code>ethernet</code> vào node và đặt target trỏ đến bridge node. Có thể để trống IP để auto-assign (container/script-node nhận <code>.2</code>, <code>.3</code>, …) hoặc đặt địa chỉ tĩnh cho Skycraft guest.\n  </p>\n  <pre class=\"code-block\"><code>{\n  \"ethernet\": {\n    \"address\": \"10.99.0.10\",\n    \"prefixLen\": 24,\n    \"vlanId\": 100\n  }\n}</code></pre>\n\n  <h3 class=\"section-subtitle\">Skycraft DHCP</h3>\n  <p class=\"paragraph\">\n    Khi Skycraft VM target một Ethernet Bridge, runtime của bridge chạy một DHCP server nhỏ và gắn MAC của guest (deterministic theo room/node) với IP khai báo trên ethernet pin. Nhờ đó guest boot với địa chỉ mong muốn mà không cần DHCP client.\n  </p>\n\n  <h3 class=\"section-subtitle\">Use case phổ biến</h3>\n  <ul>\n    <li>Mạng L2 giữa các VM và container trong cùng room.</li>\n    <li>Zenoh-over-Ethernet: đặt container có <code>ZENOH_MODE=router</code> trên bridge và để Script Node tự động phát hiện.</li>\n    <li>Ethernet pin của Outpost: mở rộng domain L2 tới remote hub qua WSS.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-ethernet-bridge-en\">\n  <h2 class=\"section-title\">Ethernet Bridge Node</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-ethernet-bridge.png\" alt=\"Ethernet Bridge node configuration.\">\n    <figcaption>Ethernet Bridge node configuration.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    The <strong>Ethernet Bridge</strong> node creates a virtual L2 broadcast domain inside the room. Any node with an <code>ethernet</code> pin can join it: Script Nodes, Container nodes, Skycraft VMs, and Outpost endpoints. It behaves like an unmanaged software switch.\n  </p>\n\n  <h3 class=\"section-subtitle\">Configuration</h3>\n  <pre class=\"code-block\"><code>{\n  \"ethBridge\": {\n    \"bridgeMode\": \"linux\",\n    \"subnet\": \"10.99.0.0/24\",\n    \"port\": 29400\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Field</th><th>Default</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>bridgeMode</code></td><td><code>\"linux\"</code></td><td>Backend: <code>linux</code> (kernel bridge) or <code>ovs</code> (virtual switch).</td></tr>\n      <tr><td><code>subnet</code></td><td><code>\"10.99.0.0/24\"</code></td><td>Subnet for auto-assigning IPs. The bridge itself uses <code>.1</code>.</td></tr>\n      <tr><td><code>port</code></td><td><code>29400</code></td><td>TCP port of the bridge listener.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Connecting an ethernet pin</h3>\n  <p class=\"paragraph\">\n    Add an <code>ethernet</code> pin to a node and set its target to the bridge node. You can leave the IP empty for auto-assignment (containers/script-nodes get <code>.2</code>, <code>.3</code>, …) or set a static address for Skycraft guests.\n  </p>\n  <pre class=\"code-block\"><code>{\n  \"ethernet\": {\n    \"address\": \"10.99.0.10\",\n    \"prefixLen\": 24,\n    \"vlanId\": 100\n  }\n}</code></pre>\n\n  <h3 class=\"section-subtitle\">Skycraft DHCP</h3>\n  <p class=\"paragraph\">\n    When a Skycraft VM targets an Ethernet Bridge, the bridge runtime runs a small DHCP server and binds the guest MAC (deterministic per room/node) to the IP declared on the ethernet pin. This lets the guest boot with the expected address without running a DHCP client.\n  </p>\n\n  <h3 class=\"section-subtitle\">Common use cases</h3>\n  <ul>\n    <li>VM-to-VM and VM-to-container L2 networking inside a room.</li>\n    <li>Zenoh-over-Ethernet: place a container with <code>ZENOH_MODE=router</code> on the bridge and let Script Nodes discover it automatically.</li>\n    <li>Outpost ethernet pins: extend the L2 domain to a remote hub over WSS.</li>\n  </ul>\n</section>\n"
  },
  "container-node": {
    "vi": "<section id=\"mod-container-node\">\n  <h2 class=\"section-title\">Container Node</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-container.png\" alt=\"Cấu hình và pin Container node.\">\n    <figcaption>Cấu hình và pin Container node.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    Node <strong>Container</strong> chạy một OCI image do ngườI dùng cung cấp trong room. Phù hợp cho custom gateway, bộ chuyển đổi protocol, simulator hoặc bất kỳ workload nào cần giao tiếp CAN/LIN/KUKSA/GPIO/Ethernet/Video/USB thông qua runtime của CarSky.\n  </p>\n\n  <h3 class=\"section-subtitle\">Cấu hình</h3>\n  <pre class=\"code-block\"><code>{\n  \"container\": {\n    \"image\": \"registry.local/carsky/my-gateway:latest\",\n    \"command\": [\"./gateway\"],\n    \"args\": [\"--verbose\"],\n    \"env\": { \"LOG_LEVEL\": \"info\" },\n    \"exposedPorts\": [\n      { \"name\": \"http\", \"port\": 8080, \"protocol\": \"http\" }\n    ],\n    \"capabilities\": [\"SYS_ADMIN\", \"NET_ADMIN\"],\n    \"gpu\": false,\n    \"cgroupV2\": false,\n    \"kuksaIntercepts\": { \"kuksa\": \"127.0.0.10:55555\" },\n    \"socketcanShim\": { \"enabled\": true },\n    \"devices\": [\"/dev/video0\"]\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Trường</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>image</code></td><td>Bắt buộc. OCI image reference (registry hoặc artifact-resolved).</td></tr>\n      <tr><td><code>command</code> / <code>args</code></td><td>Ghi đè entrypoint và arguments của container.</td></tr>\n      <tr><td><code>env</code></td><td>Biến môi trường bổ sung.</td></tr>\n      <tr><td><code>exposedPorts</code></td><td>Tạo gateway route tại <code>/{room}/{node}/{name}/</code>.</td></tr>\n      <tr><td><code>capabilities</code></td><td>Linux capabilities bổ sung (ví dụ <code>SYS_ADMIN</code> cho TelAF).</td></tr>\n      <tr><td><code>gpu</code></td><td>Yêu cầu NVIDIA GPU resource limit.</td></tr>\n      <tr><td><code>cgroupV2</code></td><td>Mount <code>/sys/fs/cgroup</code> RW để quản lý cgroup lồng nhau.</td></tr>\n      <tr><td><code>kuksaIntercepts</code></td><td>Map tên pin → <code>ip:port</code> container mong đợi kết nối cục bộ.</td></tr>\n      <tr><td><code>socketcanShim</code></td><td>Tự động tạo interface <code>vcan</code> theo tên pin CAN đã nối dây. Thường không cần cấu hình thủ công.</td></tr>\n      <tr><td><code>devices</code></td><td>Host device passthrough (ví dụ <code>/dev/video0</code>). Cần xác nhận hỗ trợ trên cluster hiện tại.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Các loại pin</h3>\n  <p class=\"paragraph\">\n    Hầu hết pin của Container là <strong>client-only</strong>: kết nối tới target node qua runtime.\n  </p>\n  <ul>\n    <li><strong>can / lin</strong> — Raw SocketCAN trên interface <code>vcan</code> do <code>socketcanShim</code> tạo ra; target can-bus / lin-bus node.</li>\n    <li><strong>kuksa</strong> — Intercept địa chỉ broker cứng; target KUKSA Broker.</li>\n    <li><strong>gpio</strong> — Kết nối tới GPIO Panel node.</li>\n    <li><strong>ethernet</strong> — virtual network interface tham gia Ethernet Bridge.</li>\n    <li><strong>video</strong> — shared-memory video topic cho RGBA IN/OUT.</li>\n    <li><strong>usb</strong> — Kết nối tới Device Proxy Node để chuyển tiếp USB.</li>\n    <li><strong>tunnel</strong> — TCP forwarding; pin tunnel INPUT có port sẽ đóng vai trò server.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Use case</h3>\n  <ul>\n    <li>Custom protocol gateway (ví dụ MQTT ↔ CAN).</li>\n    <li>Container Zenoh router trên Ethernet Bridge.</li>\n    <li>Runtime TelAF / Legato với <code>SYS_ADMIN</code> + <code>cgroupV2</code>.</li>\n    <li>vECU algorithm với <a href=\"#mod-container-node-coding\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-container-node-en\">\n  <h2 class=\"section-title\">Container Node</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-container.png\" alt=\"Container node configuration and pins.\">\n    <figcaption>Container node configuration and pins.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    The <strong>Container</strong> node runs a user-provided OCI image inside the room. It is useful for custom gateways, protocol converters, simulators, or any workload that needs to talk to CAN/LIN/KUKSA/GPIO/Ethernet/Video/USB through the CarSky runtime.\n  </p>\n\n  <h3 class=\"section-subtitle\">Configuration</h3>\n  <pre class=\"code-block\"><code>{\n  \"container\": {\n    \"image\": \"registry.local/carsky/my-gateway:latest\",\n    \"command\": [\"./gateway\"],\n    \"args\": [\"--verbose\"],\n    \"env\": { \"LOG_LEVEL\": \"info\" },\n    \"exposedPorts\": [\n      { \"name\": \"http\", \"port\": 8080, \"protocol\": \"http\" }\n    ],\n    \"capabilities\": [\"SYS_ADMIN\", \"NET_ADMIN\"],\n    \"gpu\": false,\n    \"cgroupV2\": false,\n    \"kuksaIntercepts\": { \"kuksa\": \"127.0.0.10:55555\" },\n    \"socketcanShim\": { \"enabled\": true },\n    \"devices\": [\"/dev/video0\"]\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Field</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>image</code></td><td>Required. OCI image reference (registry or artifact-resolved).</td></tr>\n      <tr><td><code>command</code> / <code>args</code></td><td>Override container entrypoint and arguments.</td></tr>\n      <tr><td><code>env</code></td><td>Extra environment variables.</td></tr>\n      <tr><td><code>exposedPorts</code></td><td>Create gateway routes at <code>/{room}/{node}/{name}/</code>.</td></tr>\n      <tr><td><code>capabilities</code></td><td>Linux capabilities to add (e.g. <code>SYS_ADMIN</code> for TelAF).</td></tr>\n      <tr><td><code>gpu</code></td><td>Request an NVIDIA GPU resource limit.</td></tr>\n      <tr><td><code>cgroupV2</code></td><td>Mount <code>/sys/fs/cgroup</code> RW for nested cgroup management.</td></tr>\n      <tr><td><code>kuksaIntercepts</code></td><td>Map pin name → <code>ip:port</code> the container expects locally.</td></tr>\n      <tr><td><code>socketcanShim</code></td><td>Auto-creates a <code>vcan</code> interface named after each wired CAN pin. Usually no manual config needed.</td></tr>\n      <tr><td><code>devices</code></td><td>Host device passthrough (e.g. <code>/dev/video0</code>). Confirm support on your target cluster.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pins</h3>\n  <p class=\"paragraph\">\n    Container pins are mostly <strong>client-only</strong>: they connect to a target node via the runtime.\n  </p>\n  <ul>\n    <li><strong>can / lin</strong> — Raw SocketCAN on the <code>vcan</code> interface created by <code>socketcanShim</code>; target a can-bus / lin-bus node.</li>\n    <li><strong>kuksa</strong> — Intercept a hardcoded broker address; target a KUKSA Broker.</li>\n    <li><strong>gpio</strong> — Connect to a GPIO Panel node.</li>\n    <li><strong>ethernet</strong> — virtual network interface joins an Ethernet Bridge.</li>\n    <li><strong>video</strong> — shared-memory video topic for RGBA IN/OUT.</li>\n    <li><strong>usb</strong> — Connect to a Device Proxy Node for USB forwarding.</li>\n    <li><strong>tunnel</strong> — TCP forwarding; an INPUT tunnel pin with a port acts as a server.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Use cases</h3>\n  <ul>\n    <li>Custom protocol gateway (e.g., MQTT ↔ CAN).</li>\n    <li>Zenoh router container on an Ethernet Bridge.</li>\n    <li>TelAF / Legato runtime with <code>SYS_ADMIN</code> + <code>cgroupV2</code>.</li>\n    <li>vECU algorithm with <a href=\"#mod-container-node-coding-en\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n"
  },
  "container-node-coding": {
    "vi": "<section id=\"mod-container-node-coding\">\n  <h2 class=\"section-title\">Lập Trình Container Node</h2>\n  <p class=\"paragraph\">\n    Container Node chạy OCI image do bạn cung cấp. Bên trong container, bạn tự viết mã để giao tiếp với các pin qua\n    các giao thức chuẩn. Module này trình bày ba cách tiếp cận: <strong>Python</strong> (một lớp helper mỏng bọc\n    quanh KUKSA/CAN/tunnel/video), <strong>Rust</strong> (nói chuyện trực tiếp với CAN qua gRPC và tự triển khai\n    tầng UDS/ISO-TP) và <strong>C++</strong> (dùng thư viện mô phỏng bus <strong>Vector SIL Kit</strong>).\n    Toàn bộ code minh hoạ dưới đây là ví dụ tham khảo — <strong>không phải SDK chính thức của CarSky</strong>. Bạn\n    nên viết/tuỳ chỉnh mã tương đương trong image của riêng mình.\n  </p>\n\n  <h3 class=\"section-subtitle\">Python: KUKSA</h3>\n  <pre class=\"code-block\"><code>import a8_pin\n\nkuksa = a8_pin.kuksa(\"127.0.0.10:55555\")\nkuksa.set(\"Vehicle.Speed\", 60.5)\nkuksa.actuate(\"Vehicle.Chassis.Brake.PedalPosition\", 0.4)\n\ndef on_speed(path, dp):\n    print(path, dp.value)\n\nkuksa.subscribe([\"Vehicle.Speed\"], on_speed)</code></pre>\n\n  <h3 class=\"section-subtitle\">Python: CAN qua SocketCAN</h3>\n  <pre class=\"code-block\"><code>import a8_pin\n\nbus = a8_pin.can(\"can\")      # tên pin → vcan interface\ndef on_frame(f):\n    print(hex(f.can_id), f.data)\n\nbus.on_frame(on_frame)\nbus.send(0x123, b\"\\x01\\x02\\x03\\x04\")</code></pre>\n\n  <h3 class=\"section-subtitle\">Python: Tunnel</h3>\n  <pre class=\"code-block\"><code>import json\nimport a8_pin\n\nt = a8_pin.tunnel(\"road_gt\")\nt.on_frame(lambda data: print(json.loads(data)))\nt.send(json.dumps({\"event\": \"aeb\"}).encode())</code></pre>\n\n  <h3 class=\"section-subtitle\">Python: Video</h3>\n  <pre class=\"code-block\"><code>import a8_pin\n\n# SUBSCRIBER: đọc frame RGBA từ pin VIDEO IN\nv = a8_pin.video(\"VIDEO_IN_FRONT\")\nfor frame in v.frames():\n    print(frame.width, frame.height, len(frame.rgba))\n\n# PUBLISHER: gửi frame RGBA\npub = a8_pin.video_publisher(\"a8/video/replay/front\", 640, 360)\npub.publish(rgba_bytes)  # len = 640*360*4</code></pre>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong>Video: Publisher phải được tạo trước Subscriber.</strong> Nếu Subscriber mở trước, shared-memory video service sẽ khởi tạo buffer mặc định quá nhỏ, dẫn đến frame bị cắt ngầm. Luôn khởi động publisher trước khi có subscriber.\n    </div>\n  </div>\n\n  <div class=\"info-box\">\n    <strong>📖 Python:</strong> lớp helper này bọc quanh KUKSA (gRPC), CAN (SocketCAN), tunnel (WebSocket) và video\n    (shared-memory iceoryx2), ngoài ra còn có factory tương tự cho LIN, GPIO, Ethernet, zenoh và UDS. Coi các hàm\n    <code>a8_pin.kuksa(...)</code>/<code>a8_pin.can(...)</code>/<code>a8_pin.tunnel(...)</code>/<code>a8_pin.video(...)</code>\n    ở trên như chữ ký API mẫu — bạn viết lại một lớp tương đương, tự chọn thư viện client phù hợp với ngôn ngữ/runtime của mình.\n  </div>\n\n  <h3 class=\"section-subtitle\">C++: Mô Phỏng Bus Qua Vector SIL Kit</h3>\n  <p class=\"paragraph\">\n    Với C++, cách tiếp cận phổ biến là liên kết thư viện <strong>Vector SIL Kit</strong> chính thức thay vì tự mở\n    raw socket <code>AF_CAN</code>. Container tạo một <em>participant</em>, tham gia vào một SIL Kit registry nhúng\n    trong sidecar nydus, rồi tạo các <em>controller</em> CAN/LIN/Ethernet mang đúng tên pin đã khai báo trong\n    blueprint (tên network SIL Kit trùng tên pin, không cần quy đổi). Sidecar bắc cầu các controller đó sang bus\n    thật của room — ứng dụng C++ chỉ thấy một API gửi/nhận frame ở mức participant.\n  </p>\n  <p class=\"paragraph\">\n    Với pin <strong>KUKSA</strong> và <strong>VIDEO</strong> thì chưa có helper C++ tương đương — bạn tự dùng một\n    KUKSA gRPC client chuẩn, và đọc định dạng shared-memory iceoryx2 (28-byte header + RGBA) mà video bridge cung cấp.\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>vecu.cpp — participant + CAN controller</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>#include \"silkit/SilKit.hpp\"\n#include \"silkit/services/can/all.hpp\"\n\nnamespace SCan = SilKit::Services::Can;\n\nint main() {\n    auto pcfg = SilKit::Config::ParticipantConfigurationFromString(\n        R\"({\"Logging\":{\"Sinks\":[{\"Type\":\"Stdout\",\"Level\":\"Info\"}]}})\");\n    // registryUri trỏ tới SIL Kit registry nhúng trong sidecar nydus.\n    auto participant = SilKit::CreateParticipant(pcfg, \"PowertrainECU\", \"silkit://127.0.0.1:8500\");\n\n    // Tên network (\"PowertrainCAN\") phải khớp tên pin CAN trong blueprint.\n    auto* can = participant->CreateCanController(\"PowertrainECU.CAN\", \"PowertrainCAN\");\n    can->AddFrameHandler([](SCan::ICanController*, const SCan::CanFrameEvent& ev) {\n        std::cout &lt;&lt; \"RX id=0x\" &lt;&lt; std::hex &lt;&lt; ev.frame.canId\n                  &lt;&lt; \" len=\" &lt;&lt; ev.frame.dataField.size() &lt;&lt; \"\\n\";\n    });\n    can->Start();\n\n    // Gửi một frame EngineData mẫu (little-endian, 2 tín hiệu 16-bit).\n    std::vector&lt;uint8_t&gt; payload = {0xEE, 0x02, 0x64, 0x00, 0x00, 0x00, 0x00, 0x00};\n    SCan::CanFrame f{};\n    f.canId = 0x100;\n    f.dataField = SilKit::Util::ToSpan(payload);\n    f.dlc = uint16_t(payload.size());\n    can->SendFrame(f);\n}</code></pre></div>\n  </div>\n\n  <p class=\"paragraph\">\n    Nguyên tắc tương tự áp dụng cho LIN (<code>CreateLinController</code>, cấu hình Master/Slave + baud rate) và\n    Ethernet (<code>CreateEthernetController</code>, gửi/nhận frame L2 thô) — chỉ khác API controller, còn vòng đời\n    participant/registry giữ nguyên.\n  </p>\n\n  <h3 class=\"section-subtitle\">C++: Kết Nối Trực Tiếp Qua Linux vsock (AF_VSOCK)</h3>\n  <p class=\"paragraph\">\n    Khi node cần một kênh giao tiếp riêng với dịch vụ chạy bên trong guest VM (node <a href=\"#mod-skycraft-node\">Skycraft</a>)\n    mà không đi qua bridge CAN/LIN/Ethernet — ví dụ một giao thức tuỳ biến, một kênh debug, hay một stream nhị phân —\n    <strong>AF_VSOCK</strong> là lựa chọn tự nhiên: guest VM chạy trên crosvm/QEMU expose sẵn một vsock device, mỗi\n    VM có một <em>Context ID (CID)</em> riêng, tương tự địa chỉ IP nhưng chỉ có ý nghĩa host↔guest, không cần cấu\n    hình mạng ảo. Container Node (chạy trên host, tức Kubernetes node) kết nối vào CID của guest bằng socket API\n    chuẩn của Linux, không cần thư viện thứ ba.\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>vsock_client.cpp — kết nối tới guest VM qua AF_VSOCK</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>#include &lt;linux/vm_sockets.h&gt;\n#include &lt;sys/socket.h&gt;\n#include &lt;unistd.h&gt;\n#include &lt;cstring&gt;\n#include &lt;iostream&gt;\n\nint main() {\n    int fd = socket(AF_VSOCK, SOCK_STREAM, 0);\n    if (fd < 0) { perror(\"socket(AF_VSOCK)\"); return 1; }\n\n    sockaddr_vm addr{};\n    addr.svm_family = AF_VSOCK;\n    addr.svm_cid = 3;       // CID của guest VM (lấy từ metadata node/blueprint)\n    addr.svm_port = 9300;   // port do dịch vụ trong guest lắng nghe\n\n    if (connect(fd, reinterpret_cast&lt;sockaddr*&gt;(&amp;addr), sizeof(addr)) < 0) {\n        perror(\"connect(vsock)\");\n        close(fd);\n        return 1;\n    }\n\n    const char msg[] = \"PING\\n\";\n    write(fd, msg, sizeof(msg) - 1);\n\n    char buf[256];\n    ssize_t n = read(fd, buf, sizeof(buf));\n    if (n > 0) std::cout.write(buf, n);\n\n    close(fd);\n}</code></pre></div>\n  </div>\n\n  <p class=\"paragraph\">\n    Về phía guest (bên trong VM), dịch vụ chỉ cần <code>bind()</code>/<code>listen()</code> trên một\n    <code>sockaddr_vm</code> với <code>svm_cid = VMADDR_CID_ANY</code> và cùng port — hoàn toàn đối xứng với ví dụ\n    client ở trên, chỉ đảo vai trò connect/accept. Vì đây là API socket chuẩn của kernel Linux, cùng một cách viết\n    áp dụng được cho C, Rust (<code>libc::AF_VSOCK</code>) hay bất kỳ ngôn ngữ nào có binding socket POSIX.\n  </p>\n\n  <h3 class=\"section-subtitle\">Rust: CAN Qua gRPC + Tầng UDS/ISO-TP Tự Triển Khai</h3>\n  <p class=\"paragraph\">\n    Với Rust, một cách tiếp cận là nói chuyện với pin CAN qua gRPC (client sinh bởi <strong>tonic</strong> từ proto\n    của dịch vụ can-bus) thay vì socket CAN trực tiếp, rồi tự xử lý tầng ISO-TP/UDS phía trên (session, security\n    access, đọc/ghi DID, quản lý DTC, routine). Hiện chưa có crate pin cấp cao kiểu <code>a8_pin</code> của Python cho\n    hướng này — bạn ghép một thư viện ISO-TP/UDS (tự viết hoặc mã nguồn mở) với một gRPC client CAN của riêng mình.\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>main.rs — subscribe ID chẩn đoán + đọc DID</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>// Kết nối tới dịch vụ CAN qua gRPC (endpoint dạng http://can-bus:50051).\nlet mut client = CanBusClient::connect(endpoint).await?;\n\n// Subscribe hai ID chẩn đoán: physical request (0x7E0) + functional (0x7DF).\nlet (out_tx, out_rx) = tokio::sync::mpsc::unbounded_channel();\nout_tx.send(ClientMessage::subscribe(vec![0x7E0, 0x7DF]))?;\n\nlet mut inbound = client.exchange(out_rx).await?.into_inner();\nwhile let Some(frame) = inbound.message().await? {\n    // Đẩy frame nhận được vào tầng ISO-TP/UDS tự viết; tầng này ghép lại\n    // các segment, xử lý session/security, rồi gọi handler đọc DID bên dưới.\n    for reply in uds_server.feed_frame(frame.id, &amp;frame.data) {\n        out_tx.send(ClientMessage::from_can_frame(reply))?;\n    }\n}\n\n// Ví dụ handler đọc DID tĩnh (0xF190 = VIN).\nfn read_did(did: u16) -> Option&lt;Vec&lt;u8&gt;&gt; {\n    match did {\n        0xF190 => Some(b\"VIN1234567890ABCDE\".to_vec()),\n        _ => None,\n    }\n}</code></pre></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Ví dụ Dockerfile (Python)</h3>\n  <pre class=\"code-block\"><code>FROM python:3.12-slim\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\nCOPY a8_pin/ ./a8_pin/\nCOPY main.py .\nCMD [\"python\", \"main.py\"]</code></pre>\n  <p class=\"paragraph\">\n    Container cho C++/Rust theo cùng nguyên tắc multi-stage: một stage build (biên dịch với toolchain + thư viện\n    liên quan như SIL Kit hoặc tonic/prost) và một stage runtime gọn nhẹ chỉ chứa binary đã build cùng các thư viện\n    chia sẻ cần thiết lúc chạy.\n  </p>\n</section>\n",
    "en": "<section id=\"mod-container-node-coding-en\">\n  <h2 class=\"section-title\">Container Node Coding</h2>\n  <p class=\"paragraph\">\n    A Container Node runs an OCI image you provide. Inside the container you write code that talks to pins through\n    standard protocols. This module covers three approaches: <strong>Python</strong> (a thin helper layer around\n    KUKSA/CAN/tunnel/video), <strong>Rust</strong> (talking to CAN directly over gRPC and implementing the UDS/ISO-TP\n    layer yourself), and <strong>C++</strong> (using the <strong>Vector SIL Kit</strong> bus-simulation library). All\n    the sample code below is illustrative — <strong>a reference pattern, not an official CarSky SDK</strong>. Write\n    and adapt equivalent code in your own image.\n  </p>\n\n  <h3 class=\"section-subtitle\">Python: KUKSA</h3>\n  <pre class=\"code-block\"><code>import a8_pin\n\nkuksa = a8_pin.kuksa(\"127.0.0.10:55555\")\nkuksa.set(\"Vehicle.Speed\", 60.5)\nkuksa.actuate(\"Vehicle.Chassis.Brake.PedalPosition\", 0.4)\n\ndef on_speed(path, dp):\n    print(path, dp.value)\n\nkuksa.subscribe([\"Vehicle.Speed\"], on_speed)</code></pre>\n\n  <h3 class=\"section-subtitle\">Python: CAN via SocketCAN</h3>\n  <pre class=\"code-block\"><code>import a8_pin\n\nbus = a8_pin.can(\"can\")      # pin name becomes the vcan interface\n\ndef on_frame(f):\n    print(hex(f.can_id), f.data)\n\nbus.on_frame(on_frame)\nbus.send(0x123, b\"\\x01\\x02\\x03\\x04\")</code></pre>\n\n  <h3 class=\"section-subtitle\">Python: Tunnel</h3>\n  <pre class=\"code-block\"><code>import json\nimport a8_pin\n\nt = a8_pin.tunnel(\"road_gt\")\nt.on_frame(lambda data: print(json.loads(data)))\nt.send(json.dumps({\"event\": \"aeb\"}).encode())</code></pre>\n\n  <h3 class=\"section-subtitle\">Python: Video</h3>\n  <pre class=\"code-block\"><code>import a8_pin\n\n# SUBSCRIBER: read RGBA frames from a VIDEO IN pin\nv = a8_pin.video(\"VIDEO_IN_FRONT\")\nfor frame in v.frames():\n    print(frame.width, frame.height, len(frame.rgba))\n\n# PUBLISHER: send RGBA frames\npub = a8_pin.video_publisher(\"a8/video/replay/front\", 640, 360)\npub.publish(rgba_bytes)  # len = 640*360*4</code></pre>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong>Video: the Publisher must be created before any Subscriber.</strong> If a Subscriber opens first, the shared-memory video service initializes its default buffer\n      too small, silently truncating frames. Always start the publisher before subscribers exist.\n    </div>\n  </div>\n\n  <div class=\"info-box\">\n    <strong>📖 Python:</strong> this helper layer wraps KUKSA (gRPC), CAN (SocketCAN), tunnel (WebSocket), and video\n    (iceoryx2 shared memory), plus similar factories for LIN, GPIO, Ethernet, zenoh, and UDS. Treat the\n    <code>a8_pin.kuksa(...)</code>/<code>a8_pin.can(...)</code>/<code>a8_pin.tunnel(...)</code>/<code>a8_pin.video(...)</code>\n    calls above as a sample API surface — write an equivalent layer, picking whatever client library fits your\n    language and runtime.\n  </div>\n\n  <h3 class=\"section-subtitle\">C++: Bus Simulation via Vector SIL Kit</h3>\n  <p class=\"paragraph\">\n    For C++, a common approach is linking the official <strong>Vector SIL Kit</strong> library instead of opening raw\n    <code>AF_CAN</code> sockets yourself. The container creates one <em>participant</em>, joins an embedded SIL Kit\n    registry running in the nydus sidecar, then creates CAN/LIN/Ethernet <em>controllers</em> named exactly after the\n    pins declared in the blueprint (the SIL Kit network name matches the pin name verbatim, no translation needed).\n    The sidecar bridges those controllers onto the room's real bus — the C++ app only ever sees a participant-level\n    send/receive-frame API.\n  </p>\n  <p class=\"paragraph\">\n    For <strong>KUKSA</strong> and <strong>VIDEO</strong> pins there is no equivalent C++ helper yet — use a standard\n    KUKSA gRPC client, and read the iceoryx2 shared-memory format (28-byte header + RGBA) that the video bridge\n    provides.\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>vecu.cpp — participant + CAN controller</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>#include \"silkit/SilKit.hpp\"\n#include \"silkit/services/can/all.hpp\"\n\nnamespace SCan = SilKit::Services::Can;\n\nint main() {\n    auto pcfg = SilKit::Config::ParticipantConfigurationFromString(\n        R\"({\"Logging\":{\"Sinks\":[{\"Type\":\"Stdout\",\"Level\":\"Info\"}]}})\");\n    // registryUri points at the SIL Kit registry embedded in the nydus sidecar.\n    auto participant = SilKit::CreateParticipant(pcfg, \"PowertrainECU\", \"silkit://127.0.0.1:8500\");\n\n    // The network name (\"PowertrainCAN\") must match the CAN pin name in the blueprint.\n    auto* can = participant->CreateCanController(\"PowertrainECU.CAN\", \"PowertrainCAN\");\n    can->AddFrameHandler([](SCan::ICanController*, const SCan::CanFrameEvent& ev) {\n        std::cout &lt;&lt; \"RX id=0x\" &lt;&lt; std::hex &lt;&lt; ev.frame.canId\n                  &lt;&lt; \" len=\" &lt;&lt; ev.frame.dataField.size() &lt;&lt; \"\\n\";\n    });\n    can->Start();\n\n    // Send a sample EngineData frame (little-endian, two 16-bit signals).\n    std::vector&lt;uint8_t&gt; payload = {0xEE, 0x02, 0x64, 0x00, 0x00, 0x00, 0x00, 0x00};\n    SCan::CanFrame f{};\n    f.canId = 0x100;\n    f.dataField = SilKit::Util::ToSpan(payload);\n    f.dlc = uint16_t(payload.size());\n    can->SendFrame(f);\n}</code></pre></div>\n  </div>\n\n  <p class=\"paragraph\">\n    The same pattern applies to LIN (<code>CreateLinController</code>, configured with Master/Slave mode + baud rate)\n    and Ethernet (<code>CreateEthernetController</code>, sending/receiving raw L2 frames) — only the controller API\n    differs, the participant/registry lifecycle stays the same.\n  </p>\n\n  <h3 class=\"section-subtitle\">C++: Connecting Directly via Linux vsock (AF_VSOCK)</h3>\n  <p class=\"paragraph\">\n    When a node needs a private channel to a service running inside a <a href=\"#mod-skycraft-node-en\">Skycraft</a>\n    guest VM without going through the CAN/LIN/Ethernet bridge — a custom protocol, a debug channel, or a raw binary\n    stream — <strong>AF_VSOCK</strong> is the natural fit: a guest VM running on crosvm/QEMU exposes a vsock device,\n    and each VM has its own <em>Context ID (CID)</em> — similar to an IP address, but meaningful only host↔guest, with\n    no virtual networking required. A Container Node (running on the host, i.e. the Kubernetes node) connects to the\n    guest's CID using Linux's standard socket API — no third-party library needed.\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>vsock_client.cpp — connecting to a guest VM over AF_VSOCK</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>#include &lt;linux/vm_sockets.h&gt;\n#include &lt;sys/socket.h&gt;\n#include &lt;unistd.h&gt;\n#include &lt;cstring&gt;\n#include &lt;iostream&gt;\n\nint main() {\n    int fd = socket(AF_VSOCK, SOCK_STREAM, 0);\n    if (fd < 0) { perror(\"socket(AF_VSOCK)\"); return 1; }\n\n    sockaddr_vm addr{};\n    addr.svm_family = AF_VSOCK;\n    addr.svm_cid = 3;       // the guest VM's CID (from node metadata/blueprint)\n    addr.svm_port = 9300;   // port the service inside the guest listens on\n\n    if (connect(fd, reinterpret_cast&lt;sockaddr*&gt;(&amp;addr), sizeof(addr)) < 0) {\n        perror(\"connect(vsock)\");\n        close(fd);\n        return 1;\n    }\n\n    const char msg[] = \"PING\\n\";\n    write(fd, msg, sizeof(msg) - 1);\n\n    char buf[256];\n    ssize_t n = read(fd, buf, sizeof(buf));\n    if (n > 0) std::cout.write(buf, n);\n\n    close(fd);\n}</code></pre></div>\n  </div>\n\n  <p class=\"paragraph\">\n    On the guest side, the service just needs to <code>bind()</code>/<code>listen()</code> on a\n    <code>sockaddr_vm</code> with <code>svm_cid = VMADDR_CID_ANY</code> and the matching port — a mirror image of the\n    client above, with connect/accept roles swapped. Since this is the standard Linux kernel socket API, the same\n    pattern works from C, Rust (<code>libc::AF_VSOCK</code>), or any language with POSIX socket bindings.\n  </p>\n\n  <h3 class=\"section-subtitle\">Rust: CAN over gRPC + a Hand-Rolled UDS/ISO-TP Layer</h3>\n  <p class=\"paragraph\">\n    For Rust, one approach is talking to the CAN pin over gRPC (a client generated by <strong>tonic</strong> from the\n    can-bus service's proto) instead of a direct CAN socket, then handling the ISO-TP/UDS layer above it yourself\n    (session, security access, DID read/write, DTC management, routines). There's no high-level pin crate like\n    Python's <code>a8_pin</code> for this path yet — you pair an ISO-TP/UDS library (hand-written or open-source) with\n    your own CAN gRPC client.\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>main.rs — subscribe diagnostic IDs + read a DID</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>// Connect to the CAN service over gRPC (endpoint like http://can-bus:50051).\nlet mut client = CanBusClient::connect(endpoint).await?;\n\n// Subscribe to the two diagnostic IDs: physical request (0x7E0) + functional (0x7DF).\nlet (out_tx, out_rx) = tokio::sync::mpsc::unbounded_channel();\nout_tx.send(ClientMessage::subscribe(vec![0x7E0, 0x7DF]))?;\n\nlet mut inbound = client.exchange(out_rx).await?.into_inner();\nwhile let Some(frame) = inbound.message().await? {\n    // Feed the received frame into a hand-rolled ISO-TP/UDS layer, which\n    // reassembles segments, handles session/security, and calls the DID\n    // read handler below.\n    for reply in uds_server.feed_frame(frame.id, &amp;frame.data) {\n        out_tx.send(ClientMessage::from_can_frame(reply))?;\n    }\n}\n\n// Sample static DID read handler (0xF190 = VIN).\nfn read_did(did: u16) -> Option&lt;Vec&lt;u8&gt;&gt; {\n    match did {\n        0xF190 => Some(b\"VIN1234567890ABCDE\".to_vec()),\n        _ => None,\n    }\n}</code></pre></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Example Dockerfile (Python)</h3>\n  <pre class=\"code-block\"><code>FROM python:3.12-slim\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\nCOPY a8_pin/ ./a8_pin/\nCOPY main.py .\nCMD [\"python\", \"main.py\"]</code></pre>\n  <p class=\"paragraph\">\n    C++/Rust containers follow the same multi-stage pattern: a build stage (compiling with the relevant toolchain and\n    libraries such as SIL Kit or tonic/prost) and a slim runtime stage that only carries the built binary plus the\n    shared libraries it needs at runtime.\n  </p>\n</section>\n"
  },
  "kuksa-broker-node": {
    "vi": "<section id=\"mod-kuksa-broker-node\">\n  <h2 class=\"section-title\">KUKSA Broker Node</h2>\n  <p class=\"paragraph\">\n    Node <strong>KUKSA Databroker</strong> là một server gRPC duy nhất trong room, lưu trữ và phân phối tín hiệu xe theo cây\n    <strong>Vehicle Signal Specification (VSS)</strong>. Các node khác (Script Node, Container Node, Skycraft) kết nối đến broker này\n    qua pin <code>kuksa</code> để đọc/ghi tín hiệu.\n  </p>\n\n  <h3 class=\"section-subtitle\">Cấu hình</h3>\n  <pre class=\"code-block\"><code>{\n  \"kuksa\": {\n    \"vss\": {\n      \"artifactId\": \"JOSNDJcuXslUAWO66PrM3\",\n      \"versionId\": \"Wp8W_2Nroxch2b7y5hMlo\",\n      \"version\": \"0.0.1\"\n    },\n    \"insecure\": true\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Trường</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>kuksa.vss.artifactId</code></td><td>ID artifact VSS JSON trong thư viện Artifact.</td></tr>\n      <tr><td><code>kuksa.vss.versionId</code></td><td>ID phiên bản artifact VSS cần dùng.</td></tr>\n      <tr><td><code>kuksa.vss.version</code></td><td>Nhãn phiên bản hiển thị (ví dụ <code>0.0.1</code>).</td></tr>\n      <tr><td><code>kuksa.insecure</code></td><td>Mặc định <code>true</code>: chạy gRPC không TLS trong room.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pin và cổng</h3>\n  <ul>\n    <li>Chỉ cho phép pin <strong>kuksa</strong>.</li>\n    <li>Broker có một gRPC server duy nhất; mọi pin <code>kuksa</code> trên cùng node chia sẻ một cổng.</li>\n    <li>Cổng mặc định: <code>55555</code>. Nếu các pin khai báo <code>port</code> khác nhau, blueprint sẽ bị từ chối.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Gợi ý sử dụng</h3>\n  <ul>\n    <li>Đặt một KUKSA Broker trung tâm cho mỗi room để làm nguồn dữ liệu VSS chung.</li>\n    <li>Nối Script Node hoặc Container Node vào broker qua pin <code>kuksa</code> để gateway chuyển đổi VSS ↔ CAN/VHAL.</li>\n    <li>Xem API client trong <a href=\"#mod-script-node-kuksa\">Script Node KUKSA/VSS Pin</a> và <a href=\"#mod-container-node-coding\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-kuksa-broker-node-en\">\n  <h2 class=\"section-title\">KUKSA Broker Node</h2>\n  <p class=\"paragraph\">\n    The <strong>KUKSA Databroker</strong> node is a single gRPC server in the room that stores and distributes vehicle signals\n    using the <strong>Vehicle Signal Specification (VSS)</strong> tree. Other nodes (Script Node, Container Node, Skycraft)\n    connect to it through a <code>kuksa</code> pin to read/write signals.\n  </p>\n\n  <h3 class=\"section-subtitle\">Configuration</h3>\n  <pre class=\"code-block\"><code>{\n  \"kuksa\": {\n    \"vss\": {\n      \"artifactId\": \"JOSNDJcuXslUAWO66PrM3\",\n      \"versionId\": \"Wp8W_2Nroxch2b7y5hMlo\",\n      \"version\": \"0.0.1\"\n    },\n    \"insecure\": true\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Field</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>kuksa.vss.artifactId</code></td><td>VSS JSON artifact ID in the Artifact library.</td></tr>\n      <tr><td><code>kuksa.vss.versionId</code></td><td>Artifact version ID to use.</td></tr>\n      <tr><td><code>kuksa.vss.version</code></td><td>Display version label (e.g. <code>0.0.1</code>).</td></tr>\n      <tr><td><code>kuksa.insecure</code></td><td>Defaults to <code>true</code>: runs gRPC without TLS inside the room.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pins and port</h3>\n  <ul>\n    <li>Only <strong>kuksa</strong> pins are allowed.</li>\n    <li>The broker has a single gRPC server; every <code>kuksa</code> pin on the node shares one port.</li>\n    <li>Default port: <code>55555</code>. If pins declare different <code>port</code> values, the blueprint is rejected.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Usage tips</h3>\n  <ul>\n    <li>Use one central KUKSA Broker per room as the shared VSS data source.</li>\n    <li>Wire a Script Node or Container Node to the broker via a <code>kuksa</code> pin to build VSS ↔ CAN/VHAL gateways.</li>\n    <li>See client APIs in <a href=\"#mod-script-node-kuksa-en\">Script Node KUKSA/VSS Pin</a> and <a href=\"#mod-container-node-coding-en\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n"
  },
  "proxy-node": {
    "vi": "<section id=\"mod-proxy-node\">\n  <h2 class=\"section-title\">Proxy / Outpost Node</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-proxy-outpost.png\" alt=\"Proxy / Outpost node tham chiếu Scout hub.\">\n    <figcaption>Proxy / Outpost node tham chiếu Scout hub.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    Node <strong>Proxy / Outpost</strong> mở rộng room ra phần cứng biên (edge). Nó tham chiếu tới một <strong>Hub</strong> đã đăng ký (Scout CR) và hiện thực hóa các pin mà hub quảng cáo thành Kubernetes Services trong cluster, để mọi workload trong room có thể sử dụng như pin local.\n  </p>\n\n  <h3 class=\"section-subtitle\">Vòng đờI</h3>\n  <ol>\n    <li>Vận hành cài đặt agent <strong>Scout</strong> trên PC/laptop/bench từ xa.</li>\n    <li>Scout kết nối ngược về hệ thống và xuất hiện trong <strong>Rework → Hubs</strong> ở trạng thái <code>Pending</code>.</li>\n    <li>Admin phê duyệt hub; các pin được quảng cáo sẽ hiển thị.</li>\n    <li>Trong blueprint, thêm node <strong>Outpost</strong> và đặt <code>scoutRef</code> là tên hub.</li>\n    <li>Khai báo các pin trên Outpost node là tập con của các pin mà Scout quảng cáo.</li>\n  </ol>\n\n  <h3 class=\"section-subtitle\">Cấu hình</h3>\n  <pre class=\"code-block\"><code>{\n  \"outpost\": {\n    \"scoutRef\": \"hil-bench-1\"\n  }\n}</code></pre>\n\n  <h3 class=\"section-subtitle\">Các loại pin hỗ trợ</h3>\n  <p class=\"paragraph\">\n    Các loại pin cụ thể phụ thuộc vào Scout quảng cáo. Thường gặp:\n  </p>\n  <ul>\n    <li><strong>can</strong> — Giao diện CAN vật lý trên hub (qua SocketCAN).</li>\n    <li><strong>lin</strong> — Giao diện LIN vật lý.</li>\n    <li><strong>gpio</strong> — GPIO / hardkey panel vật lý.</li>\n    <li><strong>ethernet</strong> — Mở rộng Ethernet Bridge ra hub; cần target bridge node.</li>\n    <li><strong>tunnel</strong> — Luồng byte TCP generic tới hub.</li>\n    <li><strong>audio</strong> — Audio capture/playback từ xa.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Quy tắc validate</h3>\n  <ul>\n    <li>Tên mỗi Outpost pin phải khớp chính xác node/pin mà Scout quảng cáo.</li>\n    <li>Loại pin phải nằm trong allowlist <code>allowedPinKinds</code> của Scout.</li>\n    <li>Scout phải ở trạng thái <code>Ready</code> trước khi blueprint deploy được.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Use case</h3>\n  <ul>\n    <li>HIL bench có phần cứng CAN/LIN thật.</li>\n    <li>Sensor và GPIO panel từ xa.</li>\n    <li>Nối mạng L2 on-premise vào room qua Ethernet Bridge.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-proxy-node-en\">\n  <h2 class=\"section-title\">Proxy / Outpost Node</h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/node-proxy-outpost.png\" alt=\"Proxy / Outpost node referencing a Scout hub.\">\n    <figcaption>Proxy / Outpost node referencing a Scout hub.</figcaption>\n  </figure>\n\n  <p class=\"paragraph\">\n    A <strong>Proxy / Outpost</strong> node extends a room to physical hardware at the edge. It references a registered <strong>Hub</strong> (Scout CR) and materializes the hub's advertised pins as Kubernetes Services inside the cluster, so any room workload can consume them like local pins.\n  </p>\n\n  <h3 class=\"section-subtitle\">Lifecycle</h3>\n  <ol>\n    <li>An operator installs the <strong>Scout</strong> agent on a remote PC/laptop/bench.</li>\n    <li>The Scout connects back and appears in <strong>Rework → Hubs</strong> as <code>Pending</code>.</li>\n    <li>An admin accepts the hub; its advertised pins become visible.</li>\n    <li>In a blueprint, add an <strong>Outpost</strong> node and set <code>scoutRef</code> to the hub name.</li>\n    <li>Declare pins on the Outpost node that are a subset of the Scout's advertised pins.</li>\n  </ol>\n\n  <h3 class=\"section-subtitle\">Configuration</h3>\n  <pre class=\"code-block\"><code>{\n  \"outpost\": {\n    \"scoutRef\": \"hil-bench-1\"\n  }\n}</code></pre>\n\n  <h3 class=\"section-subtitle\">Supported pin kinds</h3>\n  <p class=\"paragraph\">\n    The exact pin kinds available depend on what the remote Scout advertises. Commonly:\n  </p>\n  <ul>\n    <li><strong>can</strong> — Physical CAN interface on the hub (via SocketCAN).</li>\n    <li><strong>lin</strong> — Physical LIN interface.</li>\n    <li><strong>gpio</strong> — Physical GPIO / hardkey panel.</li>\n    <li><strong>ethernet</strong> — Extend an Ethernet Bridge to the hub; requires a target bridge node.</li>\n    <li><strong>tunnel</strong> — Generic TCP byte stream to the hub.</li>\n    <li><strong>audio</strong> — Remote audio capture/playback.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Validation rules</h3>\n  <ul>\n    <li>Each Outpost pin name must match a node/pin advertised by the Scout verbatim.</li>\n    <li>The pin kind must be in the Scout's <code>allowedPinKinds</code> allowlist.</li>\n    <li>The Scout must be in <code>Ready</code> state before the blueprint can deploy.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Use cases</h3>\n  <ul>\n    <li>HIL benches with real CAN/LIN hardware.</li>\n    <li>Remote sensors and GPIO panels.</li>\n    <li>Bridging an on-premise L2 network into the room via an Ethernet Bridge.</li>\n  </ul>\n</section>\n"
  },
  "can-bus-node": {
    "vi": "<section id=\"mod-can-bus-node\">\n  <h2 class=\"section-title\">CAN Bus Node</h2>\n  <p class=\"paragraph\">\n    Node <strong>CAN Bus</strong> là server gRPC cung cấp hai tầng API: <strong>raw CAN frame</strong> và <strong>symbolic DBC</strong>.\n    Node này thường đóng vai trò \"bus master\" trong room: các Script Node / Container Node nối pin <code>can</code> vào đây để\n    gửi/nhận frame, còn CAN Bus Node tự động encode/decode theo file DBC đã upload.\n  </p>\n\n  <h3 class=\"section-subtitle\">Cấu hình</h3>\n  <pre class=\"code-block\"><code>{\n  \"canBus\": {\n    \"dbc\": {\n      \"artifactId\": \"0vYW3DS6QtsnU413ORGx6\",\n      \"versionId\": \"B0Gtv4_HuE98SszeUpdvN\",\n      \"version\": \"0.0.1\"\n    },\n    \"filterNodes\": [\"EngineECU\", \"BodyECU\"],\n    \"filterMessages\": [0x123, 0x456],\n    \"socketcanInterface\": \"can0\"\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Trường</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>canBus.dbc.artifactId</code></td><td>ID artifact file DBC.</td></tr>\n      <tr><td><code>canBus.dbc.versionId</code></td><td>ID phiên bản DBC.</td></tr>\n      <tr><td><code>canBus.dbc.version</code></td><td>Nhãn phiên bản hiển thị.</td></tr>\n      <tr><td><code>canBus.filterNodes</code></td><td>Chỉ giữ lại message thuộc các DBC node chỉ định (AND với filterMessages).</td></tr>\n      <tr><td><code>canBus.filterMessages</code></td><td>Chỉ giữ lại các CAN ID chỉ định (AND với filterNodes).</td></tr>\n      <tr><td><code>canBus.socketcanInterface</code></td><td>Tên interface SocketCAN vật lý (ví dụ <code>can0</code>) để cầu nối với bus thật; bỏ qua nếu chỉ dùng bus ảo trong room.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pin và cổng</h3>\n  <ul>\n    <li>Chỉ cho phép pin <strong>can</strong>.</li>\n    <li>Server gRPC duy nhất; mọi pin <code>can</code> chia sẻ cổng mặc định <code>29000</code>.</li>\n    <li>Các pin của client node (Script/Container) phải khai báo <code>target</code> trỏ đến CAN Bus Node này.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Gợi ý sử dụng</h3>\n  <ul>\n    <li>Mỗi bus logic (PWT, BCM, chassis...) nên có một CAN Bus Node riêng với DBC tương ứng.</li>\n    <li>Dùng <code>filterNodes</code> để giảm tải khi DBC lớn chứa nhiều ECU không liên quan.</li>\n    <li>Xem API client trong <a href=\"#mod-script-node-can\">Script Node CAN/LIN Pin</a> và <a href=\"#mod-container-node-coding\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-can-bus-node-en\">\n  <h2 class=\"section-title\">CAN Bus Node</h2>\n  <p class=\"paragraph\">\n    The <strong>CAN Bus</strong> node is a gRPC server that provides two API layers: <strong>raw CAN frames</strong>\n    and <strong>DBC symbolic signals</strong>. It usually acts as the \"bus master\" in the room: Script Nodes / Container Nodes\n    connect their <code>can</code> pins here to send/receive frames, while the CAN Bus Node automatically encodes/decodes\n    using the uploaded DBC file.\n  </p>\n\n  <h3 class=\"section-subtitle\">Configuration</h3>\n  <pre class=\"code-block\"><code>{\n  \"canBus\": {\n    \"dbc\": {\n      \"artifactId\": \"0vYW3DS6QtsnU413ORGx6\",\n      \"versionId\": \"B0Gtv4_HuE98SszeUpdvN\",\n      \"version\": \"0.0.1\"\n    },\n    \"filterNodes\": [\"EngineECU\", \"BodyECU\"],\n    \"filterMessages\": [0x123, 0x456],\n    \"socketcanInterface\": \"can0\"\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Field</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>canBus.dbc.artifactId</code></td><td>DBC file artifact ID.</td></tr>\n      <tr><td><code>canBus.dbc.versionId</code></td><td>DBC artifact version ID.</td></tr>\n      <tr><td><code>canBus.dbc.version</code></td><td>Display version label.</td></tr>\n      <tr><td><code>canBus.filterNodes</code></td><td>Keep only messages belonging to the listed DBC nodes (AND with filterMessages).</td></tr>\n      <tr><td><code>canBus.filterMessages</code></td><td>Keep only the listed CAN IDs (AND with filterNodes).</td></tr>\n      <tr><td><code>canBus.socketcanInterface</code></td><td>Physical SocketCAN interface name (e.g. <code>can0</code>) to bridge to a real bus; omit for a virtual in-room bus.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pins and port</h3>\n  <ul>\n    <li>Only <strong>can</strong> pins are allowed.</li>\n    <li>Single gRPC server; every <code>can</code> pin shares the default port <code>29000</code>.</li>\n    <li>Client pins on Script/Container nodes must declare a <code>target</code> pointing to this CAN Bus Node.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Usage tips</h3>\n  <ul>\n    <li>Create one CAN Bus Node per logical bus (PWT, BCM, chassis...) with its own DBC.</li>\n    <li>Use <code>filterNodes</code> to reduce load when a large DBC contains many unrelated ECUs.</li>\n    <li>See client APIs in <a href=\"#mod-script-node-can-en\">Script Node CAN/LIN Pin</a> and <a href=\"#mod-container-node-coding-en\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n"
  },
  "lin-bus-node": {
    "vi": "<section id=\"mod-lin-bus-node\">\n  <h2 class=\"section-title\">LIN Bus Node</h2>\n  <p class=\"paragraph\">\n    Node <strong>LIN Bus</strong> là server gRPC tương đương với CAN Bus Node nhưng dành cho bus LIN.\n    Nó decode/encode frame LIN theo file <strong>LDF</strong> và hỗ trợ lập lịch (schedule table) theo định nghĩa LDF.\n  </p>\n\n  <h3 class=\"section-subtitle\">Cấu hình</h3>\n  <pre class=\"code-block\"><code>{\n  \"linBus\": {\n    \"ldf\": {\n      \"artifactId\": \"aBc123XyZ\",\n      \"versionId\": \"vErSiOnId\",\n      \"version\": \"0.0.1\"\n    },\n    \"filterNodes\": [\"DoorSlave\", \"SeatECU\"],\n    \"initialSchedule\": \"DoorSchedule\",\n    \"uartDevice\": \"/dev/ttyAMA0\"\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Trường</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>linBus.ldf.artifactId</code></td><td>ID artifact file LDF.</td></tr>\n      <tr><td><code>linBus.ldf.versionId</code></td><td>ID phiên bản LDF.</td></tr>\n      <tr><td><code>linBus.ldf.version</code></td><td>Nhãn phiên bản hiển thị.</td></tr>\n      <tr><td><code>linBus.filterNodes</code></td><td>Chỉ giữ lại frame/signal thuộc các node LDF chỉ định.</td></tr>\n      <tr><td><code>linBus.initialSchedule</code></td><td>Tên schedule table trong LDF sẽ tự động chạy khi node khởi động.</td></tr>\n      <tr><td><code>linBus.uartDevice</code></td><td>Thiết bị UART vật lý để cầu nối với bus LIN thật; bỏ qua nếu chỉ dùng bus ảo.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pin và cổng</h3>\n  <ul>\n    <li>Chỉ cho phép pin <strong>lin</strong>.</li>\n    <li>Server gRPC duy nhất; mọi pin <code>lin</code> chia sẻ cổng mặc định.</li>\n    <li>Pin client trên Script/Container Node phải khai báo <code>target</code> trỏ đến LIN Bus Node này.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Gợi ý sử dụng</h3>\n  <ul>\n    <li>Dùng một LIN Bus Node riêng cho mỗi bus LIN trong hệ thống (cửa, ghế, đèn...).</li>\n    <li>Đảm bảo LDF chứa đúng schedule table tên trong <code>initialSchedule</code> nếu bạn cần tự chạy lập lịch.</li>\n    <li>Xem API client trong <a href=\"#mod-script-node-can\">Script Node CAN/LIN Pin</a> và <a href=\"#mod-container-node-coding\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-lin-bus-node-en\">\n  <h2 class=\"section-title\">LIN Bus Node</h2>\n  <p class=\"paragraph\">\n    The <strong>LIN Bus</strong> node is the LIN equivalent of the CAN Bus Node: a gRPC server that decodes/encodes\n    LIN frames using an <strong>LDF</strong> file and supports schedule tables defined in that LDF.\n  </p>\n\n  <h3 class=\"section-subtitle\">Configuration</h3>\n  <pre class=\"code-block\"><code>{\n  \"linBus\": {\n    \"ldf\": {\n      \"artifactId\": \"aBc123XyZ\",\n      \"versionId\": \"vErSiOnId\",\n      \"version\": \"0.0.1\"\n    },\n    \"filterNodes\": [\"DoorSlave\", \"SeatECU\"],\n    \"initialSchedule\": \"DoorSchedule\",\n    \"uartDevice\": \"/dev/ttyAMA0\"\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Field</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>linBus.ldf.artifactId</code></td><td>LDF file artifact ID.</td></tr>\n      <tr><td><code>linBus.ldf.versionId</code></td><td>LDF artifact version ID.</td></tr>\n      <tr><td><code>linBus.ldf.version</code></td><td>Display version label.</td></tr>\n      <tr><td><code>linBus.filterNodes</code></td><td>Keep only frames/signals belonging to the listed LDF nodes.</td></tr>\n      <tr><td><code>linBus.initialSchedule</code></td><td>Name of the LDF schedule table to auto-run on startup.</td></tr>\n      <tr><td><code>linBus.uartDevice</code></td><td>Physical UART device to bridge to a real LIN bus; omit for a virtual in-room bus.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pins and port</h3>\n  <ul>\n    <li>Only <strong>lin</strong> pins are allowed.</li>\n    <li>Single gRPC server; every <code>lin</code> pin shares the default port.</li>\n    <li>Client pins on Script/Container nodes must declare a <code>target</code> pointing to this LIN Bus Node.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Usage tips</h3>\n  <ul>\n    <li>Use a separate LIN Bus Node per LIN bus in the system (doors, seats, lights...).</li>\n    <li>Make sure the LDF contains the schedule table named in <code>initialSchedule</code> if you need auto-scheduling.</li>\n    <li>See client APIs in <a href=\"#mod-script-node-can-en\">Script Node CAN/LIN Pin</a> and <a href=\"#mod-container-node-coding-en\">Container Node Coding</a>.</li>\n  </ul>\n</section>\n"
  },
  "device-proxy-node": {
    "vi": "<section id=\"mod-device-proxy-node\">\n  <h2 class=\"section-title\">Device Proxy Node</h2>\n  <p class=\"paragraph\">\n    Node <strong>Device Proxy</strong> cho phép VM trong room (thường là Skycraft) nhìn thấy và tương tác với thiết bị USB\n    như thể thiết bị đó được cắm trực tiếp vào guest. Node hỗ trợ hai chế độ:\n  </p>\n  <ul>\n    <li><strong>Virtual image</strong>: mount file <code>.img</code> (FAT32) như một USB mass-storage ảo.</li>\n    <li><strong>Remote proxy</strong>: chuyển tiếp thiết bị USB vật lý từ một máy trạm/laptop qua mạng vào VM.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Cấu hình</h3>\n  <pre class=\"code-block\"><code>{\n  \"deviceProxy\": {\n    \"mediaImageDir\": \"/var/lib/device-proxy/images\",\n    \"inventoryPort\": 28100,\n    \"pollIntervalSeconds\": 5,\n    \"remoteClients\": [\n      {\n        \"id\": \"lab-laptop-1\",\n        \"baseUrl\": \"http://192.168.1.50:7000\",\n        \"authToken\": \"optional-token\"\n      }\n    ]\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Trường</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>deviceProxy.mediaImageDir</code></td><td>Thư mục trên host chứa ảnh đĩa <code>.img</code>; mount vào cả pod device-proxy và pod Skycraft.</td></tr>\n      <tr><td><code>deviceProxy.inventoryPort</code></td><td>Cổng gRPC của device-proxy pod. Mặc định <code>28100</code>.</td></tr>\n      <tr><td><code>deviceProxy.pollIntervalSeconds</code></td><td>Chu kỳ poll inventory từ các remote client (giây). Mặc định <code>5</code>.</td></tr>\n      <tr><td><code>deviceProxy.remoteClients</code></td><td>Danh sách client daemon tĩnh; có thể đăng ký thêm động từ script.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pin</h3>\n  <ul>\n    <li>Chỉ cho phép pin <strong>usb</strong>.</li>\n    <li>Nối pin <code>usb</code> OUTPUT từ Device Proxy Node vào pin <code>usb</code> INPUT của Skycraft Node.</li>\n    <li>Mỗi cặp Device Proxy ↔ Skycraft chỉ attach
