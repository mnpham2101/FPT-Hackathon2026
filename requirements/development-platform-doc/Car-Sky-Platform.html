class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Nydus%20Screen.png')\">\n                    <img src=\"./images/Nydus%20Screen.png\" alt=\"Nydus Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n            </div>\n\n            <table>\n                <thead>\n                    <tr><th>Node Type</th><th>Role</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>Skycraft</strong></td><td>A virtual machine running a full OS — IVI Android or AGL Cluster.</td></tr>\n                    <tr><td><strong>Script Node</strong></td><td>Runs custom Lua logic, used as a bridge/aggregator between signals.</td></tr>\n                    <tr><td><strong>KUKSA Broker</strong></td><td>Central VSS (Vehicle Signal Specification) signal broker.</td></tr>\n                    <tr><td><strong>CAN Bus</strong></td><td>Simulates a physical CAN bus, loads a DBC file to decode signals.</td></tr>\n                    <tr><td><strong>LIN Bus</strong></td><td>Simulates a LIN bus, loads an LDF file.</td></tr>\n                    <tr><td><strong>GPIO Panel</strong></td><td>A digital/analog GPIO signal source used to simulate discrete sensors.</td></tr>\n                    <tr><td><strong>Ethernet Bridge</strong></td><td>Network bridge connecting in-vehicle Ethernet between zones.</td></tr>\n                    <tr><td><strong>Container</strong></td><td>Runs an arbitrary Docker image as a standalone node in the topology.</td></tr>\n                    <tr><td><strong>Proxy Node</strong></td><td>Logical representative of an external physical Hub/hardware device outside the cluster (see <a href=\"#mod-hubs-ui-hubs-en\">Hubs</a>).</td></tr>\n                    <tr><td><strong>Device Proxy</strong></td><td>Bridge for plugging a real USB device/USB image from the client machine into a node in the blueprint.</td></tr>\n                    <tr><td><strong>Abstract</strong></td><td>An abstract block node used to group/document design ideas; it produces no runtime.</td></tr>\n                </tbody>\n            </table>\n        </section>\n\n<section id=\"mod-nydus-ui-node-config-en\">\n            <h2 class=\"section-title\">Nydus → Node Configuration (Inspector)</h2>\n            <p class=\"paragraph\">\n                Select any node on the canvas to open its detailed configuration panel in the Inspector — the content\n                varies by node type; the example below shows the full configuration of a <strong>Skycraft</strong>\n                node running Android.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Full Canvas + Inspector</span>\n                        Configuring a Skycraft node (IVI - FACE Android)\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Blueprint%20Node%20config.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Blueprint%20Node%20config.png')\">\n                    <img src=\"./images/Blueprint%20Node%20config.png\" alt=\"Blueprint Node Config Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 CONFIGURATION group</div>\n                    <ul class=\"details-list\">\n                        <li><strong>OS / Artifact / Version / Architecture:</strong> pick the artifact (section 3) as the boot image — the Artifact and Version must already exist in the Artifacts panel.</li>\n                        <li><strong>Display Width/Height/DPI:</strong> the virtual screen resolution shown in the Screen widget.</li>\n                        <li><strong>GPU Backend:</strong> the virtual graphics driver (e.g. VirGL Renderer) given to the VM.</li>\n                        <li><strong>Part Prefix:</strong> the auto-naming prefix for every \"part\" of this node (e.g. <code>face</code> → <code>face-screen</code>, <code>face-audio</code>) — used to pick quickly in other widgets' Inspector.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 PINS group</div>\n                    <ul class=\"details-list\">\n                        <li>The list of connection pins (<code>eth</code>, <code>usb</code>, <code>vhal</code>...) this node exposes for wiring to other nodes on the canvas.</li>\n                        <li><strong>vhal</strong> typically has dozens of child properties (propId codes like <code>0x21400400</code>) mapped to Android VHAL signals — each property is flagged <span class=\"table-badge badge-cyan\">Custom</span> if manually overridden instead of using the AOSP default.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-nydus-ui-blueprint-config-en\">\n            <h2 class=\"section-title\">Nydus → Blueprint Configuration & Deploy</h2>\n            <p class=\"paragraph\">\n                Click an empty area of the canvas (no node selected) to make the Inspector show configuration at the\n                whole-<strong>blueprint</strong> level instead of a single node — this is also where you trigger a\n                new Deployment.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Blueprint-level configuration\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Blueprint%20config.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Blueprint%20config.png')\">\n                    <img src=\"./images/Blueprint%20config.png\" alt=\"Blueprint Config Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Element Breakdown</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Locked:</strong> lock the blueprint to prevent accidental topology/metadata edits while running a demo.</li>\n                        <li><strong>Deployments:</strong> the list of times this blueprint has been deployed; the <span class=\"table-badge badge-emerald\">Running</span> badge reports the pod status on K8s.</li>\n                        <li><strong>New Deployment:</strong> create a new running instance from the current design — each Deployment has its own independent resources (IP, ports) from the others.</li>\n                        <li><strong>Sharing & Ownership / Transfer Ownership:</strong> same as Artifacts — transfer blueprint ownership to another team member.</li>\n                        <li><strong>Delete Blueprint (Danger Zone):</strong> can only be deleted once no Deployment is still running.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🚀</div>\n                <div class=\"banner-content\">\n                    Ready to run your blueprint? See <a href=\"#mod-deploy-workflow-en\">Deploy a Blueprint</a> — CarSky's core operational loop: deploy → monitor → teardown.\n                </div>\n            </div>\n        </section><section id=\"mod-nydus-abstract-en\">\n  <h2 class=\"section-title\">Abstract Node (Placeholder)</h2>\n  <p class=\"paragraph\">\n    The <strong>Abstract</strong> entry in the node palette creates a placeholder node with no concrete type. It is useful for sketching a topology before deciding which implementation to use. Before deploying, every abstract node must be converted to a real node type (Skycraft, Container, Script Node, etc.) through the <em>Instantiate Abstract Nodes</em> dialog; the compiler rejects deployment while any abstract node remains.\n  </p>\n</section>\n"
  },
  "script-node-basics": {
    "vi": "<section id=\"mod-script-node-intro\">\n  <h2 class=\"section-title\">Script Node — Runtime Luau trong Room</h2>\n  <p class=\"paragraph\">\n    <strong>Script Node</strong> là một node blueprint chạy script <strong>Luau</strong> (Lua sandboxed) bên trong Room.\n    Nó hoạt động như một <em>protocol bridge</em>: nhận frame/signal từ các pin (CAN, LIN, GPIO, KUKSA, VHAL, Ethernet),\n    xử lý trong code, rồi ghi kết quả ra pin khác. Script Node chạy cô lập — không truy cập filesystem host, không mở socket tùy ý,\n    chỉ dùng các API runtime được định nghĩa sẵn.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-canvas.png\" alt=\"Script Node trên canvas blueprint cùng panel Inspector.\">\n    <figcaption>Script Node trên canvas blueprint cùng panel Inspector.</figcaption>\n  </figure>\n\n\n  <div class=\"info-box\">\n    <strong>🧠 Mô hình tổng quan:</strong> mỗi pin được khai báo trong blueprint YAML sẽ xuất hiện dưới dạng <code>pins.&lt;tên_pin&gt;</code>.\n    Các API bổ sung nằm trong <code>nydus.*</code> (network, SOME/IP, UDS, vSOME/IP, KUKSA client, device proxy).\n    Ngoài ra còn có <code>timer</code>, <code>vhal</code> constants và <code>print/log</code>.\n  </div>\n\n  <h3 class=\"section-subtitle\">Khai báo pin trong blueprint</h3>\n  <pre class=\"code-block\"><code>nodes:\n  - id: gateway\n    label: Gateway Script\n    nodeType: script-node\n    config:\n      script: bridge.lua\n      memory_limit_mb: 64\n    pins:\n      can0:\n        type: can\n        transport:\n          kind: can_grpc\n          can_grpc:\n            endpoint: \"unix:/run/nydus/can-can0.sock\"\n            dbc_path: \"/dbc/vehicle.dbc\"\n      vhal:\n        type: vhal\n        transport:\n          kind: vhal_grpc\n          vhal_grpc:\n            listen: \"0.0.0.0:9300\"</code></pre>\n  <p class=\"paragraph\">\n    Trong <code>bridge.lua</code>, các pin trên sẽ có tên đúng như khai báo: <code>pins.can0</code>, <code>pins.vhal</code>.\n  </p>\n  <div class=\"info-box\">\n    <strong>ℹ️ Còn pin Ethernet/Zenoh thì sao?</strong> Không giống <code>can0</code>/<code>vhal</code> ở trên, bạn không tự khai báo một pin <code>type: zenoh</code>.\n    Chỉ cần nối pin <code>ethernet</code> của node này vào một <strong>Ethernet Bridge</strong>, nền tảng sẽ tự động tổng hợp <code>pins.zenoh</code> cho bạn —\n    xem <a href=\"#mod-script-node-zenoh\">Zenoh Pub/Sub</a>.\n  </div>\n</section>\n\n<section id=\"mod-script-node-global\">\n  <h2 class=\"section-title\">Môi Trường Toàn Cục</h2>\n  <table>\n    <thead><tr><th>Global</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>pins</code></td><td>Table ánh xạ tên pin (do bạn đặt trong YAML) → API backend tương ứng.</td></tr>\n      <tr><td><code>nydus</code></td><td>Chứa <code>net</code>, <code>someip</code>, <code>uds</code>, <code>vsomeip</code>, <code>kuksa</code>, <code>device_proxy</code>.</td></tr>\n      <tr><td><code>timer</code></td><td><code>timer.periodic(ms, callback)</code> — lặp định kỳ.</td></tr>\n      <tr><td><code>vhal</code></td><td>Hằng số Android VHAL: property IDs, area IDs, gear, fan direction, unit...</td></tr>\n      <tr><td><code>print</code> / <code>log</code></td><td>Ghi log ra stream của Room (xem trong Deployment Viewer / kubectl logs).</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Timer</h3>\n  <pre class=\"code-block\"><code>timer.periodic(1000, function()\n  print(\"tick every 1s\")\nend)</code></pre>\n  <p class=\"paragraph\">\n    Tick đầu tiên được bỏ qua để script có thởi gian khởi tạo trước khi callback chạy.\n  </p>\n</section>",
    "en": "<section id=\"mod-script-node-intro-en\">\n  <h2 class=\"section-title\">Script Node — Luau Runtime inside a Room</h2>\n  <p class=\"paragraph\">\n    The <strong>Script Node</strong> is a blueprint node that runs a <strong>Luau</strong> (sandboxed Lua) script inside a Room.\n    It acts as a <em>protocol bridge</em>: it receives frames or signals from pins (CAN, LIN, GPIO, KUKSA, VHAL, Ethernet),\n    transforms them in code, and writes the result to other pins. Scripts are isolated — no host filesystem access, no arbitrary sockets,\n    only the defined runtime APIs.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-canvas.png\" alt=\"A Script Node on the blueprint canvas with its Inspector panel.\">\n    <figcaption>A Script Node on the blueprint canvas with its Inspector panel.</figcaption>\n  </figure>\n\n\n  <div class=\"info-box\">\n    <strong>🧠 Big picture:</strong> every pin declared in the blueprint YAML appears as <code>pins.&lt;pin_name&gt;</code>.\n    Additional APIs live under <code>nydus.*</code> (network, SOME/IP, UDS, vSOME/IP, KUKSA client, device proxy).\n    Globals also include <code>timer</code>, <code>vhal</code> constants and <code>print/log</code>.\n  </div>\n\n  <h3 class=\"section-subtitle\">Declaring pins in a blueprint</h3>\n  <pre class=\"code-block\"><code>nodes:\n  - id: gateway\n    label: Gateway Script\n    nodeType: script-node\n    config:\n      script: bridge.lua\n      memory_limit_mb: 64\n    pins:\n      can0:\n        type: can\n        transport:\n          kind: can_grpc\n          can_grpc:\n            endpoint: \"unix:/run/nydus/can-can0.sock\"\n            dbc_path: \"/dbc/vehicle.dbc\"\n      vhal:\n        type: vhal\n        transport:\n          kind: vhal_grpc\n          vhal_grpc:\n            listen: \"0.0.0.0:9300\"</code></pre>\n  <p class=\"paragraph\">\n    In <code>bridge.lua</code>, the pins are available with the exact names you declared: <code>pins.can0</code>, <code>pins.vhal</code>.\n  </p>\n  <div class=\"info-box\">\n    <strong>ℹ️ What about an Ethernet/Zenoh pin?</strong> Unlike <code>can0</code>/<code>vhal</code> above, you don't hand-declare a <code>type: zenoh</code> pin.\n    Just wire this node's <code>ethernet</code> pin to an <strong>Ethernet Bridge</strong> and the platform automatically synthesizes <code>pins.zenoh</code>\n    for you — see <a href=\"#mod-script-node-zenoh-en\">Zenoh Pub/Sub</a>.\n  </div>\n</section>\n\n<section id=\"mod-script-node-global-en\">\n  <h2 class=\"section-title\">Global Environment</h2>\n  <table>\n    <thead><tr><th>Global</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>pins</code></td><td>Table mapping pin names (from YAML) to backend-specific APIs.</td></tr>\n      <tr><td><code>nydus</code></td><td>Holds <code>net</code>, <code>someip</code>, <code>uds</code>, <code>vsomeip</code>, <code>kuksa</code>, <code>device_proxy</code>.</td></tr>\n      <tr><td><code>timer</code></td><td><code>timer.periodic(ms, callback)</code> — periodic timer.</td></tr>\n      <tr><td><code>vhal</code></td><td>Android VHAL constants: property IDs, area IDs, gears, fan directions, units...</td></tr>\n      <tr><td><code>print</code> / <code>log</code></td><td>Log to the Room stream (view in Deployment Viewer / kubectl logs).</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Timer</h3>\n  <pre class=\"code-block\"><code>timer.periodic(1000, function()\n  print(\"tick every 1s\")\nend)</code></pre>\n  <p class=\"paragraph\">\n    The first tick is skipped so the script can initialize before the callback fires.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-timer.png\" alt=\"The built-in Script Editor showing timer and logging usage.\">\n    <figcaption>The built-in Script Editor showing timer and logging usage.</figcaption>\n  </figure>\n\n</section>"
  },
  "can-lin-bus": {
    "vi": "<section id=\"mod-script-node-can\">\n  <h2 class=\"section-title\">CAN Pin — <code>pins.&lt;can&gt;</code></h2>\n  <p class=\"paragraph\">\n    CAN pin cung cấp hai tầng API: <strong>raw frame</strong> và <strong>symbolic DBC</strong> (chỉ khi <code>dbc_path</code> được cấu hình).\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-can-lin.png\" alt=\"Script Editor với code mẫu nhận CAN và lập lịch LIN.\">\n    <figcaption>Script Editor với code mẫu nhận CAN và lập lịch LIN.</figcaption>\n  </figure>\n\n\n  <h3 class=\"section-subtitle\">Raw frame</h3>\n  <pre class=\"code-block\"><code>-- Nhận mọi frame\npins.can0:on_frame(function(frame)\n  print(\"id\", frame.id, \"len\", #frame.data, \"extended\", frame.extended, \"fd\", frame.fd, \"brs\", frame.brs)\nend)\n\n-- Gửi frame\npins.can0:send(0x123, {0x11, 0x22})               -- classic\npins.can0:send(0x123, \"\\x11\\x22\", true, true, true) -- extended + FD + BRS</code></pre>\n\n  <h3 class=\"section-subtitle\">Symbolic DBC API</h3>\n  <pre class=\"code-block\"><code>-- Theo dõi tín hiệu (chỉ gọi khi giá trị thay đổi)\npins.can0.db.EngSpeed:on_change(function(v)\n  print(\"RPM\", v)\nend)\n\n-- Gọi mỗi khi có frame chứa signal\npins.can0.db.EngSpeed:on_update(function(v)\n  print(\"raw update\", v)\nend)\n\n-- Gửi giá trị signal (encode + send)\npins.can0.db.EngSpeed:publish(3500)\n\n-- Chỉ cập nhật buffer, chưa gửi\npins.can0.db.EngSpeed:set(3500)\n\n-- Bắt đầu / dừng message cyclic\npins.can0.db.EngineData:start()\npins.can0.db.EngineData:stop()\nlocal running = pins.can0.db.EngineData:is_running()\n\n-- Bắt đầu tất cả message của một DBC node\npins.can0.db:start_node(\"EngineECU\")\npins.can0.db:start_node({\"EngineECU\", \"BodyECU\"})</code></pre>\n\n  <table>\n    <thead><tr><th>Đối tượng / Phương thức</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on_frame(fn)</code></td><td>Nhận raw CAN frame.</td></tr>\n      <tr><td><code>pin:send(id, data [, extended, fd, brs])</code></td><td>Gửi raw frame; data có thể là table byte hoặc string.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:on_change(fn)</code></td><td>Callback khi giá trị decoded thay đổi.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:on_update(fn)</code></td><td>Callback mỗi frame.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:publish(v)</code></td><td>Encode + gửi; khởi động cyclic timer nếu có.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:set(v)</code></td><td>Cập nhật cached frame buffer.</td></tr>\n      <tr><td><code>pin.db.&lt;Message&gt;:start() / :stop() / :is_running()</code></td><td>Điều khiển message cyclic.</td></tr>\n      <tr><td><code>pin.db:start_node(name_or_table)</code></td><td>Start cyclic của một hoặc nhiều DBC node.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;.unit / .min / .max / .val.&lt;Label&gt;</code></td><td>Metadata &amp; enum constants từ DBC.</td></tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-script-node-lin\">\n  <h2 class=\"section-title\">LIN Pin — <code>pins.&lt;lin&gt;</code></h2>\n  <pre class=\"code-block\"><code>-- Raw frame\npins.lin0:on_frame(function(frame)\n  print(\"lin id\", frame.id, \"data\", frame.data)\nend)\npins.lin0:send(0x1A, {0x01, 0x02})\n\n-- Symbolic LDF (khi có ldf_path)\npins.lin0.db.DoorFrame.LockStatus:on_change(function(v)\n  print(\"lock\", v)\nend)\npins.lin0.db.DoorFrame.LockStatus:publish(1)\npins.lin0.db.DoorFrame.LockStatus:set(1)\nlocal current = pins.lin0.db.DoorFrame.LockStatus:get()\n\n-- Gửi frame theo buffer đã set\npins.lin0.db.DoorFrame:send()\npins.lin0.db.DoorFrame:on_frame(function(frame) print(frame.id) end)\n\n-- Start node\npins.lin0.db:start_node(\"DoorSlave\")</code></pre>\n\n  <table>\n    <thead><tr><th>Phương thức</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on_frame(fn)</code></td><td>Nhận raw LIN frame.</td></tr>\n      <tr><td><code>pin:send(id, data)</code></td><td>Gửi raw frame; id 0..63.</td></tr>\n      <tr><td><code>pin.db.&lt;Frame&gt;.&lt;Signal&gt;:on_change / :on_update / :publish / :set / :get</code></td><td>Signal-level API tương tự DBC.</td></tr>\n      <tr><td><code>pin.db.&lt;Frame&gt;:send()</code></td><td>Gửi frame với cached signal values.</td></tr>\n      <tr><td><code>pin.db.&lt;Frame&gt;:on_frame(fn)</code></td><td>Raw callback cho frame cụ thể.</td></tr>\n      <tr><td><code>pin.db:start_node(name)</code></td><td>Start cyclic theo node trong LDF.</td></tr>\n      <tr><td><code>signal.unit / .min / .max / .val.&lt;Label&gt;</code></td><td>Metadata &amp; logical values từ LDF.</td></tr>\n    </tbody>\n  </table>\n</section>",
    "en": "<section id=\"mod-script-node-can-en\">\n  <h2 class=\"section-title\">CAN Pin — <code>pins.&lt;can&gt;</code></h2>\n  <p class=\"paragraph\">\n    A CAN pin exposes two API layers: <strong>raw frames</strong> and <strong>symbolic DBC</strong> (only when <code>dbc_path</code> is configured).\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-can-lin.png\" alt=\"Script Editor with CAN receive and LIN scheduler sample code.\">\n    <figcaption>Script Editor with CAN receive and LIN scheduler sample code.</figcaption>\n  </figure>\n\n\n  <h3 class=\"section-subtitle\">Raw frame</h3>\n  <pre class=\"code-block\"><code>-- Receive every frame\npins.can0:on_frame(function(frame)\n  print(\"id\", frame.id, \"len\", #frame.data, \"extended\", frame.extended, \"fd\", frame.fd, \"brs\", frame.brs)\nend)\n\n-- Send frame\npins.can0:send(0x123, {0x11, 0x22})               -- classic\npins.can0:send(0x123, \"\\x11\\x22\", true, true, true) -- extended + FD + BRS</code></pre>\n\n  <h3 class=\"section-subtitle\">Symbolic DBC API</h3>\n  <pre class=\"code-block\"><code>-- Watch a signal (only fires on value change)\npins.can0.db.EngSpeed:on_change(function(v)\n  print(\"RPM\", v)\nend)\n\n-- Fire on every frame carrying this signal\npins.can0.db.EngSpeed:on_update(function(v)\n  print(\"raw update\", v)\nend)\n\n-- Encode + send\npins.can0.db.EngSpeed:publish(3500)\n\n-- Update cached buffer only\npins.can0.db.EngSpeed:set(3500)\n\n-- Start / stop cyclic message\npins.can0.db.EngineData:start()\npins.can0.db.EngineData:stop()\nlocal running = pins.can0.db.EngineData:is_running()\n\n-- Start all cyclic messages owned by a DBC node\npins.can0.db:start_node(\"EngineECU\")\npins.can0.db:start_node({\"EngineECU\", \"BodyECU\"})</code></pre>\n\n  <table>\n    <thead><tr><th>Object / Method</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on_frame(fn)</code></td><td>Receive raw CAN frame.</td></tr>\n      <tr><td><code>pin:send(id, data [, extended, fd, brs])</code></td><td>Send raw frame; data may be byte table or string.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:on_change(fn)</code></td><td>Callback when decoded value changes.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:on_update(fn)</code></td><td>Callback on every frame.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:publish(v)</code></td><td>Encode + send; starts cyclic timer if applicable.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;:set(v)</code></td><td>Update cached frame buffer.</td></tr>\n      <tr><td><code>pin.db.&lt;Message&gt;:start() / :stop() / :is_running()</code></td><td>Control cyclic message.</td></tr>\n      <tr><td><code>pin.db:start_node(name_or_table)</code></td><td>Start cyclic messages for one or more DBC nodes.</td></tr>\n      <tr><td><code>pin.db.&lt;Signal&gt;.unit / .min / .max / .val.&lt;Label&gt;</code></td><td>Metadata &amp; enum constants from DBC.</td></tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-script-node-lin-en\">\n  <h2 class=\"section-title\">LIN Pin — <code>pins.&lt;lin&gt;</code></h2>\n  <pre class=\"code-block\"><code>-- Raw frame\npins.lin0:on_frame(function(frame)\n  print(\"lin id\", frame.id, \"data\", frame.data)\nend)\npins.lin0:send(0x1A, {0x01, 0x02})\n\n-- Symbolic LDF (when ldf_path is set)\npins.lin0.db.DoorFrame.LockStatus:on_change(function(v)\n  print(\"lock\", v)\nend)\npins.lin0.db.DoorFrame.LockStatus:publish(1)\npins.lin0.db.DoorFrame.LockStatus:set(1)\nlocal current = pins.lin0.db.DoorFrame.LockStatus:get()\n\n-- Send frame with cached values\npins.lin0.db.DoorFrame:send()\npins.lin0.db.DoorFrame:on_frame(function(frame) print(frame.id) end)\n\n-- Start node\npins.lin0.db:start_node(\"DoorSlave\")</code></pre>\n\n  <table>\n    <thead><tr><th>Method</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on_frame(fn)</code></td><td>Receive raw LIN frame.</td></tr>\n      <tr><td><code>pin:send(id, data)</code></td><td>Send raw frame; id 0..63.</td></tr>\n      <tr><td><code>pin.db.&lt;Frame&gt;.&lt;Signal&gt;:on_change / :on_update / :publish / :set / :get</code></td><td>Signal-level API similar to DBC.</td></tr>\n      <tr><td><code>pin.db.&lt;Frame&gt;:send()</code></td><td>Send frame with cached signal values.</td></tr>\n      <tr><td><code>pin.db.&lt;Frame&gt;:on_frame(fn)</code></td><td>Raw callback for a specific frame.</td></tr>\n      <tr><td><code>pin.db:start_node(name)</code></td><td>Start cyclic schedules for an LDF node.</td></tr>\n      <tr><td><code>signal.unit / .min / .max / .val.&lt;Label&gt;</code></td><td>Metadata &amp; logical values from LDF.</td></tr>\n    </tbody>\n  </table>\n</section>"
  },
  "gpio-vhal": {
    "vi": "<section id=\"mod-script-node-gpio\">\n  <h2 class=\"section-title\">GPIO Panel Node & Pin — <code>pins.&lt;gpio&gt;</code></h2>\n  <p class=\"paragraph\">\n    <strong>GPIO panel node</strong> (<code>gpio-panel</code>) trong Nydus cung cấp một bảng điều khiển ảo gồm các thành phần nhập: nút bấm, núm xoay, thanh trượt, công tắc, encoder, joystick và rocker. Các kịch bản kiểm thử có thể \"nhấn\" hoặc \"xoay\" như một bảng điều khiển phần cứng thật mà không cần phần cứng vật lý. Script Node kết nối tới panel qua một pin <code>gpio</code> và xử lý / phát ra sự kiện pin trong Luau.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-gpio.png\" alt=\"Script Editor với ví dụ xung GPIO output và lắng nghe input.\">\n    <figcaption>Script Editor với ví dụ xung GPIO output và lắng nghe input.</figcaption>\n  </figure>\n\n  <h3 class=\"section-subtitle\">Các loại pin</h3>\n  <p class=\"paragraph\">\n    Mỗi pin được khai báo trong JSON <code>pinDefinitions</code> của blueprint với <code>id</code>, <code>type</code> và các trường tùy loại. Panel sẽ validate mọi event theo ràng buộc này.\n  </p>\n  <details class=\"feature-list\">\n    <summary>Bảng tra cứu 9 loại control (bấm để mở/đóng)</summary>\n    <details>\n      <summary><code>momentary</code> — Nút nhấn giữ, không giữ trạng thái</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> 0 (nhả) hoặc 1 (nhấn)</li>\n        <li><strong>Trường bổ sung:</strong> không có</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>toggle</code> — Công tắc giữ trạng thái on/off</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> 0 hoặc 1</li>\n        <li><strong>Trường bổ sung:</strong> không có</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>rotary</code> — Núm xoay có giới hạn min/max</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> <code>min</code> .. <code>max</code></li>\n        <li><strong>Trường bổ sung:</strong> <code>min</code>, <code>max</code>, <code>step</code>, <code>unit</code></li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>slider</code> — Thanh trượt tuyến tính</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> <code>min</code> .. <code>max</code></li>\n        <li><strong>Trường bổ sung:</strong> <code>min</code>, <code>max</code>, <code>step</code>, <code>unit</code></li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>rocker</code> — Rocker hai chiều momentary</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> −1, 0 hoặc 1</li>\n        <li><strong>Trường bổ sung:</strong> không có</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>two_stage_rocker</code> — Rocker hai cấp mỗi chiều</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> −2, −1, 0, 1, 2</li>\n        <li><strong>Trường bổ sung:</strong> không có</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>multi_position</code> — Công tắc nhiều vị trí (wiper, PRNDL, …)</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> 0 .. (số labels − 1)</li>\n        <li><strong>Trường bổ sung:</strong> mảng <code>labels</code></li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>incremental_encoder</code> — Encoder tương đối (delta)</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> bất kỳ số nguyên delta nào</li>\n        <li><strong>Trường bổ sung:</strong> không có</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>joystick</code> — Joystick hướng</summary>\n      <ul class=\"details-list\">\n        <li><strong>Giá trị hợp lệ:</strong> 0 .. max direction</li>\n        <li><strong>Trường bổ sung:</strong> <code>axes</code> (4 hoặc 8), <code>has_push</code></li>\n      </ul>\n    </details>\n  </details>\n\n  <h3 class=\"section-subtitle\">Khai báo GPIO panel trong blueprint</h3>\n  <p class=\"paragraph\">\n    Thêm node <code>gpio-panel</code>, sau đó sửa JSON <code>gpioPanel.pinDefinitions</code>. ID pin là chuỗi và phải duy nhất trong cả room. Ví dụ dưới định nghĩa một bảng HVAC nhỏ.\n  </p>\n  <pre class=\"code-block\"><code>{\n  \"pinDefinitions\": [\n    { \"id\": \"ac_btn\",      \"name\": \"AC\",       \"type\": \"momentary\", \"group\": \"HVAC\" },\n    { \"id\": \"fan_knob\",    \"name\": \"Fan\",      \"type\": \"rotary\",    \"group\": \"HVAC\", \"min\": 0, \"max\": 4,   \"step\": 1,   \"default_value\": 0 },\n    { \"id\": \"temp_driver\", \"name\": \"Temp DRV\", \"type\": \"rotary\",    \"group\": \"HVAC\", \"min\": 16, \"max\": 27, \"step\": 0.5, \"unit\": \"°C\", \"default_value\": 22 },\n    { \"id\": \"gear\",        \"name\": \"Gear\",     \"type\": \"multi_position\", \"group\": \"Powertrain\",\n      \"labels\": [\"P\", \"R\", \"N\", \"D\"], \"default_value\": 0 }\n  ]\n}</code></pre>\n  <p class=\"paragraph\">\n    Nối Script Node tới panel bằng một pin <strong>gpio</strong> có <strong>target</strong> trỏ đến node <code>gpio-panel</code>. Tên pin của Script Node (ví dụ <code>gpio0</code>) sẽ thành <code>pins.gpio0</code> trong Luau.\n  </p>\n\n  <h3 class=\"section-subtitle\">Lua API</h3>\n  <pre class=\"code-block\"><code>-- Lắng nghe một pin cụ thể\npins.gpio0:on(\"ignition\", function(value)\n  print(\"ignition\", value)\nend)\n\n-- Lắng nghe mọi sự kiện\npins.gpio0:on_event(function(pin_id, value)\n  print(\"event\", pin_id, value)\nend)\n\n-- Gửi giá trị lên panel\npins.gpio0:set(\"ignition\", 1.0)\n\n-- Đọc cached value (number hoặc nil)\nlocal v = pins.gpio0:get(\"ignition\")</code></pre>\n\n  <table>\n    <thead><tr><th>Phương thức</th><th>Chữ ký</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on</code></td><td><code>on(pin_id, function(value))</code></td><td>Đăng ký callback theo từng pin. Chạy mỗi khi pin có event, kể cả snapshot PinList ban đầu.</td></tr>\n      <tr><td><code>pin:on_event</code></td><td><code>on_event(function(pin_id, value))</code></td><td>Đăng ký callback toàn cục cho mọi pin.</td></tr>\n      <tr><td><code>pin:set</code></td><td><code>set(pin_id, value)</code></td><td>Gửi giá trị lên GPIO panel. Panel validate và broadcast cho các subscriber khác.</td></tr>\n      <tr><td><code>pin:get</code></td><td><code>get(pin_id)</code> → number | nil</td><td>Trả về giá trị cuối cùng đã cache của một pin.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Công thức theo từng loại pin</h3>\n  <pre class=\"code-block\"><code>-- momentary / toggle\npins.gpio0:on(\"ac_btn\", function(v)\n  if v == 1 then print(\"AC pressed\") end\nend)\npins.gpio0:set(\"ac_btn\", 1)  -- nhấn; UI thường tự nhả sau ~50 ms\n\n-- rotary / slider\npins.gpio0:on(\"fan_knob\", function(v)\n  print(\"fan level\", v)\nend)\npins.gpio0:set(\"temp_driver\", 23.5)\n\n-- rocker / two_stage_rocker\npins.gpio0:on(\"window_up\", function(v)\n  if v == 1 then print(\"up stage 1\") end\n  if v == 2 then print(\"up stage 2\") end\n  if v == 0 then print(\"released\") end\nend)\n\n-- multi_position (PRNDL, wiper, …)\npins.gpio0:on(\"gear\", function(idx)\n  local labels = { \"P\", \"R\", \"N\", \"D\" }\n  print(\"gear\", labels[idx + 1])\nend)\n\n-- incremental_encoder: value là delta có dấu\nlocal volume = 50\npins.gpio0:on(\"volume_enc\", function(delta)\n  volume = math.max(0, math.min(100, volume + delta))\n  print(\"volume\", volume)\nend)\n\n-- joystick (mặc định 4 hướng; 8 hướng khi axes=8)\npins.gpio0:on(\"nav_joy\", function(dir)\n  local names_4 = { \"idle\", \"up\", \"down\", \"left\", \"right\" }\n  print(\"joystick\", names_4[dir + 1])\nend)</code></pre>\n\n  <h3 class=\"section-subtitle\">Ví dụ cầu nối</h3>\n  <pre class=\"code-block\"><code>-- Nút hazard → KUKSA / VSS\npins.gpio0:on(\"btn_hazard\", function(value)\n  pins.kuksa:publish(\"Vehicle.Body.HazardLights.Switch\", value == 1)\nend)\n\n-- Bảng HVAC → LIN ClimateCommand\npins.gpio0:on(\"fan_knob\", function(v)\n  pins.lin0.db.ClimateCommand.FanSpeed:publish(v)\nend)\n\n-- Cần số → CAN GearStatus\npins.gpio0:on(\"gear\", function(idx)\n  pins.can0.db.GearStatus.SelectedGear:publish(idx)\nend)</code></pre>\n\n  <h3 class=\"section-subtitle\">Quy tắc & sửa lỗi</h3>\n  <ul>\n    <li>Pin ID phải duy nhất trong room. Đăng ký trùng ID sẽ bị từ chối toàn bộ.</li>\n    <li>Event có giá trị ngoài range hoặc sai kiểu sẽ bị panel từ chối và ghi log.</li>\n    <li>Client gửi event sẽ không nhận lại chính event đó (echo suppression).</li>\n    <li>Client ngắt kết nối sẽ mất các pin đã đăng ký; pin preload từ blueprint JSON thì vẫn tồn tại.</li>\n    <li>Nếu callback không chạy, kiểm tra target của pin <code>gpio</code> trong Script Node có trỏ đúng node <code>gpio-panel</code> không.</li>\n  </ul>\n</section>\n\n<section id=\"mod-script-node-vhal\">\n  <h2 class=\"section-title\">VHAL Pin — <code>pins.&lt;vhal&gt;</code></h2>\n  <p class=\"paragraph\">\n    Script Node đóng vai trò <strong>VehicleServer gRPC</strong>; guest VM (AAOS/Trout) kết nối tới nó như một VHAL client.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-vhal.png\" alt=\"Script Editor với ví dụ VHAL get/set/subscribe.\">\n    <figcaption>Script Editor với ví dụ VHAL get/set/subscribe.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>-- Guest ghi property\npins.vhal0:on_change(function(ev)\n  print(\"set\", ev.id, ev.area, ev.value)\nend)\n\n-- Guest đọc property\npins.vhal0:on_get(function(prop_id, area_id)\n  if prop_id == vhal.prop.PERF_VEHICLE_SPEED then\n    return 60.5\n  end\n  return nil\nend)\n\n-- Đẩy property vào guest stream\npins.vhal0:push(vhal.prop.HVAC_AC_ON, vhal.area.seat.ROW_1_LEFT, true)</code></pre>\n\n  <table>\n    <thead><tr><th>Phương thức</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on_change(fn)</code></td><td>Guest gọi <code>SetValues</code>; ev có <code>id</code>, <code>area</code>, <code>value</code>.</td></tr>\n      <tr><td><code>pin:on_get(fn)</code></td><td>Guest gọi <code>GetValues</code>; trả về value hoặc <code>nil</code>.</td></tr>\n      <tr><td><code>pin:push(prop_id, area_id, value)</code></td><td>Đẩy property update tới guest.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Hằng số VHAL toàn cục</h3>\n  <pre class=\"code-block\"><code>vhal.prop.HVAC_AC_ON            -- 0x15200505\nvhal.prop.PERF_VEHICLE_SPEED    -- 0x11600207\nvhal.area.seat.ROW_1_LEFT       -- 0x0001\nvhal.gear.PARK\nvhal.fan_direction.FACE\nvhal.unit.KILOMETERS_PER_HOUR</code></pre>\n  <p class=\"paragraph\">\n    Các bảng hằng: <code>vhal.prop.*</code>, <code>vhal.area.seat/window/door/mirror/wheel.*</code>, <code>vhal.gear.*</code>, <code>vhal.fan_direction.*</code>, <code>vhal.unit.*</code>.\n  </p>\n</section>\n",
    "en": "<section id=\"mod-script-node-gpio-en\">\n  <h2 class=\"section-title\">GPIO Panel Node & Pin — <code>pins.&lt;gpio&gt;</code></h2>\n  <p class=\"paragraph\">\n    The <strong>GPIO panel node</strong> (<code>gpio-panel</code>) in Nydus exposes a virtual control panel of configurable input controls — buttons, rotary knobs, sliders, switches, encoders, joysticks, and rockers. Test scenarios can inject hardware-like input events into a room without physical control panels. A Script Node connects to the panel through a <code>gpio</code> pin and reacts to or emits pin events in Luau.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-gpio.png\" alt=\"Script Editor with GPIO output pulse and input listener example.\">\n    <figcaption>Script Editor with GPIO output pulse and input listener example.</figcaption>\n  </figure>\n\n  <h3 class=\"section-subtitle\">Pin types</h3>\n  <p class=\"paragraph\">\n    Each pin is declared in the blueprint's <code>pinDefinitions</code> JSON with an <code>id</code>, a <code>type</code>, and type-specific fields. The panel validates every event against these constraints.\n  </p>\n  <details class=\"feature-list\">\n    <summary>Reference table of 9 control types (click to expand/collapse)</summary>\n    <details>\n      <summary><code>momentary</code> — Push button, no hold state</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> 0 (released) or 1 (pressed)</li>\n        <li><strong>Extra fields:</strong> none</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>toggle</code> — Latching on/off switch</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> 0 or 1</li>\n        <li><strong>Extra fields:</strong> none</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>rotary</code> — Rotary knob with min/max bounds</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> <code>min</code> .. <code>max</code></li>\n        <li><strong>Extra fields:</strong> <code>min</code>, <code>max</code>, <code>step</code>, <code>unit</code></li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>slider</code> — Linear slider</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> <code>min</code> .. <code>max</code></li>\n        <li><strong>Extra fields:</strong> <code>min</code>, <code>max</code>, <code>step</code>, <code>unit</code></li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>rocker</code> — Two-way momentary rocker</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> −1, 0, or 1</li>\n        <li><strong>Extra fields:</strong> none</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>two_stage_rocker</code> — Rocker with two intensity stages per side</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> −2, −1, 0, 1, 2</li>\n        <li><strong>Extra fields:</strong> none</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>multi_position</code> — Multi-position switch (wiper, PRNDL, …)</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> 0 .. (labels − 1)</li>\n        <li><strong>Extra fields:</strong> <code>labels</code> array</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>incremental_encoder</code> — Relative encoder delta</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> any integer delta</li>\n        <li><strong>Extra fields:</strong> none</li>\n      </ul>\n    </details>\n    <details>\n      <summary><code>joystick</code> — Directional joystick</summary>\n      <ul class=\"details-list\">\n        <li><strong>Value range:</strong> 0 .. max direction</li>\n        <li><strong>Extra fields:</strong> <code>axes</code> (4 or 8), <code>has_push</code></li>\n      </ul>\n    </details>\n  </details>\n\n  <h3 class=\"section-subtitle\">Declaring a GPIO panel in the blueprint</h3>\n  <p class=\"paragraph\">\n    Add a <code>gpio-panel</code> node, then edit its <code>gpioPanel.pinDefinitions</code> JSON. Pin IDs are strings and must be unique across the whole room. The example below defines a small HVAC panel.\n  </p>\n  <pre class=\"code-block\"><code>{\n  \"pinDefinitions\": [\n    { \"id\": \"ac_btn\",      \"name\": \"AC\",       \"type\": \"momentary\", \"group\": \"HVAC\" },\n    { \"id\": \"fan_knob\",    \"name\": \"Fan\",      \"type\": \"rotary\",    \"group\": \"HVAC\", \"min\": 0, \"max\": 4,   \"step\": 1,   \"default_value\": 0 },\n    { \"id\": \"temp_driver\", \"name\": \"Temp DRV\", \"type\": \"rotary\",    \"group\": \"HVAC\", \"min\": 16, \"max\": 27, \"step\": 0.5, \"unit\": \"°C\", \"default_value\": 22 },\n    { \"id\": \"gear\",        \"name\": \"Gear\",     \"type\": \"multi_position\", \"group\": \"Powertrain\",\n      \"labels\": [\"P\", \"R\", \"N\", \"D\"], \"default_value\": 0 }\n  ]\n}</code></pre>\n  <p class=\"paragraph\">\n    Wire the Script Node to the panel with a <strong>gpio</strong> pin whose <strong>target</strong> points to the <code>gpio-panel</code> node. The Script Node's pin name (e.g. <code>gpio0</code>) becomes <code>pins.gpio0</code> in Luau.\n  </p>\n\n  <h3 class=\"section-subtitle\">Lua API reference</h3>\n  <pre class=\"code-block\"><code>-- Watch a specific pin\npins.gpio0:on(\"ignition\", function(value)\n  print(\"ignition\", value)\nend)\n\n-- Watch all events\npins.gpio0:on_event(function(pin_id, value)\n  print(\"event\", pin_id, value)\nend)\n\n-- Send a value to the panel\npins.gpio0:set(\"ignition\", 1.0)\n\n-- Read the last cached value (number or nil)\nlocal v = pins.gpio0:get(\"ignition\")</code></pre>\n\n  <table>\n    <thead><tr><th>Method</th><th>Signature</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on</code></td><td><code>on(pin_id, function(value))</code></td><td>Register a per-pin callback. Fires on every event for that pin, including the initial PinList snapshot.</td></tr>\n      <tr><td><code>pin:on_event</code></td><td><code>on_event(function(pin_id, value))</code></td><td>Register a global callback for all pin events.</td></tr>\n      <tr><td><code>pin:set</code></td><td><code>set(pin_id, value)</code></td><td>Send a value to the GPIO panel. The panel validates it against the pin type and broadcasts it to other subscribers.</td></tr>\n      <tr><td><code>pin:get</code></td><td><code>get(pin_id)</code> → number | nil</td><td>Return the last known cached value for a pin.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Per-pin-type recipes</h3>\n  <pre class=\"code-block\"><code>-- momentary / toggle\npins.gpio0:on(\"ac_btn\", function(v)\n  if v == 1 then print(\"AC pressed\") end\nend)\npins.gpio0:set(\"ac_btn\", 1)  -- press; UI usually auto-releases after ~50 ms\n\n-- rotary / slider\npins.gpio0:on(\"fan_knob\", function(v)\n  print(\"fan level\", v)\nend)\npins.gpio0:set(\"temp_driver\", 23.5)\n\n-- rocker / two-stage rocker\npins.gpio0:on(\"window_up\", function(v)\n  if v == 1 then print(\"up stage 1\") end\n  if v == 2 then print(\"up stage 2\") end\n  if v == 0 then print(\"released\") end\nend)\n\n-- multi_position (PRNDL, wiper, …)\npins.gpio0:on(\"gear\", function(idx)\n  local labels = { \"P\", \"R\", \"N\", \"D\" }\n  print(\"gear\", labels[idx + 1])\nend)\n\n-- incremental_encoder: value is a signed delta\nlocal volume = 50\npins.gpio0:on(\"volume_enc\", function(delta)\n  volume = math.max(0, math.min(100, volume + delta))\n  print(\"volume\", volume)\nend)\n\n-- joystick (4-way by default; 8-way when axes=8)\npins.gpio0:on(\"nav_joy\", function(dir)\n  local names_4 = { \"idle\", \"up\", \"down\", \"left\", \"right\" }\n  print(\"joystick\", names_4[dir + 1])\nend)</code></pre>\n\n  <h3 class=\"section-subtitle\">Bridge examples</h3>\n  <pre class=\"code-block\"><code>-- GPIO hazard button → KUKSA / VSS\npins.gpio0:on(\"btn_hazard\", function(value)\n  pins.kuksa:publish(\"Vehicle.Body.HazardLights.Switch\", value == 1)\nend)\n\n-- GPIO HVAC panel → LIN ClimateCommand\npins.gpio0:on(\"fan_knob\", function(v)\n  pins.lin0.db.ClimateCommand.FanSpeed:publish(v)\nend)\n\n-- GPIO gear selector → CAN GearStatus\npins.gpio0:on(\"gear\", function(idx)\n  pins.can0.db.GearStatus.SelectedGear:publish(idx)\nend)</code></pre>\n\n  <h3 class=\"section-subtitle\">Rules & troubleshooting</h3>\n  <ul>\n    <li>Pin IDs must be unique in the room. A duplicate registration is rejected entirely.</li>\n    <li>Events with out-of-range or wrong-type values are rejected by the panel and logged.</li>\n    <li>The sender does not receive its own event back (echo suppression).</li>\n    <li>Disconnected clients lose their pins; server-preloaded pins (from blueprint JSON) persist.</li>\n    <li>If a callback is not firing, check that the Script Node's <code>gpio</code> pin target points to the correct <code>gpio-panel</code> node.</li>\n  </ul>\n</section>\n\n<section id=\"mod-script-node-vhal-en\">\n  <h2 class=\"section-title\">VHAL Pin — <code>pins.&lt;vhal&gt;</code></h2>\n  <p class=\"paragraph\">\n    The Script Node acts as a <strong>VehicleServer gRPC</strong>; the guest VM (AAOS/Trout) connects to it as a VHAL client.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-vhal.png\" alt=\"Script Editor showing VHAL get/set/subscribe usage.\">\n    <figcaption>Script Editor showing VHAL get/set/subscribe usage.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>-- Guest writes a property\npins.vhal0:on_change(function(ev)\n  print(\"set\", ev.id, ev.area, ev.value)\nend)\n\n-- Guest reads a property\npins.vhal0:on_get(function(prop_id, area_id)\n  if prop_id == vhal.prop.PERF_VEHICLE_SPEED then\n    return 60.5\n  end\n  return nil\nend)\n\n-- Push property update to guest stream\npins.vhal0:push(vhal.prop.HVAC_AC_ON, vhal.area.seat.ROW_1_LEFT, true)</code></pre>\n\n  <table>\n    <thead><tr><th>Method</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>pin:on_change(fn)</code></td><td>Guest calls <code>SetValues</code>; ev has <code>id</code>, <code>area</code>, <code>value</code>.</td></tr>\n      <tr><td><code>pin:on_get(fn)</code></td><td>Guest calls <code>GetValues</code>; return a value or <code>nil</code>.</td></tr>\n      <tr><td><code>pin:push(prop_id, area_id, value)</code></td><td>Push a property update to the guest.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Global VHAL constants</h3>\n  <pre class=\"code-block\"><code>vhal.prop.HVAC_AC_ON            -- 0x15200505\nvhal.prop.PERF_VEHICLE_SPEED    -- 0x11600207\nvhal.area.seat.ROW_1_LEFT       -- 0x0001\nvhal.gear.PARK\nvhal.fan_direction.FACE\nvhal.unit.KILOMETERS_PER_HOUR</code></pre>\n  <p class=\"paragraph\">\n    Tables: <code>vhal.prop.*</code>, <code>vhal.area.seat/window/door/mirror/wheel.*</code>, <code>vhal.gear.*</code>, <code>vhal.fan_direction.*</code>, <code>vhal.unit.*</code>.\n  </p>\n</section>\n"
  },
  "kuksa-zenoh": {
    "vi": "<section id=\"mod-script-node-kuksa\">\n  <h2 class=\"section-title\">KUKSA / VSS Pin — <code>pins.&lt;kuksa&gt;</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-kuksa.png\" alt=\"Script Editor với ví dụ KUKSA VSS subscribe/set/get.\">\n    <figcaption>Script Editor với ví dụ KUKSA VSS subscribe/set/get.</figcaption>\n  </figure>\n\n\n  <h3 class=\"section-subtitle\">API bằng path string</h3>\n  <pre class=\"code-block\"><code>pins.kuksa:on_change(function(ev)\n  print(ev.path, ev.value)\nend)\n\npins.kuksa:subscribe({\"Vehicle.Speed\", \"Vehicle.Cabin.HVAC.Station.Row1.Driver.Temperature\"})\npins.kuksa:publish(\"Vehicle.Speed\", 60.5)\npins.kuksa:actuate(\"Vehicle.Cabin.HVAC.ACOn\", true)\nlocal v = pins.kuksa:get(\"Vehicle.Speed\")</code></pre>\n\n  <h3 class=\"section-subtitle\">API cây VSS (<code>pin.vss</code>)</h3>\n  <pre class=\"code-block\"><code>local speed = pins.kuksa.vss.Vehicle.Speed\nspeed:on_change(function(v) print(\"speed\", v) end)\nspeed:publish(60.5)\nspeed:actuate(55.0)\nlocal v = speed:get()\n\nlocal ac = pins.kuksa.vss.Vehicle.Cabin.HVAC.IsAirConditioningActive\nac:on_actuate(function(v) print(\"requested AC\", v) end)\nac:publish(true)\n\nprint(speed.path, speed.unit, speed.data_type, speed.min, speed.max)</code></pre>\n\n  <details class=\"feature-list\">\n    <summary>Bảng API <code>pin.vss</code> đầy đủ (7 phương thức)</summary>\n    <table>\n      <thead><tr><th>Phương thức</th><th>Mô tả</th></tr></thead>\n      <tbody>\n        <tr><td><code>pin:on_change(fn)</code></td><td>Global callback cho mọi signal đã subscribe.</td></tr>\n        <tr><td><code>pin:subscribe(paths)</code></td><td>Subscribe động danh sách path.</td></tr>\n        <tr><td><code>pin:publish(path, value)</code></td><td>Publish current/sensor value.</td></tr>\n        <tr><td><code>pin:actuate(path, value)</code></td><td>Gửi actuation request.</td></tr>\n        <tr><td><code>pin:get(path)</code></td><td>Đọc đồng bộ.</td></tr>\n        <tr><td><code>pin.vss.&lt;Path&gt;.Leaf:on_change / :on_actuate / :publish / :actuate / :get</code></td><td>Dot-notation VSS tree API.</td></tr>\n        <tr><td><code>leaf.path / .unit / .data_type / .min / .max / .val.&lt;Label&gt;</code></td><td>Metadata.</td></tr>\n      </tbody>\n    </table>\n  </details>\n</section>\n\n<section id=\"mod-script-node-zenoh\">\n  <h2 class=\"section-title\">Zenoh Pub/Sub — Tự Động Tổng Hợp <code>pins.zenoh</code></h2>\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">ℹ️</div>\n    <div class=\"banner-content\">\n      <strong>Không phải một loại pin trong blueprint.</strong> Zenoh không có mục nào trong schema pin-type của Nydus và không thể chọn từ danh sách loại\n      pin trên canvas — đây là một giao thức ứng dụng chạy chồng lên trên pin <strong>Ethernet</strong>. Chỉ cần nối pin <code>ethernet</code> của Script Node\n      này vào một node <strong>Ethernet Bridge</strong>, operator của nền tảng sẽ tự động tiêm <code>pins.zenoh</code> vào script — không cần (và không thể)\n      khai báo pin thủ công. Nếu có một container \"Zenoh router\" (Container node với <code>env.ZENOH_MODE=router</code> trên cùng bridge), kết nối sẽ dùng\n      TCP unicast tới router đó; nếu không, operator tự động chuyển sang chế độ peer+multicast. Container node cũng dùng chung bus này chỉ bằng pin\n      <code>ethernet</code> của chính nó cùng một thư viện Zenoh client thông thường — vẫn không cần pin riêng.\n    </div>\n  </div>\n  <p class=\"paragraph\">\n    Payload mặc định là UTF-8 string; giá trị số được mã hóa/giải mã heuristic.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-zenoh.png\" alt=\"Script Editor với code Zenoh publisher và subscriber.\">\n    <figcaption>Script Editor với code Zenoh publisher và subscriber.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>-- Publish\npins.zenoh:publish(\"Vehicle.Speed\", 60.5)\n\n-- Subscribe chính xác một path\npins.zenoh:on_change(\"Vehicle.Speed\", function(path, value)\n  print(path, value)\nend)\n\n-- Subscribe wildcard\npins.zenoh:sub(\"Vehicle.Powertrain.**\", function(raw_key, value)\n  print(raw_key, value)\nend)\n\n-- Subscribe low-level: exact key nhận (value), wildcard nhận (raw_key, value)\npins.zenoh:sub(\"Vehicle.Speed\", function(value) print(value) end)\n\n-- Query\nlocal v = pins.zenoh:get(\"Vehicle.Speed\")</code></pre>\n\n  <details class=\"feature-list\">\n    <summary>Bảng API Zenoh pin đầy đủ (4 phương thức)</summary>\n    <table>\n      <thead><tr><th>Phương thức</th><th>Mô tả</th></tr></thead>\n      <tbody>\n        <tr><td><code>pin:publish(key, value)</code></td><td>Put value lên bus.</td></tr>\n        <tr><td><code>pin:on_change(pattern, fn)</code></td><td>Subscribe; callback luôn nhận <code>(path, value)</code>.</td></tr>\n        <tr><td><code>pin:sub(pattern, fn)</code></td><td>Low-level subscribe; wildcard nhận <code>(raw_key, value)</code>, exact nhận <code>(value)</code>.</td></tr>\n        <tr><td><code>pin:get(key)</code></td><td>Đọc từ local cache hoặc issue Zenoh query.</td></tr>\n      </tbody>\n    </table>\n  </details>\n  <div class=\"info-box\">\n    <strong>Quy tắc key:</strong> VSS path <code>Vehicle.Speed</code> được prefix với <code>key_prefix</code> (mặc định <code>v1/vss</code>) và chuyển dấu chấm thành slash:\n    <code>v1/vss/Vehicle/Speed</code>. Nếu key chứa <code>/</code> thì dùng nguyên văn, chỉ đổi dấu chấm thành slash.\n  </div>\n</section>\n\n<section id=\"mod-script-node-dynamic-kuksa\">\n  <h2 class=\"section-title\">Dynamic KUKSA Client — <code>nydus.kuksa</code></h2>\n  <p class=\"paragraph\">\n    Tạo thêm KUKSA client độc lập với các pin đã khai báo.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-kuksa.png\" alt=\"Script Editor với ví dụ KUKSA VSS subscribe/set/get.\">\n    <figcaption>Script Editor với ví dụ KUKSA VSS subscribe/set/get.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>local agl = nydus.kuksa.connect(\"http://10.99.0.30:55555\")\n\n-- Optional type hints nếu broker thiếu metadata\nlocal agl = nydus.kuksa.connect(\"http://10.99.0.30:55555\", {\n  [\"Vehicle.Speed\"] = \"float\",\n  [\"Vehicle.Cabin.HVAC.ACOn\"] = \"boolean\",\n})\n\nagl.vss.Vehicle.Speed:on_change(function(v) print(v) end)\nagl.vss.Vehicle.Cabin.HVAC.ACOn:publish(true)</code></pre>\n</section>",
    "en": "<section id=\"mod-script-node-kuksa-en\">\n  <h2 class=\"section-title\">KUKSA / VSS Pin — <code>pins.&lt;kuksa&gt;</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-kuksa.png\" alt=\"Script Editor with KUKSA VSS subscribe/set/get example.\">\n    <figcaption>Script Editor with KUKSA VSS subscribe/set/get example.</figcaption>\n  </figure>\n\n\n  <h3 class=\"section-subtitle\">String-path API</h3>\n  <pre class=\"code-block\"><code>pins.kuksa:on_change(function(ev)\n  print(ev.path, ev.value)\nend)\n\npins.kuksa:subscribe({\"Vehicle.Speed\", \"Vehicle.Cabin.HVAC.Station.Row1.Driver.Temperature\"})\npins.kuksa:publish(\"Vehicle.Speed\", 60.5)\npins.kuksa:actuate(\"Vehicle.Cabin.HVAC.ACOn\", true)\nlocal v = pins.kuksa:get(\"Vehicle.Speed\")</code></pre>\n\n  <h3 class=\"section-subtitle\">VSS tree API (<code>pin.vss</code>)</h3>\n  <pre class=\"code-block\"><code>local speed = pins.kuksa.vss.Vehicle.Speed\nspeed:on_change(function(v) print(\"speed\", v) end)\nspeed:publish(60.5)\nspeed:actuate(55.0)\nlocal v = speed:get()\n\nlocal ac = pins.kuksa.vss.Vehicle.Cabin.HVAC.IsAirConditioningActive\nac:on_actuate(function(v) print(\"requested AC\", v) end)\nac:publish(true)\n\nprint(speed.path, speed.unit, speed.data_type, speed.min, speed.max)</code></pre>\n\n  <details class=\"feature-list\">\n    <summary>Full <code>pin.vss</code> API table (7 methods)</summary>\n    <table>\n      <thead><tr><th>Method</th><th>Description</th></tr></thead>\n      <tbody>\n        <tr><td><code>pin:on_change(fn)</code></td><td>Global callback for any subscribed signal.</td></tr>\n        <tr><td><code>pin:subscribe(paths)</code></td><td>Dynamically subscribe to a list of paths.</td></tr>\n        <tr><td><code>pin:publish(path, value)</code></td><td>Publish a current/sensor value.</td></tr>\n        <tr><td><code>pin:actuate(path, value)</code></td><td>Send an actuation request.</td></tr>\n        <tr><td><code>pin:get(path)</code></td><td>Synchronous read.</td></tr>\n        <tr><td><code>pin.vss.&lt;Path&gt;.Leaf:on_change / :on_actuate / :publish / :actuate / :get</code></td><td>Dot-notation VSS tree API.</td></tr>\n        <tr><td><code>leaf.path / .unit / .data_type / .min / .max / .val.&lt;Label&gt;</code></td><td>Metadata.</td></tr>\n      </tbody>\n    </table>\n  </details>\n</section>\n\n<section id=\"mod-script-node-zenoh-en\">\n  <h2 class=\"section-title\">Zenoh Pub/Sub — Auto-Synthesized <code>pins.zenoh</code></h2>\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">ℹ️</div>\n    <div class=\"banner-content\">\n      <strong>Not a blueprint pin type.</strong> Zenoh has no entry in the Nydus pin-type schema and cannot be picked from the canvas's pin type list —\n      it is an application protocol that rides on top of the <strong>Ethernet</strong> pin. Wire this Script Node's <code>ethernet</code> pin to an\n      <strong>Ethernet Bridge</strong> node and the platform operator automatically injects <code>pins.zenoh</code> into the script — no manual pin declaration\n      needed or possible. If a \"Zenoh router\" container (a Container node with <code>env.ZENOH_MODE=router</code> on the same bridge) is present, the\n      connection uses TCP unicast to that router; otherwise the operator falls back to peer+multicast mode automatically. A Container node gets the same\n      bus simply by using its own <code>ethernet</code> pin with a regular Zenoh client library — again, no dedicated pin.\n    </div>\n  </div>\n  <p class=\"paragraph\">\n    Default payloads are UTF-8 strings; numeric values are encoded/decoded heuristically.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-zenoh.png\" alt=\"Script Editor showing Zenoh publisher and subscriber code.\">\n    <figcaption>Script Editor showing Zenoh publisher and subscriber code.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>-- Publish\npins.zenoh:publish(\"Vehicle.Speed\", 60.5)\n\n-- Subscribe to an exact path\npins.zenoh:on_change(\"Vehicle.Speed\", function(path, value)\n  print(path, value)\nend)\n\n-- Subscribe to a wildcard\npins.zenoh:sub(\"Vehicle.Powertrain.**\", function(raw_key, value)\n  print(raw_key, value)\nend)\n\n-- Low-level subscribe: exact key receives (value), wildcard receives (raw_key, value)\npins.zenoh:sub(\"Vehicle.Speed\", function(value) print(value) end)\n\n-- Query\nlocal v = pins.zenoh:get(\"Vehicle.Speed\")</code></pre>\n\n  <details class=\"feature-list\">\n    <summary>Full Zenoh pin API table (4 methods)</summary>\n    <table>\n      <thead><tr><th>Method</th><th>Description</th></tr></thead>\n      <tbody>\n        <tr><td><code>pin:publish(key, value)</code></td><td>Put value on the bus.</td></tr>\n        <tr><td><code>pin:on_change(pattern, fn)</code></td><td>Subscribe; callback always receives <code>(path, value)</code>.</td></tr>\n        <tr><td><code>pin:sub(pattern, fn)</code></td><td>Low-level subscribe; wildcard receives <code>(raw_key, value)</code>, exact receives <code>(value)</code>.</td></tr>\n        <tr><td><code>pin:get(key)</code></td><td>Read from local cache or issue a Zenoh query.</td></tr>\n      </tbody>\n    </table>\n  </details>\n  <div class=\"info-box\">\n    <strong>Key rules:</strong> a VSS path <code>Vehicle.Speed</code> is prefixed with <code>key_prefix</code> (default <code>v1/vss</code>) and dots become slashes:\n    <code>v1/vss/Vehicle/Speed</code>. If the key already contains <code>/</code>, it is used as-is (only dots→slashes).\n  </div>\n</section>\n\n<section id=\"mod-script-node-dynamic-kuksa-en\">\n  <h2 class=\"section-title\">Dynamic KUKSA Client — <code>nydus.kuksa</code></h2>\n  <p class=\"paragraph\">\n    Create additional KUKSA clients at runtime, independent of declared pins.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-kuksa.png\" alt=\"Script Editor with KUKSA VSS subscribe/set/get example.\">\n    <figcaption>Script Editor with KUKSA VSS subscribe/set/get example.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>local agl = nydus.kuksa.connect(\"http://10.99.0.30:55555\")\n\n-- Optional type hints for brokers with incomplete metadata\nlocal agl = nydus.kuksa.connect(\"http://10.99.0.30:55555\", {\n  [\"Vehicle.Speed\"] = \"float\",\n  [\"Vehicle.Cabin.HVAC.ACOn\"] = \"boolean\",\n})\n\nagl.vss.Vehicle.Speed:on_change(function(v) print(v) end)\nagl.vss.Vehicle.Cabin.HVAC.ACOn:publish(true)</code></pre>\n</section>"
  },
  "network-someip": {
    "vi": "<section id=\"mod-script-node-net\">\n  <h2 class=\"section-title\">Networking — <code>nydus.net</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-net.png\" alt=\"Script Editor với code mẫu socket UDP/TCP.\">\n    <figcaption>Script Editor với code mẫu socket UDP/TCP.</figcaption>\n  </figure>\n\n\n  <h3 class=\"section-subtitle\">UDP</h3>\n  <pre class=\"code-block\"><code>local sock = nydus.net.udp(\"0.0.0.0\", 30490)\n\nsock:on_recv(function(data, from_addr, from_port)\n  print(\"UDP from\", from_addr, from_port, #data)\nend)\n\nsock:send_to(\"\\x01\\x02\", \"192.168.1.10\", 30490)\nsock:join_multicast(\"239.255.0.1\", \"0.0.0.0\")\nsock:close()\nlocal addr = sock:local_addr()</code></pre>\n\n  <h3 class=\"section-subtitle\">TCP</h3>\n  <pre class=\"code-block\"><code>local sock = nydus.net.tcp(\"192.168.1.10\", 5000)\n\nsock:on_connect(function()\n  print(\"connected\")\n  sock:send(\"hello\")\nend)\n\nsock:on_data(function(data)\n  print(\"recv\", #data)\nend)\n\nsock:on_close(function(err)\n  print(\"closed\", err)\nend)\n\nsock:close()\nlocal addr = sock:remote_addr()</code></pre>\n</section>\n\n<section id=\"mod-script-node-someip\">\n  <h2 class=\"section-title\">SOME/IP Helpers — <code>nydus.someip</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-someip.png\" alt=\"Script Editor với ví dụ SOME/IP client subscribe và request.\">\n    <figcaption>Script Editor với ví dụ SOME/IP client subscribe và request.</figcaption>\n  </figure>\n  <details class=\"feature-list\">\n    <summary>Toàn bộ API SOME/IP: parse, build message và SD helpers (bấm để mở/đóng)</summary>\n\n  <pre class=\"code-block\"><code>-- Parse raw SOME/IP message\nlocal msg = nydus.someip.parse(data)\n-- msg.service_id, msg.method_id, msg.event_id, msg.client_id, msg.session_id\n-- msg.interface_version, msg.return_code, msg.message_type, msg.is_event, msg.is_sd\n-- msg.payload\n\n-- Build message\nlocal pkt = nydus.someip.build({\n  service_id = 0x1234,\n  method_id = 0x5678,\n  client_id = 0x0001,\n  session_id = 0x0001,\n  interface_version = 1,\n  return_code = 0,\n  message_type = \"request\", -- request | request_no_return | notification | response | error\n  payload = \"\\x01\\x02\"\n})\n\n-- SD helpers\nlocal sd = nydus.someip.parse_sd(sd_payload)\nlocal offer = nydus.someip.build_sd_offer({\n  service_id = 0x1234,\n  instance_id = 0x0001,\n  major_version = 1,\n  ttl = 3,\n  minor_version = 0,\n  endpoint = { address = \"192.168.1.1\", port = 30509, protocol = \"udp\" }\n})\nlocal find = nydus.someip.build_sd_find({ service_id = 0x1234 })\nlocal ack = nydus.someip.build_sd_subscribe_ack({\n  service_id = 0x1234, instance_id = 0x0001,\n  major_version = 1, ttl = 3, eventgroup_id = 0x01\n})</code></pre>\n  </details>\n</section>",
    "en": "<section id=\"mod-script-node-net-en\">\n  <h2 class=\"section-title\">Networking — <code>nydus.net</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-net.png\" alt=\"Script Editor with UDP/TCP socket example code.\">\n    <figcaption>Script Editor with UDP/TCP socket example code.</figcaption>\n  </figure>\n\n\n  <h3 class=\"section-subtitle\">UDP</h3>\n  <pre class=\"code-block\"><code>local sock = nydus.net.udp(\"0.0.0.0\", 30490)\n\nsock:on_recv(function(data, from_addr, from_port)\n  print(\"UDP from\", from_addr, from_port, #data)\nend)\n\nsock:send_to(\"\\x01\\x02\", \"192.168.1.10\", 30490)\nsock:join_multicast(\"239.255.0.1\", \"0.0.0.0\")\nsock:close()\nlocal addr = sock:local_addr()</code></pre>\n\n  <h3 class=\"section-subtitle\">TCP</h3>\n  <pre class=\"code-block\"><code>local sock = nydus.net.tcp(\"192.168.1.10\", 5000)\n\nsock:on_connect(function()\n  print(\"connected\")\n  sock:send(\"hello\")\nend)\n\nsock:on_data(function(data)\n  print(\"recv\", #data)\nend)\n\nsock:on_close(function(err)\n  print(\"closed\", err)\nend)\n\nsock:close()\nlocal addr = sock:remote_addr()</code></pre>\n</section>\n\n<section id=\"mod-script-node-someip-en\">\n  <h2 class=\"section-title\">SOME/IP Helpers — <code>nydus.someip</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-someip.png\" alt=\"Script Editor with SOME/IP client subscribe and request example.\">\n    <figcaption>Script Editor with SOME/IP client subscribe and request example.</figcaption>\n  </figure>\n  <details class=\"feature-list\">\n    <summary>Full SOME/IP API: parse, message build and SD helpers (click to expand/collapse)</summary>\n\n  <pre class=\"code-block\"><code>-- Parse raw SOME/IP message\nlocal msg = nydus.someip.parse(data)\n-- msg.service_id, msg.method_id, msg.event_id, msg.client_id, msg.session_id\n-- msg.interface_version, msg.return_code, msg.message_type, msg.is_event, msg.is_sd\n-- msg.payload\n\n-- Build message\nlocal pkt = nydus.someip.build({\n  service_id = 0x1234,\n  method_id = 0x5678,\n  client_id = 0x0001,\n  session_id = 0x0001,\n  interface_version = 1,\n  return_code = 0,\n  message_type = \"request\", -- request | request_no_return | notification | response | error\n  payload = \"\\x01\\x02\"\n})\n\n-- SD helpers\nlocal sd = nydus.someip.parse_sd(sd_payload)\nlocal offer = nydus.someip.build_sd_offer({\n  service_id = 0x1234,\n  instance_id = 0x0001,\n  major_version = 1,\n  ttl = 3,\n  minor_version = 0,\n  endpoint = { address = \"192.168.1.1\", port = 30509, protocol = \"udp\" }\n})\nlocal find = nydus.someip.build_sd_find({ service_id = 0x1234 })\nlocal ack = nydus.someip.build_sd_subscribe_ack({\n  service_id = 0x1234, instance_id = 0x0001,\n  major_version = 1, ttl = 3, eventgroup_id = 0x01\n})</code></pre>\n  </details>\n</section>"

  "uds-vsomeip": {
    "vi": "<section id=\"mod-script-node-uds\">\n  <h2 class=\"section-title\">UDS Server — <code>nydus.uds</code></h2>\n  <p class=\"paragraph\">\n    Tạo một UDS server tĩnh trong script node, sau đó feed CAN frame vào và lấy response frame ra.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-uds.png\" alt=\"Script Editor với ví dụ gửi yêu cầu chẩn đoán UDS.\">\n    <figcaption>Script Editor với ví dụ gửi yêu cầu chẩn đoán UDS.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>local server = nydus.uds.server({\n  rx_id = 0x7E0,\n  tx_id = 0x7E8,\n  funct_rx_id = 0x7DF,\n  fd = false,\n  pad = true,\n  s3_ms = 5000,\n  security_level = 0,\n  security_constant = 0,\n  dids = {\n    [0xF1A0] = \"OK!\",\n    [0xF1A1] = {0x01, 0x02, 0x03},\n  },\n  routines = {0xFF01, 0xFF02},\n  dtcs = {\n    {id = 0x010420, status = 0x09},\n  }\n})\n\nlocal outs = server:feed_frame(0x7E0, request_bytes, false)\n-- outs[1] = { id=0x7E8, data={...}, fd=false, extended=false }\n\nlocal outs2 = server:tick()\nlocal busy = server:is_busy()\nlocal session = server:current_session()</code></pre>\n</section>\n\n<section id=\"mod-script-node-vsomeip\">\n  <h2 class=\"section-title\">vSOME/IP Binding — <code>nydus.vsomeip</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-vsomeip.png\" alt=\"Script Editor với ví dụ thiết lập service vSOME/IP.\">\n    <figcaption>Script Editor với ví dụ thiết lập service vSOME/IP.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>-- Optional: ghi config JSON trước khi new()\nnydus.vsomeip.configure([[ { \"unicast\" : \"192.168.1.10\", ... } ]])\n\nnydus.vsomeip.add_multicast_route(\"224.224.224.245\", \"eth0\")\nlocal ip = nydus.vsomeip.iface_ip(\"eth0\")\n\nlocal app = nydus.vsomeip.new(\"MyApp\")\n\napp:offer(0x1234, 0x0001)\napp:offer_event(0x1234, 0x0001, 0x8001, 0x01)\n\napp:notify(0x1234, 0x0001, 0x8001, \"\\x01\\x02\")\n\napp:on_request(0x1234, 0x0001, 0x0001, function(req)\n  print(\"request\", req.service, req.instance, req.method, req.client, req.session)\n  app:respond(req, \"\\x00\\x00\")\nend)\n\napp:stop()</code></pre>\n\n  <table>\n    <thead><tr><th>API</th><th>Mô tả</th></tr></thead>\n    <tbody>\n      <tr><td><code>nydus.vsomeip.configure(json)</code></td><td>Ghi <code>/tmp/vsomeip_script_node.json</code>, phải gọi trước <code>new()</code>.</td></tr>\n      <tr><td><code>nydus.vsomeip.add_multicast_route(group, device)</code></td><td>Thêm route multicast.</td></tr>\n      <tr><td><code>nydus.vsomeip.iface_ip(name)</code></td><td>IPv4 đầu tiên của interface.</td></tr>\n      <tr><td><code>nydus.vsomeip.new(name)</code></td><td>Tạo vsomeip application.</td></tr>\n      <tr><td><code>app:offer(svc, inst)</code></td><td>Offer service instance.</td></tr>\n      <tr><td><code>app:offer_event(svc, inst, event, eventgroup)</code></td><td>Offer event.</td></tr>\n      <tr><td><code>app:notify(svc, inst, event, data)</code></td><td>Emit notification.</td></tr>\n      <tr><td><code>app:on_request(svc, inst, method, fn)</code></td><td>Register method handler; <code>req</code> có service, instance, method, client, session, payload.</td></tr>\n      <tr><td><code>app:respond(req, payload)</code></td><td>Gửi response tương ứng với req.</td></tr>\n      <tr><td><code>app:stop()</code></td><td>Dừng application.</td></tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-script-node-tunnel\">\n  <h2 class=\"section-title\">Tunnel UDS Pin — <code>pins.&lt;tunnel&gt;</code></h2>\n  <p class=\"paragraph\">\n    Opaque byte stream qua Unix domain socket, đóng khung bởi 4-byte big-endian length.\n  </p>\n  <pre class=\"code-block\"><code>pins.tunnel:on_frame(function(direction, bytes)\n  -- direction == \"rx\"\n  print(#bytes, bytes)\nend)\n\npins.tunnel:send(\"\\x01\\x02\\x03\")\npins.tunnel:send({0x01, 0x02, 0x03})</code></pre>\n</section>",
    "en": "<section id=\"mod-script-node-uds-en\">\n  <h2 class=\"section-title\">UDS Server — <code>nydus.uds</code></h2>\n  <p class=\"paragraph\">\n    Create a static UDS server inside the script node, then feed CAN frames in and read response frames out.\n  </p>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-uds.png\" alt=\"Script Editor with a UDS diagnostic request example.\">\n    <figcaption>Script Editor with a UDS diagnostic request example.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>local server = nydus.uds.server({\n  rx_id = 0x7E0,\n  tx_id = 0x7E8,\n  funct_rx_id = 0x7DF,\n  fd = false,\n  pad = true,\n  s3_ms = 5000,\n  security_level = 0,\n  security_constant = 0,\n  dids = {\n    [0xF1A0] = \"OK!\",\n    [0xF1A1] = {0x01, 0x02, 0x03},\n  },\n  routines = {0xFF01, 0xFF02},\n  dtcs = {\n    {id = 0x010420, status = 0x09},\n  }\n})\n\nlocal outs = server:feed_frame(0x7E0, request_bytes, false)\n-- outs[1] = { id=0x7E8, data={...}, fd=false, extended=false }\n\nlocal outs2 = server:tick()\nlocal busy = server:is_busy()\nlocal session = server:current_session()</code></pre>\n</section>\n\n<section id=\"mod-script-node-vsomeip-en\">\n  <h2 class=\"section-title\">vSOME/IP Binding — <code>nydus.vsomeip</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-vsomeip.png\" alt=\"Script Editor with a vSOME/IP service setup example.\">\n    <figcaption>Script Editor with a vSOME/IP service setup example.</figcaption>\n  </figure>\n\n  <pre class=\"code-block\"><code>-- Optional: write config JSON before new()\nnydus.vsomeip.configure([[ { \"unicast\" : \"192.168.1.10\", ... } ]])\n\nnydus.vsomeip.add_multicast_route(\"224.224.224.245\", \"eth0\")\nlocal ip = nydus.vsomeip.iface_ip(\"eth0\")\n\nlocal app = nydus.vsomeip.new(\"MyApp\")\n\napp:offer(0x1234, 0x0001)\napp:offer_event(0x1234, 0x0001, 0x8001, 0x01)\n\napp:notify(0x1234, 0x0001, 0x8001, \"\\x01\\x02\")\n\napp:on_request(0x1234, 0x0001, 0x0001, function(req)\n  print(\"request\", req.service, req.instance, req.method, req.client, req.session)\n  app:respond(req, \"\\x00\\x00\")\nend)\n\napp:stop()</code></pre>\n\n  <table>\n    <thead><tr><th>API</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>nydus.vsomeip.configure(json)</code></td><td>Write <code>/tmp/vsomeip_script_node.json</code>; must be called before <code>new()</code>.</td></tr>\n      <tr><td><code>nydus.vsomeip.add_multicast_route(group, device)</code></td><td>Add a multicast route.</td></tr>\n      <tr><td><code>nydus.vsomeip.iface_ip(name)</code></td><td>First IPv4 address of the interface.</td></tr>\n      <tr><td><code>nydus.vsomeip.new(name)</code></td><td>Create a vsomeip application.</td></tr>\n      <tr><td><code>app:offer(svc, inst)</code></td><td>Offer a service instance.</td></tr>\n      <tr><td><code>app:offer_event(svc, inst, event, eventgroup)</code></td><td>Offer an event.</td></tr>\n      <tr><td><code>app:notify(svc, inst, event, data)</code></td><td>Emit event notification.</td></tr>\n      <tr><td><code>app:on_request(svc, inst, method, fn)</code></td><td>Register method handler; <code>req</code> has service, instance, method, client, session, payload.</td></tr>\n      <tr><td><code>app:respond(req, payload)</code></td><td>Send a response correlated to req.</td></tr>\n      <tr><td><code>app:stop()</code></td><td>Stop the application.</td></tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-script-node-tunnel-en\">\n  <h2 class=\"section-title\">Tunnel UDS Pin — <code>pins.&lt;tunnel&gt;</code></h2>\n  <p class=\"paragraph\">\n    Opaque byte stream over a Unix domain socket, framed by a 4-byte big-endian length prefix.\n  </p>\n  <pre class=\"code-block\"><code>pins.tunnel:on_frame(function(direction, bytes)\n  -- direction == \"rx\"\n  print(#bytes, bytes)\nend)\n\npins.tunnel:send(\"\\x01\\x02\\x03\")\npins.tunnel:send({0x01, 0x02, 0x03})</code></pre>\n</section>"
  },
  "device-proxy": {
    "vi": "<section id=\"mod-script-node-device-proxy\">\n  <h2 class=\"section-title\">Device Proxy — <code>nydus.device_proxy</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-device-proxy.png\" alt=\"Script Editor với ví dụ device proxy shell/ADB/forward.\">\n    <figcaption>Script Editor với ví dụ device proxy shell/ADB/forward.</figcaption>\n  </figure>\n\n  <div class=\"info-box\">\n    <strong>⚠️ Trạng thái:</strong> API này chỉ tồn tại khi Operator set biến môi trường <code>DEVICE_PROXY_URL</code>.\n    Trong Phase C rewrite, device-proxy TS không còn expose gRPC server nữa, nên các lệnh Lua có thể bị <code>connection refused</code>\n    trừ khi được bật lại. USB plug/unplug chủ yếu thực hiện qua UI.\n  </div>\n  <pre class=\"code-block\"><code>nydus.device_proxy:on_event(function(kind, handle, key, message)\n  -- kind: \"attached\" | \"detached\" | \"error\" | \"unknown\"\nend)\n\nlocal inv = nydus.device_proxy:list_inventory()\nfor _, d in ipairs(inv.devices) do\n  print(d.key, d.name, d.vid, d.pid)\nend\n\nlocal r = nydus.device_proxy:attach_by_key(\"usb:1234:5678\")\nprint(r.ok, r.handle, r.error, r.port)  -- port do runtime cấp cho thiết bị\n\nr = nydus.device_proxy:detach(r.handle)\nr = nydus.device_proxy:mount_image(\"system.img\")\nr = nydus.device_proxy:register_client(\"client-1\", \"http://...\", \"token\")</code></pre>\n</section>",
    "en": "<section id=\"mod-script-node-device-proxy-en\">\n  <h2 class=\"section-title\">Device Proxy — <code>nydus.device_proxy</code></h2>\n  <figure class=\"screenshot\">\n    <img src=\"./images/script-node-device-proxy.png\" alt=\"Script Editor with device proxy shell/ADB/forward example.\">\n    <figcaption>Script Editor with device proxy shell/ADB/forward example.</figcaption>\n  </figure>\n\n  <div class=\"info-box\">\n    <strong>⚠️ Status:</strong> This API only exists when the Operator sets the <code>DEVICE_PROXY_URL</code> environment variable.\n    In the Phase C TypeScript rewrite, the device-proxy no longer exposes a gRPC server, so Lua calls may fail with connection refused\n    unless re-enabled. USB plug/unplug is primarily done through the UI.\n  </div>\n  <pre class=\"code-block\"><code>nydus.device_proxy:on_event(function(kind, handle, key, message)\n  -- kind: \"attached\" | \"detached\" | \"error\" | \"unknown\"\nend)\n\nlocal inv = nydus.device_proxy:list_inventory()\nfor _, d in ipairs(inv.devices) do\n  print(d.key, d.name, d.vid, d.pid)\nend\n\nlocal r = nydus.device_proxy:attach_by_key(\"usb:1234:5678\")\nprint(r.ok, r.handle, r.error, r.port)  -- port assigned by the runtime\n\nr = nydus.device_proxy:detach(r.handle)\nr = nydus.device_proxy:mount_image(\"system.img\")\nr = nydus.device_proxy:register_client(\"client-1\", \"http://...\", \"token\")</code></pre>\n</section>"
  },
  "uds-client": {
    "vi": "<section id=\"mod-uds-client\">\n  <h2 class=\"section-title\">UDS Client — ISO-TP Socket</h2>\n  <p class=\"paragraph\">\n    Từ bản cập nhật M3, mỗi <a href=\"#mod-can-bus-node\">CAN Bus pin</a> được runtime mở sẵn một socket ISO-TP tại\n    <code>/run/nydus/uds-&lt;pin_name&gt;.sock</code>. Bất kỳ Container Node (hoặc process trong pod) nào cũng có thể kết nối\n    socket này để gửi/nhận <strong>UDS PDU thô</strong> (ISO 14229) mà không cần tự xử lý ISO-TP segmentation.\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">💡</div>\n    <div class=\"banner-content\">\n      <strong>Khác biệt với UDS Server</strong>\n      <a href=\"#mod-uds-vsomeip\">UDS Server</a> dùng trong Script Node để <em>mô phỏng ECU</em>.\n      UDS Client ở đây là <em>tester/gateway</em> gửi request (ReadDID, ReadDTC, SessionControl…) và đọc response từ ECU thật/ảo.\n    </div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Đường dẫn socket</h3>\n  <p class=\"paragraph\">\n    Nếu Container Node có pin <code>can_main</code> nối vào CAN Bus Node, runtime sẽ tạo:\n  </p>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>socket path</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>/run/nydus/uds-can_main.sock</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Wire protocol</h3>\n  <p class=\"paragraph\">\n    Giao thức là framed message đơn giản qua Unix domain socket:\n  </p>\n  <table>\n    <thead>\n      <tr><th>Tag</th><th>Ý nghĩa</th><th>Payload</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>0x01</code></td><td>Config (gửi đầu tiên)</td><td><code>addr_mode tx_id rx_id can_fd p2_ms</code></td></tr>\n      <tr><td><code>0x10</code></td><td>Request</td><td>Raw UDS request PDU, e.g. <code>22 F1 90</code></td></tr>\n      <tr><td><code>0x20</code></td><td>Response</td><td>Raw UDS response PDU, e.g. <code>62 F1 90 …</co
