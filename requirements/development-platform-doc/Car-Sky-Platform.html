ck=\"openLightbox('./images/live-step-05-artifacts.png')\">\n      <img src=\"./images/live-step-05-artifacts.png\" alt=\"Artifact aaos với host package và image\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Danh sách trái:</strong> usb, agl, aaos, pwt, bcm, vss, AAOS — mỗi item hiển thị category và số version.</li>\n        <li><strong>Category filter:</strong> All Categories, VSS, Android Image, AGL Image, DBC, LDF, Script, USB.</li>\n        <li><strong>Version 0.0.1 (latest):</strong> chứa 2 file role: <code>host_package</code> 463.6 MB và <code>image</code> 731.9 MB.</li>\n        <li><strong>Sharing:</strong> Private.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 6: Nydus list -->\n  <h3 class=\"section-subtitle\">Bước 6 — Nydus: Danh Sách Blueprint</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Nydus</strong> để vào trung tâm thiết kế kiến trúc. Panel hiển thị các blueprint (bản thiết kế) và các deployment\n    (instance đang chạy) được tạo từ blueprint đó.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 6</span>\n        Danh sách Blueprint &amp; Deployment\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-06-nydus-list.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-06-nydus-list.png')\">\n      <img src=\"./images/live-step-06-nydus-list.png\" alt=\"Danh sách blueprint trong Nydus\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Blueprint actions:</strong> New Blueprint, Import from File, Export Selected.</li>\n        <li><strong>Started pack / Demo:</strong> 2 blueprint trong hệ thống.</li>\n        <li><strong>Started pack-deploy:</strong> deployment đang chạy 22/22 nodes từ blueprint Started pack.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 7: Blueprint canvas -->\n  <h3 class=\"section-subtitle\">Bước 7 — Canvas Blueprint: Thiết Kế Topology</h3>\n  <p class=\"paragraph\">\n    Bấm vào blueprint <strong>Started pack</strong> để mở canvas kéo-thả. Đây là nơi khai báo các node (ECU ảo/VM),\n    pin (điểm giao tiếp) và các kết nối (edge) giữa chúng.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 7</span>\n        Canvas blueprint \"Started pack\"\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-07-blueprint-canvas.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-07-blueprint-canvas.png')\">\n      <img src=\"./images/live-step-07-blueprint-canvas.png\" alt=\"Canvas blueprint với các node và zone\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Node palette:</strong> Abstract, Skycraft, Script Node, KUKSA Broker, CAN/LIN Bus, GPIO Panel, Ethernet Bridge, Container, Proxy Node, Device Proxy.</li>\n        <li><strong>Các node chính:</strong> IVI - FACE (Android), Cluster - FACE (AGL), BCM Gateway, TCU Gateway, PWT Gateway, Central Broker (VSS), v.v.</li>\n        <li><strong>4 zones màu:</strong> BCM Zonal, PWT Zonal, TCU Zonal, CDC Zonal giúp nhóm node theo miền chức năng.</li>\n        <li><strong>Inspector:</strong> Name, Description, Locked, Deployments, Sharing &amp; Ownership, Actions.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 8: Deployment -->\n  <h3 class=\"section-subtitle\">Bước 8 — Deployment Viewer: Theo Dõi Room Đang Chạy</h3>\n  <p class=\"paragraph\">\n    Bấm vào deployment <strong>Started pack-deploy</strong> để mở Deployment Viewer. Tại đây bạn thấy trạng thái thực tế\n    của từng node trên Kubernetes và có thể Redeploy / Restart All.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 8</span>\n        Deployment Viewer — 22/22 nodes ready\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-08-deployment.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-08-deployment.png')\">\n      <img src=\"./images/live-step-08-deployment.png\" alt=\"Deployment viewer hiển thị tất cả node Running\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Running — 22/22 nodes ready:</strong> toàn bộ pod trong Room đã sẵn sàng.</li>\n        <li><strong>Edit:</strong> chỉnh snapshot blueprint của deployment.</li>\n        <li><strong>Redeploy:</strong> chỉ restart các node có thay đổi.</li>\n        <li><strong>Restart All:</strong> restart toàn bộ node.</li>\n        <li>Mỗi node có badge <span class=\"table-badge badge-emerald\">Running</span> màu xanh.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 9: Hubs -->\n  <h3 class=\"section-subtitle\">Bước 9 — Hubs: Quản Lý Proxy Node Vật Lý</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Hubs</strong> để quản lý các hub/agent chạy trên phần cứng biên (remote bench/PC). Khi một Scout agent kết nối lần đầu,\n    nó sẽ xuất hiện ở trạng thái <em>Pending</em> để admin phê duyệt.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 9</span>\n        Hubs — chưa có hub đăng ký\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-09-hubs.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-09-hubs.png')\">\n      <img src=\"./images/live-step-09-hubs.png\" alt=\"Panel Hubs chưa có hub nào\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Live:</strong> kết nối tới dịch vụ hub đang hoạt động (không báo lỗi upstream connect).</li>\n        <li><strong>No hubs registered:</strong> chưa có Scout agent nào kết nối.</li>\n        <li>Khi có hub, bạn sẽ thấy Accept / Revoke / Delete.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 10: Registry login -->\n  <h3 class=\"section-subtitle\">Bước 10 — Registry: Đăng Nhập Zot</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Registry</strong> để mở Container Registry (Zot) nhúng trong iframe. Lần đầu truy cập Zot yêu cầu đăng nhập SSO.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-data\">Bước 10</span>\n        Trang đăng nhập Zot\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-10-registry-login.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-10-registry-login.png')\">\n      <img src=\"./images/live-step-10-registry-login.png\" alt=\"Zot registry login page\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>https://registry.carsky.io/</strong>: endpoint dùng cho <code>docker login</code>/<code>docker push</code>.</li>\n        <li><strong>SIGN IN WITH A8 KEYCLOAK:</strong> đăng nhập SSO qua Keycloak.</li>\n        <li>Có thể dùng username/password trực tiếp nếu đã tạo API key trong phần Settings.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 11: Registry home -->\n  <h3 class=\"section-subtitle\">Bước 11 — Registry: Danh Sách Image</h3>\n  <p class=\"paragraph\">\n    Sau khi đăng nhập SSO, Zot hiển thị các Docker/OCI image đã push lên registry của CarSky.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-data\">Bước 11</span>\n        Zot home — Most popular images\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-11-registry-home.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-11-registry-home.png')\">\n      <img src=\"./images/live-step-11-registry-home.png\" alt=\"Zot registry hiển thị danh sách image\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Most popular images:</strong> ví dụ <code>local-nginx-hello</code>, <code>local-busybox-loop</code>, <code>local-can-sender</code>.</li>\n        <li><strong>Tags:</strong> linux / arm64 / unknown.</li>\n        <li><strong>Search bar:</strong> tìm image theo tên repository.</li>\n        <li>Image này dùng cho node Container trong blueprint.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 12: Dashboard -->\n  <h3 class=\"section-subtitle\">Bước 12 — Dashboard: Giám Sát Tài Nguyên Runtime</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Dashboard</strong> để xem tổng hợp CPU/RAM của từng pod/node trong deployment. Chọn deployment cần xem từ dropdown trên cùng.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 12</span>\n        Dashboard theo dõi CPU/MEM từng node\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-12-dashboard.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-12-dashboard.png')\">\n      <img src=\"./images/live-step-12-dashboard.png\" alt=\"Dashboard giám sát tài nguyên các node\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Dropdown:</strong> <code>AI_Device01 — Started pack-deploy</code>.</li>\n        <li><strong>CPU USAGE:</strong> 1.64 cores; <strong>MEM USAGE:</strong> 7.25 GiB.</li>\n        <li><strong>Running 22/22 nodes ready:</strong> tất cả pod đều healthy.</li>\n        <li><strong>Node Usage cards:</strong> mỗi card = 1 node, hiển thị CPU/MEM. <code>IVI - FACE (Android)</code> đang dùng 4.75 GiB RAM. <code>SeatBelt ECU</code> có badge ⚠ 3.</li>\n      </ul>\n    </div>\n  </div>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong>Lưu ý</strong>\n      Dữ liệu trên dashboard là runtime thay đổi liên tục — con số trong ảnh chỉ phản ánh thờigi điểm chụp màn hình.\n      Nếu một node có badge lỗi (⚠), bấm vào card để xem log chi tiết.\n    </div>\n  </div>\n</section>\n",
    "en": "<section id=\"mod-live-walkthrough-steps-en\">\n  <h2 class=\"section-title\">Live Walkthrough on carsky.io</h2>\n\n  <p class=\"paragraph\">\n    Every screenshot below was captured <strong>directly from carsky.io</strong>. This walkthrough follows the exact\n    order of the 7 main items in the left DockBar: <strong>Devices → Videos → Artifacts → Nydus → Hubs → Registry → Dashboard</strong>.\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">💡</div>\n    <div class=\"banner-content\">\n      <strong>Tip while reading the screenshots</strong>\n      Each image can be clicked to zoom in (lightbox). The <em>Element Breakdown</em> section under each image highlights what to notice.\n    </div>\n  </div>\n\n  <!-- Step 0: Login -->\n  <h3 class=\"section-subtitle\">Step 0 — Sign In via Keycloak SSO</h3>\n  <p class=\"paragraph\">\n    Opening <code>https://carsky.io</code> redirects to the CarSky Keycloak sign-in page.\n    Enter your username and the provided password, then click <strong>Sign In</strong>.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 0</span>\n        Keycloak SSO sign-in page\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-00-login.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-00-login.png')\">\n      <img src=\"./images/live-step-00-login.png\" alt=\"Keycloak SSO sign-in page\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Sign in to CarSky:</strong> SSO authentication form served by Keycloak.</li>\n        <li><strong>Username / Password:</strong> credentials provided by the admin.</li>\n        <li>After successful login, the browser redirects back to the Rework workbench.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 1: Workbench -->\n  <h3 class=\"section-subtitle\">Step 1 — The 3-Column Workbench</h3>\n  <p class=\"paragraph\">\n    After signing in, the main UI appears with a 3-column layout: <strong>DockBar/Panel on the left</strong>,\n    <strong>Stage in the center</strong>, and <strong>Inspector on the right</strong>. The \"T\" avatar at the bottom-left confirms the signed-in user.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 1</span>\n        Default workbench after login\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-01-workbench.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-01-workbench.png')\">\n      <img src=\"./images/live-step-01-workbench.png\" alt=\"Three-column workbench after login\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Left DockBar:</strong> 7 section buttons — Devices, Videos, Artifacts, Nydus, Hubs, Registry, Dashboard.</li>\n        <li><strong>Left Panel:</strong> shows the list for the currently selected section.</li>\n        <li><strong>Center Stage:</strong> main content (canvas, video stream, etc.).</li>\n        <li><strong>Right Inspector:</strong> detailed properties of the selected object.</li>\n        <li>The avatar in the bottom-left corner confirms you are logged in.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 2: Devices -->\n  <h3 class=\"section-subtitle\">Step 2 — Devices: Device List</h3>\n  <p class=\"paragraph\">\n    Click <strong>Devices</strong> on the DockBar to open the device management panel. Each device is a runtime endpoint\n    that a user can connect to and open widgets for viewing/control.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 2</span>\n        Devices panel with 2 devices\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-02-devices.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-02-devices.png')\">\n      <img src=\"./images/live-step-02-devices.png\" alt=\"Device list in the Devices panel\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Demo:</strong> sample device with serial <code>dp38391gqduqqfjqyjadn</code>.</li>\n        <li><strong>AI_Device01:</strong> device attached to the <em>Started pack-deploy</em> deployment, serial <code>l4-ar9uaebz1ko1901t18</code>.</li>\n        <li><strong>Connect button:</strong> opens a control session to the device.</li>\n        <li><strong>+ (Add device):</strong> creates a new device if you have permission.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 3: Widgets -->\n  <h3 class=\"section-subtitle\">Step 3 — Connect a Device &amp; Open Widgets</h3>\n  <p class=\"paragraph\">\n    Click <strong>Connect</strong> on <code>AI_Device01</code>. After a few seconds the connection succeeds and widgets open automatically.\n    The <strong>AAOS screen</strong> widget starts streaming the Android Automotive screen live.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 3</span>\n        Device connected — widgets showing AAOS screen\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-03-widgets.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-03-widgets.png')\">\n      <img src=\"./images/live-step-03-widgets.png\" alt=\"AAOS screen and widgets after connect\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Status bar:</strong> <code>AI_Device01</code> — <span class=\"table-badge badge-emerald\">Connected</span>.</li>\n        <li><strong>Widgets list:</strong> AAOS screen, AAOS ADB, BCM CAN signal, Dashboard, New CAN Panel, New USB Device Proxy, New GPIO Panel.</li>\n        <li><strong>AAOS screen (Stage):</strong> live Android Automotive stream with PRND, 0 km/h, 30°C, 85% battery, 382 km range.</li>\n        <li><strong>Inspector (BCM CAN):</strong> watching 3 signals: <code>HvacCommand/Driver_Temperature</code>, <code>Passenger_Temperature</code>, <code>PWT_VehicleSpeed/Speed_kph</code>.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 4: Videos -->\n  <h3 class=\"section-subtitle\">Step 4 — Videos: Recorded Video Library</h3>\n  <p class=\"paragraph\">\n    Click <strong>Videos</strong> on the DockBar. This is the library for clips recorded via the Screen widget's Recorder Part.\n    The system currently has no recordings.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 4</span>\n        Empty Video Library\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-04-videos.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-04-videos.png')\">\n      <img src=\"./images/live-step-04-videos.png\" alt=\"Video library with no recordings\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>0 recordings:</strong> no videos recorded from the Recorder Part yet.</li>\n        <li><strong>Message:</strong> \"Start recording from a device to see videos here\".</li>\n        <li>When videos exist, each thumbnail allows playback in the Stage or downloading as <code>.mp4</code>.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 5: Artifacts -->\n  <h3 class=\"section-subtitle\">Step 5 — Artifacts: OS Images &amp; Config Files</h3>\n  <p class=\"paragraph\">\n    Click <strong>Artifacts</strong> to open the central binary store. Nydus nodes need artifacts at boot time:\n    OS images, DBC/VSS files, scripts, etc. Select the <code>aaos</code> (Android Image) artifact to view its version details.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-data\">Step 5</span>\n        aaos artifact with two file roles\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-05-artifacts.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-05-artifacts.png')\">\n      <img src=\"./images/live-step-05-artifacts.png\" alt=\"aaos artifact with host package and image files\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Left list:</strong> usb, agl, aaos, pwt, bcm, vss, AAOS — each shows category and version count.</li>\n        <li><strong>Category filter:</strong> All Categories, VSS, Android Image, AGL Image, DBC, LDF, Script, USB.</li>\n        <li><strong>Version 0.0.1 (latest):</strong> contains two file roles: <code>host_package</code> 463.6 MB and <code>image</code> 731.9 MB.</li>\n        <li><strong>Sharing:</strong> Private.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 6: Nydus list -->\n  <h3 class=\"section-subtitle\">Step 6 — Nydus: Blueprint List</h3>\n  <p class=\"paragraph\">\n    Click <strong>Nydus</strong> to enter the architecture design center. The panel lists blueprints (designs)\n    and deployments (running instances created from a blueprint).\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 6</span>\n        Blueprint &amp; Deployment list\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-06-nydus-list.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-06-nydus-list.png')\">\n      <img src=\"./images/live-step-06-nydus-list.png\" alt=\"Blueprint list in Nydus\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Blueprint actions:</strong> New Blueprint, Import from File, Export Selected.</li>\n        <li><strong>Started pack / Demo:</strong> two blueprints in the system.</li>\n        <li><strong>Started pack-deploy:</strong> running deployment, 22/22 nodes, from blueprint Started pack.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 7: Blueprint canvas -->\n  <h3 class=\"section-subtitle\">Step 7 — Blueprint Canvas: Designing Topology</h3>\n  <p class=\"paragraph\">\n    Click the <strong>Started pack</strong> blueprint to open its drag-and-drop canvas. This is where you declare nodes (virtual ECUs/VMs),\n    pins (connection points), and edges (wires) between them.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 7</span>\n        \"Started pack\" blueprint canvas\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-07-blueprint-canvas.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-07-blueprint-canvas.png')\">\n      <img src=\"./images/live-step-07-blueprint-canvas.png\" alt=\"Blueprint canvas with nodes and zones\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Node palette:</strong> Abstract, Skycraft, Script Node, KUKSA Broker, CAN/LIN Bus, GPIO Panel, Ethernet Bridge, Container, Proxy Node, Device Proxy.</li>\n        <li><strong>Main nodes:</strong> IVI - FACE (Android), Cluster - FACE (AGL), BCM Gateway, TCU Gateway, PWT Gateway, Central Broker (VSS), etc.</li>\n        <li><strong>4 colored zones:</strong> BCM Zonal, PWT Zonal, TCU Zonal, CDC Zonal group nodes by functional domain.</li>\n        <li><strong>Inspector:</strong> Name, Description, Locked, Deployments, Sharing &amp; Ownership, Actions.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 8: Deployment -->\n  <h3 class=\"section-subtitle\">Step 8 — Deployment Viewer: Monitor the Running Room</h3>\n  <p class=\"paragraph\">\n    Click the <strong>Started pack-deploy</strong> deployment to open the Deployment Viewer. Here you see the real-time status\n    of each Kubernetes node and can Redeploy / Restart All.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 8</span>\n        Deployment Viewer — 22/22 nodes ready\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-08-deployment.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-08-deployment.png')\">\n      <img src=\"./images/live-step-08-deployment.png\" alt=\"Deployment viewer showing all nodes Running\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Running — 22/22 nodes ready:</strong> all pods in the Room are ready.</li>\n        <li><strong>Edit:</strong> edit the deployment's snapshot blueprint.</li>\n        <li><strong>Redeploy:</strong> restart only changed nodes.</li>\n        <li><strong>Restart All:</strong> restart every node.</li>\n        <li>Each node shows a <span class=\"table-badge badge-emerald\">Running</span> badge.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 9: Hubs -->\n  <h3 class=\"section-subtitle\">Step 9 — Hubs: Physical Proxy Node Management</h3>\n  <p class=\"paragraph\">\n    Click <strong>Hubs</strong> to manage edge hardware agents (remote benches/PCs). When a Scout agent connects for the first time,\n    it appears in <em>Pending</em> state for an admin to Accept.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 9</span>\n        Hubs — no hubs registered\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-09-hubs.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-09-hubs.png')\">\n      <img src=\"./images/live-step-09-hubs.png\" alt=\"Hubs panel with no registered hubs\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Live:</strong> connection to the hub service is healthy (no upstream connect error).</li>\n        <li><strong>No hubs registered:</strong> no Scout agents have connected yet.</li>\n        <li>When a hub appears, you can Accept, Revoke, or Delete it.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 10: Registry login -->\n  <h3 class=\"section-subtitle\">Step 10 — Registry: Sign In to Zot</h3>\n  <p class=\"paragraph\">\n    Click <strong>Registry</strong> to open the embedded Zot Container Registry. The first visit to Zot requires SSO sign-in.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-data\">Step 10</span>\n        Zot sign-in page\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-10-registry-login.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-10-registry-login.png')\">\n      <img src=\"./images/live-step-10-registry-login.png\" alt=\"Zot registry login page\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>https://registry.carsky.io/</strong>: endpoint used for <code>docker login</code> / <code>docker push</code>.</li>\n        <li><strong>SIGN IN WITH A8 KEYCLOAK:</strong> SSO sign-in via Keycloak.</li>\n        <li>You can also use a username/password directly if an API key was created in Settings.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 11: Registry home -->\n  <h3 class=\"section-subtitle\">Step 11 — Registry: Image List</h3>\n  <p class=\"paragraph\">\n    After SSO sign-in, Zot shows the Docker/OCI images pushed to the CarSky registry.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-data\">Step 11</span>\n        Zot home — Most popular images\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-11-registry-home.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-11-registry-home.png')\">\n      <img src=\"./images/live-step-11-registry-home.png\" alt=\"Zot registry image list\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Most popular images:</strong> e.g. <code>local-nginx-hello</code>, <code>local-busybox-loop</code>, <code>local-can-sender</code>.</li>\n        <li><strong>Tags:</strong> linux / arm64 / unknown.</li>\n        <li><strong>Search bar:</strong> search images by repository name.</li>\n        <li>These images are used by Container nodes in blueprints.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 12: Dashboard -->\n  <h3 class=\"section-subtitle\">Step 12 — Dashboard: Runtime Resource Monitoring</h3>\n  <p class=\"paragraph\">\n    Click <strong>Dashboard</strong> to view aggregated CPU/RAM per pod/node in the deployment. Select the deployment to monitor\n    from the top dropdown.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Step 12</span>\n        Dashboard monitoring per-node CPU/MEM\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-12-dashboard.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-12-dashboard.png')\">\n      <img src=\"./images/live-step-12-dashboard.png\" alt=\"Dashboard monitoring node resources\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Element Breakdown</div>\n      <ul class=\"details-list\">\n        <li><strong>Dropdown:</strong> <code>AI_Device01 — Started pack-deploy</code>.</li>\n        <li><strong>CPU USAGE:</strong> 1.64 cores; <strong>MEM USAGE:</strong> 7.25 GiB.</li>\n        <li><strong>Running 22/22 nodes ready:</strong> all pods are healthy.</li>\n        <li><strong>Node Usage cards:</strong> one card per node showing CPU/MEM. <code>IVI - FACE (Android)</code> uses 4.75 GiB RAM. <code>SeatBelt ECU</code> has ⚠ 3 badge.</li>\n      </ul>\n    </div>\n  </div>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong>Note</strong>\n      Dashboard numbers are live runtime data that change continuously — the values in the screenshot reflect only the moment the screenshot was taken.\n      If a node shows an error badge (⚠), click its card to inspect the logs.\n    </div>\n  </div>\n</section>\n"

  "tutorial-dms-overview": {
    "vi": "<section id=\"mod-tutorial-dms-intro\">\n  <h2 class=\"section-title\">Tutorial: Xây Test Bench AEB Device-in-the-Loop</h2>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🎯</div>\n    <div class=\"banner-content\">\n      Trong tutorial này bạn sẽ dựng một <strong>test bench kiểm thử AEB (Autonomous Emergency Braking)</strong> hoàn chỉnh trên CarSky:\n      một container đóng vai <strong>test harness</strong> (phát kịch bản giao thông + chấm điểm), một container đóng vai\n      <strong>thuật toán cần test</strong> (đọc cảm biến ảo, quyết định phanh) — kết nối qua bus <strong>KUKSA/VSS</strong> và\n      <strong>CAN</strong> y như một ECU thật. Mã nguồn ví dụ được cung cấp riêng theo tutorial này.\n    </div>\n  </div>\n\n  <p class=\"paragraph\">\n    \"Device-in-the-loop\" nghĩa là thuật toán chạy trong một container riêng biệt — như một thiết bị/ECU độc lập —\n    chỉ giao tiếp với thế giới qua các bus tín hiệu. Test bench không gọi hàm trực tiếp vào thuật toán; nó phát\n    dữ liệu cảm biến lên bus và quan sát phản ứng phanh. Đây chính là cách kiểm thử phần mềm ô tô sát thực tế nhất\n    mà không cần phần cứng.\n  </p>\n\n  <h3 class=\"section-subtitle\">Kiến trúc: 4 node, 2 bus, 5 dây nối</h3>\n\n  <table>\n    <thead>\n      <tr><th>Node</th><th>Loại</th><th>Vai trò</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><strong>KUKSA Databroker</strong></td>\n        <td><code>kuksa-databroker</code> (node tích hợp sẵn của Nydus)</td>\n        <td>Server trạng thái xe theo chuẩn COVESA VSS: <code>Vehicle.Speed</code>, <code>Vehicle.Chassis.Brake.PedalPosition</code>...</td>\n      </tr>\n      <tr>\n        <td><strong>Vehicle CAN Bus</strong></td>\n        <td><code>can-bus</code> (node tích hợp sẵn)</td>\n        <td>CAN bus ảo kèm DBC decode: <code>EngineData</code> (0x100, 50&nbsp;Hz), <code>PerceptionHeader</code> (0x110) + 8× <code>PerceptionObject</code> (0x111–0x118).</td>\n      </tr>\n      <tr>\n        <td><strong>Test Bench</strong></td>\n        <td><code>container</code></td>\n        <td><strong>Harness</strong>: đọc scenario → phát KUKSA + CAN (+ video), subscribe tín hiệu phanh của thuật toán, chấm điểm, phục vụ dashboard web :8080.</td>\n      </tr>\n      <tr>\n        <td><strong>Algorithm (DUT)</strong></td>\n        <td><code>container</code></td>\n        <td><strong>Thiết bị cần test</strong>: đọc KUKSA + CAN (+ video), ghi <code>Brake.PedalPosition</code> (0–100%) lên KUKSA. Kèm <strong>code-server</strong> (VS Code trong browser) :8888 để sửa code trực tiếp.</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>Luồng tín hiệu chính:</strong> Bench → KUKSA: <code>Vehicle.Speed</code> @ 50&nbsp;Hz · Bench → CAN: <code>EngineData</code> @ 50&nbsp;Hz,\n    snapshot perception @ 30&nbsp;Hz · Algo → KUKSA: <code>Brake.PedalPosition</code> · Video (tùy chọn): Bench → Algo một kênh 1-1.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-wiring\">\n  <h2 class=\"section-title\">Sơ Đồ Nối Dây (Pins & Edges)</h2>\n  <p class=\"paragraph\">\n    Blueprint gồm 5 <strong>edge</strong>. Cả Test Bench lẫn Algorithm cùng publish vào <em>chung một</em> KUKSA broker và\n    <em>chung một</em> CAN bus — đúng như nhiều ECU cùng cắm vào một bus vật lý:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Từ pin</th><th>Đến pin</th><th>Ý nghĩa</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>bench.kuksa</code></td><td><code>kuksa-databroker.in</code></td><td>Bench phát trạng thái xe (speed...) lên VSS broker.</td></tr>\n      <tr><td><code>algo.kuksa</code></td><td><code>kuksa-databroker.in</code></td><td>Algo ghi phần trăm phanh lên cùng broker đó.</td></tr>\n      <tr><td><code>bench.chassis</code> (CAN)</td><td><code>can-bus.in</code></td><td>Bench phát frame EngineData + perception.</td></tr>\n      <tr><td><code>algo.chassis</code> (CAN)</td><td><code>can-bus.in</code></td><td>Algo cũng cắm vào cùng CAN bus (đọc/ghi frame).</td></tr>\n      <tr><td><code>bench.front</code> (VIDEO)</td><td><code>algo.front</code> (VIDEO)</td><td>Kênh video 1-1 (tùy chọn) cho thuật toán dùng camera.</td></tr>\n    </tbody>\n  </table>\n\n  <p class=\"paragraph\">\n    Nếu các khái niệm node/pin/edge còn mới, đọc trước <a href=\"#mod-concepts-mental-model\">Khái Niệm & Mental Model</a>.\n    Chi tiết từng loại: <a href=\"#mod-container-node\">Container Node</a> ·\n    <a href=\"#mod-script-node-kuksa\">KUKSA / VSS Pin</a> · <a href=\"#mod-script-node-can\">CAN Pin</a>.\n  </p>\n</section>\n\n<section id=\"mod-tutorial-dms-prereq\">\n  <h2 class=\"section-title\">Chuẩn Bị & Lộ Trình</h2>\n\n  <ul class=\"details-list\">\n    <li><strong>Đã biết:</strong> thiết kế blueprint trên canvas và <a href=\"#mod-deploy-workflow\">deploy blueprint</a> — tutorial này không nhắc lại các bước đó.</li>\n    <li><strong>Công cụ:</strong> Docker (khuyến nghị <code>buildx</code>), quyền push vào <a href=\"#mod-registry-zot-login-vi\">registry Zot của CarSky</a>.</li>\n    <li><strong>Mã nguồn:</strong> bộ mẫu đi kèm tutorial — chứa Dockerfile, blueprint JSON, DBC, VSS, scenario và thuật toán mẫu.</li>\n  </ul>\n\n  <ol class=\"steps-list\">\n    <li><strong>Phần này:</strong> hiểu kiến trúc và sơ đồ nối dây.</li>\n    <li><a href=\"#mod-tutorial-dms-build-images\">Build Image & Import Blueprint</a> — build/push 2 image, đăng ký artifact DBC/VSS, dựng blueprint.</li>\n    <li><a href=\"#mod-tutorial-dms-run-deploy\">Chạy Scenario & Chấm Điểm</a> — deploy, mở dashboard, chạy scenario, sửa thuật toán trong IDE và xem điểm.</li>\n  </ol>\n</section>\n",
    "en": "<section id=\"mod-tutorial-dms-intro-en\">\n  <h2 class=\"section-title\">Tutorial: Build an AEB Device-in-the-Loop Test Bench</h2>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🎯</div>\n    <div class=\"banner-content\">\n      In this tutorial you will build a complete <strong>AEB (Autonomous Emergency Braking) test bench</strong> on CarSky:\n      one container acts as the <strong>test harness</strong> (replays traffic scenarios + scores), another acts as the\n      <strong>algorithm under test</strong> (reads virtual sensors, decides braking) — connected over\n      <strong>KUKSA/VSS</strong> and <strong>CAN</strong> buses just like a real ECU. The example source package is provided with this tutorial.\n    </div>\n  </div>\n\n  <p class=\"paragraph\">\n    \"Device-in-the-loop\" means the algorithm runs in its own container — like an independent device/ECU —\n    talking to the world only through signal buses. The test bench never calls into the algorithm directly; it publishes\n    sensor data onto the buses and observes the braking response. This is the closest you can get to real automotive\n    software testing without hardware.\n  </p>\n\n  <h3 class=\"section-subtitle\">Architecture: 4 nodes, 2 buses, 5 wires</h3>\n\n  <table>\n    <thead>\n      <tr><th>Node</th><th>Type</th><th>Role</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><strong>KUKSA Databroker</strong></td>\n        <td><code>kuksa-databroker</code> (built-in Nydus node)</td>\n        <td>Vehicle state server following the COVESA VSS standard: <code>Vehicle.Speed</code>, <code>Vehicle.Chassis.Brake.PedalPosition</code>...</td>\n      </tr>\n      <tr>\n        <td><strong>Vehicle CAN Bus</strong></td>\n        <td><code>can-bus</code> (built-in node)</td>\n        <td>Virtual CAN bus with DBC decoding: <code>EngineData</code> (0x100, 50&nbsp;Hz), <code>PerceptionHeader</code> (0x110) + 8× <code>PerceptionObject</code> (0x111–0x118).</td>\n      </tr>\n      <tr>\n        <td><strong>Test Bench</strong></td>\n        <td><code>container</code></td>\n        <td><strong>Harness</strong>: reads scenarios → publishes KUKSA + CAN (+ video), subscribes to the algorithm's brake signal, scores it, and serves a web dashboard on :8080.</td>\n      </tr>\n      <tr>\n        <td><strong>Algorithm (DUT)</strong></td>\n        <td><code>container</code></td>\n        <td><strong>Device under test</strong>: reads KUKSA + CAN (+ video), writes <code>Brake.PedalPosition</code> (0–100%) to KUKSA. Ships with <strong>code-server</strong> (VS Code in the browser) on :8888 for live editing.</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>Main signal flow:</strong> Bench → KUKSA: <code>Vehicle.Speed</code> @ 50&nbsp;Hz · Bench → CAN: <code>EngineData</code> @ 50&nbsp;Hz,\n    perception snapshots @ 30&nbsp;Hz · Algo → KUKSA: <code>Brake.PedalPosition</code> · Video (optional): one 1-to-1 channel Bench → Algo.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-wiring-en\">\n  <h2 class=\"section-title\">Wiring Diagram (Pins & Edges)</h2>\n  <p class=\"paragraph\">\n    The blueprint has 5 <strong>edges</strong>. Both the Test Bench and the Algorithm publish into the <em>same</em> KUKSA\n    broker and the <em>same</em> CAN bus — exactly like multiple ECUs attached to one physical bus:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>From pin</th><th>To pin</th><th>Meaning</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>bench.kuksa</code></td><td><code>kuksa-databroker.in</code></td><td>Bench publishes vehicle state (speed...) to the VSS broker.</td></tr>\n      <tr><td><code>algo.kuksa</code></td><td><code>kuksa-databroker.in</code></td><td>Algo writes brake percentage to that same broker.</td></tr>\n      <tr><td><code>bench.chassis</code> (CAN)</td><td><code>can-bus.in</code></td><td>Bench sends EngineData + perception frames.</td></tr>\n      <tr><td><code>algo.chassis</code> (CAN)</td><td><code>can-bus.in</code></td><td>Algo also attaches to the same CAN bus (read/write frames).</td></tr>\n      <tr><td><code>bench.front</code> (VIDEO)</td><td><code>algo.front</code> (VIDEO)</td><td>1-to-1 video channel (optional) for camera-based algorithms.</td></tr>\n    </tbody>\n  </table>\n\n  <p class=\"paragraph\">\n    New to nodes/pins/edges? Read <a href=\"#mod-concepts-mental-model-en\">Concepts & Mental Model</a> first.\n    Details for each type: <a href=\"#mod-container-node-en\">Container Node</a> ·\n    <a href=\"#mod-script-node-kuksa-en\">KUKSA / VSS Pin</a> · <a href=\"#mod-script-node-can-en\">CAN Pin</a>.\n  </p>\n</section>\n\n<section id=\"mod-tutorial-dms-prereq-en\">\n  <h2 class=\"section-title\">Prerequisites & Roadmap</h2>\n\n  <ul class=\"details-list\">\n    <li><strong>You already know:</strong> how to design a blueprint on the canvas and <a href=\"#mod-deploy-workflow-en\">deploy a blueprint</a> — this tutorial does not repeat those steps.</li>\n    <li><strong>Tools:</strong> Docker (<code>buildx</code> recommended), and push access to <a href=\"#mod-registry-zot-login-en\">the CarSky Zot registry</a>.</li>\n    <li><strong>Source code:</strong> the sample package included with this tutorial — Dockerfiles, blueprint JSON, DBC, VSS, scenarios, and the sample algorithm.</li>\n  </ul>\n\n  <ol class=\"steps-list\">\n    <li><strong>This page:</strong> understand the architecture and wiring.</li>\n    <li><a href=\"#mod-tutorial-dms-build-images-en\">Build Images & Import Blueprint</a> — build/push the two images, register DBC/VSS artifacts, assemble the blueprint.</li>\n    <li><a href=\"#mod-tutorial-dms-run-deploy-en\">Run Scenarios & Scoring</a> — deploy, open the dashboard, run scenarios, edit the algorithm in the IDE, and read the scores.</li>\n  </ol>\n</section>\n"
  },
  "tutorial-dms-build": {
    "vi": "<section id=\"mod-tutorial-dms-build-images\">\n  <h2 class=\"section-title\">Bước 1 — Build 2 Container Image</h2>\n  <p class=\"paragraph\">\n    Test bench cần 2 image: <code>aeb-test-bench</code> (harness) và <code>aeb-algo-py</code> (thuật toán mẫu + code-server).\n    Cả hai Dockerfile đều nằm trong cùng một <strong>thư mục dự án mẫu</strong>\n    (vì chúng COPY chung thư viện helper, file <code>dbc/</code> và <code>scenarios/</code>):\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash — build từ thư mục dự án mẫu</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>cd &lt;your-sample-project&gt;\n\n# Image test bench (WITH_VIDEO=1 để có kênh video mẫu)\ndocker build --build-arg WITH_VIDEO=1 \\\n  -f test-bench/Dockerfile -t aeb-test-bench:video .\n\n# Image thuật toán (kèm code-server IDE)\ndocker build -f sample-algo-py/Dockerfile -t aeb-algo-py:0.1 .</code></div>\n  </div>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong>Kiểm tra kiến trúc CPU của cluster trước khi build.</strong> Nếu node Kubernetes là arm64 (VD: AWS Graviton),\n      image x86_64 chạy qua QEMU có thể lỗi ngẫu nhiên. Khi đó hãy build đa kiến trúc:\n      <code>docker buildx build --platform linux/arm64 --push -f test-bench/Dockerfile -t &lt;registry&gt;/aeb-test-bench:video .</code>\n    </div>\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-build-registry\">\n  <h2 class=\"section-title\">Bước 2 — Push Image Lên Registry Củng CarSky</h2>\n  <p class=\"paragraph\">\n    CarSky cung cấp registry Zot tại <code>registry.carsky.io</code>.\n    Đăng nhập theo hướng dẫn ở mục <a href=\"#mod-registry-zot-docker-login-vi\">Đăng Nhập Registry Zot</a>, rồi tag + push:\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>HOST=registry.carsky.io\ndocker login $HOST\n\nfor img in aeb-test-bench:video aeb-algo-py:0.1; do\n  docker tag $img $HOST/$img\n  docker push $HOST/$img\ndone</code></div>\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-build-artifacts\">\n  <h2 class=\"section-title\">Bước 3 — Đăng Ký Artifact DBC & VSS</h2>\n  <p class=\"paragraph\">\n    Hai file schema cần upload lên <a href=\"#mod-artifacts-ui-artifacts\">Artifacts</a> để blueprint tham chiếu:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Artifact</th><th>File nguồn</th><th>Loại</th><th>Dùng bởi node</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><strong>aeb.dbc</strong></td>\n        <td><code>aeb.dbc</code></td>\n        <td>DBC</td>\n        <td><strong>Vehicle CAN Bus</strong> — decode 11 message: <code>EngineData</code> (0x100), <code>BrakeStatus</code> (0x101), <code>PerceptionHeader</code> (0x110), <code>PerceptionObject0..7</code> (0x111–0x118).</td>\n      </tr>\n      <tr>\n        <td><strong>covesa-vss</strong></td>\n        <td><code>vss.json</code></td>\n        <td>VSS (signal_db)</td>\n        <td><strong>KUKSA Databroker</strong> — cây tín hiệu COVESA chuẩn; ví dụ này chỉ dùng <code>Vehicle.Speed</code> và <code>Vehicle.Chassis.Brake.PedalPosition</code>.</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>Mẹo:</strong> không cần sửa JSON artifact bằng tay — trong Inspector của node <code>can-bus</code>/<code>kuksa-databroker</code>,\n    chọn artifact từ dropdown sau khi upload. Bỏ trống config cũng được (<em>schema-less mode</em> chấp nhận mọi path/signal),\n    nhưng có schema thì bus sẽ decode đầy đủ và validate tín hiệu.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-build-blueprint\">\n  <h2 class=\"section-title\">Bước 4 — Dựng Blueprint (4 Node, 5 Edge)</h2>\n  <p class=\"paragraph\">\n    Tạo blueprint mới trên canvas Nydus (hoặc import từ file blueprint mẫu rồi thay registry/artifact\n    bằng của bạn). Hai node tích hợp <code>kuksa-databroker</code> và <code>can-bus</code> không cần cấu hình gì ngoài artifact ở Bước 3.\n    Hai container node cần chú ý 4 cơ chế cấu hình sau:\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>json — config container node (rút gọn từ aeb-blueprint.json, đã thay placeholder)</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>{\n  \"image\": \"registry.carsky.io/aeb-test-bench:video\",\n  \"env\": {\n    \"KUKSA_ADDR\": \"127.0.0.10:55555\",\n    \"CAN_IFACE\": \"vcan0\",\n    \"DBC_PATH\": \"/data/aeb.dbc\",\n    \"SCENARIOS_DIR\": \"/data/scenarios\",\n    \"TICK_HZ\": \"50\",\n    \"PORT\": \"8080\"\n  },\n  \"kuksaIntercepts\": { \"kuksa\": \"127.0.0.10:55555\" },\n  \"socketcanShim\": { \"interfaces\": [ { \"pin\": \"chassis\", \"ifName\": \"vcan0\", \"fd\": false } ] },\n  \"capabilities\": [\"NET_RAW\"],\n  \"exposedPorts\": [ { \"name\": \"dashboard\", \"port\": 8080, \"protocol\": \"http\" } ]\n}</code></div>\n  </div>\n\n  <ul class=\"details-list\">\n    <li><strong><code>kuksaIntercepts</code>:</strong> nền tảng tạo một IP ảo (<code>127.0.0.10</code>) trong pod và tunnel tới KUKSA broker — code trong container kết nối <code>127.0.0.10:55555</code> như kết nối broker thật. Nhớ trỏ <code>KUKSA_ADDR</code> tới đúng địa chỉ này.</li>\n    <li><strong><code>socketcanShim</code>:</strong> runtime bridge giữa interface <code>vcan0</code> trong container và CAN bus ảo của Nydus — container dùng SocketCAN chuẩn (<code>socket(AF_CAN)</code>) như trên Linux thật.</li>\n    <li><strong><code>capabilities: [\"NET_RAW\"]</code>:</strong> bắt buộc để container được mở raw socket (cần cho CAN).</li>\n    <li><strong><code>exposedPorts</code>:</strong> expose HTTP của container qua conduit. Port 8080 của test bench → dashboard; port 8888 của node algo (đặt <code>name: \"ide\"</code>) → code-server. URL truy cập có dạng <code>https://&lt;host&gt;/conduit/http/&lt;room-namespace&gt;/&lt;node-key&gt;/&lt;port&gt;/</code>.</li>\n  </ul>\n\n  <p class=\"paragraph\">\n    Node <strong>Algorithm</strong> dùng config tương tự, chỉ khác <code>image</code> (<code>aeb-algo-py:0.1</code>),\n    <code>exposedPorts</code> (<code>{ \"name\": \"ide\", \"port\": 8888, \"protocol\": \"http\" }</code>) và pin video là hướng <em>INPUT</em>.\n    Nối 5 edge theo đúng <a href=\"#mod-tutorial-dms-wiring\">sơ đồ nối dây</a> ở phần tổng quan là hoàn tất.\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">▶️</div>\n    <div class=\"banner-content\">\n      Blueprint đã sẵn sàng? Sang phần <a href=\"#mod-tutorial-dms-run-deploy\">Chạy Scenario & Chấm Điểm</a>.\n    </div>\n  </div>\n</section>\n",
    "en": "<section id=\"mod-tutorial-dms-build-images-en\">\n  <h2 class=\"section-title\">Step 1 — Build the Two Container Images</h2>\n  <p class=\"paragraph\">\n    The test bench needs two images: <code>aeb-test-bench</code> (the harness) and <code>aeb-algo-py</code>\n    (the sample algorithm + code-server). Both Dockerfiles live in the same <strong>sample project folder</strong>\n    (they COPY the shared helper library, <code>dbc/</code> and <code>scenarios/</code>):\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash — build from the sample project folder</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>cd &lt;your-sample-project&gt;\n\n# Test bench image (WITH_VIDEO=1 enables the sample video channel)\ndocker build --build-arg WITH_VIDEO=1 \\\n  -f test-bench/Dockerfile -t aeb-test-bench:video .\n\n# Algorithm image (bundles the code-server IDE)\ndocker build -f sample-algo-py/Dockerfile -t aeb-algo-py:0.1 .</code></div>\n  </div>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong>Check your cluster's CPU architecture before building.</strong> If the Kubernetes nodes are arm64\n      (e.g. AWS Graviton), x86_64 images running under QEMU can crash randomly. Build multi-arch instead:\n      <code>docker buildx build --platform linux/arm64 --push -f test-bench/Dockerfile -t &lt;registry&gt;/aeb-test-bench:video .</code>\n    </div>\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-build-registry-en\">\n  <h2 class=\"section-title\">Step 2 — Push Images to the CarSky Registry</h2>\n  <p class=\"paragraph\">\n    CarSky provides a Zot registry at <code>registry.carsky.io</code>.\n    Log in as described in <a href=\"#mod-registry-zot-docker-login-en\">Zot Registry Login</a>, then tag + push:\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>HOST=registry.carsky.io\ndocker login $HOST\n\nfor img in aeb-test-bench:video aeb-algo-py:0.1; do\n  docker tag $img $HOST/$img\n  docker push $HOST/$img\ndone</code></div>\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-build-artifacts-en\">\n  <h2 class=\"section-title\">Step 3 — Register the DBC & VSS Artifacts</h2>\n  <p class=\"paragraph\">\n    Two schema files must be uploaded to <a href=\"#mod-artifacts-ui-artifacts-en\">Artifacts</a> so the blueprint can reference them:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Artifact</th><th>Source file</th><th>Type</th><th>Used by node</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><strong>aeb.dbc</strong></td>\n        <td><code>aeb.dbc</code></td>\n        <td>DBC</td>\n        <td><strong>Vehicle CAN Bus</strong> — decodes 11 messages: <code>EngineData</code> (0x100), <code>BrakeStatus</code> (0x101), <code>PerceptionHeader</code> (0x110), <code>PerceptionObject0..7</code> (0x111–0x118).</td>\n      </tr>\n      <tr>\n        <td><strong>covesa-vss</strong></td>\n        <td><code>vss.json</code></td>\n        <td>VSS (signal_db)</td>\n        <td><strong>KUKSA Databroker</strong> — the standard COVESA signal tree; this example only uses <code>Vehicle.Speed</code> and <code>Vehicle.Chassis.Brake.PedalPosition</code>.</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>Tip:</strong> you don't need to hand-edit artifact JSON — in the <code>can-bus</code>/<code>kuksa-databroker</code>\n    node Inspector, pick the artifact from the dropdown after uploading. Leaving the config empty also works\n    (<em>schema-less mode</em> accepts any path/signal), but with a schema the bus fully decodes and validates signals.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-build-blueprint-en\">\n  <h2 class=\"section-title\">Step 4 — Assemble the Blueprint (4 Nodes, 5 Edges)</h2>\n  <p class=\"paragraph\">\n    Create a new blueprint on the Nydus canvas (or import the sample blueprint JSON and replace the\n    registry/artifact references with your own). The two built-in nodes <code>kuksa-databroker</code> and\n    <code>can-bus</code> need nothing beyond the artifacts from Step 3. The two container nodes rely on four\n    configuration mechanisms worth understanding:\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>json — container node config (trimmed from aeb-blueprint.json, placeholders substituted)</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>{\n  \"image\": \"registry.carsky.io/aeb-test-bench:video\",\n  \"env\": {\n    \"KUKSA_ADDR\": \"127.0.0.10:55555\",\n    \"CAN_IFACE\": \"vcan0\",\n    \"DBC_PATH\": \"/data/aeb.dbc\",\n    \"SCENARIOS_DIR\": \"/data/scenarios\",\n    \"TICK_HZ\": \"50\",\n    \"PORT\": \"8080\"\n  },\n  \"kuksaIntercepts\": { \"kuksa\": \"127.0.0.10:55555\" },\n  \"socketcanShim\": { \"interfaces\": [ { \"pin\": \"chassis\", \"ifName\": \"vcan0\", \"fd\": false } ] },\n  \"capabilities\": [\"NET_RAW\"],\n  \"exposedPorts\": [ { \"name\": \"dashboard\", \"port\": 8080, \"protocol\": \"http\" } ]\n}</code></div>\n  </div>\n\n  <ul class=\"details-list\">\n    <li><strong><code>kuksaIntercepts</code>:</strong> the platform creates a virtual IP (<code>127.0.0.10</code>) inside the pod and tunnels it to the KUKSA broker — code in the container connects to <code>127.0.0.10:55555</code> as if it were the real broker. Point <code>KUKSA_ADDR</code> at exactly this address.</li>\n    <li><strong><code>socketcanShim</code>:</strong> a runtime bridge connects the container's <code>vcan0</code> interface to Nydus's virtual CAN bus — the container uses standard SocketCAN (<code>socket(AF_CAN)</code>) just like on real Linux.</li>\n    <li><strong><code>capabilities: [\"NET_RAW\"]</code>:</strong> required so the container may open raw sockets (needed for CAN).</li>\n    <li><strong><code>exposedPorts</code>:</strong> exposes the container's HTTP through the conduit. The bench's port 8080 → dashboard; the algo node's port 8888 (named <code>\"ide\"</code>) → code-server. Access URLs look like <code>https://&lt;host&gt;/conduit/http/&lt;room-namespace&gt;/&lt;node-key&gt;/&lt;port&gt;/</code>.</li>\n  </ul>\n\n  <p class=\"paragraph\">\n    The <strong>Algorithm</strong> node uses the same config shape, differing only in <code>image</code>\n    (<code>aeb-algo-py:0.1</code>), <code>exposedPorts</code> (<code>{ \"name\": \"ide\", \"port\": 8888, \"protocol\": \"http\" }</code>),\n    and its video pin direction (<em>INPUT</em>). Wire the 5 edges exactly as in the\n    <a href=\"#mod-tutorial-dms-wiring-en\">wiring diagram</a> from the overview page and you're done.\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">▶️</div>\n    <div class=\"banner-content\">\n      Blueprint ready? Continue to <a href=\"#mod-tutorial-dms-run-deploy-en\">Run Scenarios & Scoring</a>.\n    </div>\n  </div>\n</section>\n"
  },
  "tutorial-dms-run": {
    "vi": "<section id=\"mod-tutorial-dms-run-deploy\">\n  <h2 class=\"section-title\">Bước 1 — Deploy Blueprint</h2>\n  <p class=\"paragraph\">\n    Deploy blueprint theo đúng <a href=\"#mod-deploy-workflow\">quy trình chuẩn</a>: <strong>New Deployment</strong> → chọn/tạo\n    Device → <strong>Deploy</strong>. Chờ đến khi Deployment Viewer báo\n    <span class=\"table-badge badge-emerald\">Running</span> cho cả 4 node. Lần đầu sẽ lâu hơn vì cluster phải kéo 2 image\n    về (theo dõi tiến trình kéo image trong trạng thái từng pod).\n  </p>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      Nếu pod container bị <em>ImagePullBackOff</em>: gần như chắc chắn là sai hostname registry trong config\n      <code>image</code> hoặc cluster chưa có quyền kéo image — kiểm tra lại <a href=\"#mod-registry-zot-docker-login-vi\">đăng nhập Zot</a>\n      và tên image đã push.\n    </div>\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-run-dashboard\">\n  <h2 class=\"section-title\">Bước 2 — Mở Dashboard Test Bench</h2>\n  <p class=\"paragraph\">\n    Nhờ <code>exposedPorts</code>, dashboard của test bench được expose qua conduit tại URL dạng:\n    <code>https://&lt;host&gt;/conduit/http/&lt;room-namespace&gt;/&lt;node-test-bench&gt;/8080/</code>.\n    Dashboard gồm 5 khu vực chính:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Panel</th><th>Chức năng</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><strong>Scenario runner</strong></td><td>Chọn scenario, Start / Stop / Pause / Resume / Replay, và nút <em>Run all</em> chạy tuần tự toàn bộ bộ scenario.</td></tr>\n      <tr><td><strong>Bird's-eye view</strong></td><td>Canvas nhìn từ trên xuống: xe ego, làn đường và các đối tượng giao thông theo dữ liệu ground-truth realtime.</td></tr>\n      <tr><td><strong>Live state</strong></td><td>Thời điểm scenario (<code>scenario_t</code>), tốc độ xe, phần trăm phanh hiện tại, tiến độ suite.</td></tr>\n      <tr><td><strong>Scenario score</strong></td><td>Thẻ điểm từng scenario và classification của từng sự kiện.</td></tr>\n      <tr><td><strong>Recent classifications</strong></td><td>Dòng sự kiện fire / false-positive mới nhất.</td></tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    Mọi tab browser mở dashboard đều đồng bộ realtime (server-sent events 10&nbsp;Hz) — bạn có thể mở dashboard ở một tab\n    và IDE ở tab khác cạnh nhau.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-run-scenario\">\n  <h2 class=\"section-title\">Bước 3 — Chạy Scenario & Hiểu Cách Chấm Điểm</h2>\n  <p class=\"paragraph\">\n    Mỗi <strong>scenario</strong> là một thư mục gồm <code>scenario.mcap</code> (telemetry + ground-truth đa đối tượng),\n    <code>scoring.yaml</code> (cửa sổ kích hoạt + điểm) và <code>manifest.yaml</code>. Nguồn canonical là file YAML trong\n    <code>scenarios_src/</code>, build ra MCAP bằng tool đi kèm:\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash — build scenario mới từ YAML</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>pip install mcap PyYAML numpy\npython3 tools/build_scenario.py scenarios_src/01_lead_brake_hard.yaml\n# → scenarios/lead_brake_hard_001/{scenario.mcap, scoring.yaml, manifest.yaml}\n# Scenario được COPY vào image test-bench lúc build → build lại image nếu thêm scenario mới.</code></div>\n  </div>\n\n  <details class=\"feature-list\">\n    <summary>Ví dụ một scenario YAML (xe phía trước phanh gấp)</summary>\n    <div class=\"code-container\">\n      <div class=\"code-header\">\n        <span>yaml — scenarios_src/01_lead_brake_hard.yaml (rút gọn)</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n      </div>\n      <div class=\"code-block\"><code>id: lead_brake_hard_001\nduration_s: 12.0\nego: { initial_speed_mps: 25.0 }            # 90 km/h\nroad: { speed_limit_kph: 90, surface: dry, weather: clear,\n        traffic: light, lanes: [-1, 0, 1], ego_lane_id: 0, lane_width_m: 3.5 }\nobjects:\n  - id: lead\n    class: car\n    lane_id: 0\n    motion:                                  # keyframes hệ tọa độ thế giới, +X tiến, +Y trái\n      - { t: 0.0, x: 40.0,  y: 0.0, vx: 25.0, vy: 0.0 }\n      - { t: 5.0, x: 165.0, y: 0.0, vx: 25.0, vy: 0.0 }\n      - { t: 8.0, x: 202.5, y: 0.0, vx: 0.0,  vy: 0.0 }   # phanh gấp\nevents:\n  - id: ev1_lead_brake\n    type: lead_aggressive_brake\n    t_event: 5.5\n    trigger_window: [5.0, 6.5]               # phanh trong cửa sổ này mới được điểm\n    appropriate_brake_pct: [70, 100]         # ngưỡng phanh \"đủ mạnh\"\n    points: { in_window: 30, outside_window: -10, false_positive: -20 }</code></div>\n    </div>\n  </details>\n\n  <h3 class=\"section-subtitle\">Cơ chế chấm điểm edge-trigger</h3>\n  <p class=\"paragraph\">\n    Test bench subscribe tín hiệu <code>Vehicle.Chassis.Brake.PedalPosition</code> mà thuật toán của bạn ghi lên KUKSA và\n    phân loại <strong>mỗi lần phanh vượt ngưỡng 30% (rising edge)</strong> — mỗi cạnh lên chỉ tính một lần, nhả xuống dưới\n    10% mới \"nạp lại\" (hysteresis, tránh phạt nhiều lần khi phanh dao động):\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Classification</th><th>Điều kiện</th><th>Điểm</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><span class=\"table-badge badge-emerald\">in_window</span></td><td>Fire đúng trong <code>trigger_window</code> và phanh ≥ ngưỡng dưới của <code>appropriate_brake_pct</code>.</td><td><strong>+points.in_window</strong></td></tr>\n      <tr><td><span class=\"table-badge badge-emerald\">in_window_weak</span></td><td>Đúng cửa sổ nhưng phanh yếu hơn ngưỡng.</td><td>nửa điểm in_window</td></tr>\n      <tr><td><span class=\"table-badge badge-feature\">false_positive</span></td><td>Phanh ngoài mọi cửa sổ kích hoạt.</td><td><strong>points.false_positive</strong> (VD −20)</td></tr>\n      <tr><td><span class=\"table-badge badge-feature\">missed</span></td><td>Hết scenario mà sự kiện chưa được phản ứng.</td><td><strong>points.outside_window</strong> (VD −10)</td></tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    Tính xác định (deterministic): cùng một file MCAP + cùng một thuật toán → cùng một điểm số. Bạn có thể so sánh điểm\n    giữa các lần sửa code một cách công bằng. Breakdown đầy đủ từng sự kiện nằm ở panel <strong>Scenario score</strong> và API\n    <code>GET /api/scores</code> của test bench.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-run-iterate\">\n  <h2 class=\"section-title\">Bước 4 — Vòng Lặp Live-Iteration: Sửa Thuật Toán Ngay Trên Room</h2>\n  <p class=\"paragraph\">\n    Node Algorithm chạy sẵn <strong>code-server</strong> (VS Code trong browser) tại\n    <code>https://&lt;host&gt;/conduit/http/&lt;room-namespace&gt;/&lt;node-algo&gt;/8888/</code>. Một watcher trong container\n    tự khởi động lại thuật toán trong ~1&nbsp;giây mỗi khi bạn lưu file <code>.py</code> trong <code>/workspace</code>:\n  </p>\n\n  <ol class=\"steps-list\">\n    <li>Mở dashboard test bench ở một tab, chọn scenario (VD <code>lead_brake_hard_001</code>) và bấm <strong>Start</strong>.</li>\n    <li>Mở code-server ở tab khác, mở <code>/workspace/algo.py</code> và tìm hàm <code>decide_brake(state)</code> —\n      toàn bộ logic quyết định chỉ ~50 dòng (lọc vật cản cùng làn, tính TTC = <code>x_m / (-vx_mps)</code>, map TTC → mức phanh).</li>\n    <li>Sửa ngưỡng phanh (VD <code>T_FULL_BRAKE</code> từ 1.2s xuống 1.0s), <strong>Ctrl+S</strong> — watcher restart thuật toán.</li>\n    <li>Quan sát đường cong phanh trên dashboard, chạy lại scenario (Replay) và so điểm.</li>\n    <li>Theo dõi log thuật toán trong terminal của code-server: <code>tail -F /workspace/algo.log</code>.</li>\n    <li>Hài lòng với kết quả → <strong>Download file về máy</strong>, rồi teardown deployment khi xong việc.</li>\n  </ol>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong><code>/workspace</code> trong container là ephemeral</strong> — mọi chỉnh sửa sẽ <strong>mất khi pod bị redeploy</strong>.\n      Hãy Download file về máy (hoặc commit vào repo của bạn) trước khi teardown. Muốn thay đổi vĩnh viễn thì sửa\n      <code>sample-algo-py/algo.py</code> và build lại image.\n    </div>\n  </div>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🏁</div>\n    <div class=\"banner-content\">\n      Hoàn thành tutorial! Bạn đã đi qua toàn bộ vòng đời: build image → đăng ký artifact → dựng blueprint → deploy →\n      chạy scenario → sửa thuật toán trực tiếp → đọc điểm. Pattern này áp dụng được cho mọi bài toán\n      device-in-the-loop khác (DMS, parking, adaptive cruise...) — chỉ cần thay scenario và bus tín hiệu.\n    </div>\n  </div>\n</section>\n",
    "en": "<section id=\"mod-tutorial-dms-run-deploy-en\">\n  <h2 class=\"section-title\">Step 1 — Deploy the Blueprint</h2>\n  <p class=\"paragraph\">\n    Deploy the blueprint following the <a href=\"#mod-deploy-workflow-en\">standard workflow</a>: <strong>New Deployment</strong> →\n    pick/create a Device → <strong>Deploy</strong>. Wait until the Deployment Viewer reports\n    <span class=\"table-badge badge-emerald\">Running</span> for all 4 nodes. The first deploy takes longer because the\n    cluster must pull the two images (watch the per-pod status for pull progress).\n  </p>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      If a container pod is stuck in <em>ImagePullBackOff</em>: the registry hostname in the <code>image</code> config is\n      almost certainly wrong, or the cluster cannot pull — double-check your\n      <a href=\"#mod-registry-zot-docker-login-en\">Zot login</a> and the pushed image names.\n    </div>\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-run-dashboard-en\">\n  <h2 class=\"section-title\">Step 2 — Open the Test Bench Dashboard</h2>\n  <p class=\"paragraph\">\n    Thanks to <code>exposedPorts</code>, the bench dashboard is exposed through the conduit at a URL like:\n    <code>https://&lt;host&gt;/conduit/http/&lt;room-namespace&gt;/&lt;test-bench-node&gt;/8080/</code>.\n    The dashboard has 5 main areas:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Panel</th><th>What it does</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><strong>Scenario runner</strong></td><td>Pick a scenario, Start / Stop / Pause / Resume / Replay, plus <em>Run all</em> to execute the whole scenario suite sequentially.</td></tr>\n      <tr><td><strong>Bird's-eye view</strong></td><td>Top-down canvas: ego vehicle, lanes, and traffic objects from real-time ground-truth data.</td></tr>\n      <tr><td><strong>Live state</strong></td><td>Scenario time (<code>scenario_t</code>), vehicle speed, current brake percentage, suite progress.</td></tr>\n      <tr><td><strong>Scenario score</strong></td><td>Score cards per scenario and per-event classifications.</td></tr>\n      <tr><td><strong>Recent classifications</strong></td><td>Live feed of the latest fire / false-positive events.</td></tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    Every browser tab showing the dashboard stays in sync in real time (10&nbsp;Hz server-sent events) — you can keep the\n    dashboard in one tab and the IDE in another, side by side.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-run-scenario-en\">\n  <h2 class=\"section-title\">Step 3 — Run a Scenario & Understand the Scoring</h2>\n  <p class=\"paragraph\">\n    Each <strong>scenario</strong> is a directory containing <code>scenario.mcap</code> (telemetry + multi-object ground truth),\n    <code>scoring.yaml</code> (trigger windows + points), and <code>manifest.yaml</code>. The canonical source is a YAML file\n    in <code>scenarios_src/</code>, compiled to MCAP with the bundled tool:\n  </p>\n\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash — build a new scenario from YAML</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>pip install mcap PyYAML numpy\npython3 tools/build_scenario.py scenarios_src/01_lead_brake_hard.yaml\n# → scenarios/lead_brake_hard_001/{scenario.mcap, scoring.yaml, manifest.yaml}\n# Scenarios are COPYed into the test-bench image at build time → rebuild the image after adding one.</code></div>\n  </div>\n\n  <details class=\"feature-list\">\n    <summary>Example scenario YAML (lead vehicle brakes hard)</summary>\n    <div class=\"code-container\">\n      <div class=\"code-header\">\n        <span>yaml — scenarios_src/01_lead_brake_hard.yaml (trimmed)</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n      </div>\n      <div class=\"code-block\"><code>id: lead_brake_hard_001\nduration_s: 12.0\nego: { initial_speed_mps: 25.0 }            # 90 km/h\nroad: { speed_limit_kph: 90, surface: dry, weather: clear,\n        traffic: light, lanes: [-1, 0, 1], ego_lane_id: 0, lane_width_m: 3.5 }\nobjects:\n  - id: lead\n    class: car\n    lane_id: 0\n    motion:                                  # world-frame keyframes, +X forward, +Y left\n      - { t: 0.0, x: 40.0,  y: 0.0, vx: 25.0, vy: 0.0 }\n      - { t: 5.0, x: 165.0, y: 0.0, vx: 25.0, vy: 0.0 }\n      - { t: 8.0, x: 202.5, y: 0.0, vx: 0.0,  vy: 0.0 }   # hard brake\nevents:\n  - id: ev1_lead_brake\n    type: lead_aggressive_brake\n    t_event: 5.5\n    trigger_window: [5.0, 6.5]               # braking inside this window scores\n    appropriate_brake_pct: [70, 100]         # \"firm enough\" brake threshold\n    points: { in_window: 30, outside_window: -10, false_positive: -20 }</code></div>\n    </div>\n  </details>\n\n  <h3 class=\"section-subtitle\">The edge-trigger scoring mechanism</h3>\n  <p class=\"paragraph\">\n    The bench subscribes to the <code>Vehicle.Chassis.Brake.PedalPosition</code> signal your algorithm writes to KUKSA and\n    classifies <strong>every rising edge above 30% brake</strong> — each rising edge counts once, and the detector re-arms only\n    after the signal drops below 10% (hysteresis, so a wobbly brake pedal isn't penalized repeatedly):\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Classification</th><th>Condition</th><th>Points</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><span class=\"table-badge badge-emerald\">in_window</span></td><td>Fires inside the <code>trigger_window</code> with brake ≥ the lower bound of <code>appropriate_brake_pct</code>.</td><td><strong>+points.in_window</strong></td></tr>\n      <tr><td><span class=\"table-badge badge-emerald\">in_window_weak</span></td><td>Inside the window but braking weaker than the threshold.</td><td>half of in_window</td></tr>\n      <tr><td><span class=\"table-badge badge-feature\">false_positive</span></td><td>Braking outside every trigger window.</td><td><strong>points.false_positive</strong> (e.g. −20)</td></tr>\n      <tr><td><span class=\"table-badge badge-feature\">missed</span></td><td>Scenario ends with the event unanswered.</td><td><strong>points.outside_window</strong> (e.g. −10)</td></tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    Fully deterministic: same MCAP + same algorithm → same score, so you can compare scores fairly across code edits.\n    The per-event breakdown lives in the <strong>Scenario score</strong> panel and the bench's\n    <code>GET /api/scores</code> API.\n  </div>\n</section>\n\n<section id=\"mod-tutorial-dms-run-iterate-en\">\n  <h2 class=\"section-title\">Step 4 — The Live-Iteration Loop: Edit the Algorithm Right on the Room</h2>\n  <p class=\"paragraph\">\n    The Algorithm node runs <strong>code-server</strong> (VS Code in the browser) at\n    <code>https://&lt;host&gt;/conduit/http/&lt;room-namespace&gt;/&lt;algo-node&gt;/8888/</code>. A watcher inside the container\n    restarts the algorithm within ~1&nbsp;second every time you save a <code>.py</code> file in <code>/workspace</code>:\n  </p>\n\n  <ol class=\"steps-list\">\n    <li>Open the bench dashboard in one tab, pick a scenario (e.g. <code>lead_brake_hard_001</code>) and press <strong>Start</strong>.</li>\n    <li>Open code-server in another tab, open <code>/workspace/algo.py</code> and find <code>decide_brake(state)</code> —\n      the entire decision logic is ~50 lines (filter same-lane obstacles, compute TTC = <code>x_m / (-vx_mps)</code>, map TTC → brake level).</li>\n    <li>Tweak a threshold (e.g. <code>T_FULL_BRAKE</code> from 1.2s down to 1.0s), hit <strong>Ctrl+S</strong> — the watcher restarts the algorithm.</li>\n    <li>Watch the brake curve on the dashboard, replay the scenario, and compare scores.</li>\n    <li>Follow the algorithm log in the code-server terminal: <code>tail -F /workspace/algo.log</code>.</li>\n    <li>Happy with the result → <strong>download the file to your machine</strong>, then tear down the deployment when done.</li>\n  </ol>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">⚠️</div>\n    <div class=\"banner-content\">\n      <strong>The container's <code>/workspace</code> is ephemeral</strong> — every edit is <strong>lost when the pod is redeployed</strong>.\n      Download your files (or commit them to your own repo) before tearing down. For permanent changes, edit\n      <code>sample-algo-py/algo.py</code> and rebuild the image.\n    </div>\n  </div>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🏁</div>\n    <div class=\"banner-content\">\n      Tutorial complete! You've walked the full lifecycle: build images → register artifacts → assemble a blueprint →\n      deploy → run scenarios → edit the algorithm live → read the scores. This pattern applies to any other\n      device-in-the-loop problem (DMS, parking, adaptive cruise...) — just swap the scenarios and signal buses.\n    </div>\n  </div>\n</section>\n"
  }
};
