ại diện góc trên → chọn tab <strong>Credentials</strong> (cần quyền Admin/Editor tùy cấu hình).</li>\n<li>Bấm <strong>Create credential</strong> → sao chép chuỗi khóa API được hiển thị <strong>một lần duy nhất</strong>.</li>\n<li>Lưu khóa vào nơi an toàn. Nếu mất, bạn phải tạo khóa mới.</li>\n</ol>\n<blockquote>\n<p><strong>Lưu ý</strong>: Khóa API là machine-to-machine key dành cho script/agent, không phải mật khẩu đăng nhập của bạn. Hãy sao chép và bảo mật khóa ngay khi tạo.</p>\n</blockquote>\n<h3>2.2 Dùng khóa API với REST API</h3>\n<p class=\"paragraph\">Thêm vào header của mọi request:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>X-API-Key: &lt;khóa_api_của_bạn&gt;\n</code></div>\n</div>\n<p class=\"paragraph\">Hoặc dùng dạng Bearer:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>Authorization: Bearer &lt;khóa_api_của_bạn&gt;\n</code></div>\n</div>\n<p class=\"paragraph\">Ví dụ bằng <code>curl</code>:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>curl</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>curl -H &quot;X-API-Key: &lt;khóa_api_của_bạn&gt;&quot; \\\n     https://carsky.example.com/api/v1/healthz\n</code></div>\n</div>\n<h3>2.3 Dùng khóa API với MCP Server</h3>\n<ul>\n<li><strong>Nếu dùng stdio transport</strong> (mặc định): đặt khóa vào biến môi trường <code>A8_API_KEY</code> khi khởi động MCP server.</li>\n<li><strong>Nếu dùng HTTP transport</strong>: gửi khóa qua header <code>X-API-Key</code> hoặc <code>Authorization: Bearer</code> trong mỗi request đến MCP server.</li>\n</ul>\n<h3>2.4 Lấy <code>roomId</code> và <code>nodeKey</code></h3>\n<p class=\"paragraph\">Hầu hết API/MCP bên dưới đều cần <code>roomId</code>, và với call theo từng node thì cần thêm <code>nodeKey</code>. Đây là cách lấy từng giá trị:</p>\n<div class=\"info-box\">\n<strong>🆔 roomId</strong> — ID của thiết bị (room) đã deploy. 3 cách để lấy:\n<ul>\n<li><strong>Bạn vừa tạo device</strong>: chính là ID bạn đặt lúc tạo device trong <strong>Devices</strong> (xem mục 3.5) — không cần tra cứu thêm.</li>\n<li><strong>UI</strong>: mở tab <strong>Devices</strong> hoặc <strong>Deployments</strong> — ID hiển thị ngay cạnh mỗi dòng device/deployment.</li>\n<li><strong>API/MCP, khi chỉ nhớ tên device hoặc blueprint</strong>: <code>GET /api/v1/deployments/find?device=&lt;name&gt;</code> hoặc MCP <code>find_deployment(device?, blueprint?)</code> sẽ tìm ra <code>roomId</code> của deployment đang chạy.</li>\n</ul>\n</div>\n<div class=\"info-box\">\n<strong>🔑 nodeKey</strong> — chính là <code>id</code> của node được khai báo trong blueprint (vd <code>vm-1</code>, <code>can0</code>, <code>screen-1</code>). 2 cách để lấy:\n<ul>\n<li><strong>UI</strong>: bấm vào node trên canvas blueprint — panel Inspector hiển thị <code>id</code> của node, đó chính là <code>nodeKey</code>.</li>\n<li><strong>API/MCP, với deployment đang chạy</strong>: <code>GET /api/v1/deployments/{roomId}/nodes</code> liệt kê mọi node kèm <code>nodeKey</code>; MCP <code>list_signal_nodes(roomId)</code> liệt kê riêng các node nguồn tín hiệu (CAN/LIN/GPIO/KUKSA), và <code>list_pods(roomId)</code> liệt kê pod Kubernetes tương ứng từng node.</li>\n</ul>\n</div>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-3-lu-ng-l-m-vi-c-c-b-n-t-blueprint-n-ki-m-th-quan-tr-ng-nh-t-vi\">\n<h2 class=\"section-title\">3. Luồng làm việc cơ bản: từ blueprint đến kiểm thử (quan trọng nhất)</h2>\n<p class=\"paragraph\">Đây là quy trình chuẩn để biến một bản thiết kế thành một môi trường kiểm thử thực tế trên CarSky. Bạn có thể thực hiện bằng giao diện Rework UI hoặc qua API/MCP.</p>\n<h3>3.1 Sơ đồ tổng thể</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>Bước 1: Vào Nydus ──► Bước 2: Tạo/Import Blueprint ──► Bước 3: Deploy Blueprint\n                                                       │\n                                                       ▼\nBước 5: Kiểm thử/Điều khiển ◄───────────────────────── Bước 4: Tạo/Chọn Device\n</code></div>\n</div>\n<h3>3.2 Bước 1: Vào Nydus</h3>\n<p><strong>Trên Rework UI:</strong></p>\n<ol>\n<li>Đăng nhập vào CarSky.</li>\n<li>Trên thanh Dock chính, bấm <strong>Nydus</strong>.</li>\n<li>Giao diện Nydus mở ra với các tab chính:</li>\n<li><strong>Blueprints</strong>: danh sách bản thiết kế.</li>\n<li><strong>Deployments</strong>: các lần triển khai đang chạy.</li>\n<li><strong>Registry/Artifacts</strong>: kho image, DBC, script...</li>\n</ol>\n<h3>3.3 Bước 2: Tạo hoặc import blueprint</h3>\n<p><strong>Cách A — Tạo blueprint mới trên UI:</strong></p>\n<ol>\n<li>Trong tab <strong>Blueprints</strong>, bấm <strong>New blueprint</strong>.</li>\n<li>Đặt <strong>tên</strong> và <strong>mô tả</strong> cho blueprint.</li>\n<li>Mở graph editor, kéo thả các node từ palette vào sân khấu:</li>\n<li><strong>Skycraft</strong> — thiết bị ảo Android Automotive.</li>\n<li><strong>CAN bus / LIN bus</strong> — mạng xe.</li>\n<li><strong>GPIO panel</strong> — bảng nút/công tắc ảo.</li>\n<li><strong>Script node</strong> — chạy script tự động hóa.</li>\n<li><strong>Container</strong> — chạy service/container ECU.</li>\n<li>Kết nối các chân (pin) giữa các node bằng cách kéo dây (edge).</li>\n<li>Cấu hình từng node: chọn image, DBC, script, v.v.</li>\n<li>Bấm <strong>Save</strong>.</li>\n</ol>\n<p><strong>Cách B — Import blueprint có sẵn:</strong></p>\n<ol>\n<li>Trong tab <strong>Blueprints</strong>, bấm <strong>Import</strong>.</li>\n<li>Chọn file JSON blueprint từ máy tính (thường nằm trong <code>examples/&lt;tên-demo&gt;/blueprint.json</code>).</li>\n<li>Hệ thống kiểm tra định dạng. Nếu hợp lệ, blueprint xuất hiện trong danh sách.</li>\n</ol>\n<p><strong>Cách C — Qua API/MCP:</strong></p>\n<ul>\n<li>API: <code>POST /api/v1/blueprints</code> để tạo rỗng, sau đó dùng <code>POST /api/v1/blueprints/{id}/batch</code> để thêm node/pin/edge.</li>\n<li>MCP: <code>create_blueprint</code> với <code>nodes</code> và <code>edges</code>.</li>\n<li>Sau khi tạo, luôn gọi <code>validate_blueprint</code> (MCP) hoặc <code>POST /api/v1/blueprints/{id}/validate</code> (API) để kiểm tra topology.</li>\n</ul>\n<blockquote>\n<p><strong>Mẹo</strong>: Nếu chỉ muốn chạy demo có sẵn, hãy import thay vì tạo từ đầu. Điều này giảm thiểu lỗi cấu hình.</p>\n</blockquote>\n<h3>3.4 Bước 3: Deploy blueprint</h3>\n<ol>\n<li>Trong danh sách <strong>Blueprints</strong>, chọn blueprint muốn chạy.</li>\n<li>Bấm nút <strong>Deploy</strong> (biểu tượng tên lửa hoặc chữ \"Deploy\").</li>\n<li>Hệ thống hiển thị hộp thoại <strong>Deploy blueprint</strong>.</li>\n</ol>\n<h3>3.5 Bước 4: Tạo device và chọn làm mục tiêu deploy</h3>\n<p class=\"paragraph\">Trong hộp thoại Deploy blueprint:</p>\n<ol>\n<li>Chọn <strong>device đích</strong> từ danh sách nếu đã có.</li>\n<li>Hoặc bấm <strong>Create new device</strong> để tạo thiết bị mới:</li>\n<li>Đặt tên device (ví dụ: <code>Demo-AAOS-01</code>).</li>\n<li>Chọn loại device phù hợp (thường là <code>room</code> hoặc loại do hệ thống định nghĩa).</li>\n<li>Lưu ý: device ID này chính là <code>roomId</code> dùng trong API/MCP sau này.</li>\n<li>Bấm <strong>Deploy</strong> để bắt đầu triển khai.</li>\n</ol>\n<p class=\"paragraph\">Hệ thống sẽ bắt đầu khởi tạo các pod/container/node trong Kubernetes. Quá trình này có thể mất vài chục giây đến vài phút tùy độ phức tạp của blueprint.</p>\n<p><strong>Qua API/MCP:</strong></p>\n<ul>\n<li>API: <code>POST /api/v1/deployments</code> với body <code>{ blueprintId, roomId, name }</code>.</li>\n<li>MCP: <code>deploy(blueprintId, roomId, name)</code>.</li>\n<li>Sau đó dùng <code>wait_ready</code> (MCP) hoặc poll <code>GET /api/v1/deployments/{roomId}/status</code> (API) để chờ tất cả node chuyển sang <code>Running</code>.</li>\n</ul>\n<h3>3.6 Bước 5: Kết nối và kiểm thử device</h3>\n<p class=\"paragraph\">Sau khi deploy thành công, bạn có thể kiểm tra và điều khiển device bằng nhiều cách.</p>\n<h4>3.6.1 Xem trạng thái deployment</h4>\n<ul>\n<li><strong>UI</strong>: tab <strong>Deployments</strong> trong Nydus, hoặc panel <strong>Dashboard</strong>.</li>\n<li><strong>API</strong>: <code>GET /api/v1/deployments/{roomId}/status</code>.</li>\n<li><strong>MCP</strong>: <code>deployment_status(roomId)</code>.</li>\n</ul>\n<h4>3.6.2 Xem màn hình VM (Skycraft)</h4>\n<ul>\n<li><strong>UI</strong>: mở device, chọn node Skycraft, bấm <strong>Screen</strong>.</li>\n<li><strong>API</strong>: <code>GET /api/v1/vms/{roomId}/{nodeKey}/screenshot</code>.</li>\n<li><strong>MCP</strong>: <code>screenshot(roomId, nodeKey)</code>.</li>\n</ul>\n<h4>3.6.3 Điều khiển màn hình</h4>\n<ul>\n<li><strong>UI</strong>: click trực tiếp vào màn hình ảo trong panel Screen.</li>\n<li><strong>API/MCP</strong>:</li>\n<li>Chạm: <code>tap(roomId, nodeKey, x, y)</code> / <code>POST .../tap</code></li>\n<li>Vuốt: <code>swipe(...)</code> / <code>POST .../swipe</code></li>\n<li>Nhập text: <code>input_text(roomId, nodeKey, text)</code> / <code>POST .../text</code></li>\n<li>Bấm phím: <code>press_key(roomId, nodeKey, \"KEYCODE_HOME\")</code> / <code>POST .../key</code></li>\n</ul>\n<h4>3.6.4 Kiểm tra UI tree (tìm nút/icon)</h4>\n<ul>\n<li><strong>API</strong>: <code>GET /api/v1/vms/{roomId}/{nodeKey}/accessibility</code></li>\n<li><strong>MCP</strong>: <code>ui_tree(roomId, nodeKey)</code> hoặc <code>find_text(roomId, nodeKey, \"Settings\")</code></li>\n</ul>\n<h4>3.6.5 Đọc/ghi tín hiệu CAN/LIN/GPIO</h4>\n<ul>\n<li><strong>UI</strong>: mở panel <strong>Signal</strong> hoặc <strong>GPIO</strong>, chọn node nguồn tín hiệu.</li>\n<li><strong>API</strong>:</li>\n<li>Đọc: <code>POST /api/v1/signals/{roomId}/{nodeKey}/values</code></li>\n<li>Ghi: <code>POST /api/v1/signals/{roomId}/{nodeKey}/actuate</code></li>\n<li><strong>MCP</strong>:</li>\n<li>Đọc: <code>get_signal_values(roomId, nodeKey, [\"Vehicle.Speed\"])</code></li>\n<li>Ghi: <code>send_signals(roomId, nodeKey, [{path:\"Vehicle.Speed\", value:60}])</code></li>\n</ul>\n<h4>3.6.6 Xem log</h4>\n<ul>\n<li><strong>UI</strong>: panel <strong>Logs</strong> trong Dashboard, chọn node.</li>\n<li><strong>API</strong>: <code>GET /api/v1/deployments/{roomId}/logs/{nodeKey}</code></li>\n<li><strong>MCP</strong>: <code>pod_logs(roomId, nodeKey)</code> hoặc <code>search_logs(...)</code> để tìm log lịch sử.</li>\n</ul>\n<h4>3.6.7 Dùng ADB (nâng cao)</h4>\n<ul>\n<li><strong>Một lệnh</strong>: <code>adb_shell(roomId, nodeKey, \"logcat -d\")</code></li>\n<li><strong>Tunnel liên tục</strong>: <code>vm_tunnel_open(roomId, nodeKey)</code> → <code>adb connect localhost:&lt;port&gt;</code> → dùng adb local bình thường.</li>\n</ul>\n<h3>3.7 Khi nào cần redeploy?</h3>\n<p class=\"paragraph\">Bạn cần <strong>redeploy</strong> khi:</p>\n<ul>\n<li>Sửa topology blueprint (thêm/xóa node, thay đổi kết nối).</li>\n<li>Thay đổi artifact/image được dùng trong node.</li>\n<li>Cấu hình node thay đổi.</li>\n</ul>\n<p class=\"paragraph\">Bạn <strong>không cần redeploy</strong> khi:</p>\n<ul>\n<li>Chỉ điều khiển màn hình, gửi tín hiệu, hoặc xem log.</li>\n<li>Thay đổi widget/dashboard của device.</li>\n</ul>\n<h3>3.8 Dừng và dọn dẹp</h3>\n<p class=\"paragraph\">Khi kiểm thử xong:</p>\n<ol>\n<li><strong>UI</strong>: trong tab <strong>Deployments</strong>, chuột phải vào deployment → <strong>Delete</strong>.</li>\n<li><strong>API</strong>: <code>DELETE /api/v1/deployments/{roomId}</code>.</li>\n<li><strong>MCP</strong>: <code>undeploy(roomId)</code>.</li>\n</ol>\n<blockquote>\n<p><strong>Lưu ý</strong>: Xóa deployment sẽ dừng các pod/container đang chạy nhưng <strong>không xóa blueprint</strong>. Bạn có thể deploy lại blueprint này sau.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-4-rest-api-c-ch-s-d-ng-vi\">\n<h2 class=\"section-title\">4. REST API — Cách sử dụng</h2>\n<h3>4.1 Base URL</h3>\n<p class=\"paragraph\">Tất cả API đều nằm dưới:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>https://&lt;tên-miền-carsky&gt;/api/v1\n</code></div>\n</div>\n<p class=\"paragraph\">Ví dụ: <code>https://carsky.example.com/api/v1/blueprints</code></p>\n<h3>4.2 Tài liệu OpenAPI tự động</h3>\n<p class=\"paragraph\">CarSky tự sinh tài liệu API:</p>\n<ul>\n<li><strong>OpenAPI JSON</strong>: <code>GET /api/v1/openapi.json</code></li>\n<li><strong>Swagger UI</strong>: <code>GET /api/v1/docs</code></li>\n</ul>\n<p class=\"paragraph\">Bạn có thể mở <code>/api/v1/docs</code> trên trình duyệt để xem chi tiết từng endpoint, tham số và ví dụ response.</p>\n<h3>4.3 Định dạng phản hồi chung</h3>\n<p class=\"paragraph\">Hầu hết response đều ở dạng JSON. Một số endpoint (như screenshot) trả về binary (ảnh PNG).</p>\n<ul>\n<li><code>200 OK</code> — thành công.</li>\n<li><code>201 Created</code> — tạo mới thành công.</li>\n<li><code>400 Bad Request</code> — tham số sai hoặc thiếu.</li>\n<li><code>401 Unauthorized</code> — chưa xác thực hoặc khóa API không hợp lệ.</li>\n<li><code>403 Forbidden</code> — đã xác thực nhưng không đủ quyền.</li>\n<li><code>404 Not Found</code> — tài nguyên không tồn tại.</li>\n<li><code>500 Internal Server Error</code> — lỗi phía server.</li>\n</ul>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-5-danh-s-ch-rest-api-endpoint-vi\">\n<h2 class=\"section-title\">5. Danh sách REST API Endpoint</h2>\n<p class=\"paragraph\">Dưới đây là các nhóm endpoint chính. Mỗi endpoint đều yêu cầu header xác thực như đã mô tả ở trên, trừ các endpoint công khai được đánh dấu riêng.</p>\n<h3>5.1 Meta — Kiểm tra hệ thống (Public)</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/healthz</code></td>\n<td>Kiểm tra sức khỏe API, database, Zero sync.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/openapi.json</code></td>\n<td>Trả về OpenAPI 3.1 spec.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/docs</code></td>\n<td>Giao diện Swagger UI.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.2 Blueprints — Bản thiết kế hệ thống</h3>\n<p class=\"paragraph\">Blueprints là bản thiết kế mô tả topology của một \"phòng\" ảo: các node (Skycraft, CAN bus, script, container...), các chân kết nối (pin) và các liên kết (edge) giữa chúng.</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/blueprints</code></td>\n<td>Liệt kê blueprints (phân trang, lọc theo tên).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/blueprints/:id</code></td>\n<td>Lấy chi tiết một blueprint, bao gồm nodes, pins, edges.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints</code></td>\n<td>Tạo blueprint mới.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/blueprints/:id</code></td>\n<td>Cập nhật tên/mô tả blueprint.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/lock</code></td>\n<td>Khóa/mở khóa blueprint (ngăn sửa đổi).</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/:id</code></td>\n<td>Xóa blueprint.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/clone</code></td>\n<td>Nhân bản blueprint.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/validate</code></td>\n<td>Kiểm tra topology trước khi triển khai.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/batch</code></td>\n<td>Thực hiện nhiều thao tác topology trong một lệnh (thêm node/pin/edge).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/blueprints/:id/export</code></td>\n<td>Xuất blueprint ra JSON để backup hoặc chia sẻ.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/import</code></td>\n<td>Nhập blueprint từ file JSON đã xuất.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/nodes</code></td>\n<td>Thêm node vào blueprint.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/blueprints/nodes/:nodeId</code></td>\n<td>Sửa node.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/nodes/:nodeId</code></td>\n<td>Xóa node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/nodes/:nodeId/pins</code></td>\n<td>Thêm pin vào node.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/blueprints/pins/:pinId</code></td>\n<td>Sửa pin.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/pins/:pinId</code></td>\n<td>Xóa pin.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/edges</code></td>\n<td>Thêm liên kết giữa hai pin.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/edges/:edgeId</code></td>\n<td>Xóa liên kết.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.3 Devices — Thiết bị</h3>\n<p class=\"paragraph\">Trong CarSky, \"device\" thường được dùng như một \"room\" để triển khai blueprint.</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/devices</code></td>\n<td>Liệt kê thiết bị (phân trang, lọc theo tag).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/devices/:id</code></td>\n<td>Xem chi tiết thiết bị, tags, widgets.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices</code></td>\n<td>Tạo thiết bị mới.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/devices/:id</code></td>\n<td>Cập nhật tên thiết bị.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/lock</code></td>\n<td>Khóa/mở khóa thiết bị.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/devices/:id</code></td>\n<td>Xóa thiết bị.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/tags</code></td>\n<td>Gán tag cho thiết bị.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/devices/:id/tags/:tag</code></td>\n<td>Gỡ tag.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/widgets</code></td>\n<td>Thêm dashboard widget.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/devices/:id/widgets/:widgetId</code></td>\n<td>Sửa widget.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/devices/:id/widgets/:widgetId</code></td>\n<td>Xóa widget.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/widgets/:widgetId/reorder</code></td>\n<td>Sắp xếp lại widget.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.4 Artifacts — Kho tài nguyên</h3>\n<p class=\"paragraph\">Artifacts là các file/tài nguyên dùng trong blueprint: ảnh đĩa VM, file DBC, script, firmware...</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/artifacts</code></td>\n<td>Liệt kê artifacts (phân trang, lọc theo category).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/artifacts/:id</code></td>\n<td>Xem chi tiết artifact và các phiên bản.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/artifacts</code></td>\n<td>Tạo metadata artifact.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/artifacts/:id</code></td>\n<td>Cập nhật metadata.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/artifacts/:id</code></td>\n<td>Xóa artifact.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/artifacts/:id/versions</code></td>\n<td>Thêm phiên bản mới.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/artifacts/:id/versions/:versionId</code></td>\n<td>Xóa phiên bản.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.5 Deployments — Triển khai blueprint</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments</code></td>\n<td>Triển khai một blueprint lên một thiết bị (room).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/find</code></td>\n<td>Tìm deployment đang chạy theo tên device hoặc blueprint.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/status</code></td>\n<td>Xem trạng thái deployment.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/nodes</code></td>\n<td>Liệt kê các node trong deployment.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/nodes/watch</code></td>\n<td>Theo dõi trạng thái node theo thời gian thực (SSE).</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/restart</code></td>\n<td>Khởi động lại tất cả node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/restart/:node</code></td>\n<td>Khởi động lại một node cụ thể.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/deployments/:roomId</code></td>\n<td>Dừng và xóa deployment.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/adb-tunnel</code></td>\n<td>Lấy thông tin lệnh mở ADB tunnel cho Skycraft node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/adb-exec/:nodeKey</code></td>\n<td>Chạy lệnh ADB một lần.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/container-exec/:nodeKey</code></td>\n<td>Chạy lệnh bên trong container node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/container-file/:nodeKey</code></td>\n<td>Đọc/ghi file trong container.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/pods</code></td>\n<td>Liệt kê Kubernetes pods.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/logs/:nodeKey</code></td>\n<td>Đọc log pod.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/logs/:nodeKey/search</code></td>\n<td>Tìm log lịch sử qua Loki.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.6 VM Interaction — Điều khiển thiết bị ảo Android</h3>\n<p class=\"paragraph\">Các endpoint này cho phép điều khiển màn hình Android ảo như thể bạn đang cầm thiết bị thật.</p>\n<h4>ADB routes (luôn có)</h4>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/screenshot</code></td>\n<td>Chụp màn hình PNG.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/text</code></td>\n<td>Nhập văn bản vào ô đang focus.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/key</code></td>\n<td>Bấm phím Android (keycode).</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/shell</code></td>\n<td>Chạy lệnh ADB shell tùy ý.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/accessibility</code></td>\n<td>Lấy cây accessibility (UI tree) dạng JSON.</td>\n</tr>\n</tbody>\n</table>\n<h4>Touch routes (chỉ khi hệ thống có <code>COOLGATE_URL_SERVER</code>)</h4>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/tap</code></td>\n<td>Chạm vào tọa độ màn hình.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/swipe</code></td>\n<td>Vuốt màn hình.</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>Lưu ý</strong>: <code>roomId</code> là ID của device đã triển khai, <code>nodeKey</code> là tên node trong blueprint (ví dụ: <code>vm-1</code>, <code>screen-1</code>).</p>\n</blockquote>\n<h3>5.7 Signals — Tín hiệu CAN/LIN/GPIO/KUKSA</h3>\n<p class=\"paragraph\">Gửi và nhận tín hiệu giữa các node trong deployment. CarSky sử dụng Zenoh peer-to-peer làm backbone.</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId</code></td>\n<td>Tìm các node nguồn tín hiệu trong room.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey</code></td>\n<td>Liệt kê các tín hiệu trên một node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/values</code></td>\n<td>Đọc giá trị hiện tại của một hoặc nhiều tín hiệu.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/actuate</code></td>\n<td>Gửi giá trị tín hiệu (actuate).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/subscribe</code></td>\n<td>Đăng ký theo dõi thay đổi giá trị (SSE).</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic/start</code></td>\n<td>Bắt đầu gửi tuần hoàn một tín hiệu (CAN).</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic/stop</code></td>\n<td>Dừng gửi tuần hoàn.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic</code></td>\n<td>Liệt kê các tín hiệu đang gửi tuần hoàn.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic/subscribe</code></td>\n<td>Theo dõi trạng thái gửi tuần hoàn (SSE).</td>\n</tr>\n</tbody>\n</table>\n<h3>5.8 Credentials — Quản lý khóa API (M2M)</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/credentials</code></td>\n<td>Liệt kê các khóa M2M của tài khoản bạn.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/credentials</code></td>\n<td>Tạo khóa M2M mới. Trả về khóa <code>&lt;your_api_key&gt;</code> một lần duy nhất.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/credentials/:clientId</code></td>\n<td>Thu hồi khóa.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.9 Auth — Kiểm tra token</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/auth/introspect</code></td>\n<td>Kiểm tra thông tin của một khóa <code>&lt;your_api_key&gt;</code> (chỉ admin/bootstrap key).</td>\n</tr>\n</tbody>\n</table>\n<h3>5.10 Config — Cấu hình hệ thống (Public)</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/config/limits</code></td>\n<td>Xem giới hạn tài nguyên đang áp dụng.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/config/cpu-status</code></td>\n<td>Xem trạng thái CPU monitor.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.11 Users &amp; Account Limits</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/users</code></td>\n<td>Liệt kê các account identifier (public).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/account-limits</code></td>\n<td>Liệt kê giới hạn tài khoản.</td>\n</tr>\n<tr>\n<td><code>GET/PUT/POST/DELETE</code></td>\n<td><code>/api/v1/account-limits/:account</code></td>\n<td>CRUD giới hạn cho một tài khoản (admin).</td>\n</tr>\n</tbody>\n</table>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-6-mcp-server-c-ch-s-d-ng-vi\">\n<h2 class=\"section-title\">6. MCP Server — Cách sử dụng</h2>\n<h3>6.1 MCP là gì?</h3>\n<p><strong>Model Context Protocol (MCP)</strong> là chuẩn do Anthropic khởi xướng, cho phép AI assistant kết nối với các dịch vụ bên ngoài qua các <strong>tool</strong>. Mỗi tool có:</p>\n<ul>\n<li>Tên (ví dụ: <code>screenshot</code>, <code>tap</code>, <code>deploy</code>).</li>\n<li>Mô tả ngắn gọn để AI hiểu chức năng.</li>\n<li>Schema tham số đầu vào.</li>\n<li>Hành động thực thi phía server.</li>\n</ul>\n<p class=\"paragraph\">Khi bạn yêu cầu AI \"chụp màn hình VM và bấm vào nút Settings\", AI sẽ tự động gọi các tool phù hợp thay vì bạn phải viết code.</p>\n<h3>6.2 Kết nối MCP Client</h3>\n<p class=\"paragraph\">CarSky MCP server hỗ trợ hai transport:</p>\n<table>\n<thead>\n<tr>\n<th>Transport</th>\n<th>Mô tả</th>\n<th>Cách dùng</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>stdio</strong></td>\n<td>Server chạy như một process con, giao tiếp qua stdin/stdout.</td>\n<td>Dùng cho Claude Desktop, Cursor, hoặc các MCP client chạy local. Cấu hình command đến <code>node mcp/dist/index.js</code>.</td>\n</tr>\n<tr>\n<td><strong>HTTP (Streamable)</strong></td>\n<td>Server lắng nghe HTTP.</td>\n<td>Đặt <code>MCP_TRANSPORT=http</code>, server chạy trên cổng <code>3100</code>. Gửi request đến <code>http://localhost:3100/mcp</code>.</td>\n</tr>\n</tbody>\n</table>\n<p class=\"paragraph\">Ví dụ cấu hình stdio cho Claude Desktop (<code>claude_desktop_config.json</code>):</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>JSON</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>{\n  &quot;mcpServers&quot;: {\n    &quot;carsky&quot;: {\n      &quot;command&quot;: &quot;node&quot;,\n      &quot;args&quot;: [&quot;E:/A8/a8-reborn/mcp/dist/index.js&quot;],\n      &quot;env&quot;: {\n        &quot;A8_URL&quot;: &quot;https://carsky.example.com&quot;,\n        &quot;A8_API_KEY&quot;: &quot;&lt;khóa_api_của_bạn&gt;&quot;\n      }\n    }\n  }\n}\n</code></div>\n</div>\n<blockquote>\n<p><strong>Lưu ý</strong>: MCP server sử dụng <code>A8_URL</code> để biết địa chỉ CarSky API backend. Thay <code>https://carsky.example.com</code> bằng URL thật của bạn.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-7-danh-s-ch-mcp-tool-vi\">\n<h2 class=\"section-title\">7. Danh sách MCP Tool</h2>\n<p class=\"paragraph\">CarSky MCP server hiện cung cấp <strong>42 tool</strong> chia thành 10 nhóm.</p>\n<h3>7.1 Health — Kiểm tra kết nối</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>health_check</code></td>\n<td>không có</td>\n<td>Kiểm tra API có hoạt động không (Prisma, Zero).</td>\n</tr>\n</tbody>\n</table>\n<h3>7.2 Blueprints — Quản lý bản thiết kế</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_blueprints</code></td>\n<td><code>name?</code>, <code>limit?</code>, <code>cursor?</code></td>\n<td>Liệt kê blueprint.</td>\n</tr>\n<tr>\n<td><code>get_blueprint</code></td>\n<td><code>id</code></td>\n<td>Lấy chi tiết blueprint.</td>\n</tr>\n<tr>\n<td><code>create_blueprint</code></td>\n<td><code>name</code>, <code>description?</code>, <code>nodes?</code>, <code>edges?</code></td>\n<td>Tạo blueprint, có thể kèm topology.</td>\n</tr>\n<tr>\n<td><code>update_blueprint</code></td>\n<td><code>id</code>, <code>name?</code>, <code>description?</code>, <code>operations?</code></td>\n<td>Cập nhật blueprint hoặc topology batch.</td>\n</tr>\n<tr>\n<td><code>clone_blueprint</code></td>\n<td><code>id</code>, <code>name</code>, <code>isSnapshot?</code></td>\n<td>Nhân bản blueprint.</td>\n</tr>\n<tr>\n<td><code>validate_blueprint</code></td>\n<td><code>id</code></td>\n<td>Kiểm tra topology trước khi deploy.</td>\n</tr>\n<tr>\n<td><code>export_blueprint</code></td>\n<td><code>id</code></td>\n<td>Xuất blueprint ra JSON.</td>\n</tr>\n<tr>\n<td><code>import_blueprint</code></td>\n<td><code>data</code>, <code>name?</code></td>\n<td>Nhập blueprint từ JSON.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.3 Devices — Thiết bị</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_devices</code></td>\n<td><code>tag?</code>, <code>limit?</code>, <code>cursor?</code></td>\n<td>Liệt kê thiết bị. ID thiết bị thường được dùng làm <code>roomId</code>.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.4 Artifacts — Tài nguyên</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_artifacts</code></td>\n<td><code>category?</code>, <code>limit?</code>, <code>cursor?</code></td>\n<td>Liệt kê artifact theo loại (DBC, VM_IMAGE, SCRIPT, v.v.).</td>\n</tr>\n</tbody>\n</table>\n<h3>7.5 Deployments — Triển khai</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>find_deployment</code></td>\n<td><code>device?</code>, <code>blueprint?</code></td>\n<td>Tìm deployment đang chạy để lấy <code>roomId</code>.</td>\n</tr>\n<tr>\n<td><code>deploy</code></td>\n<td><code>blueprintId</code>, <code>roomId</code>, <code>name</code></td>\n<td>Triển khai blueprint lên thiết bị.</td>\n</tr>\n<tr>\n<td><code>deployment_status</code></td>\n<td><code>roomId</code></td>\n<td>Xem trạng thái deployment.</td>\n</tr>\n<tr>\n<td><code>wait_ready</code></td>\n<td><code>roomId</code>, <code>timeoutMs?</code>, <code>pollIntervalMs?</code></td>\n<td>Chờ đến khi tất cả node chạy xong.</td>\n</tr>\n<tr>\n<td><code>undeploy</code></td>\n<td><code>roomId</code></td>\n<td>Dừng deployment.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.6 VM Interaction — Điều khiển thiết bị ảo</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>screenshot</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>Chụp màn hình VM, trả về ảnh base64 PNG.</td>\n</tr>\n<tr>\n<td><code>tap</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>x</code>, <code>y</code>, <code>screenWidth?</code>, <code>screenHeight?</code></td>\n<td>Chạm vào tọa độ màn hình.</td>\n</tr>\n<tr>\n<td><code>swipe</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>x1</code>, <code>y1</code>, <code>x2</code>, <code>y2</code>, <code>durationMs?</code></td>\n<td>Vuốt màn hình.</td>\n</tr>\n<tr>\n<td><code>input_text</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>text</code></td>\n<td>Nhập văn bản.</td>\n</tr>\n<tr>\n<td><code>press_key</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>keycode</code></td>\n<td>Bấm phím Android (ví dụ: <code>KEYCODE_HOME</code>).</td>\n</tr>\n<tr>\n<td><code>adb_shell</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>command</code></td>\n<td>Chạy lệnh ADB shell.</td>\n</tr>\n<tr>\n<td><code>ui_tree</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>Lấy cây accessibility dạng JSON.</td>\n</tr>\n<tr>\n<td><code>wait_boot</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>timeoutMs?</code></td>\n<td>Chờ Android boot xong (<code>sys.boot_completed=1</code>).</td>\n</tr>\n<tr>\n<td><code>find_text</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>text</code>, <code>exact?</code></td>\n<td>Tìm text trong UI tree.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.7 Signals — Tín hiệu</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_signal_nodes</code></td>\n<td><code>roomId</code></td>\n<td>Tìm các node nguồn tín hiệu.</td>\n</tr>\n<tr>\n<td><code>list_signals</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>pattern?</code></td>\n<td>Liệt kê tín hiệu.</td>\n</tr>\n<tr>\n<td><code>get_signal_values</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>paths</code></td>\n<td>Đọc giá trị một hoặc nhiều tín hiệu.</td>\n</tr>\n<tr>\n<td><code>send_signals</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>signals</code></td>\n<td>Gửi giá trị tín hiệu.</td>\n</tr>\n<tr>\n<td><code>start_periodic_send</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code>, <code>value</code>, <code>intervalMs?</code></td>\n<td>Gửi tuần hoàn.</td>\n</tr>\n<tr>\n<td><code>stop_periodic_send</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code></td>\n<td>Dừng gửi tuần hoàn.</td>\n</tr>\n<tr>\n<td><code>list_periodic_sends</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>Liệt kê các tín hiệu đang gửi tuần hoàn.</td>\n</tr>\n<tr>\n<td><code>subscribe_signals</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>paths</code>, <code>maxEvents?</code>, <code>timeoutMs?</code></td>\n<td>Thu thập các sự kiện thay đổi giá trị trong một khoảng thời gian.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.8 Tunnels — ADB Tunnel cục bộ</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>vm_tunnel_open</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>localPort?</code></td>\n<td>Mở tunnel ADB local (<code>localhost:port</code>).</td>\n</tr>\n<tr>\n<td><code>vm_tunnel_close</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>Đóng tunnel.</td>\n</tr>\n<tr>\n<td><code>vm_tunnel_list</code></td>\n<td>không có</td>\n<td>Liệt kê các tunnel đang mở.</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>Khi nào dùng tunnel?</strong> Khi bạn muốn dùng <code>adb</code> local, Appium, hoặc UIAutomator để kết nối trực tiếp đến VM ảo như thể nó đang cắm USB vào máy tính của bạn.</p>\n</blockquote>\n<h3>7.9 Containers — Thao tác container Linux</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>container_shell</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>command</code>, <code>timeout_secs?</code></td>\n<td>Chạy lệnh shell trong container.</td>\n</tr>\n<tr>\n<td><code>container_file_read</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code></td>\n<td>Đọc file từ container.</td>\n</tr>\n<tr>\n<td><code>container_file_write</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code>, <code>content</code></td>\n<td>Ghi file vào container.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.10 Logs — Log pod và Loki</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Tham số chính</th>\n<th>Mô tả</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_pods</code></td>\n<td><code>roomId</code></td>\n<td>Liệt kê pods/containers.</td>\n</tr>\n<tr>\n<td><code>pod_logs</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>tail?</code>, <code>since?</code>, <code>container?</code></td>\n<td>Đọc log container trực tiếp.</td>\n</tr>\n<tr>\n<td><code>search_logs</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>query?</code>, <code>since?</code>, <code>limit?</code></td>\n<td>Tìm log lịch sử qua Loki.</td>\n</tr>\n</tbody>\n</table>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-8-v-d-lu-ng-l-m-vi-c-th-ng-g-p-vi\">\n<h2 class=\"section-title\">8. Ví dụ luồng làm việc thường gặp</h2>\n<h3>8.1 Luồng 1: AI agent tự động mở app trên Android VM</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>1. AI agent gọi MCP tool: list_devices → chọn device (roomId).\n2. AI agent gọi: find_deployment(device=&quot;...&quot;) hoặc deployment_status(roomId).\n3. Nếu chưa có deployment, gọi: deploy(blueprintId, roomId, name).\n4. Chờ VM sẵn sàng: wait_boot(roomId, nodeKey=&quot;vm-1&quot;).\n5. Chụp màn hình: screenshot(roomId, nodeKey=&quot;vm-1&quot;).\n6. AI phân tích ảnh hoặc ui_tree để tìm icon app.\n7. Bấm vào icon: tap(roomId, nodeKey=&quot;vm-1&quot;, x=..., y=...).\n8. Chờ và chụp lại màn hình để xác nhận app đã mở.\n</code></div>\n</div>\n<h3>8.2 Luồng 2: Gửi tín hiệu CAN từ script tự động</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Script</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code># 1. Xác thực và tìm roomId\nROOM_ID=$(curl -H &quot;X-API-Key: &lt;key&gt;&quot; \\\n  &quot;https://carsky.example.com/api/v1/devices?limit=1&quot; | jq -r '.items[0].id')\n\n# 2. Tìm node tín hiệu trong room\nNODE_KEY=$(curl -H &quot;X-API-Key: &lt;key&gt;&quot; \\\n  &quot;https://carsky.example.com/api/v1/signals/$ROOM_ID&quot; | jq -r '.nodes[0].key')\n\n# 3. Gửi tín hiệu\ncurl -X POST -H &quot;X-API-Key: &lt;key&gt;&quot; -H &quot;Content-Type: application/json&quot; \\\n  &quot;https://carsky.example.com/api/v1/signals/$ROOM_ID/$NODE_KEY/actuate&quot; \\\n  -d '{&quot;signals&quot;:[{&quot;path&quot;:&quot;Vehicle.Speed&quot;,&quot;value&quot;:60}]}'\n</code></div>\n</div>\n<h3>8.3 Luồng 3: Mở ADB tunnel để dùng adb local</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code>1. Gọi MCP tool: vm_tunnel_open(roomId, nodeKey=&quot;vm-1&quot;).\n2. Server trả về localhost:port, ví dụ localhost:5038.\n3. Trên máy local, chạy: adb connect localhost:5038\n4. Giờ có thể dùng: adb shell, adb logcat, appium, v.v.\n5. Khi xong, gọi: vm_tunnel_close(roomId, nodeKey=&quot;vm-1&quot;).\n</code></div>\n</div>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-9-l-u-quan-tr-ng-vi\">\n<h2 class=\"section-title\">9. Lưu ý quan trọng</h2>\n<ol>\n<li><strong>Phân quyền</strong>: Các thao tác sửa/xóa/triển khai thường yêu cầu vai trò <code>editor</code> hoặc <code>admin</code>. Nếu gặp <code>403 Forbidden</code>, hãy kiểm tra vai trò tài khoản.</li>\n<li><strong>Khóa API bảo mật</strong>: Không chia sẻ khóa <code>&lt;your_api_key&gt;</code> công khai. Nếu nghi ngờ lộ, xóa và tạo lại trong tab Credentials.</li>\n<li><strong>roomId và nodeKey</strong>:</li>\n<li><code>roomId</code> thường chính là ID của <strong>device</strong> đã chọn.</li>\n<li><code>nodeKey</code> là tên node trong blueprint (do người tạo blueprint đặt, ví dụ <code>vm-1</code>, <code>can-1</code>).</li>\n<li><strong>SSE endpoints</strong> (<code>/watch</code>, <code>/subscribe</code>): là Server-Sent Events, chỉ dùng được với client hỗ trợ stream.</li>\n<li><strong>MCP HTTP transport</strong>: khi bật <code>MCP_TRANSPORT=http</code>, server lắng nghe trên cổng <code>3100</code>. Đảm bảo cổng này không bị chặn bởi firewall.</li>\n<li><strong>Tài liệu tự động</strong>: Luôn ưu tiên kiểm tra <code>/api/v1/openapi.json</code> và <code>/api/v1/docs</code> để có thông tin schema mới nhất.</li>\n</ol>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-10-t-m-t-t-nhanh-vi\">\n<h2 class=\"section-title\">10. Tóm tắt nhanh</h2>\n<table>\n<thead>\n<tr>\n<th>Bạn muốn làm gì?</th>\n<th>Dùng API endpoint</th>\n<th>Dùng MCP tool</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Kiểm tra hệ thống</td>\n<td><code>GET /api/v1/healthz</code></td>\n<td><code>health_check</code></td>\n</tr>\n<tr>\n<td>Liệt kê blueprint</td>\n<td><code>GET /api/v1/blueprints</code></td>\n<td><code>list_blueprints</code></td>\n</tr>\n<tr>\n<td>Triển khai blueprint</td>\n<td><code>POST /api/v1/deployments</code></td>\n<td><code>deploy</code></td>\n</tr>\n<tr>\n<td>Chụp màn hình VM</td>\n<td><code>GET /api/v1/vms/{roomId}/{nodeKey}/screenshot</code></td>\n<td><code>screenshot</code></td>\n</tr>\n<tr>\n<td>Chạm màn hình</td>\n<td><code>POST /api/v1/vms/{roomId}/{nodeKey}/tap</code></td>\n<td><code>tap</code></td>\n</tr>\n<tr>\n<td>Nhập text</td>\n<td><code>POST /api/v1/vms/{roomId}/{nodeKey}/text</code></td>\n<td><code>input_text</code></td>\n</tr>\n<tr>\n<td>Lấy UI tree</td>\n<td><code>GET /api/v1/vms/{roomId}/{nodeKey}/accessibility</code></td>\n<td><code>ui_tree</code></td>\n</tr>\n<tr>\n<td>Chạy ADB shell</td>\n<td><code>POST /api/v1/vms/{roomId}/{nodeKey}/shell</code></td>\n<td><code>adb_shell</code></td>\n</tr>\n<tr>\n<td>Đọc tín hiệu</td>\n<td><code>POST /api/v1/signals/{roomId}/{nodeKey}/values</code></td>\n<td><code>get_signal_values</code></td>\n</tr>\n<tr>\n<td>Gửi tín hiệu</td>\n<td><code>POST /api/v1/signals/{roomId}/{nodeKey}/actuate</code></td>\n<td><code>send_signals</code></td>\n</tr>\n<tr>\n<td>Mở ADB tunnel local</td>\n<td><code>GET /api/v1/deployments/{roomId}/adb-tunnel</code></td>\n<td><code>vm_tunnel_open</code></td>\n</tr>\n<tr>\n<td>Đọc log</td>\n<td><code>GET /api/v1/deployments/{roomId}/logs/{nodeKey}</code></td>\n<td><code>pod_logs</code></td>\n</tr>\n</tbody>\n</table>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-11-t-i-nguy-n-tham-kh-o-vi\">\n<h2 class=\"section-title\">11. Tài nguyên tham khảo</h2>\n<ul>\n<li>OpenAPI spec: <code>https://&lt;carsky-domain&gt;/api/v1/openapi.json</code></li>\n<li>Swagger UI: <code>https://&lt;carsky-domain&gt;/api/v1/docs</code></li>\n<li>MCP specification: https://modelcontextprotocol.io/</li>\n</ul>\n</section>\n</div>",
    "en": "<div class=\"module-content\" id=\"mod-api-mcp-tools-container-en\">\n<section id=\"mod-api-mcp-tools-intro-en\">\n<h2 class=\"section-title\">Introduction</h2>\n<blockquote>\n<p><strong>Purpose</strong>: Help end users and AI agents understand how to communicate with CarSky through the REST API and MCP server. No deep programming knowledge required.</p>\n<p><strong>Updated</strong>: 2026-07-16<br />\n<strong>Status</strong>: Reference document — updated when the API or MCP server changes.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-1-overview-en\">\n<h2 class=\"section-title\">1. Overview</h2>\n<p class=\"paragraph\">CarSky provides two main ways to automate and control remotely:</p>\n<table>\n<thead>\n<tr>\n<th>Approach</th>\n<th>Description</th>\n<th>When to use</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>REST API</strong></td>\n<td>Traditional HTTP/JSON protocol. You call endpoints to fetch data, control VMs, send signals, etc.</td>\n<td>For automation scripts, third-party apps, or agents running in the cloud.</td>\n</tr>\n<tr>\n<td><strong>MCP Server</strong></td>\n<td>A server following the <strong>Model Context Protocol</strong> (MCP) that AI agents can connect to. It wraps common operations into named <strong>tools</strong> with clear descriptions and parameters.</td>\n<td>For AI assistants/agents that want to control CarSky naturally.</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>Relationship between API and MCP</strong>: Most MCP tools internally call the CarSky REST API. MCP is just a wrapper that makes it easier for AI agents to use.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-2-authentication-en\">\n<h2 class=\"section-title\">2. Authentication</h2>\n<p class=\"paragraph\">Both the API and MCP require an API key or token.</p>\n<h3>2.1 Getting an API Key</h3>\n<ol>\n<li>Log in to the CarSky Rework UI.</li>\n<li>Click your avatar at the top → select the <strong>Credentials</strong> tab (requires Admin/Editor depending on configuration).</li>\n<li>Click <strong>Create credential</strong> → copy the API key string shown <strong>only once</strong>.</li>\n<li>Store the key securely. If lost, you must create a new one.</li>\n</ol>\n<blockquote>\n<p><strong>Note</strong>: The API key is a machine-to-machine key for scripts/agents, not your login password. Copy and secure it immediately when created.</p>\n</blockquote>\n<h3>2.2 Using the API Key with REST API</h3>\n<p class=\"paragraph\">Add it to the header of every request:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>X-API-Key: &lt;your_api_key&gt;\n</code></div>\n</div>\n<p class=\"paragraph\">Or as Bearer:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>Authorization: Bearer &lt;your_api_key&gt;\n</code></div>\n</div>\n<p class=\"paragraph\">Example with <code>curl</code>:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>curl</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>curl -H &quot;X-API-Key: &lt;your_api_key&gt;&quot; \\\n     https://carsky.example.com/api/v1/healthz\n</code></div>\n</div>\n<h3>2.3 Using the API Key with MCP Server</h3>\n<ul>\n<li><strong>stdio transport</strong> (default): set the key in the <code>A8_API_KEY</code> environment variable when starting the MCP server.</li>\n<li><strong>HTTP transport</strong>: send the key via <code>X-API-Key</code> or <code>Authorization: Bearer</code> header in each request to the MCP server.</li>\n</ul>\n<h3>2.4 Finding <code>roomId</code> and <code>nodeKey</code></h3>\n<p class=\"paragraph\">Almost every API/MCP call below takes a <code>roomId</code> and, for node-scoped calls, a <code>nodeKey</code>. Here's where to get each one:</p>\n<div class=\"info-box\">\n<strong>🆔 roomId</strong> — the ID of the deployed device (room). Three ways to get it:\n<ul>\n<li><strong>You just created the device</strong>: it's the exact ID you set when creating it in <strong>Devices</strong> (see 3.5) — no lookup needed.</li>\n<li><strong>UI</strong>: open the <strong>Devices</strong> or <strong>Deployments</strong> tab — the ID is shown next to each device/deployment row.</li>\n<li><strong>API/MCP, when you only know the device or blueprint name</strong>: <code>GET /api/v1/deployments/find?device=&lt;name&gt;</code> or MCP <code>find_deployment(device?, blueprint?)</code> resolves the running deployment's <code>roomId</code>.</li>\n</ul>\n</div>\n<div class=\"info-box\">\n<strong>🔑 nodeKey</strong> — the node's <code>id</code> as declared in the blueprint (e.g. <code>vm-1</code>, <code>can0</code>, <code>screen-1</code>). Two ways to get it:\n<ul>\n<li><strong>UI</strong>: click the node on the blueprint canvas — its Inspector panel shows the node <code>id</code>, which is the <code>nodeKey</code>.</li>\n<li><strong>API/MCP, for a running deployment</strong>: <code>GET /api/v1/deployments/{roomId}/nodes</code> lists every node with its <code>nodeKey</code>; MCP <code>list_signal_nodes(roomId)</code> lists signal-source nodes (CAN/LIN/GPIO/KUKSA) specifically, and <code>list_pods(roomId)</code> lists the underlying Kubernetes pods per node.</li>\n</ul>\n</div>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-3-basic-workflow-from-blueprint-to-testing-most-important-en\">\n<h2 class=\"section-title\">3. Basic Workflow: From Blueprint to Testing (Most Important)</h2>\n<p class=\"paragraph\">This is the standard flow to turn a design into a real testing environment on CarSky. You can do it through the Rework UI or via API/MCP.</p>\n<h3>3.1 Overall Diagram</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>Step 1: Open Nydus ──► Step 2: Create/Import Blueprint ──► Step 3: Deploy Blueprint\n                                                           │\n                                                           ▼\nStep 5: Test/Control ◄──────────────────────────────────── Step 4: Create/Select Device\n</code></div>\n</div>\n<h3>3.2 Step 1: Open Nydus</h3>\n<p><strong>On Rework UI:</strong></p>\n<ol>\n<li>Log in to CarSky.</li>\n<li>Click <strong>Nydus</strong> on the main Dock.</li>\n<li>The Nydus interface opens with main tabs:</li>\n<li><strong>Blueprints</strong>: list of designs.</li>\n<li><strong>Deployments</strong>: running deployments.</li>\n<li><strong>Registry/Artifacts</strong>: image, DBC, script repository...</li>\n</ol>\n<h3>3.3 Step 2: Create or Import a Blueprint</h3>\n<p><strong>Option A — Create a new blueprint in the UI:</strong></p>\n<ol>\n<li>In the <strong>Blueprints</strong> tab, click <strong>New blueprint</strong>.</li>\n<li>Set a <strong>name</strong> and <strong>description</strong>.</li>\n<li>Open the graph editor, drag nodes from the palette:</li>\n<li><strong>Skycraft</strong> — Android Automotive virtual device.</li>\n<li><strong>CAN bus / LIN bus</strong> — vehicle networks.</li>\n<li><strong>GPIO panel</strong> — virtual buttons/switches.</li>\n<li><strong>Script node</strong> — automation script.</li>\n<li><strong>Container</strong> — ECU service/container.</li>\n<li>Connect pins between nodes with edges.</li>\n<li>Configure each node: choose image, DBC, script, etc.</li>\n<li>Click <strong>Save</strong>.</li>\n</ol>\n<p><strong>Option B — Import an existing blueprint:</strong></p>\n<ol>\n<li>In the <strong>Blueprints</strong> tab, click <strong>Import</strong>.</li>\n<li>Select a blueprint JSON file from your computer (usually in <code>examples/&lt;demo&gt;/blueprint.json</code>).</li>\n<li>The system validates the format. If valid, the blueprint appears in the list.</li>\n</ol>\n<p><strong>Option C — Via API/MCP:</strong></p>\n<ul>\n<li>API: <code>POST /api/v1/blueprints</code> to create an empty blueprint, then <code>POST /api/v1/blueprints/{id}/batch</code> to add nodes/pins/edges.</li>\n<li>MCP: <code>create_blueprint</code> with <code>nodes</code> and <code>edges</code>.</li>\n<li>After creation, always call <code>validate_blueprint</code> (MCP) or <code>POST /api/v1/blueprints/{id}/validate</code> (API) to check topology.</li>\n</ul>\n<blockquote>\n<p><strong>Tip</strong>: If you just want to run an existing demo, import instead of building from scratch to reduce configuration errors.</p>\n</blockquote>\n<h3>3.4 Step 3: Deploy the Blueprint</h3>\n<ol>\n<li>In the <strong>Blueprints</strong> list, select the blueprint to run.</li>\n<li>Click the <strong>Deploy</strong> button (rocket icon or \"Deploy\" label).</li>\n<li>The <strong>Deploy blueprint</strong> dialog appears.</li>\n</ol>\n<h3>3.5 Step 4: Create a Device and Select It as Deployment Target</h3>\n<p class=\"paragraph\">In the Deploy blueprint dialog:</p>\n<ol>\n<li>Choose an existing <strong>target device</strong> from the list.</li>\n<li>Or click <strong>Create new device</strong> to create a new one:</li>\n<li>Set a device name (e.g., <code>Demo-AAOS-01</code>).</li>\n<li>Choose the appropriate device type (usually <code>room</code> or a system-defined type).</li>\n<li>Note: this device ID is the <code>roomId</code> used later in API/MCP.</li>\n<li>Click <strong>Deploy</strong> to start.</li>\n</ol>\n<p class=\"paragraph\">The system will start initializing pods/containers/nodes in Kubernetes. This may take from a few tens of seconds to several minutes depending on blueprint complexity.</p>\n<p><strong>Via API/MCP:</strong></p>\n<ul>\n<li>API: <code>POST /api/v1/deployments</code> with body <code>{ blueprintId, roomId, name }</code>.</li>\n<li>MCP: <code>deploy(blueprintId, roomId, name)</code>.</li>\n<li>Then use <code>wait_ready</code> (MCP) or poll <code>GET /api/v1/deployments/{roomId}/status</code> (API) until all nodes are <code>Running</code>.</li>\n</ul>\n<h3>3.6 Step 5: Connect and Test the Device</h3>\n<p class=\"paragraph\">After successful deployment, you can inspect and control the device in several ways.</p>\n<h4>3.6.1 View Deployment Status</h4>\n<ul>\n<li><strong>UI</strong>: <strong>Deployments</strong> tab in Nydus, or <strong>Dashboard</strong> panel.</li>\n<li><strong>API</strong>: <code>GET /api/v1/deployments/{roomId}/status</code>.</li>\n<li><strong>MCP</strong>: <code>deployment_status(roomId)</code>.</li>\n</ul>\n<h4>3.6.2 View VM Screen (Skycraft)</h4>\n<ul>\n<li><strong>UI</strong>: open the device, select the Skycraft node, click <strong>Screen</strong>.</li>\n<li><strong>API</strong>: <code>GET /api/v1/vms/{roomId}/{nodeKey}/screenshot</code>.</li>\n<li><strong>MCP</strong>: <code>screenshot(roomId, nodeKey)</code>.</li>\n</ul>\n<h4>3.6.3 Control the Screen</h4>\n<ul>\n<li><strong>UI</strong>: click directly on the virtual screen in the Screen panel.</li>\n<li><strong>API/MCP</strong>:</li>\n<li>Tap: <code>tap(roomId, nodeKey, x, y)</code> / <code>POST .../tap</code></li>\n<li>Swipe: <code>swipe(...)</code> / <code>POST .../swipe</code></li>\n<li>Type text: <code>input_text(roomId, nodeKey, text)</code> / <code>POST .../text</code></li>\n<li>Press key: <code>press_key(roomId, nodeKey, \"KEYCODE_HOME\")</code> / <code>POST .../key</code></li>\n</ul>\n<h4>3.6.4 Inspect UI Tree (Find Buttons/Icons)</h4>\n<ul>\n<li><strong>API</strong>: <code>GET /api/v1/vms/{roomId}/{nodeKey}/accessibility</code></li>\n<li><strong>MCP</strong>: <code>ui_tree(roomId, nodeKey)</code> or <code>find_text(roomId, nodeKey, \"Settings\")</code></li>\n</ul>\n<h4>3.6.5 Read/Write CAN/LIN/GPIO Signals</h4>\n<ul>\n<li><strong>UI</strong>: open <strong>Signal</strong> or <strong>GPIO</strong> panel, select the signal source node.</li>\n<li><strong>API</strong>:</li>\n<li>Read: <code>POST /api/v1/signals/{roomId}/{nodeKey}/values</code></li>\n<li>Write: <code>POST /api/v1/signals/{roomId}/{nodeKey}/actuate</code></li>\n<li><strong>MCP</strong>:</li>\n<li>Read: <code>get_signal_values(roomId, nodeKey, [\"Vehicle.Speed\"])</code></li>\n<li>Write: <code>send_signals(roomId, nodeKey, [{path:\"Vehicle.Speed\", value:60}])</code></li>\n</ul>\n<h4>3.6.6 View Logs</h4>\n<ul>\n<li><strong>UI</strong>: <strong>Logs</strong> panel in Dashboard, select the node.</li>\n<li><strong>API</strong>: <code>GET /api/v1/deployments/{roomId}/logs/{nodeKey}</code></li>\n<li><strong>MCP</strong>: <code>pod_logs(roomId, nodeKey)</code> or <code>search_logs(...)</code> for historical logs.</li>\n</ul>\n<h4>3.6.7 Use ADB (Advanced)</h4>\n<ul>\n<li><strong>One-shot</strong>: <code>adb_shell(roomId, nodeKey, \"logcat -d\")</code></li>\n<li><strong>Persistent tunnel</strong>: <code>vm_tunnel_open(roomId, nodeKey)</code> → <code>adb connect localhost:&lt;port&gt;</code> → use local adb normally.</li>\n</ul>\n<h3>3.7 When to Redeploy?</h3>\n<p class=\"paragraph\">You need to <strong>redeploy</strong> when:</p>\n<ul>\n<li>You change blueprint topology (add/remove nodes, change connections).</li>\n<li>You change the artifact/image used in a node.</li>\n<li>Node configuration changes.</li>\n</ul>\n<p class=\"paragraph\">You <strong>do not need to redeploy</strong> when:</p>\n<ul>\n<li>You only control the screen, send signals, or view logs.</li>\n<li>You change device widgets/dashboard.</li>\n</ul>\n<h3>3.8 Stop and Clean Up</h3>\n<p class=\"paragraph\">When testing is done:</p>\n<ol>\n<li><strong>UI</strong>: in the <strong>Deployments</strong> tab, right-click the deployment → <strong>Delete</strong>.</li>\n<li><strong>API</strong>: <code>DELETE /api/v1/deployments/{roomId}</code>.</li>\n<li><strong>MCP</strong>: <code>undeploy(roomId)</code>.</li>\n</ol>\n<blockquote>\n<p><strong>Note</strong>: Deleting a deployment stops pods/containers but <strong>does not delete the blueprint</strong>. You can redeploy the same blueprint later.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-4-rest-api-how-to-use-en\">\n<h2 class=\"section-title\">4. REST API — How to Use</h2>\n<h3>4.1 Base URL</h3>\n<p class=\"paragraph\">All APIs are under:</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>https://&lt;carsky-domain&gt;/api/v1\n</code></div>\n</div>\n<p class=\"paragraph\">Example: <code>https://carsky.example.com/api/v1/blueprints</code></p>\n<h3>4.2 Auto-generated OpenAPI Docs</h3>\n<p class=\"paragraph\">CarSky auto-generates API documentation:</p>\n<ul>\n<li><strong>OpenAPI JSON</strong>: <code>GET /api/v1/openapi.json</code></li>\n<li><strong>Swagger UI</strong>: <code>GET /api/v1/docs</code></li>\n</ul>\n<p class=\"paragraph\">Open <code>/api/v1/docs</code> in a browser to see every endpoint, parameter, and example response.</p>\n<h3>4.3 Common Response Format</h3>\n<p class=\"paragraph\">Most responses are JSON. Some endpoints (like screenshot) return binary (PNG image).</p>\n<ul>\n<li><code>200 OK</code> — success.</li>\n<li><code>201 Created</code> — created successfully.</li>\n<li><code>400 Bad Request</code> — wrong or missing parameters.</li>\n<li><code>401 Unauthorized</code> — not authenticated or invalid API key.</li>\n<li><code>403 Forbidden</code> — authenticated but insufficient permissions.</li>\n<li><code>404 Not Found</code> — resource does not exist.</li>\n<li><code>500 Internal Server Error</code> — server-side error.</li>\n</ul>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-5-rest-api-endpoint-reference-en\">\n<h2 class=\"section-title\">5. REST API Endpoint Reference</h2>\n<p class=\"paragraph\">Below are the main endpoint groups. Each endpoint requires the authentication header described above, except public endpoints marked separately.</p>\n<h3>5.1 Meta — System Health (Public)</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/healthz</code></td>\n<td>Check API, database, and Zero sync health.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/openapi.json</code></td>\n<td>Return OpenAPI 3.1 spec.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/docs</code></td>\n<td>Swagger UI.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.2 Blueprints — System Designs</h3>\n<p class=\"paragraph\">Blueprints describe the topology of a virtual \"room\": nodes (Skycraft, CAN bus, script, container...), pins, and edges between them.</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/blueprints</code></td>\n<td>List blueprints (paginated, filter by name).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/blueprints/:id</code></td>\n<td>Get blueprint details including nodes, pins, edges.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints</code></td>\n<td>Create a new blueprint.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/blueprints/:id</code></td>\n<td>Update blueprint name/description.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/lock</code></td>\n<td>Lock/unlock blueprint (prevent edits).</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/:id</code></td>\n<td>Delete blueprint.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/clone</code></td>\n<td>Clone a blueprint.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/validate</code></td>\n<td>Validate topology before deploying.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/batch</code></td>\n<td>Batch topology mutations (add node/pin/edge).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/blueprints/:id/export</code></td>\n<td>Export blueprint as JSON for backup/sharing.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/import</code></td>\n<td>Import blueprint from exported JSON.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/nodes</code></td>\n<td>Add node to blueprint.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/blueprints/nodes/:nodeId</code></td>\n<td>Update node.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/nodes/:nodeId</code></td>\n<td>Delete node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/nodes/:nodeId/pins</code></td>\n<td>Add pin to node.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/blueprints/pins/:pinId</code></td>\n<td>Update pin.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/pins/:pinId</code></td>\n<td>Delete pin.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/blueprints/:id/edges</code></td>\n<td>Add edge between two pins.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/blueprints/edges/:edgeId</code></td>\n<td>Delete edge.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.3 Devices</h3>\n<p class=\"paragraph\">In CarSky, a \"device\" is often used as a \"room\" to deploy a blueprint.</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/devices</code></td>\n<td>List devices (paginated, filter by tag).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/devices/:id</code></td>\n<td>Get device details, tags, widgets.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices</code></td>\n<td>Create new device.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/devices/:id</code></td>\n<td>Update device name.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/lock</code></td>\n<td>Lock/unlock device.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/devices/:id</code></td>\n<td>Delete device.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/tags</code></td>\n<td>Add tag to device.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/devices/:id/tags/:tag</code></td>\n<td>Remove tag.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/widgets</code></td>\n<td>Add dashboard widget.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/devices/:id/widgets/:widgetId</code></td>\n<td>Update widget.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/devices/:id/widgets/:widgetId</code></td>\n<td>Remove widget.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/devices/:id/widgets/:widgetId/reorder</code></td>\n<td>Reorder widgets.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.4 Artifacts — Asset Repository</h3>\n<p class=\"paragraph\">Artifacts are files/resources used in blueprints: VM disk images, DBC files, scripts, firmware...</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/artifacts</code></td>\n<td>List artifacts (paginated, filter by category).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/artifacts/:id</code></td>\n<td>Get artifact details and versions.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/artifacts</code></td>\n<td>Create artifact metadata.</td>\n</tr>\n<tr>\n<td><code>PATCH</code></td>\n<td><code>/api/v1/artifacts/:id</code></td>\n<td>Update metadata.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/artifacts/:id</code></td>\n<td>Delete artifact.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/artifacts/:id/versions</code></td>\n<td>Add new version.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/artifacts/:id/versions/:versionId</code></td>\n<td>Delete version.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.5 Deployments — Deploy Blueprints</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments</code></td>\n<td>Deploy a blueprint to a device (room).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/find</code></td>\n<td>Find running deployments by device or blueprint name.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/status</code></td>\n<td>Get deployment status.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/nodes</code></td>\n<td>List nodes in deployment.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/nodes/watch</code></td>\n<td>Watch node status in real time (SSE).</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/restart</code></td>\n<td>Restart all nodes.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/restart/:node</code></td>\n<td>Restart a specific node.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/deployments/:roomId</code></td>\n<td>Stop and delete deployment.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/adb-tunnel</code></td>\n<td>Get ADB tunnel command info for Skycraft node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/adb-exec/:nodeKey</code></td>\n<td>Run one-shot ADB command.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/container-exec/:nodeKey</code></td>\n<td>Run command inside a container node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/deployments/:roomId/container-file/:nodeKey</code></td>\n<td>Read/write file in container.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/pods</code></td>\n<td>List Kubernetes pods.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/logs/:nodeKey</code></td>\n<td>Read pod logs.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/deployments/:roomId/logs/:nodeKey/search</code></td>\n<td>Search historical logs via Loki.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.6 VM Interaction — Control Android Virtual Devices</h3>\n<p class=\"paragraph\">These endpoints let you control an Android virtual screen as if holding a real device.</p>\n<h4>ADB routes (always available)</h4>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/screenshot</code></td>\n<td>Capture PNG screenshot.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/text</code></td>\n<td>Type text into focused field.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/key</code></td>\n<td>Press Android keycode.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/shell</code></td>\n<td>Run arbitrary ADB shell command.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/accessibility</code></td>\n<td>Get accessibility tree (UI tree) as JSON.</td>\n</tr>\n</tbody>\n</table>\n<h4>Touch routes (only when <code>COOLGATE_URL_SERVER</code> is set)</h4>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/tap</code></td>\n<td>Tap at screen coordinates.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/vms/:roomId/:nodeKey/swipe</code></td>\n<td>Swipe gesture.</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>Note</strong>: <code>roomId</code> is the deployed device ID; <code>nodeKey</code> is the node name in the blueprint (e.g., <code>vm-1</code>, <code>screen-1</code>).</p>\n</blockquote>\n<h3>5.7 Signals — CAN/LIN/GPIO/KUKSA</h3>\n<p class=\"paragraph\">Send and receive signals between nodes in a deployment. CarSky uses Zenoh peer-to-peer as the backbone.</p>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId</code></td>\n<td>Discover signal-source nodes in room.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey</code></td>\n<td>List signals on a node.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/values</code></td>\n<td>Read current values of one or more signals.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/actuate</code></td>\n<td>Send signal values (actuate).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/subscribe</code></td>\n<td>Subscribe to value changes (SSE).</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic/start</code></td>\n<td>Start cyclic transmission of a signal (CAN).</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic/stop</code></td>\n<td>Stop cyclic transmission.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic</code></td>\n<td>List active periodic sends.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/signals/:roomId/:nodeKey/periodic/subscribe</code></td>\n<td>Stream periodic-send status (SSE).</td>\n</tr>\n</tbody>\n</table>\n<h3>5.8 Credentials — Manage API Keys (M2M)</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/credentials</code></td>\n<td>List your M2M credentials.</td>\n</tr>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/credentials</code></td>\n<td>Create new M2M credential. Returns <code>&lt;your_api_key&gt;</code> key once.</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td><code>/api/v1/credentials/:clientId</code></td>\n<td>Revoke credential.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.9 Auth — Token Introspection</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>POST</code></td>\n<td><code>/api/v1/auth/introspect</code></td>\n<td>Inspect an <code>&lt;your_api_key&gt;</code> key (admin/bootstrap only).</td>\n</tr>\n</tbody>\n</table>\n<h3>5.10 Config — System Config (Public)</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/config/limits</code></td>\n<td>View active resource limits.</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/config/cpu-status</code></td>\n<td>View CPU monitor status.</td>\n</tr>\n</tbody>\n</table>\n<h3>5.11 Users &amp; Account Limits</h3>\n<table>\n<thead>\n<tr>\n<th>Method</th>\n<th>Path</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/users</code></td>\n<td>List account identifiers (public).</td>\n</tr>\n<tr>\n<td><code>GET</code></td>\n<td><code>/api/v1/account-limits</code></td>\n<td>List account limits.</td>\n</tr>\n<tr>\n<td><code>GET/PUT/POST/DELETE</code></td>\n<td><code>/api/v1/account-limits/:account</code></td>\n<td>CRUD limits for an account (admin).</td>\n</tr>\n</tbody>\n</table>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-6-mcp-server-how-to-use-en\">\n<h2 class=\"section-title\">6. MCP Server — How to Use</h2>\n<h3>6.1 What is MCP?</h3>\n<p><strong>Model Context Protocol (MCP)</strong> is a standard initiated by Anthropic that allows AI assistants to connect to external services through <strong>tools</strong>. Each tool has:</p>\n<ul>\n<li>A name (e.g., <code>screenshot</code>, <code>tap</code>, <code>deploy</code>).</li>\n<li>A short description so the AI understands its function.</li>\n<li>An input parameter schema.</li>\n<li>A server-side execution action.</li>\n</ul>\n<p class=\"paragraph\">When you ask an AI \"capture the VM screen and tap the Settings button\", the AI automatically calls the appropriate tools instead of you writing code.</p>\n<h3>6.2 Connecting an MCP Client</h3>\n<p class=\"paragraph\">The CarSky MCP server supports two transports:</p>\n<table>\n<thead>\n<tr>\n<th>Transport</th>\n<th>Description</th>\n<th>How to use</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>stdio</strong></td>\n<td>Server runs as a child process, communicates via stdin/stdout.</td>\n<td>For Claude Desktop, Cursor, or local MCP clients. Configure command to <code>node mcp/dist/index.js</code>.</td>\n</tr>\n<tr>\n<td><strong>HTTP (Streamable)</strong></td>\n<td>Server listens over HTTP.</td>\n<td>Set <code>MCP_TRANSPORT=http</code>, server runs on port <code>3100</code>. Send requests to <code>http://localhost:3100/mcp</code>.</td>\n</tr>\n</tbody>\n</table>\n<p class=\"paragraph\">Example stdio configuration for Claude Desktop (<code>claude_desktop_config.json</code>):</p>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>JSON</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>{\n  &quot;mcpServers&quot;: {\n    &quot;carsky&quot;: {\n      &quot;command&quot;: &quot;node&quot;,\n      &quot;args&quot;: [&quot;E:/A8/a8-reborn/mcp/dist/index.js&quot;],\n      &quot;env&quot;: {\n        &quot;A8_URL&quot;: &quot;https://carsky.example.com&quot;,\n        &quot;A8_API_KEY&quot;: &quot;&lt;your_api_key&gt;&quot;\n      }\n    }\n  }\n}\n</code></div>\n</div>\n<blockquote>\n<p><strong>Note</strong>: The MCP server uses <code>A8_URL</code> to know the CarSky API backend address. Replace <code>https://carsky.example.com</code> with your real URL.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-7-mcp-tool-reference-en\">\n<h2 class=\"section-title\">7. MCP Tool Reference</h2>\n<p class=\"paragraph\">The CarSky MCP server currently provides <strong>42 tools</strong> in 10 groups.</p>\n<h3>7.1 Health — Connection Check</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>health_check</code></td>\n<td>none</td>\n<td>Check whether the API is up (Prisma, Zero).</td>\n</tr>\n</tbody>\n</table>\n<h3>7.2 Blueprints — Design Management</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_blueprints</code></td>\n<td><code>name?</code>, <code>limit?</code>, <code>cursor?</code></td>\n<td>List blueprints.</td>\n</tr>\n<tr>\n<td><code>get_blueprint</code></td>\n<td><code>id</code></td>\n<td>Get blueprint details.</td>\n</tr>\n<tr>\n<td><code>create_blueprint</code></td>\n<td><code>name</code>, <code>description?</code>, <code>nodes?</code>, <code>edges?</code></td>\n<td>Create blueprint, optionally with topology.</td>\n</tr>\n<tr>\n<td><code>update_blueprint</code></td>\n<td><code>id</code>, <code>name?</code>, <code>description?</code>, <code>operations?</code></td>\n<td>Update blueprint or batch topology.</td>\n</tr>\n<tr>\n<td><code>clone_blueprint</code></td>\n<td><code>id</code>, <code>name</code>, <code>isSnapshot?</code></td>\n<td>Clone blueprint.</td>\n</tr>\n<tr>\n<td><code>validate_blueprint</code></td>\n<td><code>id</code></td>\n<td>Validate topology before deploy.</td>\n</tr>\n<tr>\n<td><code>
