    // ===================== Module Loader =====================
    const LANG_STORAGE_KEY = 'carsky_guide_lang';
    let manifest = [];

    function loadManifest() {
        return EMBEDDED_MANIFEST;
    }

    function getActiveLang() {
        return document.body.classList.contains('lang-en-active') ? 'en' : 'vi';
    }

    function activeContentBlock() {
        return document.getElementById('content-' + getActiveLang());
    }

    function activeSections() {
        return activeContentBlock().querySelectorAll('section');
    }

    function activeNavItems() {
        return document.querySelectorAll('.lang-' + getActiveLang() + ' .nav-item');
    }

    // ===================== Sidebar: Part > Group > Module (3 levels) =====================
    const PART_ORDER = ['reference', 'tutorial'];
    const PART_FALLBACK = {
        reference: { vi: '📚 Tài Liệu Tham Khảo', en: '📚 Reference' },
        tutorial: { vi: '🎓 Hướng Dẫn Thực Hành', en: '🎓 Tutorial' }
    };

    function getModPart(mod) {
        if (mod.part && mod.part.id) return mod.part;
        return { id: 'reference', vi: PART_FALLBACK.reference.vi, en: PART_FALLBACK.reference.en };
    }

    function toggleNavPart(partEl) {
        partEl.classList.toggle('collapsed');
    }

    function renderSidebar(manifest) {
        const nav = document.getElementById('sidebarNav');

        // Build part buckets while preserving the manifest's sort order (part, then order)
        const parts = {};
        const partIds = [];
        for (const mod of manifest) {
            const p = getModPart(mod);
            if (!parts[p.id]) {
                parts[p.id] = { id: p.id, titles: { vi: p.vi, en: p.en }, mods: [] };
                partIds.push(p.id);
            }
            parts[p.id].mods.push(mod);
        }

        function buildNavItem(mod, lang) {
            const wrap = document.createElement('div');
            wrap.className = 'nav-item-wrap';
            wrap.dataset.module = mod.id;
            const firstSectionId = findFirstSectionId(mod, lang);
            const a = document.createElement('a');
            a.href = '#' + firstSectionId;
            a.className = 'nav-item' + (mod.parent ? ' nav-subitem' : '');
            a.innerHTML = (mod.icon ? mod.icon + ' ' : '') + escapeHtml(mod.title[lang]);
            a.dataset.module = mod.id;
            a.dataset.section = firstSectionId;
            wrap.appendChild(a);

            const children = document.createElement('div');
            children.className = 'nav-children';
            const modSections = EMBEDDED_SECTIONS[mod.id] && EMBEDDED_SECTIONS[mod.id][lang];
            if (modSections && modSections.length > 1) {
                for (const sec of modSections) {
                    const sa = document.createElement('a');
                    sa.href = '#' + sec.id;
                    sa.className = 'nav-item nav-section';
                    sa.textContent = sec.title;
                    sa.dataset.module = mod.id;
                    sa.dataset.section = sec.id;
                    children.appendChild(sa);
                }
            }
            wrap.appendChild(children);
            return wrap;
        }

        function buildLangBlock(lang) {
            const container = document.createElement('div');
            container.className = 'lang-block lang-' + lang;
            for (const partId of partIds) {
                const part = parts[partId];
                const partEl = document.createElement('div');
                partEl.className = 'nav-part';
                partEl.dataset.part = partId;
                const partTitle = document.createElement('div');
                partTitle.className = 'nav-part-title';
                partTitle.innerHTML = '<span class="nav-chevron">▸</span><span>' + escapeHtml(part.titles[lang] || part.titles.vi) + '</span>';
                partTitle.addEventListener('click', function() { toggleNavPart(partEl); });
                partEl.appendChild(partTitle);

                const partBody = document.createElement('div');
                partBody.className = 'nav-part-body';
                const groupEl = document.createElement('div');
                groupEl.className = 'nav-group';
                let lastGroupKey = null;
                for (const mod of part.mods) {
                    const gKey = mod.group.vi;
                    if (gKey !== lastGroupKey) {
                        const title = document.createElement('div');
                        title.className = 'nav-group-title';
                        title.textContent = mod.group[lang] || mod.group.vi;
                        groupEl.appendChild(title);
                        lastGroupKey = gKey;
                    }
                    groupEl.appendChild(buildNavItem(mod, lang));
                }
                partBody.appendChild(groupEl);
                partEl.appendChild(partBody);
                container.appendChild(partEl);
            }
            return container;
        }

        nav.innerHTML = '';
        nav.appendChild(buildLangBlock('vi'));
        nav.appendChild(buildLangBlock('en'));
    }

    function findFirstSectionId(mod, lang) {
        const container = document.getElementById('content-' + lang);
        const marker = container.querySelector('[data-module="' + mod.id + '"]');
        if (marker) {
            const firstSection = marker.querySelector('section');
            if (firstSection) return firstSection.id;
        }
        const sections = container.querySelectorAll('section');
        for (const s of sections) {
            if (s.id.indexOf('mod-' + mod.id) === 0) return s.id;
        }
        return '';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderContent(manifest) {
        const viContainer = document.getElementById('content-vi');
        const enContainer = document.getElementById('content-en');
        viContainer.innerHTML = '';
        enContainer.innerHTML = '';

        for (const mod of manifest) {
            const modContent = EMBEDDED_CONTENT[mod.id];
            viContainer.insertAdjacentHTML('beforeend', '<div data-module="' + mod.id + '">' + modContent.vi + '</div>');
            enContainer.insertAdjacentHTML('beforeend', '<div data-module="' + mod.id + '">' + modContent.en + '</div>');
        }
    }

    function setLang(lang) {
        document.body.classList.toggle('lang-en-active', lang === 'en');
        localStorage.setItem(LANG_STORAGE_KEY, lang);

        document.getElementById('langBtnVi').classList.toggle('active', lang === 'vi');
        document.getElementById('langBtnEn').classList.toggle('active', lang === 'en');

        const searchInputEl = document.getElementById('sidebarSearch');
        searchInputEl.placeholder = lang === 'en' ? 'Search screen names...' : 'Tìm tên màn hình...';
        searchInputEl.value = '';
        document.querySelectorAll('.nav-item').forEach(function(item) { item.style.display = ''; });

        activeNavItems().forEach(function(i) { i.classList.remove('active'); });
        const first = activeNavItems()[0];
        if (first) {
            first.classList.add('active');
            const wrap = first.closest('.nav-item-wrap');
            if (wrap) wrap.classList.add('expanded');
        }
    }

    function attachEvents() {
        document.querySelectorAll('.nav-item').forEach(function(item) {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = item.getAttribute('href');
                const targetSection = document.querySelector(targetId);
                if (!targetSection) return;
                window.scrollTo({
                    top: targetSection.offsetTop - 30,
                    behavior: 'smooth'
                });
                activeNavItems().forEach(function(i) { i.classList.remove('active'); });
                item.classList.add('active');
                // Expand the clicked module so its section children are visible.
                document.querySelectorAll('.nav-item-wrap').forEach(function(w) { w.classList.remove('expanded'); });
                const wrap = item.closest('.nav-item-wrap');
                if (wrap) wrap.classList.add('expanded');
            });
        });

        window.addEventListener('scroll', function() {
            let current = '';
            activeSections().forEach(function(section) {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= (sectionTop - 150)) {
                    current = section.getAttribute('id');
                }
            });
            activeNavItems().forEach(function(item) {
                item.classList.remove('active');
                if (item.getAttribute('href') === '#' + current) {
                    item.classList.add('active');
                    const wrap = item.closest('.nav-item-wrap');
                    if (wrap) wrap.classList.add('expanded');
                }
            });
        });
    }

    function toggleFaq(header) {
        header.parentElement.classList.toggle('open');
    }

    function copyCode(btn) {
        const container = btn.parentElement.parentElement;
        const codeBlock = container.querySelector('.code-block code');
        navigator.clipboard.writeText(codeBlock.innerText);
        const originalText = btn.innerText;
        btn.innerText = getActiveLang() === 'en' ? 'Copied!' : 'Đã sao chép!';
        setTimeout(function() { btn.innerText = originalText; }, 2000);
    }

    const lightbox = document.getElementById('lightboxModal');
    const lightboxImg = document.getElementById('lightboxImg');

    function openLightbox(imgSrc) {
        lightboxImg.src = imgSrc;
        lightbox.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('show');
        document.body.style.overflow = 'auto';
    }

    document.getElementById('sidebarSearch').addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase();
        document.querySelectorAll('.nav-item-wrap').forEach(function(wrap) {
            const parentLink = wrap.querySelector(':scope > .nav-item');
            let anyChildMatch = false;
            wrap.querySelectorAll('.nav-children .nav-item').forEach(function(child) {
                const childMatch = child.innerText.toLowerCase().includes(query);
                child.style.display = childMatch ? 'flex' : 'none';
                if (childMatch) anyChildMatch = true;
            });
            const selfMatch = parentLink.innerText.toLowerCase().includes(query);
            parentLink.style.display = (selfMatch || anyChildMatch) ? 'flex' : 'none';
            wrap.dataset.hasMatch = (selfMatch || anyChildMatch) ? '1' : '';
            if (anyChildMatch && query) wrap.classList.add('expanded');
        });
        // Reveal ancestor parts that contain a match
        document.querySelectorAll('.nav-part').forEach(function(partEl) {
            if (partEl.querySelector('.nav-item-wrap[data-has-match="1"]')) {
                partEl.classList.remove('collapsed');
            }
        });
    });

    function init() {
        manifest = loadManifest();
        // Synchronize main content and sidebar order: part first, then module order.
        manifest.sort(function(a, b) {
            var pa = PART_ORDER.indexOf(getModPart(a).id);
            var pb = PART_ORDER.indexOf(getModPart(b).id);
            if (pa === -1) pa = 99;
            if (pb === -1) pb = 99;
            if (pa !== pb) return pa - pb;
            return a.order - b.order;
        });
        renderContent(manifest);
        renderSidebar(manifest);
        attachEvents();
        setLang(localStorage.getItem(LANG_STORAGE_KEY) === 'en' ? 'en' : 'vi');
    }

    init();

    </script>
