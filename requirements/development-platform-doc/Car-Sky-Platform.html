export_blueprint</code></td>\n<td><code>id</code></td>\n<td>Export blueprint as JSON.</td>\n</tr>\n<tr>\n<td><code>import_blueprint</code></td>\n<td><code>data</code>, <code>name?</code></td>\n<td>Import blueprint from JSON.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.3 Devices</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_devices</code></td>\n<td><code>tag?</code>, <code>limit?</code>, <code>cursor?</code></td>\n<td>List devices. Device IDs are commonly used as <code>roomId</code>.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.4 Artifacts</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_artifacts</code></td>\n<td><code>category?</code>, <code>limit?</code>, <code>cursor?</code></td>\n<td>List artifacts by category (DBC, VM_IMAGE, SCRIPT, etc.).</td>\n</tr>\n</tbody>\n</table>\n<h3>7.5 Deployments</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>find_deployment</code></td>\n<td><code>device?</code>, <code>blueprint?</code></td>\n<td>Find running deployment to get <code>roomId</code>.</td>\n</tr>\n<tr>\n<td><code>deploy</code></td>\n<td><code>blueprintId</code>, <code>roomId</code>, <code>name</code></td>\n<td>Deploy blueprint to device.</td>\n</tr>\n<tr>\n<td><code>deployment_status</code></td>\n<td><code>roomId</code></td>\n<td>Get deployment status.</td>\n</tr>\n<tr>\n<td><code>wait_ready</code></td>\n<td><code>roomId</code>, <code>timeoutMs?</code>, <code>pollIntervalMs?</code></td>\n<td>Wait until all nodes are running.</td>\n</tr>\n<tr>\n<td><code>undeploy</code></td>\n<td><code>roomId</code></td>\n<td>Stop deployment.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.6 VM Interaction — Control Virtual Devices</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>screenshot</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>Capture VM screen, returns base64 PNG.</td>\n</tr>\n<tr>\n<td><code>tap</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>x</code>, <code>y</code>, <code>screenWidth?</code>, <code>screenHeight?</code></td>\n<td>Tap at screen coordinates.</td>\n</tr>\n<tr>\n<td><code>swipe</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>x1</code>, <code>y1</code>, <code>x2</code>, <code>y2</code>, <code>durationMs?</code></td>\n<td>Swipe on screen.</td>\n</tr>\n<tr>\n<td><code>input_text</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>text</code></td>\n<td>Type text.</td>\n</tr>\n<tr>\n<td><code>press_key</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>keycode</code></td>\n<td>Press Android key (e.g., <code>KEYCODE_HOME</code>).</td>\n</tr>\n<tr>\n<td><code>adb_shell</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>command</code></td>\n<td>Run ADB shell command.</td>\n</tr>\n<tr>\n<td><code>ui_tree</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>Get accessibility tree as JSON.</td>\n</tr>\n<tr>\n<td><code>wait_boot</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>timeoutMs?</code></td>\n<td>Wait until Android finishes booting (<code>sys.boot_completed=1</code>).</td>\n</tr>\n<tr>\n<td><code>find_text</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>text</code>, <code>exact?</code></td>\n<td>Search text in UI tree.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.7 Signals</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_signal_nodes</code></td>\n<td><code>roomId</code></td>\n<td>Discover signal-source nodes.</td>\n</tr>\n<tr>\n<td><code>list_signals</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>pattern?</code></td>\n<td>List signals.</td>\n</tr>\n<tr>\n<td><code>get_signal_values</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>paths</code></td>\n<td>Read values of one or more signals.</td>\n</tr>\n<tr>\n<td><code>send_signals</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>signals</code></td>\n<td>Send signal values.</td>\n</tr>\n<tr>\n<td><code>start_periodic_send</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code>, <code>value</code>, <code>intervalMs?</code></td>\n<td>Start cyclic send.</td>\n</tr>\n<tr>\n<td><code>stop_periodic_send</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code></td>\n<td>Stop cyclic send.</td>\n</tr>\n<tr>\n<td><code>list_periodic_sends</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>List active cyclic sends.</td>\n</tr>\n<tr>\n<td><code>subscribe_signals</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>paths</code>, <code>maxEvents?</code>, <code>timeoutMs?</code></td>\n<td>Collect value-change events over a bounded SSE window.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.8 Tunnels — Local ADB Tunnel</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>vm_tunnel_open</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>localPort?</code></td>\n<td>Open local ADB tunnel (<code>localhost:port</code>).</td>\n</tr>\n<tr>\n<td><code>vm_tunnel_close</code></td>\n<td><code>roomId</code>, <code>nodeKey</code></td>\n<td>Close tunnel.</td>\n</tr>\n<tr>\n<td><code>vm_tunnel_list</code></td>\n<td>none</td>\n<td>List active local tunnels.</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>When to use tunnel?</strong> When you want to use local <code>adb</code>, Appium, or UIAutomator to connect directly to the virtual VM as if it were plugged into your computer via USB.</p>\n</blockquote>\n<h3>7.9 Containers — Linux Container Operations</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>container_shell</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>command</code>, <code>timeout_secs?</code></td>\n<td>Run shell command inside container.</td>\n</tr>\n<tr>\n<td><code>container_file_read</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code></td>\n<td>Read file from container.</td>\n</tr>\n<tr>\n<td><code>container_file_write</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>path</code>, <code>content</code></td>\n<td>Write file into container.</td>\n</tr>\n</tbody>\n</table>\n<h3>7.10 Logs — Pod Logs and Loki</h3>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Main Parameters</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>list_pods</code></td>\n<td><code>roomId</code></td>\n<td>List pods/containers.</td>\n</tr>\n<tr>\n<td><code>pod_logs</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>tail?</code>, <code>since?</code>, <code>container?</code></td>\n<td>Read live container logs.</td>\n</tr>\n<tr>\n<td><code>search_logs</code></td>\n<td><code>roomId</code>, <code>nodeKey</code>, <code>query?</code>, <code>since?</code>, <code>limit?</code></td>\n<td>Search historical logs via Loki.</td>\n</tr>\n</tbody>\n</table>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-8-common-workflow-examples-en\">\n<h2 class=\"section-title\">8. Common Workflow Examples</h2>\n<h3>8.1 Example 1: AI Agent Automatically Opens an App on Android VM</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>1. AI agent calls MCP tool: list_devices → choose device (roomId).\n2. AI agent calls: find_deployment(device=&quot;...&quot;) or deployment_status(roomId).\n3. If no deployment, call: deploy(blueprintId, roomId, name).\n4. Wait for VM ready: wait_boot(roomId, nodeKey=&quot;vm-1&quot;).\n5. Capture screen: screenshot(roomId, nodeKey=&quot;vm-1&quot;).\n6. AI analyzes image or ui_tree to find app icon.\n7. Tap icon: tap(roomId, nodeKey=&quot;vm-1&quot;, x=..., y=...).\n8. Wait and capture again to confirm the app opened.\n</code></div>\n</div>\n<h3>8.2 Example 2: Send CAN Signal from Automation Script</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Script</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code># 1. Authenticate and find roomId\nROOM_ID=$(curl -H &quot;X-API-Key: &lt;key&gt;&quot; \\\n  &quot;https://carsky.example.com/api/v1/devices?limit=1&quot; | jq -r '.items[0].id')\n\n# 2. Find signal node in room\nNODE_KEY=$(curl -H &quot;X-API-Key: &lt;key&gt;&quot; \\\n  &quot;https://carsky.example.com/api/v1/signals/$ROOM_ID&quot; | jq -r '.nodes[0].key')\n\n# 3. Send signal\ncurl -X POST -H &quot;X-API-Key: &lt;key&gt;&quot; -H &quot;Content-Type: application/json&quot; \\\n  &quot;https://carsky.example.com/api/v1/signals/$ROOM_ID/$NODE_KEY/actuate&quot; \\\n  -d '{&quot;signals&quot;:[{&quot;path&quot;:&quot;Vehicle.Speed&quot;,&quot;value&quot;:60}]}'\n</code></div>\n</div>\n<h3>8.3 Example 3: Open ADB Tunnel to Use Local adb</h3>\n<div class=\"code-container\">\n    <div class=\"code-header\">\n        <span>Code</span>\n        <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code>1. Call MCP tool: vm_tunnel_open(roomId, nodeKey=&quot;vm-1&quot;).\n2. Server returns localhost:port, e.g., localhost:5038.\n3. On local machine, run: adb connect localhost:5038\n4. Now you can use: adb shell, adb logcat, appium, etc.\n5. When done, call: vm_tunnel_close(roomId, nodeKey=&quot;vm-1&quot;).\n</code></div>\n</div>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-9-important-notes-en\">\n<h2 class=\"section-title\">9. Important Notes</h2>\n<ol>\n<li><strong>Permissions</strong>: Modify/delete/deploy operations usually require <code>editor</code> or <code>admin</code> role. If you get <code>403 Forbidden</code>, check your account role.</li>\n<li><strong>API Key Security</strong>: Do not share <code>&lt;your_api_key&gt;</code> keys publicly. If leaked, revoke and recreate in the Credentials tab.</li>\n<li><strong>roomId and nodeKey</strong>:</li>\n<li><code>roomId</code> is usually the ID of the selected <strong>device</strong>.</li>\n<li><code>nodeKey</code> is the node name in the blueprint (set by blueprint creator, e.g., <code>vm-1</code>, <code>can-1</code>).</li>\n<li><strong>SSE endpoints</strong> (<code>/watch</code>, <code>/subscribe</code>): Server-Sent Events, only work with clients that support streaming.</li>\n<li><strong>MCP HTTP transport</strong>: when <code>MCP_TRANSPORT=http</code>, server listens on port <code>3100</code>. Make sure the port is not blocked by firewall.</li>\n<li><strong>Auto-generated docs</strong>: Always prefer checking <code>/api/v1/openapi.json</code> and <code>/api/v1/docs</code> for the latest schema.</li>\n</ol>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-10-quick-reference-en\">\n<h2 class=\"section-title\">10. Quick Reference</h2>\n<table>\n<thead>\n<tr>\n<th>What do you want to do?</th>\n<th>API Endpoint</th>\n<th>MCP Tool</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Check system health</td>\n<td><code>GET /api/v1/healthz</code></td>\n<td><code>health_check</code></td>\n</tr>\n<tr>\n<td>List blueprints</td>\n<td><code>GET /api/v1/blueprints</code></td>\n<td><code>list_blueprints</code></td>\n</tr>\n<tr>\n<td>Deploy blueprint</td>\n<td><code>POST /api/v1/deployments</code></td>\n<td><code>deploy</code></td>\n</tr>\n<tr>\n<td>Capture VM screen</td>\n<td><code>GET /api/v1/vms/{roomId}/{nodeKey}/screenshot</code></td>\n<td><code>screenshot</code></td>\n</tr>\n<tr>\n<td>Tap screen</td>\n<td><code>POST /api/v1/vms/{roomId}/{nodeKey}/tap</code></td>\n<td><code>tap</code></td>\n</tr>\n<tr>\n<td>Type text</td>\n<td><code>POST /api/v1/vms/{roomId}/{nodeKey}/text</code></td>\n<td><code>input_text</code></td>\n</tr>\n<tr>\n<td>Get UI tree</td>\n<td><code>GET /api/v1/vms/{roomId}/{nodeKey}/accessibility</code></td>\n<td><code>ui_tree</code></td>\n</tr>\n<tr>\n<td>Run ADB shell</td>\n<td><code>POST /api/v1/vms/{roomId}/{nodeKey}/shell</code></td>\n<td><code>adb_shell</code></td>\n</tr>\n<tr>\n<td>Read signals</td>\n<td><code>POST /api/v1/signals/{roomId}/{nodeKey}/values</code></td>\n<td><code>get_signal_values</code></td>\n</tr>\n<tr>\n<td>Send signals</td>\n<td><code>POST /api/v1/signals/{roomId}/{nodeKey}/actuate</code></td>\n<td><code>send_signals</code></td>\n</tr>\n<tr>\n<td>Open local ADB tunnel</td>\n<td><code>GET /api/v1/deployments/{roomId}/adb-tunnel</code></td>\n<td><code>vm_tunnel_open</code></td>\n</tr>\n<tr>\n<td>Read logs</td>\n<td><code>GET /api/v1/deployments/{roomId}/logs/{nodeKey}</code></td>\n<td><code>pod_logs</code></td>\n</tr>\n</tbody>\n</table>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-11-references-en\">\n<h2 class=\"section-title\">11. References</h2>\n<ul>\n<li>OpenAPI spec: <code>https://&lt;carsky-domain&gt;/api/v1/openapi.json</code></li>\n<li>Swagger UI: <code>https://&lt;carsky-domain&gt;/api/v1/docs</code></li>\n<li>MCP specification: https://modelcontextprotocol.io/</li>\n</ul>\n</section>\n</div>"

  "credentials-api-key": {
    "vi": "<div class=\"module-content\" id=\"mod-credentials-api-key-container-vi\">\n<section id=\"mod-credentials-api-key-intro-vi\">\n    <h2 class=\"section-title\">Lấy CarSky API Key</h2>\n    <p class=\"paragraph\">\n        Khóa API (API key) là chìa khóa để script, AI agent hoặc MCP server xác thực với hệ thống CarSky.\n        Hướng dẫn này giúp bạn tạo và sao chép khóa API một cách an toàn.\n    </p>\n\n    <div class=\"banner banner-important\">\n        <div class=\"banner-icon\">⚠️</div>\n        <div class=\"banner-content\">\n            <strong>Bảo mật khóa API</strong>\n            Khóa API có quyền hạn tương đương tài khoản của bạn. Không chia sẻ công khai, không đẩy lên Git.\n            Nếu nghi ngờ lộ, hãy thu hồi và tạo khóa mới ngay.\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-credentials-api-key-prereq-vi\">\n    <h2 class=\"section-title\">1. Điều kiện trước</h2>\n    <ul>\n        <li>Đã có tài khoản CarSky và đăng nhập thành công.</li>\n        <li>Tài khoản có vai trò <strong>Admin</strong> hoặc được cấp quyền quản lý Credentials.</li>\n    </ul>\n</section>\n\n<section id=\"mod-credentials-api-key-steps-vi\">\n    <h2 class=\"section-title\">2. Các bước lấy khóa API</h2>\n\n    <h3>Bước 1: Mở giao diện CarSky Rework</h3>\n    <p class=\"paragraph\">\n        Sau khi đăng nhập, bạn sẽ thấy giao diện chính của CarSky với thanh Dock bên trái và các panel ở giữa.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Giao diện chính</span>\n                CarSky Rework UI sau đăng nhập\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-main-ui-dev.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-main-ui-dev.png')\">\n            <img src=\"./images/credentials-main-ui-dev.png\" alt=\"CarSky Rework UI\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Biểu tượng <strong>bánh răng</strong> ở góc trên bên phải mở hộp thoại Settings.</li>\n                <li>Biểu tượng <strong>avatar</strong> bên cạnh dùng để xem thông tin tài khoản và đăng xuất.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Bước 2: Mở Settings</h3>\n    <p class=\"paragraph\">\n        Bấm vào biểu tượng <strong>bánh răng</strong> ⚙️ ở góc trên bên phải. Hộp thoại Settings sẽ xuất hiện.\n    </p>\n\n    <h3>Bước 3: Chọn Credentials</h3>\n    <p class=\"paragraph\">\n        Trong menu bên trái của hộp thoại Settings, chọn <strong>Credentials</strong>.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Settings</span>\n                Menu Credentials trong Settings\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-settings-menu-dev.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-settings-menu-dev.png')\">\n            <img src=\"./images/credentials-settings-menu-dev.png\" alt=\"Settings Credentials Menu\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li><strong>Appearance</strong>: đổi giao diện sáng/tối.</li>\n                <li><strong>Screen Layout</strong>: cấu hình bố cục màn hình.</li>\n                <li><strong>Credentials</strong>: quản lý khóa API.</li>\n                <li><strong>System</strong>: thông tin hệ thống.</li>\n                <li><strong>Resource Limits</strong>: giới hạn tài nguyên.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Bước 4: Tạo khóa API mới</h3>\n    <p class=\"paragraph\">\n        Trong màn hình Credentials, bạn sẽ thấy danh sách các khóa đã tạo (nếu có).\n        Bấm nút <strong>New credential</strong> để tạo khóa mới.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Credentials Page</span>\n                Danh sách credential và nút New credential\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-page-dev.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-page-dev.png')\">\n            <img src=\"./images/credentials-page-dev.png\" alt=\"Credentials page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Bảng liệt kê các credential hiện có kèm <strong>tên</strong>, <strong>ID</strong>, <strong>ngày tạo</strong>.</li>\n                <li>Nút <strong>New credential</strong> ở trên cùng để tạo khóa mới.</li>\n                <li>Biểu tượng <strong>thùng rác</strong> ở cuối mỗi dòng dùng để thu hồi (revoke) khóa.</li>\n            </ul>\n        </div>\n    </div>\n\n    <p class=\"paragraph\">\n        Sau khi bấm <strong>New credential</strong>, hộp thoại tạo credential hiện ra:\n    </p>\n    <ol>\n        <li>Đặt tên cho khóa để dễ nhớ mục đích sử dụng (ví dụ: <code>AI-agent-lab</code>, <code>ci-cd-key</code>).</li>\n        <li>(Tùy chọn) Chọn ngày hết hạn nếu bạn muốn khóa tự động vô hiệu.</li>\n        <li>Bấm <strong>Create</strong>.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">New Credential</span>\n                Hộp thoại tạo credential mới\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-new-click-dev.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-new-click-dev.png')\">\n            <img src=\"./images/credentials-new-click-dev.png\" alt=\"New credential dialog\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Nhập <strong>tên</strong> gợi nhớ cho credential.</li>\n                <li>(Tùy chọn) Chọn <strong>ngày hết hạn</strong>.</li>\n                <li>Bấm <strong>Create</strong> để xác nhận tạo khóa.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Bước 5: Sao chép khóa API</h3>\n    <p class=\"paragraph\">\n        Hệ thống hiển thị chuỗi khóa API <strong>một lần duy nhất</strong> trong banner xanh.\n        Sao chép ngay vì sau khi đóng bạn <strong>không thể xem lại</strong>.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">API Key Hiển Thị</span>\n                Khóa API hiện ra sau khi tạo (đã che)\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-key-reveal-dev.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-key-reveal-dev.png')\">\n            <img src=\"./images/credentials-key-reveal-dev.png\" alt=\"API key reveal (redacted)\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Banner xanh lá hiển thị khóa API <strong>một lần duy nhất</strong>.</li>\n                <li>Bấm <strong>Copy key</strong> để sao chép ngay vào clipboard.</li>\n                <li>Sau khi đóng, bạn <strong>không thể xem lại</strong> khóa này.</li>\n            </ul>\n        </div>\n    </div>\n\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>Ví dụ khóa API</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>&lt;your_api_key&gt;</code></div>\n    </div>\n    <p class=\"paragraph\">\n        <strong>Sao chép ngay</strong> và lưu vào nơi an toàn (password manager, biến môi trường, file <code>.env</code> không commit).\n    </p>\n\n    <div class=\"banner banner-warning\">\n        <div class=\"banner-icon\">🔒</div>\n        <div class=\"banner-content\">\n            <strong>Nếu bạn quên hoặc làm mất khóa</strong>, không thể khôi phục. Bạn phải thu hồi khóa cũ và tạo khóa mới.\n        </div>\n    </div>\n\n    <h3>Bước 6: Sử dụng khóa API</h3>\n    <p class=\"paragraph\">\n        Thêm khóa vào header của mọi request REST API:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>curl</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>curl -H \"X-API-Key: <khóa_api_của_bạn>\" \\\n     https://carsky.io/api/v1/healthz</code></div>\n    </div>\n    <p class=\"paragraph\">\n        Hoặc dùng với MCP server bằng biến môi trường:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>MCP config</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>{\n  \"A8_URL\": \"https://carsky.io\",\n  \"A8_API_KEY\": \"<khóa_api_của_bạn>\"\n}</code></div>\n    </div>\n</section>\n\n<section id=\"mod-credentials-api-key-revoke-vi\">\n    <h2 class=\"section-title\">3. Thu hồi khóa API</h2>\n    <p class=\"paragraph\">\n        Nếu khóa không còn dùng hoặc bị nghi ngờ lộ:\n    </p>\n    <ol>\n        <li>Mở lại <strong>Settings → Credentials</strong>.</li>\n        <li>Tìm khóa trong danh sách.</li>\n        <li>Bấm biểu tượng <strong>thùng rác</strong> hoặc nút <strong>Revoke/Delete</strong>.</li>\n        <li>Xác nhận thu hồi. Khóa sẽ vô hiệu ngay lập tức.</li>\n    </ol>\n</section>\n\n<section id=\"mod-credentials-api-key-troubleshoot-vi\">\n    <h2 class=\"section-title\">4. Sửa lỗi thường gặp</h2>\n    <table>\n        <thead>\n            <tr><th>Lỗi</th><th>Cách xử lý</th></tr>\n        </thead>\n        <tbody>\n            <tr>\n                <td>Không thấy menu <strong>Credentials</strong></td>\n                <td>Tài khoản của bạn chưa được cấp quyền. Liên hệ admin để được gán vai trò <strong>Admin</strong> hoặc <strong>Editor</strong>.</td>\n            </tr>\n            <tr>\n                <td>Màn hình Credentials báo lỗi 502/loading</td>\n                <td>Dịch vụ credentials backend tạm thời không khả dụng. Thử refresh trang hoặc liên hệ admin.</td>\n            </tr>\n            <tr>\n                <td>API request trả về <code>401 Unauthorized</code></td>\n                <td>Khóa API sai hoặc đã bị thu hồi. Kiểm tra lại header <code>X-API-Key</code> hoặc tạo khóa mới.</td>\n            </tr>\n        </tbody>\n    </table>\n</section>\n</div>",
    "en": "<div class=\"module-content\" id=\"mod-credentials-api-key-container-en\">\n<section id=\"mod-credentials-api-key-intro-en\">\n    <h2 class=\"section-title\">Get CarSky API Key</h2>\n    <p class=\"paragraph\">\n        An API key is the credential used by scripts, AI agents, or MCP servers to authenticate with CarSky.\n        This guide walks you through creating and copying an API key safely.\n    </p>\n\n    <div class=\"banner banner-important\">\n        <div class=\"banner-icon\">⚠️</div>\n        <div class=\"banner-content\">\n            <strong>Keep your API key secure</strong>\n            An API key has the same permissions as your account. Do not share it publicly or commit it to Git.\n            If you suspect it has been leaked, revoke it and create a new one immediately.\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-credentials-api-key-prereq-en\">\n    <h2 class=\"section-title\">1. Prerequisites</h2>\n    <ul>\n        <li>You have a CarSky account and are logged in.</li>\n        <li>Your account has the <strong>Admin</strong> role or permission to manage Credentials.</li>\n    </ul>\n</section>\n\n<section id=\"mod-credentials-api-key-steps-en\">\n    <h2 class=\"section-title\">2. Steps to Get an API Key</h2>\n\n    <h3>Step 1: Open the CarSky Rework UI</h3>\n    <p class=\"paragraph\">\n        After logging in, you will see the main CarSky interface with the Dock on the left and panels in the center.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Main UI</span>\n                CarSky Rework UI after login\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-main-ui-dev.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-main-ui-dev.png')\">\n            <img src=\"./images/credentials-main-ui-dev.png\" alt=\"CarSky Rework UI\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>The <strong>gear</strong> icon in the top-right opens the Settings dialog.</li>\n                <li>The <strong>avatar</strong> icon next to it shows account info and Sign Out.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Step 2: Open Settings</h3>\n    <p class=\"paragraph\">\n        Click the <strong>gear</strong> ⚙️ icon in the top-right corner. The Settings dialog will appear.\n    </p>\n\n    <h3>Step 3: Select Credentials</h3>\n    <p class=\"paragraph\">\n        In the left menu of the Settings dialog, select <strong>Credentials</strong>.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Settings</span>\n                Credentials menu in Settings\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-settings-menu-dev.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-settings-menu-dev.png')\">\n            <img src=\"./images/credentials-settings-menu-dev.png\" alt=\"Settings Credentials Menu\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li><strong>Appearance</strong>: switch light/dark theme.</li>\n                <li><strong>Screen Layout</strong>: configure screen layout.</li>\n                <li><strong>Credentials</strong>: manage API keys.</li>\n                <li><strong>System</strong>: system information.</li>\n                <li><strong>Resource Limits</strong>: resource quotas.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Step 4: Create a New API Key</h3>\n    <p class=\"paragraph\">\n        On the Credentials screen, you will see the list of existing keys (if any).\n        Click the <strong>New credential</strong> button to create a new key.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Credentials Page</span>\n                Credential list and New credential button\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-page-dev.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-page-dev.png')\">\n            <img src=\"./images/credentials-page-dev.png\" alt=\"Credentials page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>The table lists existing credentials with their <strong>name</strong>, <strong>ID</strong>, and <strong>creation date</strong>.</li>\n                <li>The <strong>New credential</strong> button at the top creates a new key.</li>\n                <li>The <strong>trash</strong> icon at the end of each row revokes a key.</li>\n            </ul>\n        </div>\n    </div>\n\n    <p class=\"paragraph\">\n        After clicking <strong>New credential</strong>, the creation dialog appears:\n    </p>\n    <ol>\n        <li>Give the key a name so you remember its purpose (e.g., <code>AI-agent-lab</code>, <code>ci-cd-key</code>).</li>\n        <li>(Optional) Choose an expiration date if you want the key to auto-expire.</li>\n        <li>Click <strong>Create</strong>.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">New Credential</span>\n                New credential creation dialog\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-new-click-dev.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-new-click-dev.png')\">\n            <img src=\"./images/credentials-new-click-dev.png\" alt=\"New credential dialog\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>Enter a memorable <strong>name</strong> for the credential.</li>\n                <li>(Optional) Choose an <strong>expiration date</strong>.</li>\n                <li>Click <strong>Create</strong> to confirm and generate the key.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Step 5: Copy the API Key</h3>\n    <p class=\"paragraph\">\n        The system displays the API key string <strong>only once</strong> in a green banner.\n        Copy it immediately because after closing you <strong>cannot view it again</strong>.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">API Key Revealed</span>\n                API key shown after creation (redacted)\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/credentials-key-reveal-dev.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/credentials-key-reveal-dev.png')\">\n            <img src=\"./images/credentials-key-reveal-dev.png\" alt=\"API key reveal (redacted)\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>The green banner shows the API key <strong>only once</strong>.</li>\n                <li>Click <strong>Copy key</strong> to copy it to your clipboard immediately.</li>\n                <li>After closing, you <strong>cannot view the key again</strong>.</li>\n            </ul>\n        </div>\n    </div>\n\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>Example API key</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>&lt;your_api_key&gt;</code></div>\n    </div>\n    <p class=\"paragraph\">\n        <strong>Copy it immediately</strong> and store it securely (password manager, environment variable, or <code>.env</code> file that is not committed).\n    </p>\n\n    <div class=\"banner banner-warning\">\n        <div class=\"banner-icon\">🔒</div>\n        <div class=\"banner-content\">\n            <strong>If you forget or lose the key</strong>, it cannot be recovered. You must revoke the old key and create a new one.\n        </div>\n    </div>\n\n    <h3>Step 6: Use the API Key</h3>\n    <p class=\"paragraph\">\n        Add the key to the header of every REST API request:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>curl</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>curl -H \"X-API-Key: <your_api_key>\" \\\n     https://carsky.io/api/v1/healthz</code></div>\n    </div>\n    <p class=\"paragraph\">\n        Or use it with the MCP server via environment variables:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>MCP config</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>{\n  \"A8_URL\": \"https://carsky.io\",\n  \"A8_API_KEY\": \"<your_api_key>\"\n}</code></div>\n    </div>\n</section>\n\n<section id=\"mod-credentials-api-key-revoke-en\">\n    <h2 class=\"section-title\">3. Revoke an API Key</h2>\n    <p class=\"paragraph\">\n        If a key is no longer needed or suspected to be leaked:\n    </p>\n    <ol>\n        <li>Open <strong>Settings → Credentials</strong> again.</li>\n        <li>Find the key in the list.</li>\n        <li>Click the <strong>trash</strong> icon or <strong>Revoke/Delete</strong> button.</li>\n        <li>Confirm revocation. The key becomes invalid immediately.</li>\n    </ol>\n</section>\n\n<section id=\"mod-credentials-api-key-troubleshoot-en\">\n    <h2 class=\"section-title\">4. Troubleshooting</h2>\n    <table>\n        <thead>\n            <tr><th>Issue</th><th>Solution</th></tr>\n        </thead>\n        <tbody>\n            <tr>\n                <td>Cannot see the <strong>Credentials</strong> menu</td>\n                <td>Your account does not have permission. Ask an admin to assign you the <strong>Admin</strong> or <strong>Editor</strong> role.</td>\n            </tr>\n            <tr>\n                <td>Credentials screen shows 502/loading error</td>\n                <td>The credentials backend service is temporarily unavailable. Try refreshing the page or contact an admin.</td>\n            </tr>\n            <tr>\n                <td>API request returns <code>401 Unauthorized</code></td>\n                <td>The API key is wrong or has been revoked. Check the <code>X-API-Key</code> header or create a new key.</td>\n            </tr>\n        </tbody>\n    </table>\n</section>\n</div>"
  },
  "registry-zot": {
    "vi": "<div class=\"module-content\" id=\"mod-registry-zot-container-vi\">\n<section id=\"mod-registry-zot-intro-vi\">\n    <h2 class=\"section-title\">Đăng Nhập Registry Zot & Lấy API Key</h2>\n    <p class=\"paragraph\">\n        CarSky cung cấp một Container Registry chạy <strong>Zot</strong>. Để đẩy (push) hoặc kéo (pull) image Docker từ máy dev/CI,\n        bạn cần đăng nhập registry và có API key. Hướng dẫn này hướng dẫn cả hai cách: qua giao diện web Zot và qua dòng lệnh.\n    </p>\n</section>\n\n<section id=\"mod-registry-zot-access-vi\">\n    <h2 class=\"section-title\">1. Truy cập Registry</h2>\n\n    <h3>Cách 1: Từ giao diện CarSky</h3>\n    <p class=\"paragraph\">\n        Trên thanh Dock chính, bấm <strong>Registry</strong>. Màn hình bên phải sẽ nhúng giao diện Zot qua iframe.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">CarSky UI</span>\n                Mở Registry từ Dock\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/registry-main.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/registry-main.png')\">\n            <img src=\"./images/registry-main.png\" alt=\"Registry tab in CarSky\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Nút <strong>Registry</strong> trên thanh Dock mở panel Container Registry.</li>\n                <li>Nếu panel báo lỗi xác thực, hãy đăng nhập trực tiếp tại URL registry (cách 2).</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Cách 2: Truy cập trực tiếp URL</h3>\n    <p class=\"paragraph\">\n        Mở trình duyệt và truy cập:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>URL registry</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>https://registry.carsky.io/</code></div>\n    </div>\n    <p class=\"paragraph\">\n        \n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Zot Login</span>\n                Trang đăng nhập Zot\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-login-page.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-login-page.png')\">\n            <img src=\"./images/zot-login-page.png\" alt=\"Zot login page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Trang đăng nhập Zot hiển thị nút <strong>Sign in with A8 Keycloak</strong>.</li>\n                <li>Nếu đã đăng nhập CarSky trước đó trong cùng trình duyệt, bạn có thể được tự động chuyển vào home.</li>\n            </ul>\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-registry-zot-login-vi\">\n    <h2 class=\"section-title\">2. Đăng Nhập Bằng Keycloak</h2>\n    <ol>\n        <li>Trên trang login Zot, bấm <strong>Sign in with A8 Keycloak</strong>.</li>\n        <li>Nếu chưa đăng nhập CarSky, nhập username và password của tài khoản CarSky.</li>\n        <li>Sau khi xác thực, Zot sẽ chuyển đến trang chủ hiển thị danh sách image.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Zot Home</span>\n                Trang chủ Zot sau đăng nhập\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-home.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-home.png')\">\n            <img src=\"./images/zot-home.png\" alt=\"Zot home page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li><strong>Most popular images</strong>: các image được tải nhiều nhất.</li>\n                <li><strong>Recently updated images</strong>: image cập nhật gần đây.</li>\n                <li>Biểu tượng người dùng góc trên bên phải mở menu để vào <strong>API Keys</strong>.</li>\n            </ul>\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-registry-zot-apikey-vi\">\n    <h2 class=\"section-title\">3. Tạo API Key Cho Registry</h2>\n    <p class=\"paragraph\">\n        API key của Zot dùng để <code>docker login</code> và push/pull image từ máy dev/CI.\n    </p>\n    <ol>\n        <li>Ở góc trên bên phải Zot, bấm vào <strong>biểu tượng người dùng</strong>.</li>\n        <li>Chọn <strong>API Keys</strong> trong menu dropdown.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">API Keys</span>\n                Quản lý API Keys trong Zot\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-api-keys.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-api-keys.png')\">\n            <img src=\"./images/zot-api-keys.png\" alt=\"Zot API Keys page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Trang <strong>Manage your API Keys</strong> liệt kê các key hiện có và ngày hết hạn.</li>\n                <li>Bấm <strong>Create new API key</strong> để tạo key mới.</li>\n                <li>Bấm <strong>Revoke</strong> để thu hồi key không còn dùng.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Tạo key mới</h3>\n    <ol>\n        <li>Bấm <strong>Create new API key</strong>.</li>\n        <li>Hộp thoại hiển thị thông tin key sắp tạo (tên, ngày hết hạn). Kiểm tra và bấm <strong>Create</strong>.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Create Key</span>\n                Hộp thoại tạo API key mới\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-create-api-key.png')\">🔍 Phóng to</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-create-api-key.png')\">\n            <img src=\"./images/zot-create-api-key.png\" alt=\"Zot create API key dialog\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Diễn Giải</div>\n            <ul class=\"details-list\">\n                <li>Hộp thoại hiển thị tên key và ngày hết hạn mặc định.</li>\n                <li>Bấm <strong>Create</strong> để xác nhận.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Sao chép key</h3>\n    <p class=\"paragraph\">\n        Sau khi tạo, Zot hiển thị chuỗi key <strong>một lần duy nhất</strong>, có dạng:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>Ví dụ Zot API key</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>zak_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</code></div>\n    </div>\n    <p class=\"paragraph\">\n        <strong>Sao chép ngay</strong> và lưu vào nơi an toàn. Sau khi đóng hộp thoại, bạn không thể xem lại key.\n    </p>\n</section>\n\n<section id=\"mod-registry-zot-docker-login-vi\">\n    <h2 class=\"section-title\">4. Dùng API Key Với Docker CLI</h2>\n    <p class=\"paragraph\">\n        Key vừa tạo chính là mật khẩu cho <code>docker login</code>. Username là địa chỉ email hoặc username CarSky.\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>docker login</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>docker login registry.carsky.io -u &lt;your-username&gt;\n# Nhập API key làm password khi được hỏi</code></div>\n    </div>\n    <p class=\"paragraph\">\n        Sau khi đăng nhập thành công, bạn có thể push/pull image:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>docker push / pull</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code># Tag image local theo registry đích\ndocker tag my-app:latest registry.carsky.io/my-app:latest\n\n# Push\ndocker push registry.carsky.io/my-app:latest\n\n# Pull\ndocker pull registry.carsky.io/my-app:latest</code></div>\n    </div>\n</section>\n\n<section id=\"mod-registry-zot-troubleshoot-vi\">\n    <h2 class=\"section-title\">5. Sửa Lỗi Thường Gặp</h2>\n    <table>\n        <thead>\n            <tr><th>Lỗi</th><th>Cách xử lý</th></tr>\n        </thead>\n        <tbody>\n            <tr>\n                <td><code>401 Unauthorized</code> khi docker login</td>\n                <td>API key sai hoặc đã hết hạn. Tạo key mới trong Zot và thử lại.</td>\n            </tr>\n            <tr>\n                <td>Registry trong CarSky UI báo lỗi xác thực</td>\n                <td>Đăng nhập trực tiếp tại <code>https://registry.carsky.io/</code> trước, sau đó refresh lại tab Registry trong CarSky.</td>\n            </tr>\n            <tr>\n                <td>Không thấy menu <strong>API Keys</strong></td>\n                <td>Tài khoản chưa được cấp quyền truy cập registry. Liên hệ admin.</td>\n            </tr>\n            <tr>\n                <td>Push thành công nhưng image không hiện trong Zot UI</td>\n                <td>Kiểm tra đúng URL registry <code>https://registry.carsky.io/</code>. Bấm refresh trang Zot hoặc tìm lại tên repository.</td>\n            </tr>\n        </tbody>\n    </table>\n</section>\n</div>\n",
    "en": "<div class=\"module-content\" id=\"mod-registry-zot-container-en\">\n<section id=\"mod-registry-zot-intro-en\">\n    <h2 class=\"section-title\">Log In to Zot Registry & Get API Key</h2>\n    <p class=\"paragraph\">\n        CarSky provides a Container Registry running <strong>Zot</strong>. To push or pull Docker images from your dev machine or CI,\n        you need to log in to the registry and have an API key. This guide covers both the Zot web UI and the command line.\n    </p>\n</section>\n\n<section id=\"mod-registry-zot-access-en\">\n    <h2 class=\"section-title\">1. Access the Registry</h2>\n\n    <h3>Option A: From the CarSky UI</h3>\n    <p class=\"paragraph\">\n        On the main Dock, click <strong>Registry</strong>. The right panel will embed the Zot UI via iframe.\n    </p>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">CarSky UI</span>\n                Open Registry from the Dock\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/registry-main.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/registry-main.png')\">\n            <img src=\"./images/registry-main.png\" alt=\"Registry tab in CarSky\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>The <strong>Registry</strong> button on the Dock opens the Container Registry panel.</li>\n                <li>If the panel shows an authentication error, log in directly at the registry URL (Option B).</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Option B: Direct URL</h3>\n    <p class=\"paragraph\">\n        Open a browser and go to:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>Registry URL</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>https://registry.carsky.io/</code></div>\n    </div>\n    <p class=\"paragraph\">\n        \n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Zot Login</span>\n                Zot login page\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-login-page.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-login-page.png')\">\n            <img src=\"./images/zot-login-page.png\" alt=\"Zot login page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>The Zot login page shows a <strong>Sign in with A8 Keycloak</strong> button.</li>\n                <li>If you are already logged in to CarSky in the same browser, you may be redirected to the home page automatically.</li>\n            </ul>\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-registry-zot-login-en\">\n    <h2 class=\"section-title\">2. Log In with Keycloak</h2>\n    <ol>\n        <li>On the Zot login page, click <strong>Sign in with A8 Keycloak</strong>.</li>\n        <li>If you are not already logged in to CarSky, enter your CarSky username and password.</li>\n        <li>After authentication, Zot redirects you to the home page showing the image list.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Zot Home</span>\n                Zot home page after login\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-home.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-home.png')\">\n            <img src=\"./images/zot-home.png\" alt=\"Zot home page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li><strong>Most popular images</strong>: most downloaded images.</li>\n                <li><strong>Recently updated images</strong>: recently updated images.</li>\n                <li>The <strong>user icon</strong> in the top-right opens the menu to access <strong>API Keys</strong>.</li>\n            </ul>\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-registry-zot-apikey-en\">\n    <h2 class=\"section-title\">3. Create a Registry API Key</h2>\n    <p class=\"paragraph\">\n        The Zot API key is used for <code>docker login</code> and for pushing/pulling images from your dev machine or CI.\n    </p>\n    <ol>\n        <li>In the top-right corner of Zot, click the <strong>user icon</strong>.</li>\n        <li>Select <strong>API Keys</strong> from the dropdown menu.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">API Keys</span>\n                Manage API Keys in Zot\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-api-keys.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-api-keys.png')\">\n            <img src=\"./images/zot-api-keys.png\" alt=\"Zot API Keys page\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>The <strong>Manage your API Keys</strong> page lists existing keys and expiration dates.</li>\n                <li>Click <strong>Create new API key</strong> to create a new key.</li>\n                <li>Click <strong>Revoke</strong> to revoke an unused key.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Create a new key</h3>\n    <ol>\n        <li>Click <strong>Create new API key</strong>.</li>\n        <li>A dialog shows the key name and expiration date. Review and click <strong>Create</strong>.</li>\n    </ol>\n\n    <div class=\"screenshot-container\">\n        <div class=\"screenshot-header\">\n            <div class=\"screenshot-title\">\n                <span class=\"indicator-badge badge-data\">Create Key</span>\n                Create new API key dialog\n            </div>\n            <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/zot-create-api-key.png')\">🔍 Zoom in</button>\n        </div>\n        <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/zot-create-api-key.png')\">\n            <img src=\"./images/zot-create-api-key.png\" alt=\"Zot create API key dialog\" class=\"screenshot-img\">\n            <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n        </div>\n        <div class=\"screenshot-details\">\n            <div class=\"details-title\">🧭 Element Breakdown</div>\n            <ul class=\"details-list\">\n                <li>The dialog shows the key name and default expiration date.</li>\n                <li>Click <strong>Create</strong> to confirm.</li>\n            </ul>\n        </div>\n    </div>\n\n    <h3>Copy the key</h3>\n    <p class=\"paragraph\">\n        After creation, Zot displays the key string <strong>only once</strong>, in the form:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>Example Zot API key</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>zak_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</code></div>\n    </div>\n    <p class=\"paragraph\">\n        <strong>Copy it immediately</strong> and store it securely. After closing the dialog, you cannot view the key again.\n    </p>\n</section>\n\n<section id=\"mod-registry-zot-docker-login-en\">\n    <h2 class=\"section-title\">4. Use the API Key with Docker CLI</h2>\n    <p class=\"paragraph\">\n        The newly created key is the password for <code>docker login</code>. The username is your CarSky email or username.\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>docker login</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>docker login registry.carsky.io -u &lt;your-username&gt;\n# Enter the API key as the password when prompted</code></div>\n    </div>\n    <p class=\"paragraph\">\n        After successful login, you can push/pull images:\n    </p>\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>docker push / pull</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code># Tag local image for the target registry\ndocker tag my-app:latest registry.carsky.io/my-app:latest\n\n# Push\ndocker push registry.carsky.io/my-app:latest\n\n# Pull\ndocker pull registry.carsky.io/my-app:latest</code></div>\n    </div>\n</section>\n\n<section id=\"mod-registry-zot-troubleshoot-en\">\n    <h2 class=\"section-title\">5. Troubleshooting</h2>\n    <table>\n        <thead>\n            <tr><th>Issue</th><th>Solution</th></tr>\n        </thead>\n        <tbody>\n            <tr>\n                <td><code>401 Unauthorized</code> during docker login</td>\n                <td>The API key is wrong or expired. Create a new key in Zot and try again.</td>\n            </tr>\n            <tr>\n                <td>Registry panel in CarSky UI shows authentication error</td>\n                <td>Log in directly at <code>https://registry.carsky.io/</code> first, then refresh the Registry tab in CarSky.</td>\n            </tr>\n            <tr>\n                <td>Cannot see the <strong>API Keys</strong> menu</td>\n                <td>Your account does not have registry access. Contact an admin.</td>\n            </tr>\n            <tr>\n                <td>Push succeeds but image does not appear in Zot UI</td>\n                <td>Check that you are using the correct registry URL <code>https://registry.carsky.io/</code>. Refresh the Zot page or search for the repository name again.</td>\n            </tr>\n        </tbody>\n    </table>\n</section>\n</div>\n"
  },
  "faq": {
    "vi": "<section id=\"mod-faq-faq\">\n            <h2 class=\"section-title\">Phụ Lục — Cẩm Nang Sửa Lỗi Thường Gặp</h2>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>Panel <strong>Hubs</strong> báo lỗi \"upstream connect error... remote connection failure\"</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    Nguyên nhân: dịch vụ <code>nydus-blueprint</code> chưa được triển khai trên Kubernetes —\n                    thường gặp khi hạ tầng mới khởi tạo hoặc server mới chưa chạy đủ bước cài đặt. Cần liên hệ\n                    quản trị hệ thống để kiểm tra và triển khai lại phần k3s/CRD/operator/blueprint.\n                    Sau khi khắc phục, panel Hubs sẽ tự kết nối lại (chỉ báo \"Reconnecting\" sẽ biến mất) mà không cần tải\n                    lại trang.\n                </div>\n            </div>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>Widget <strong>Screen</strong> hiện màn hình đen, không có hình</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    Kiểm tra lại trường <strong>Video Part</strong> trong Inspector của widget — phải trỏ đúng tới \"part\"\n                    video mà node blueprint tương ứng đang publish (thường có tiền tố trùng với <em>Part Prefix</em> đã\n                    cấu hình ở node). Nếu part đã đúng nhưng vẫn đen màn hình, thử Disconnect rồi Connect lại device để\n                    khởi tạo lại phiên WebRTC.\n                </div>\n            </div>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>Không thấy phiên bản Artifact nào để chọn trong cấu hình Node</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    Dropdown Version ở Inspector của node chỉ hiện các phiên bản artifact đã <strong>upload thành\n                    công</strong> (mục Artifacts → Add Version). Vào lại panel Artifacts, chọn đúng artifact/category\n                    và kiểm tra mục Versions đã có ít nhất 1 bản ghi (đặc biệt bản gắn nhãn <code>latest</code>) trước\n                    khi quay lại chọn trong Node Inspector.\n                </div>\n            </div>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>Deployment báo Running nhưng số node \"ready\" không đủ (vd 20/22)</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    Một vài node vẫn đang khởi động hoặc gặp lỗi pull image/crash-loop. Mở panel <strong>Dashboard</strong>\n                    (mục 7), tìm node có icon cảnh báo ⚠️ với số lần restart cao bất thường, đối chiếu tên node với sơ đồ\n                    Canvas ở Nydus để xác định node đó thuộc zone nào rồi báo cho đội vận hành kiểm tra log chi tiết.\n                </div>\n            </div>\n        </section>",
    "en": "<section id=\"mod-faq-faq-en\">\n            <h2 class=\"section-title\">Appendix — Troubleshooting FAQ</h2>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>The <strong>Hubs</strong> panel shows \"upstream connect error... remote connection failure\"</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    Cause: the <code>nydus-blueprint</code> service hasn't been deployed on Kubernetes —\n                    common right after the infrastructure is initialized, or on a new server whose infrastructure setup isn't\n                    complete. Contact a system administrator to check and (re)deploy the k3s/CRD/operator/blueprint\n                    step. Once fixed, the Hubs panel reconnects automatically (the \"Reconnecting\"\n                    indicator disappears) with no page reload needed.\n                </div>\n            </div>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>The <strong>Screen</strong> widget shows a black screen with no picture</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    Check the <strong>Video Part</strong> field in the widget's Inspector — it must point to the\n                    exact video \"part\" the corresponding blueprint node is publishing (usually sharing the same\n                    prefix as the node's configured <em>Part Prefix</em>). If the part is correct but the screen is\n                    still black, try Disconnect then Connect the device again to re-establish the WebRTC session.\n                </div>\n            </div>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>No Artifact version available to pick in a Node's configuration</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    The Version dropdown in a node's Inspector only lists artifact versions that have been\n                    <strong>uploaded successfully</strong> (Artifacts → Add Version). Go back to the Artifacts panel,\n                    pick the right artifact/category, and confirm the Versions section has at least one entry\n                    (especially one tagged <code>latest</code>) before selecting it again in the Node Inspector.\n                </div>\n            </div>\n\n            <div class=\"faq-item\">\n                <div class=\"faq-header\" onclick=\"toggleFaq(this)\">\n                    <span>A Deployment shows Running but the \"ready\" node count is short (e.g. 20/22)</span>\n                    <span class=\"faq-icon\">▶</span>\n                </div>\n                <div class=\"faq-body\">\n                    Some nodes are still starting up or hit an image-pull error/crash loop. Open the\n                    <strong>Dashboard</strong> panel (section 7), find the node with an unusually high restart-count\n                    warning icon ⚠️, cross-reference its name with the Canvas diagram in Nydus to identify which zone\n                    it belongs to, then have the ops team check its detailed logs.\n                </div>\n            </div>\n        </section>"
  },
  "live-walkthrough": {
    "vi": "<section id=\"mod-live-walkthrough-steps\">\n  <h2 class=\"section-title\">Thực Hành Trực Tiếp Trên carsky.io</h2>\n\n  <p class=\"paragraph\">\n    Toàn bộ ảnh chụp bên dưới được lấy <strong>trực tiếp từ carsky.io</strong>. Mục này đi theo đúng thứ tự\n    7 mục chính trên thanh điều hướng trái của ứng dụng: <strong>Devices → Videos → Artifacts → Nydus → Hubs → Registry → Dashboard</strong>.\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">💡</div>\n    <div class=\"banner-content\">\n      <strong>Mẹo khi đọc ảnh</strong>\n      Mỗi ảnh có thể bấm vào để phóng to (lightbox). Phần <em>Diễn giải</em> dưới ảnh chỉ ra các thành phần chính cần chú ý.\n    </div>\n  </div>\n\n  <!-- Step 0: Login -->\n  <h3 class=\"section-subtitle\">Bước 0 — Đăng Nhập Qua Keycloak SSO</h3>\n  <p class=\"paragraph\">\n    Truy cập <code>https://carsky.io</code> sẽ tự động redirect về trang đăng nhập Keycloak của CarSky.\n    Nhập username và password đã cấp, sau đó bấm <strong>Sign In</strong>.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 0</span>\n        Trang đăng nhập Keycloak\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-00-login.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-00-login.png')\">\n      <img src=\"./images/live-step-00-login.png\" alt=\"Trang đăng nhập Keycloak SSO\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Sign in to CarSky:</strong> form xác thực SSO qua Keycloak.</li>\n        <li><strong>Username / Password:</strong> thông tin do admin cấp.</li>\n        <li>Sau khi đăng nhập thành công, hệ thống redirect về Rework workbench.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 1: Workbench -->\n  <h3 class=\"section-subtitle\">Bước 1 — Giao Diện Workbench 3 Cột</h3>\n  <p class=\"paragraph\">\n    Sau khi đăng nhập, giao diện chính hiện ra với cấu trúc 3 cột: <strong>DockBar/Panel trái</strong>,\n    <strong>Stage giữa</strong> và <strong>Inspector phải</strong>. Avatar chữ \"T\" ở góc dưới trái cho biết user đang đăng nhập.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 1</span>\n        Workbench mặc định sau đăng nhập\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-01-workbench.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-01-workbench.png')\">\n      <img src=\"./images/live-step-01-workbench.png\" alt=\"Workbench 3 cột sau đăng nhập\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>DockBar trái:</strong> 7 nút chuyển mục — Devices, Videos, Artifacts, Nydus, Hubs, Registry, Dashboard.</li>\n        <li><strong>Panel trái:</strong> hiển thị danh sách tương ứng với mục đang chọn.</li>\n        <li><strong>Stage giữa:</strong> nội dung chính (canvas, video stream, v.v.).</li>\n        <li><strong>Inspector phải:</strong> thuộc tính chi tiết của đối tượng đang chọn.</li>\n        <li>Avatar ở góc dưới trái xác nhận đã đăng nhập.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 2: Devices -->\n  <h3 class=\"section-subtitle\">Bước 2 — Devices: Danh Sách Thiết Bị</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Devices</strong> trên DockBar để mở panel quản lý thiết bị. Mỗi device là một runtime endpoint\n    mà ngườidùng có thể kết nối và mở widget để xem/điều khiển.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 2</span>\n        Panel Devices với 2 device\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-02-devices.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-02-devices.png')\">\n      <img src=\"./images/live-step-02-devices.png\" alt=\"Danh sách device trong panel Devices\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Demo:</strong> device mẫu có serial <code>dp38391gqduqqfjqyjadn</code>.</li>\n        <li><strong>AI_Device01:</strong> device gắn với deployment <em>Started pack-deploy</em>, serial <code>l4-ar9uaebz1ko1901t18</code>.</li>\n        <li><strong>Nút Connect:</strong> mở phiên điều khiển tới device.</li>\n        <li><strong>Nút + (Add device):</strong> tạo device mới nếu có quyền.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 3: Widgets -->\n  <h3 class=\"section-subtitle\">Bước 3 — Connect Device &amp; Mở Widgets</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Connect</strong> trên <code>AI_Device01</code>. Sau vài giây, hệ thống kết nối thành công và tự động mở các widget.\n    Widget <strong>AAOS screen</strong> bắt đầu stream màn hình Android Automotive trực tiếp.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 3</span>\n        Device đã kết nối — widgets hiển thị màn hình AAOS\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-03-widgets.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-03-widgets.png')\">\n      <img src=\"./images/live-step-03-widgets.png\" alt=\"AAOS screen và các widget sau khi connect\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>Status bar:</strong> <code>AI_Device01</code> — <span class=\"table-badge badge-emerald\">Connected</span>.</li>\n        <li><strong>Widgets list:</strong> AAOS screen, AAOS ADB, BCM CAN signal, Dashboard, New CAN Panel, New USB Device Proxy, New GPIO Panel.</li>\n        <li><strong>AAOS screen (Stage):</strong> stream Android Automotive với PRND, tốc độ 0 km/h, nhiệt độ 30°C, pin 85%, range 382 km.</li>\n        <li><strong>Inspector (BCM CAN):</strong> đang theo dõi 3 tín hiệu: <code>HvacCommand/Driver_Temperature</code>, <code>Passenger_Temperature</code>, <code>PWT_VehicleSpeed/Speed_kph</code>.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 4: Videos -->\n  <h3 class=\"section-subtitle\">Bước 4 — Videos: Thư Viện Ghi Hình</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Videos</strong> trên DockBar. Đây là kho lưu trữ các đoạn video được ghi lại từ Recorder Part của widget Screen.\n    Hiện tại hệ thống chưa có bản ghi nào.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Bước 4</span>\n        Video Library đang trống\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-04-videos.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/live-step-04-videos.png')\">\n      <img src=\"./images/live-step-04-videos.png\" alt=\"Thư viện video chưa có bản ghi\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Diễn Giải</div>\n      <ul class=\"details-list\">\n        <li><strong>0 recordings:</strong> chưa có video nào được ghi từ Recorder Part.</li>\n        <li><strong>Thông báo:</strong> \"Start recording from a device to see videos here\".</li>\n        <li>Khi có video, mỗi thumbnail cho phép phát lại trong Stage hoặc tải xuống <code>.mp4</code>.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- Step 5: Artifacts -->\n  <h3 class=\"section-subtitle\">Bước 5 — Artifacts: Quản Lý Image &amp; File Cấu Hình</h3>\n  <p class=\"paragraph\">\n    Bấm <strong>Artifacts</strong> để mở kho lưu trữ tập trung. Các node trong Nydus cần artifact để khởi tạo:\n    image OS, file DBC/VSS, script, v.v. Chọn artifact <code>aaos</code> (Android Image) để xem chi tiết phiên bản.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-data\">Bước 5</span>\n        Artifact aaos với 2 file roles\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/live-step-05-artifacts.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" oncli
