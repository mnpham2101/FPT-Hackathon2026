ame\" và \"URL\".\n                Sau khi thêm widget, một nút mang tên đã đặt xuất hiện trên thanh công cụ phải của workbench; bấm\n                vào sẽ mở URL đó trong một tab trình duyệt mới. Mục đích: deep-link tới công cụ phân tích CAN bên\n                ngoài mà team đang sử dụng sẵn.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Cấu hình shortcut tới công cụ CAN bên ngoài\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/CAN%20Panel%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/CAN%20Panel%20Widget.png')\">\n                    <img src=\"./images/CAN%20Panel%20Widget.png\" alt=\"CAN Panel Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Button name:</strong> tên hiển thị của nút shortcut trên thanh công cụ phải.</li>\n                        <li><strong>URL:</strong> địa chỉ công cụ CAN bên ngoài — bắt buộc; nếu để trống Inspector báo lỗi đỏ <em>\"CAN panel URL is required\"</em>.</li>\n                        <li><strong>Nút shortcut:</strong> bấm để mở URL trong tab trình duyệt mới; widget không render thêm nội dung nào khác trên Stage.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-road-simulator\">\n            <h2 class=\"section-title\">Devices → Widget: Road Simulator</h2>\n            <p class=\"paragraph\">\n                Hiển thị video trực tiếp màn hình Android VM kèm bộ điều khiển lái tương tác — dùng để \"lái thử\"\n                các ứng dụng chạy trên VM (demo điều khiển xe, game mô phỏng...). Input từ phím/slider được ghi\n                thành tín hiệu vào signal source đã chọn nên các node khác trong blueprint cũng quan sát được.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Lái thử trên màn hình Android VM\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Road%20Simulator%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Road%20Simulator%20Widget.png')\">\n                    <img src=\"./images/Road%20Simulator%20Widget.png\" alt=\"Road Simulator Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Video Track:</strong> chọn track màn hình của VM do node <a href=\"#mod-skycraft-node\">Skycraft</a> cung cấp (ví dụ <code>face-screen</code>, <code>agl-screen</code>) — bắt buộc; thiếu sẽ báo <em>\"Configuration errors: No Video Track selected\"</em>.</li>\n                        <li><strong>Signal Source (for driving controls):</strong> tuỳ chọn — part tín hiệu nhận giá trị lái (ví dụ <code>drive-controls-signal</code>, <code>pwt-can-signal</code>, <code>bcm-can-signal</code>...).</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel trên Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Video trực tiếp màn hình VM</strong> kèm slider <strong>Steering</strong> (-1..1) và slider <strong>Throttle/Brake</strong>.</li>\n                        <li><strong>Gợi ý \"WASD / Arrow keys to drive\":</strong> W/↑ tăng tốc, S/↓ phanh, A/← đánh lái trái, D/→ đánh lái phải.</li>\n                        <li><strong>Ghi tín hiệu:</strong> mọi thao tác phím/slider đều được ghi thành tín hiệu vào signal source đã chọn.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-tts\">\n            <h2 class=\"section-title\">Devices → Widget: Text-to-Speech</h2>\n            <p class=\"paragraph\">\n                Tổng hợp giọng nói từ text bằng Azure TTS rồi phát ngay trên thiết bị thông qua một audio-play\n                part — dùng để kiểm thử đường phát âm thanh của device hoặc các kịch bản trợ lý giọng nói.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Phát giọng nói tổng hợp trên thiết bị\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Text-to-Speech%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Text-to-Speech%20Widget.png')\">\n                    <img src=\"./images/Text-to-Speech%20Widget.png\" alt=\"Text-to-Speech Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Audio playback part:</strong> chỉ chấp nhận part kiểu <code>a8/audio-play</code>. Nếu deployment không có part nào, dropdown hiển thị <em>\"No audio playback part parts available\"</em> và nút Play bị vô hiệu (đúng trạng thái trong ảnh) — cần một node có khả năng audio (ví dụ container/skycraft chạy alsa_play) phục vụ <code>a8/audio-play</code>.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel \"Play text on device\"</div>\n                    <ul class=\"details-list\">\n                        <li><strong>PHRASE:</strong> nội dung text cần đọc.</li>\n                        <li><strong>LANGUAGE:</strong> Chinese (Taiwan) hoặc English (United States).</li>\n                        <li><strong>VOICE:</strong> giọng theo ngôn ngữ — zh-TW: HsiaoChen/HsiaoYu/YunJhe; en-US: Jenny/Guy.</li>\n                        <li><strong>Ghi chú \"Audio is synthesized on demand and not stored\":</strong> âm thanh được tổng hợp theo yêu cầu, không lưu lại.</li>\n                        <li><strong>Play on device</strong> + trạng thái <strong>Device playback</strong> (Idle/Playing) + <strong>Stop playback</strong>: phát hoặc dừng trên thiết bị đã chọn.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-usb-proxy\">\n            <h2 class=\"section-title\">Devices → Widget: USB Device Proxy</h2>\n            <p class=\"paragraph\">\n                Gắn một USB image artifact vào Android VM như một thiết bị USB thật — dùng để kiểm thử các tính\n                năng đọc media/dữ liệu từ USB. Việc gắn/gỡ do node\n                <a href=\"#mod-device-proxy-node\">Device Proxy</a> thực hiện; cách build file <code>.img</code> xem\n                tại mục <a href=\"#mod-usb-image\">USB Image</a>.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Gắn USB image vào Android VM\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/USB%20Device%20Proxy%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/USB%20Device%20Proxy%20Widget.png')\">\n                    <img src=\"./images/USB%20Device%20Proxy%20Widget.png\" alt=\"USB Device Proxy Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Node picker:</strong> chọn node <a href=\"#mod-device-proxy-node\">Device Proxy</a> (ví dụ \"USB Devices\") chịu trách nhiệm gắn/gỡ image.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel trên Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>USB Images (n) + Refresh:</strong> số image khả dụng; bấm Refresh để tải lại danh sách artifact.</li>\n                        <li><strong>Image:</strong> dropdown liệt kê artifact, ví dụ <code>usb — USB_storage.img (v0.0.1)</code>.</li>\n                        <li><strong>Mirror base</strong> (tuỳ chọn): đường dẫn trong guest dùng làm gốc mount.</li>\n                        <li><strong>Plug:</strong> gắn image vào VM; khi gắn thành công hiển thị <strong>\"Attached (1)\"</strong> kèm đường dẫn mount trong guest (ví dụ <code>/sdcard/Music/usb_1</code>) và nút <strong>Unplug</strong> để gỡ ra.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-simulator-box\">\n            <h2 class=\"section-title\">Devices → Widget: Simulator Box</h2>\n            <p class=\"paragraph\">\n                Widget điều khiển một hộp stimulus/simulator <strong>phần cứng thật</strong> (I/O vật lý, fault\n                injection) do các hardware driver (ví dụ stimulus/tsim) cung cấp và kết nối vào hệ thống qua\n                Hub/Outpost — đây không phải widget thuần phần mềm. Inspector chỉ có một picker\n                <strong>Simulator box part</strong>; trên môi trường chưa có phần cứng, dropdown báo\n                <em>\"No simulator box parts available\"</em> và panel hiển thị <em>\"Not Configured / Simulator part\n                not set in widget config\"</em>.\n            </p>\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Yêu cầu phần cứng thật</strong>\n                    Simulator Box chỉ cấu hình được khi có hộp stimulus kết nối qua Hub/Outpost đã đăng ký — xem mục\n                    <a href=\"#mod-hubs-ui-hubs\">Hubs</a>. Không có hub đã đăng ký, widget không thể cấu hình.\n                </div>\n            </div>\n        </section>",
    "en": "<section id=\"mod-devices-ui-devices-en\">\n            <h2 class=\"section-title\">1. Devices — Connected Device Management</h2>\n            <p class=\"paragraph\">\n                This is the default screen after signing in. Each \"device\" is a runtime endpoint (e.g. an IVI Android\n                Automotive unit, an AGL cluster) that a user can open widgets on to view/control directly.\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Devices — List & Connection\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Devices.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Devices.png')\">\n                    <img src=\"./images/Devices.png\" alt=\"Devices Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Element Breakdown</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Search devices:</strong> quick filter by device name or serial.</li>\n                        <li><strong>Pencil icon ✏️:</strong> rename the device's display name.</li>\n                        <li><strong>Serial/ID</strong> (faded text under the name): a unique identifier assigned by the system, used to look up logs.</li>\n                        <li><strong>Connect/Switch/Disconnect button:</strong> opens a control session to the device; if you are already connected to another device, the button shows <em>Switch</em> to change the active session.</li>\n                        <li><strong>Colored dot (●):</strong> the device's online (green) / offline (gray) status.</li>\n                        <li><strong>\"🚀 Started pack-deploy\":</strong> the device was auto-created when a Nydus Deployment ran — don't delete it manually; to remove it, stop the corresponding Deployment.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Note on Disconnect</strong>\n                    Disconnect only ends the current control session in the browser — it does not stop the\n                    device's container/pod. To fully release the resources, act on the corresponding Deployment\n                    under Nydus.\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widgets-catalog-en\">\n            <h2 class=\"section-title\">Devices → Widget System</h2>\n            <p class=\"paragraph\">\n                After connecting to a device, the Devices panel lists the <strong>Widgets</strong> attached to it.\n                Click the <code>+</code> button to open the catalog of 12 widget types and add one — clicking a\n                widget opens its content in the Stage (middle column) and its detailed settings in the Inspector\n                (right column).\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Devices — Add Widget catalog\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Manage%20Widgets.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Manage%20Widgets.png')\">\n                    <img src=\"./images/Manage%20Widgets.png\" alt=\"Manage Widgets Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n            </div>\n\n            <table>\n                <thead>\n                    <tr><th>Widget Type</th><th>Purpose</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>Screen</strong></td><td>Real-time video + audio stream plus touch/keyboard control of the IVI/AGL screen.</td></tr>\n                    <tr><td><strong>ADB</strong></td><td>ADB shell terminal connected directly to the Android device to run commands, install APKs, view logs.</td></tr>\n                    <tr><td><strong>Shell</strong></td><td>System (Linux) shell terminal for non-Android nodes (AGL, vECU...).</td></tr>\n                    <tr><td><strong>Signal Watch</strong></td><td>Monitor VSS/CAN signal values in real time as a table/chart.</td></tr>\n                    <tr><td><strong>CAN Panel</strong></td><td>Places a shortcut button on the right toolbar; clicking it opens the URL of an external CAN analysis tool in a new browser tab. Independent of any blueprint node.</td></tr>\n                    <tr><td><strong>GPIO Panel</strong></td><td>Button panel to simulate sensor/GPIO signal values fed into the system.</td></tr>\n                    <tr><td><strong>USB Device Proxy</strong></td><td>Attach/detach a USB image (image mode) or plug a real USB device from the client machine into the target device.</td></tr>\n                    <tr><td><strong>CAPL TestScript</strong></td><td>Write and run CAPL test-case scripts, typically paired with a physical Hub/Proxy Node.</td></tr>\n                    <tr><td><strong>Road Simulator</strong></td><td>Live video of the VM screen with driving controls via WASD/arrow keys or sliders; driving signals are written into the selected signal source.</td></tr>\n                    <tr><td><strong>Simulator Box</strong></td><td>Controls a real hardware stimulus/simulator box (physical I/O, fault injection) connected via a Hub/Outpost — requires hardware.</td></tr>\n                    <tr><td><strong>Text-to-speech</strong></td><td>Synthesizes speech from text (Azure TTS) and plays it immediately on the device through the selected audio-play part.</td></tr>\n                    <tr><td><strong>Log</strong></td><td>View the live runtime log of the selected node/part.</td></tr>\n                </tbody>\n            </table>\n        </section>\n\n<section id=\"mod-devices-ui-widget-screen-en\">\n            <h2 class=\"section-title\">Devices → Widget: Screen Stream</h2>\n            <p class=\"paragraph\">\n                The most commonly used widget — it displays a real-time video/audio stream of a vehicle screen (IVI\n                Android or AGL Cluster) and lets you tap/type directly from the browser as if holding the real screen.\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Full Layout</span>\n                        Full 3-column layout with the Screen widget open\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Screen%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Screen%20Widget.png')\">\n                    <img src=\"./images/Screen%20Widget.png\" alt=\"Screen Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Video Part / Audio Part:</strong> select the video/audio source \"part\" of the corresponding blueprint node (e.g. <code>face-screen</code>, <code>face-audio</code>).</li>\n                        <li><strong>Recorder Part:</strong> start recording the current session — the video will appear under <a href=\"#mod-videos-ui-videos-en\">Videos</a> once recording stops.</li>\n                        <li><strong>Microphone:</strong> pick a physical microphone on the client machine (e.g. \"CIA Iphone Microphone\") and click <em>Enable microphone</em> to talk to the device two-way.</li>\n                        <li><strong>Touch Part / Keyboard Part:</strong> the \"part\" that receives touch events and virtual keyboard input sent back to the device.</li>\n                        <li><strong>Specify Function:</strong> enable to customize the command instead of the default behavior.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel below the Stage</div>\n                    <ul class=\"details-list\">\n                        <li>An <strong>ADB Shell</strong> tab can be opened alongside the Stage to run commands while watching the screen — useful for debugging UI interaction together with system logs.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-signal-en\">\n            <h2 class=\"section-title\">Devices → Widget: Signal Watch</h2>\n            <p class=\"paragraph\">\n                Lets you pick one or more VSS/CAN signals already declared in the blueprint (e.g.\n                <code>bcm-can-signal</code>, <code>seatbelt-sensor-signal</code>) to watch their live value changes —\n                a quick way to confirm a signal is behaving correctly without opening a full CAN trace.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Choosing a signal source for Signal Watch\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Signal%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Signal%20Widget.png')\">\n                    <img src=\"./images/Signal%20Widget.png\" alt=\"Signal Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-gpio-en\">\n            <h2 class=\"section-title\">Devices → Widget: GPIO Panel</h2>\n            <p class=\"paragraph\">\n                Unlike Signal Watch (read-only), GPIO Panel lets you <strong>write a value</strong> into a source\n                signal (bcm-can-signal, seatbelt-sensor-signal...) — used to simulate a physical sensor (e.g. a\n                seatbelt buckle, tire pressure) without real hardware.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Choosing a GPIO Source part to simulate\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/GPIO%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/GPIO%20Widget.png')\">\n                    <img src=\"./images/GPIO%20Widget.png\" alt=\"GPIO Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-adb-en\">\n            <h2 class=\"section-title\">Devices → Widget: ADB</h2>\n            <p class=\"paragraph\">\n                Opens an ADB shell terminal connected directly to the Android VM run by a\n                <a href=\"#mod-skycraft-node-en\">Skycraft</a> node — run real shell commands on the AAOS VM (prompt\n                e.g. <code>trout_arm64:/ $</code>) to debug the system, inspect processes, or tweak device settings\n                without installing anything on your machine.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        ADB terminal to the Android VM\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/ADB%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/ADB%20Widget.png')\">\n                    <img src=\"./images/ADB%20Widget.png\" alt=\"ADB Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>ADB:</strong> pick the ADB part exposed by a <a href=\"#mod-skycraft-node-en\">Skycraft</a> node (e.g. <code>face-adb</code>) — each Android VM in the blueprint exposes one.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel on the Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>ADB SHELL + <code>connected</code> badge:</strong> an xterm terminal running real shell commands on the Android VM, prompt <code>trout_arm64:/ $</code>.</li>\n                        <li><strong>Disconnect:</strong> ends the current shell session.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-shell-en\">\n            <h2 class=\"section-title\">Devices → Widget: Shell</h2>\n            <p class=\"paragraph\">\n                Opens a root shell inside a node's container — for the non-Android Linux nodes (vECUs, background\n                services...) run by a <a href=\"#mod-container-node-en\">Container</a> node. Useful to inspect config\n                files, processes, or a node's internal logs right in the browser.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Root shell inside a container node\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Shell%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Shell%20Widget.png')\">\n                    <img src=\"./images/Shell%20Widget.png\" alt=\"Shell Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Shell part:</strong> pick the shell part exposed by <a href=\"#mod-container-node-en\">Container</a> nodes (e.g. <code>seatbelt-ecu-shell</code>, <code>tcu-nad-shell</code>).</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel on the Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>SHELL &lt;node-id&gt; + state badge (connected/idle):</strong> an xterm terminal with a root shell inside the container (a minimal Debian 12 image in the example).</li>\n                        <li><strong>Reconnect:</strong> reconnect when the session drops or sits idle.</li>\n                        <li><strong>Disconnect:</strong> closes the current shell session.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-log-en\">\n            <h2 class=\"section-title\">Devices → Widget: Log</h2>\n            <p class=\"paragraph\">\n                Streams the live runtime log of any node in the deployment — the first tool to reach for when\n                debugging a node's behavior without opening a shell into it.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Choosing a log source for the Log widget\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Log%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Log%20Widget.png')\">\n                    <img src=\"./images/Log%20Widget.png\" alt=\"Log Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Log Source part:</strong> lists the log part of every node — each node has a <code>&lt;node&gt;-main</code> part; <a href=\"#mod-skycraft-node-en\">Skycraft</a> nodes additionally expose <code>&lt;node&gt;-logcat</code> (e.g. <code>face-logcat</code>, <code>agl-logcat</code>) carrying the Android VM's logcat.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel on the Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Filter:</strong> live-filters log lines by substring as you type.</li>\n                        <li><strong>Auto-scroll to bottom:</strong> keeps the view pinned to the newest log line.</li>\n                        <li><strong>Clear log:</strong> clears everything currently displayed.</li>\n                        <li><strong>Connected badge:</strong> log lines stream continuously in real time.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-can-panel-en\">\n            <h2 class=\"section-title\">Devices → Widget: CAN Panel</h2>\n            <p class=\"paragraph\">\n                Independent of any blueprint node — the entire configuration is just \"Button name\" and \"URL\". Once\n                added, a button with that name appears in the workbench right toolbar; clicking it opens the URL in\n                a new browser tab. Purpose: deep-link to an external CAN analysis tool your team already uses.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Configuring a shortcut to an external CAN tool\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/CAN%20Panel%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/CAN%20Panel%20Widget.png')\">\n                    <img src=\"./images/CAN%20Panel%20Widget.png\" alt=\"CAN Panel Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Button name:</strong> the label of the shortcut button on the right toolbar.</li>\n                        <li><strong>URL:</strong> the external CAN tool address — required; leaving it empty shows a red error <em>\"CAN panel URL is required\"</em>.</li>\n                        <li><strong>The shortcut button:</strong> clicking opens the URL in a new browser tab; the widget renders nothing else on the Stage.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-road-simulator-en\">\n            <h2 class=\"section-title\">Devices → Widget: Road Simulator</h2>\n            <p class=\"paragraph\">\n                Shows live video of the Android VM screen together with interactive driving controls — used to\n                \"test-drive\" apps running on the VM (driving demos, simulation games...). Key/slider input is\n                written as signals into the selected signal source, so other nodes in the blueprint can observe\n                it too.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Test-driving on the Android VM screen\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Road%20Simulator%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Road%20Simulator%20Widget.png')\">\n                    <img src=\"./images/Road%20Simulator%20Widget.png\" alt=\"Road Simulator Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Video Track:</strong> pick a screen track of the VM provided by a <a href=\"#mod-skycraft-node-en\">Skycraft</a> node (e.g. <code>face-screen</code>, <code>agl-screen</code>) — required; otherwise the Inspector reports <em>\"Configuration errors: No Video Track selected\"</em>.</li>\n                        <li><strong>Signal Source (for driving controls):</strong> optional — the signal part that receives driving values (e.g. <code>drive-controls-signal</code>, <code>pwt-can-signal</code>, <code>bcm-can-signal</code>...).</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel on the Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Live video of the VM screen</strong> with a <strong>Steering</strong> slider (-1..1) and a <strong>Throttle/Brake</strong> slider.</li>\n                        <li><strong>The \"WASD / Arrow keys to drive\" hint:</strong> W/↑ accelerate, S/↓ brake, A/← steer left, D/→ steer right.</li>\n                        <li><strong>Signal writing:</strong> every key/slider input is written as a signal into the selected signal source.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-tts-en\">\n            <h2 class=\"section-title\">Devices → Widget: Text-to-Speech</h2>\n            <p class=\"paragraph\">\n                Synthesizes speech from text with Azure TTS and plays it immediately on the device through an\n                audio-play part — used to test the device's audio playback path or voice-assistant scenarios.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Playing synthesized speech on the device\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Text-to-Speech%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Text-to-Speech%20Widget.png')\">\n                    <img src=\"./images/Text-to-Speech%20Widget.png\" alt=\"Text-to-Speech Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Audio playback part:</strong> only accepts <code>a8/audio-play</code> parts. When the deployment has none, the dropdown shows <em>\"No audio playback part parts available\"</em> and Play stays disabled (the state shown in the screenshot) — an audio-capable node serving <code>a8/audio-play</code> is required (e.g. an alsa_play-capable container/skycraft).</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel \"Play text on device\"</div>\n                    <ul class=\"details-list\">\n                        <li><strong>PHRASE:</strong> the text to speak.</li>\n                        <li><strong>LANGUAGE:</strong> Chinese (Taiwan) or English (United States).</li>\n                        <li><strong>VOICE:</strong> per language — zh-TW: HsiaoChen/HsiaoYu/YunJhe; en-US: Jenny/Guy.</li>\n                        <li><strong>The note \"Audio is synthesized on demand and not stored\":</strong> audio is generated on demand and never stored.</li>\n                        <li><strong>Play on device</strong> + <strong>Device playback</strong> state (Idle/Playing) + <strong>Stop playback</strong>: play or stop on the selected device.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-usb-proxy-en\">\n            <h2 class=\"section-title\">Devices → Widget: USB Device Proxy</h2>\n            <p class=\"paragraph\">\n                Attaches a USB image artifact to the Android VM like a real USB stick — used to test USB media/data\n                features. Attaching/detaching is performed by a <a href=\"#mod-device-proxy-node-en\">Device Proxy</a>\n                node; see <a href=\"#mod-usb-image-en\">USB Image</a> for how to build the <code>.img</code> file.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Attaching a USB image to the Android VM\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/USB%20Device%20Proxy%20Widget.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/USB%20Device%20Proxy%20Widget.png')\">\n                    <img src=\"./images/USB%20Device%20Proxy%20Widget.png\" alt=\"USB Device Proxy Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Inspector fields (right column)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Node picker:</strong> pick the <a href=\"#mod-device-proxy-node-en\">Device Proxy</a> node (e.g. \"USB Devices\") in charge of attaching/detaching images.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel on the Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>USB Images (n) + Refresh:</strong> the number of available images; Refresh reloads the artifact list.</li>\n                        <li><strong>Image:</strong> a dropdown listing artifacts, e.g. <code>usb — USB_storage.img (v0.0.1)</code>.</li>\n                        <li><strong>Mirror base</strong> (optional): the guest path used as the mount root.</li>\n                        <li><strong>Plug:</strong> attaches the image to the VM; once attached it shows <strong>\"Attached (1)\"</strong> with the guest mount path (e.g. <code>/sdcard/Music/usb_1</code>) and an <strong>Unplug</strong> button to detach it.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-simulator-box-en\">\n            <h2 class=\"section-title\">Devices → Widget: Simulator Box</h2>\n            <p class=\"paragraph\">\n                This widget drives a real hardware stimulus/simulator box (physical I/O, fault injection) provided\n                by hardware drivers (e.g. stimulus/tsim) and attached to the system through a Hub/Outpost — it is\n                not a pure-software widget. The Inspector only has a <strong>Simulator box part</strong> picker; on\n                an environment with no hardware, the dropdown reports <em>\"No simulator box parts available\"</em>\n                and the panel shows <em>\"Not Configured / Simulator part not set in widget config\"</em>.\n            </p>\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Requires real hardware</strong>\n                    Simulator Box can only be configured when a stimulus box is connected via a registered\n                    Hub/Outpost — see <a href=\"#mod-hubs-ui-hubs-en\">Hubs</a>. Without a registered hub, the widget\n                    cannot be configured.\n                </div>\n            </div>\n        </section>"
  },
  "videos": {
    "vi": "<section id=\"mod-videos-ui-videos\">\n            <h2 class=\"section-title\">2. Videos — Thư Viện Video Ghi Hình</h2>\n            <p class=\"paragraph\">\n                Mục này lưu trữ toàn bộ các đoạn video đã ghi lại từ tính năng <strong>Recorder Part</strong> của widget\n                Screen (xem mục <a href=\"#mod-devices-ui-widget-screen\">Devices → Widget Screen</a>). Đây là kho chung của hệ thống,\n                không tách theo device.\n            </p>\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🎬</div>\n                <div class=\"banner-content\">\n                    <strong>Thao tác chính</strong>\n                    Mỗi video hiển thị tên, thời lượng và thời điểm ghi. Bấm vào thumbnail để phát lại ngay trong Stage;\n                    bấm icon tải xuống để xuất file <code>.mp4</code> về máy (tên file tự đặt theo tên device + timestamp).\n                </div>\n            </div>\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Dung lượng lưu trữ</strong>\n                    Video ghi ở độ phân giải gốc của màn hình nên dung lượng file có thể khá lớn — nên tải về và xoá bớt\n                    các bản ghi thử nghiệm không còn cần thiết để tránh đầy dung lượng lưu trữ của hệ thống.\n                </div>\n            </div>\n        </section>",
    "en": "<section id=\"mod-videos-ui-videos-en\">\n            <h2 class=\"section-title\">2. Videos — Recorded Video Library</h2>\n            <p class=\"paragraph\">\n                This section stores every video clip recorded via the <strong>Recorder Part</strong> feature of the\n                Screen widget (see <a href=\"#mod-devices-ui-widget-screen-en\">Devices → Widget Screen</a>). It's a shared library\n                shared system-wide, not split by device.\n            </p>\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🎬</div>\n                <div class=\"banner-content\">\n                    <strong>Main actions</strong>\n                    Each video shows its name, duration, and recording time. Click the thumbnail to play it back\n                    right in the Stage; click the download icon to export it as an <code>.mp4</code> file (the file\n                    name is auto-generated from the device name + timestamp).\n                </div>\n            </div>\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Storage size</strong>\n                    Videos are recorded at the screen's native resolution, so files can be quite large — download\n                    and delete test recordings you no longer need to avoid filling up system storage.\n                </div>\n            </div>\n        </section>"
  },
  "artifacts": {
    "vi": "<section id=\"mod-artifacts-ui-artifacts\">\n            <h2 class=\"section-title\">3. Artifacts — Quản Lý Gói Đĩa Ảnh & File Cấu Hình</h2>\n            <p class=\"paragraph\">\n                Artifacts là kho lưu trữ tập trung mọi loại file nhị phân mà các node trong Nydus cần dùng khi khởi tạo:\n                ảnh hệ điều hành, file định nghĩa tín hiệu, script tuỳ biến...\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-data\">Panel + Inspector</span>\n                        Quản lý Artifact và phiên bản\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Manage%20Artifact.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Manage%20Artifact.png')\">\n                    <img src=\"./images/Manage%20Artifact.png\" alt=\"Manage Artifact Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Thành Phần</div>\n                    <ul class=\"details-list\">\n                        <li><strong>All Categories:</strong> bộ lọc theo loại artifact (xem bảng danh mục bên dưới).</li>\n                        <li><strong>New Artifact:</strong> đặt Tên + chọn Category để tạo artifact rỗng, sau đó bấm <em>Add Version</em> để upload file thật.</li>\n                        <li><strong>Versions:</strong> một artifact có thể có nhiều phiên bản; bản gắn nhãn <span class=\"table-badge badge-cyan\">latest</span> là bản mặc định các node blueprint sẽ dùng.</li>\n                        <li><strong>Sharing & Ownership:</strong> bật <em>Public</em> để mọi thành viên trong workspace đều thấy artifact; mặc định là <em>Private</em> (chỉ chủ sở hữu + admin).</li>\n                        <li><strong>Danger Zone:</strong> xoá artifact — thao tác không thể hoàn tác, cần rút toàn bộ node blueprint đang tham chiếu trước khi xoá.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <table>\n                <thead>\n                    <tr><th>Category</th><th>Dùng cho node/loại nào</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>ANDROID IMAGE</strong></td><td>Node <em>Skycraft</em> chạy hệ điều hành Android Automotive (IVI).</td></tr>\n                    <tr><td><strong>AGL IMAGE</strong></td><td>Node <em>Skycraft</em> chạy Automotive Grade Linux (cluster đồng hồ).</td></tr>\n                    <tr><td><strong>DBC</strong></td><td>File định nghĩa tín hiệu CAN — nạp cho node <em>CAN Bus</em>.</td></tr>\n                    <tr><td><strong>LDF</strong></td><td>File định nghĩa tín hiệu LIN — nạp cho node <em>LIN Bus</em>.</td></tr>\n                    <tr><td><strong>VSS</strong></td><td>Định nghĩa tín hiệu chuẩn Vehicle Signal Specification — nạp cho <em>KUKSA Broker</em>.</td></tr>\n                    <tr><td><strong>SCRIPT</strong></td><td>Mã nguồn Lua tuỳ biến chạy trong node <em>Script Node</em>.</td></tr>\n                    <tr><td><strong>USB</strong></td><td>Ảnh đĩa USB (.img) dùng cho widget/node USB Device Proxy ở chế độ mô phỏng. Xem <a href=\"#mod-usb-image\">hướng dẫn đóng gói ảnh USB</a>.</td></tr>\n                </tbody>\n            </table>\n        </section>",
    "en": "<section id=\"mod-artifacts-ui-artifacts-en\">\n            <h2 class=\"section-title\">3. Artifacts — Disk Image & Config File Management</h2>\n            <p class=\"paragraph\">\n                Artifacts is the central store for every binary file that Nydus nodes need at boot time: OS images,\n                signal definition files, custom scripts...\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-data\">Panel + Inspector</span>\n                        Managing an Artifact and its versions\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Manage%20Artifact.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Manage%20Artifact.png')\">\n                    <img src=\"./images/Manage%20Artifact.png\" alt=\"Manage Artifact Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Element Breakdown</div>\n                    <ul class=\"details-list\">\n                        <li><strong>All Categories:</strong> filter by artifact type (see the category table below).</li>\n                        <li><strong>New Artifact:</strong> set a Name + pick a Category to create an empty artifact, then click <em>Add Version</em> to upload the actual file.</li>\n                        <li><strong>Versions:</strong> an artifact can have multiple versions; the one tagged <span class=\"table-badge badge-cyan\">latest</span> is the default version blueprint nodes will use.</li>\n                        <li><strong>Sharing & Ownership:</strong> turn on <em>Public</em> so every member of the workspace can see the artifact; it defaults to <em>Private</em> (owner + admins only).</li>\n                        <li><strong>Danger Zone:</strong> delete the artifact — irreversible; detach every blueprint node referencing it first.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <table>\n                <thead>\n                    <tr><th>Category</th><th>Used by which node/type</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>ANDROID IMAGE</strong></td><td>A <em>Skycraft</em> node running Android Automotive OS (IVI).</td></tr>\n                    <tr><td><strong>AGL IMAGE</strong></td><td>A <em>Skycraft</em> node running Automotive Grade Linux (instrument cluster).</td></tr>\n                    <tr><td><strong>DBC</strong></td><td>CAN signal definition file — loaded by a <em>CAN Bus</em> node.</td></tr>\n                    <tr><td><strong>LDF</strong></td><td>LIN signal definition file — loaded by a <em>LIN Bus</em> node.</td></tr>\n                    <tr><td><strong>VSS</strong></td><td>Vehicle Signal Specification definitions — loaded by the <em>KUKSA Broker</em>.</td></tr>\n                    <tr><td><strong>SCRIPT</strong></td><td>Custom Lua source code that runs inside a <em>Script Node</em>.</td></tr>\n                    <tr><td><strong>USB</strong></td><td>USB disk image (.img) used by the USB Device Proxy widget/node in simulation mode. See <a href=\"#mod-usb-image-en\">how to build a USB disk image</a>.</td></tr>\n                </tbody>\n            </table>\n        </section>"
  },
  "usb-image": {
    "vi": "<section id=\"mod-usb-image\">\n  <h2 class=\"section-title\">Đóng Gói Ảnh Đĩa USB</h2>\n  <p class=\"paragraph\">\n    Device Proxy Node có thể mount một file ảnh đĩa <code>.img</code> vào VM như một USB mass-storage ảo.\n    Hướng dẫn này giúp bạn tạo ảnh đĩa FAT32 trên Linux, macOS hoặc Windows (qua WSL2), rồi upload lên CarSky Artifacts.\n  </p>\n\n  <h3 class=\"section-subtitle\">Công cụ cần thiết</h3>\n  <ul>\n    <li><strong>Linux / WSL2 / macOS:</strong> <code>truncate</code> (hoặc <code>dd</code>), <code>mkfs.vfat</code> (dosfstools), <code>mcopy</code> (mtools).</li>\n    <li><strong>Windows:</strong> cài đặt <a href=\"https://learn.microsoft.com/windows/wsl/install\">WSL2</a>, sau đó chạy y hệt lệnh Linux bên dưới.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Tạo ảnh đĩa trên Linux / macOS / WSL2</h3>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code># 1. Tạo file rỗng 64 MB\ntruncate -s 64M ota.img\n\n# 2. Định dạng FAT32 với nhãn ổ đĩa \"OTA\"\nmkfs.vfat -F 32 -n OTA ota.img\n\n# 3. Sao chép file vào ảnh đĩa (ví dụ: gói OTA update.zip)\nmcopy -i ota.img update.zip ::/\n\n# Kiểm tra nội dung\nmdir -i ota.img ::/</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Tạo ảnh đĩa trên Windows (không dùng WSL2)</h3>\n  <p class=\"paragraph\">\n    Nếu không có WSL2, bạn có thể dùng PowerShell + <code>diskpart</code> để tạo VHD, định dạng FAT32, sao chép file,\n    rồi đổi đuôi thành <code>.img</code>.\n  </p>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>PowerShell (chạy với quyền Administrator)</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code># 1. Tạo VHD 64 MB\n$vhd = \"C:\\Temp\\ota.vhd\"\ndiskpart /s $null &lt;&lt;'EOF'\ncreate vdisk file=\"C:\\Temp\\ota.vhd\" maximum=64 type=fixed\nselect vdisk file=\"C:\\Temp\\ota.vhd\"\nattach vdisk\ncreate partition primary\nformat fs=fat32 quick label=OTA\nassign letter=Z\nexit\nEOF\n\n# 2. Copy file vào ổ Z:\ncopy C:\\Temp\\update.zip Z:\\\ncopy C:\\Temp\\demo.mp4 Z:\\\n\n# 3. Detach VHD và đổi tên thành .img\ndiskpart /s $null &lt;&lt;'EOF'\nselect vdisk file=\"C:\\Temp\\ota.vhd\"\ndetach vdisk\nexit\nEOF\nRename-Item $vhd ota.img</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Copy file video / mp3 vào ảnh đĩa</h3>\n  <p class=\"paragraph\">\n    Bất kỳ file nào cũng có thể đưa vào ảnh đĩa. Ví dụ với file video và nhạc:\n  </p>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash — Linux / WSL2</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n    </div>\n    <div class=\"code-block\"><code># Copy một hoặc nhiều file\nmcopy -i ota.img demo.mp4 ::/\nmcopy -i ota.img soundtrack.mp3 ::/\n\n# Copy cả thư mục con\nmcopy -s -i ota.img ./media/* ::/\n\n# Liệt kê để xác nhận\nmdir -i ota.img ::/</code></div>\n  </div>\n\n  <div class=\"info-box\">\n    <strong>💡 Mẹo:</strong> Một số hệ thống yêu cầu ảnh đĩa lớn hơn kích thước file thật. Hãy để dư 10–20% dung lượng, hoặc dùng\n    <code>du -b update.zip</code> để tính toán chính xác. Nếu copy nhiều file video, cân nhắc tăng kích thước ảnh lên 512 MB hoặc 1 GB.\n  </div>\n\n  <h3 class=\"section-subtitle\">Upload lên Artifacts</h3>\n  <ol class=\"steps-list\">\n    <li>Mở mục <a href=\"#mod-artifacts-ui-artifacts\">Artifacts</a>, bấm <strong>New Artifact</strong>.</li>\n    <li>Chọn Category <strong>USB</strong>, đặt tên artifact (ví dụ <code>OTA-Update</code>).</li>\n    <li>Bấm <strong>Add Version</strong>, chọn file <code>ota.img</code> vừa tạo.</li>\n    <li>Đánh dấu phiên bản <code>latest</code> để Device Proxy Node sử dụng mặc định.</li>\n  </ol>\n\n  <h3 class=\"section-subtitle\">Sử dụng trong blueprint</h3>\n  <p class=\"paragraph\">\n    Thêm một <a href=\"#mod-device-proxy-node\">Device Proxy Node</a>, cấu hình <code>mediaImageDir</code> trỏ đến thư mục chứa ảnh,\n    và nối pin <code>usb</code> vào Skycraft Node. Sau khi deploy, bạn có thể attach ảnh từ inventory qua UI hoặc API.\n  </p>\n</section>\n",
    "en": "<section id=\"mod-usb-image-en\">\n  <h2 class=\"section-title\">Build a USB Disk Image</h2>\n  <p class=\"paragraph\">\n    A Device Proxy Node can mount an <code>.img</code> disk file into a VM as a virtual USB mass-storage device.\n    This guide shows how to build a FAT32 disk image on Linux, macOS, or Windows (via WSL2) and upload it to CarSky Artifacts.\n  </p>\n\n  <h3 class=\"section-subtitle\">Required tools</h3>\n  <ul>\n    <li><strong>Linux / WSL2 / macOS:</strong> <code>truncate</code> (or <code>dd</code>), <code>mkfs.vfat</code> (dosfstools), <code>mcopy</code> (mtools).</li>\n    <li><strong>Windows:</strong> install <a href=\"https://learn.microsoft.com/windows/wsl/install\">WSL2</a>, then run the same Linux commands below.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Build the image on Linux / macOS / WSL2</h3>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code># 1. Create an empty 64 MB file\ntruncate -s 64M ota.img\n\n# 2. Format it as FAT32 with volume label \"OTA\"\nmkfs.vfat -F 32 -n OTA ota.img\n\n# 3. Copy a file into the image (example: OTA update.zip)\nmcopy -i ota.img update.zip ::/\n\n# Check contents\nmdir -i ota.img ::/</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Build the image on Windows (without WSL2)</h3>\n  <p class=\"paragraph\">\n    If you don't have WSL2, use PowerShell + <code>diskpart</code> to create a VHD, format it as FAT32, copy files in,\n    then rename the extension to <code>.img</code>.\n  </p>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>PowerShell (run as Administrator)</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code># 1. Create a 64 MB VHD\n$vhd = \"C:\\Temp\\ota.vhd\"\ndiskpart /s $null &lt;&lt;'EOF'\ncreate vdisk file=\"C:\\Temp\\ota.vhd\" maximum=64 type=fixed\nselect vdisk file=\"C:\\Temp\\ota.vhd\"\nattach vdisk\ncreate partition primary\nformat fs=fat32 quick label=OTA\nassign letter=Z\nexit\nEOF\n\n# 2. Copy files to drive Z:\ncopy C:\\Temp\\update.zip Z:\\\ncopy C:\\Temp\\demo.mp4 Z:\\\n\n# 3. Detach the VHD and rename to .img\ndiskpart /s $null &lt;&lt;'EOF'\nselect vdisk file=\"C:\\Temp\\ota.vhd\"\ndetach vdisk\nexit\nEOF\nRename-Item $vhd ota.img</code></div>\n  </div>\n\n  <h3 class=\"section-subtitle\">Copy video / mp3 files into the image</h3>\n  <p class=\"paragraph\">\n    Any file can be placed in the disk image. Examples for video and music files:\n  </p>\n  <div class=\"code-container\">\n    <div class=\"code-header\">\n      <span>bash — Linux / WSL2</span>\n      <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n    </div>\n    <div class=\"code-block\"><code># Copy one or more files\nmcopy -i ota.img demo.mp4 ::/\nmcopy -i ota.img soundtrack.mp3 ::/\n\n# Copy a whole directory recursively\nmcopy -s -i ota.img ./media/* ::/\n\n# List to verify\nmdir -i ota.img ::/</code></div>\n  </div>\n\n  <div class=\"info-box\">\n    <strong>💡 Tip:</strong> Some systems need the image to be larger than the payload. Leave 10–20% headroom, or use\n    <code>du -b update.zip</code> to size the image precisely. If you copy many video files, consider raising the image size to 512 MB or 1 GB.\n  </div>\n\n  <h3 class=\"section-subtitle\">Upload to Artifacts</h3>\n  <ol class=\"steps-list\">\n    <li>Open <a href=\"#mod-artifacts-ui-artifacts-en\">Artifacts</a>, click <strong>New Artifact</strong>.</li>\n    <li>Pick Category <strong>USB</strong> and name the artifact (e.g. <code>OTA-Update</code>).</li>\n    <li>Click <strong>Add Version</strong> and select the <code>ota.img</code> file you just built.</li>\n    <li>Mark the version as <code>latest</code> so the Device Proxy Node uses it by default.</li>\n  </ol>\n\n  <h3 class=\"section-subtitle\">Use in a blueprint</h3>\n  <p class=\"paragraph\">\n    Add a <a href=\"#mod-device-proxy-node-en\">Device Proxy Node</a>, set <code>mediaImageDir</code> to the directory holding the image,\n    and wire its <code>usb</code> pin into a Skycraft Node. After deployment, attach the image from inventory through the UI or API.\n  </p>\n</section>\n"
  },
  "nydus": {
    "vi": "<section id=\"mod-nydus-ui-blueprint-list\">\n            <h2 class=\"section-title\">4. Nydus — Danh Sách Blueprint</h2>\n            <p class=\"paragraph\">\n                Nydus là \"bộ não\" thiết kế kiến trúc hệ thống ECU ảo. Mỗi <strong>Blueprint</strong> là một sơ đồ topology\n                (các node ECU + kết nối giữa chúng) có thể triển khai thành nhiều <strong>Deployment</strong> chạy song song.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Danh sách Blueprint & thao tác New/Import/Export\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Manage%20Blueprint.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Manage%20Blueprint.png')\">\n                    <img src=\"./images/Manage%20Blueprint.png\" alt=\"Manage Blueprint Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Thành Phần</div>\n                    <ul class=\"details-list\">\n                        <li><strong>New Blueprint:</strong> tạo canvas trắng để thiết kế topology mới từ đầu.</li>\n                        <li><strong>Import from File:</strong> nạp lại blueprint đã export trước đó (file JSON) — dùng để chia sẻ/sao lưu.</li>\n                        <li><strong>Export Selected:</strong> xuất blueprint đang chọn ra file để sao lưu hoặc chia sẻ.</li>\n                        <li><strong>Search deployments:</strong> ô tìm bên dưới danh sách blueprint hiển thị các Deployment đang chạy, kèm badge trạng thái ví dụ <span class=\"table-badge badge-emerald\">Running (22/22)</span> — số node đã sẵn sàng / tổng số node.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-nydus-ui-blueprint-canvas\">\n            <h2 class=\"section-title\">Nydus → Canvas & Thư Viện Node</h2>\n            <p class=\"paragraph\">\n                Bấm vào một blueprint để mở Canvas ở Stage — khu vực kéo-thả các node từ thư viện bên trái vào sơ đồ,\n                nối dây tín hiệu giữa các node, và nhóm chúng vào từng \"zone\" (khung nét đứt màu, ví dụ\n                <em>TCU Zonal</em>, <em>CDC Zonal</em>) đại diện cho từng cụm ECU vật lý trong xe.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Full Layout</span>\n                        Canvas tổng quan một Blueprint đang chạy\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Nydus%20Screen.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Nydus%20Screen.png')\">\n                    <img src=\"./images/Nydus%20Screen.png\" alt=\"Nydus Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n            </div>\n\n            <table>\n                <thead>\n                    <tr><th>Loại Node</th><th>Vai trò</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>Skycraft</strong></td><td>Máy ảo chạy hệ điều hành đầy đủ — IVI Android hoặc AGL Cluster.</td></tr>\n                    <tr><td><strong>Script Node</strong></td><td>Chạy logic Lua tuỳ biến, dùng làm cầu nối/aggregator giữa các tín hiệu.</td></tr>\n                    <tr><td><strong>KUKSA Broker</strong></td><td>Broker tín hiệu chuẩn VSS trung tâm (Vehicle Signal Specification).</td></tr>\n                    <tr><td><strong>CAN Bus</strong></td><td>Mô phỏng một bus CAN vật lý, nạp file DBC để giải mã tín hiệu.</td></tr>\n                    <tr><td><strong>LIN Bus</strong></td><td>Mô phỏng bus LIN, nạp file LDF.</td></tr>\n                    <tr><td><strong>GPIO Panel</strong></td><td>Nguồn tín hiệu GPIO số/tương tự dùng để mô phỏng cảm biến rời rạc.</td></tr>\n                    <tr><td><strong>Ethernet Bridge</strong></td><td>Cầu nối mạng Ethernet-in-vehicle giữa các zone.</td></tr>\n                    <tr><td><strong>Container</strong></td><td>Chạy một image Docker tuỳ ý như một node độc lập trong topology.</td></tr>\n                    <tr><td><strong>Proxy Node</strong></td><td>Đại diện logic cho một Hub/thiết bị phần cứng vật lý bên ngoài cluster (xem mục <a href=\"#mod-hubs-ui-hubs\">Hubs</a>).</td></tr>\n                    <tr><td><strong>Device Proxy</strong></td><td>Cầu nối cắm USB thật/ảnh USB từ máy client vào một node trong blueprint.</td></tr>\n                    <tr><td><strong>Abstract</strong></td><td>Node khối trừu tượng dùng để nhóm/tài liệu hoá ý tưởng thiết kế, không sinh runtime.</td></tr>\n                </tbody>\n            </table>\n        </section>\n\n<section id=\"mod-nydus-ui-node-config\">\n            <h2 class=\"section-title\">Nydus → Cấu Hình Node (Inspector)</h2>\n            <p class=\"paragraph\">\n                Chọn một node bất kỳ trên canvas để mở bảng cấu hình chi tiết ở Inspector — nội dung thay đổi tuỳ loại\n                node; ví dụ dưới đây là cấu hình đầy đủ của một node <strong>Skycraft</strong> chạy Android.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Full Canvas + Inspector</span>\n                        Cấu hình node Skycraft (IVI - FACE Android)\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Blueprint%20Node%20config.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Blueprint%20Node%20config.png')\">\n                    <img src=\"./images/Blueprint%20Node%20config.png\" alt=\"Blueprint Node Config Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Nhóm CONFIGURATION</div>\n                    <ul class=\"details-list\">\n                        <li><strong>OS / Artifact / Version / Architecture:</strong> chọn artifact (mục 3) làm ảnh khởi động — Artifact và Version phải tồn tại trước ở panel Artifacts.</li>\n                        <li><strong>Display Width/Height/DPI:</strong> độ phân giải màn hình ảo hiển thị trong widget Screen.</li>\n                        <li><strong>GPU Backend:</strong> driver đồ hoạ ảo (ví dụ VirGL Renderer) cấp cho máy ảo.</li>\n                        <li><strong>Part Prefix:</strong> tiền tố đặt tên tự động cho mọi \"part\" của node này (vd <code>face</code> → <code>face-screen</code>, <code>face-audio</code>) — dùng để chọn nhanh trong Inspector của các widget.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Nhóm PINS</div>\n                    <ul class=\"details-list\">\n                        <li>Danh sách các chân kết nối (<code>eth</code>, <code>usb</code>, <code>vhal</code>...) node lộ ra để dây nối tới node khác trên canvas.</li>\n                        <li><strong>vhal</strong> thường có hàng chục property con (mã propId dạng <code>0x21400400</code>) ánh xạ tới các tín hiệu VHAL Android — mỗi property đánh dấu <span class=\"table-badge badge-cyan\">Custom</span> nếu được override thủ công thay vì dùng mặc định AOSP.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-nydus-ui-blueprint-config\">\n            <h2 class=\"section-title\">Nydus → Cấu Hình & Deploy Blueprint</h2>\n            <p class=\"paragraph\">\n                Bấm ra vùng trống của canvas (không chọn node nào) để Inspector hiển thị cấu hình ở cấp <strong>toàn bộ\n                blueprint</strong> thay vì một node — đây cũng là nơi bấm nút triển khai Deployment mới.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Cấu hình cấp Blueprint\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Blueprint%20config.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Blueprint%20config.png')\">\n                    <img src=\"./images/Blueprint%20config.png\" alt=\"Blueprint Config Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Thành Phần</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Locked:</strong> khoá blueprint để tránh chỉnh sửa nhầm topology/metadata khi đang chạy demo.</li>\n                        <li><strong>Deployments:</strong> danh sách các lần triển khai của blueprint này; badge <span class=\"table-badge badge-emerald\">Running</span> báo trạng thái pod trên K8s.</li>\n                        <li><strong>New Deployment:</strong> tạo một instance chạy mới từ đúng bản thiết kế hiện tại — mỗi Deployment độc lập tài nguyên (IP, port) với các Deployment khác.</li>\n                        <li><strong>Sharing & Ownership / Transfer Ownership:</strong> tương tự Artifacts — chuyển quyền sở hữu blueprint cho thành viên khác trong nhóm.</li>\n                        <li><strong>Delete Blueprint (Danger Zone):</strong> chỉ xoá được khi không còn Deployment nào đang chạy.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🚀</div>\n                <div class=\"banner-content\">\n                    Sẵn sàng chạy blueprint? Xem mục <a href=\"#mod-deploy-workflow\">Triển Khai Blueprint</a> — vòng lặp vận hành cốt lõi của CarSky: deploy → theo dõi → teardown.\n                </div>\n            </div>\n        </section><section id=\"mod-nydus-abstract\">\n  <h2 class=\"section-title\">Abstract Node (Node giữ chỗ)</h2>\n  <p class=\"paragraph\">\n    Mục <strong>Abstract</strong> trong node palette tạo một node giữ chỗ chưa có loại cụ thể. Hữu ích khi phác thảo topology trước khi quyết định dùng implementation nào. Trước khi deploy, mọi abstract node phải được chuyển thành loại node thật (Skycraft, Container, Script Node, …) qua hộp thoại <em>Instantiate Abstract Nodes</em>; compiler sẽ từ chối deploy nếu còn abstract node.\n  </p>\n</section>\n",
    "en": "<section id=\"mod-nydus-ui-blueprint-list-en\">\n            <h2 class=\"section-title\">4. Nydus — Blueprint List</h2>\n            <p class=\"paragraph\">\n                Nydus is the \"brain\" behind designing virtual ECU system architecture. Each <strong>Blueprint</strong>\n                is a topology diagram (ECU nodes + the connections between them) that can be deployed into multiple\n                parallel <strong>Deployments</strong>.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Blueprint list & New/Import/Export actions\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Manage%20Blueprint.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Manage%20Blueprint.png')\">\n                    <img src=\"./images/Manage%20Blueprint.png\" alt=\"Manage Blueprint Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Element Breakdown</div>\n                    <ul class=\"details-list\">\n                        <li><strong>New Blueprint:</strong> create a blank canvas to design a new topology from scratch.</li>\n                        <li><strong>Import from File:</strong> reload a previously exported blueprint (JSON file) — used for sharing/backup.</li>\n                        <li><strong>Export Selected:</strong> export the selected blueprint to a file for backup or sharing.</li>\n                        <li><strong>Search deployments:</strong> the search box below the blueprint list shows running Deployments, with a status badge such as <span class=\"table-badge badge-emerald\">Running (22/22)</span> — nodes ready / total nodes.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-nydus-abstract-en\">\n  <h2 class=\"section-title\">Abstract Node (Placeholder)</h2>\n  <p class=\"paragraph\">\n    The <strong>Abstract</strong> entry in the node palette creates a placeholder node with no concrete type. It is useful for sketching a topology before deciding which implementation to use. Before deploying, every abstract node must be converted to a real node type (Skycraft, Container, Script Node, etc.) through the <em>Instantiate Abstract Nodes</em> dialog; the compiler rejects deployment while any abstract node remains.\n  </p>\n</section>\n\n<section id=\"mod-nydus-ui-blueprint-canvas-en\">\n            <h2 class=\"section-title\">Nydus → Canvas & Node Library</h2>\n            <p class=\"paragraph\">\n                Click a blueprint to open its Canvas in the Stage — a drag-and-drop area for placing nodes from the\n                library on the left, wiring signals between nodes, and grouping them into \"zones\" (dashed colored\n                boxes, e.g. <em>TCU Zonal</em>, <em>CDC Zonal</em>) that represent each physical ECU cluster in the\n                vehicle.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Full Layout</span>\n                        Overview canvas of a running Blueprint\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Nydus%20Screen.png')\">🔍 Zoom in</button>\n                </div>\n                <div
