 <strong>một thiết bị USB tại một thờI điểm</strong>.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Chuẩn bị ảnh đĩa USB</h3>\n  <p class=\"paragraph\">\n    Xem hướng dẫn chi tiết tại <a href=\"#mod-usb-image\">Đóng Gói Ảnh Đĩa USB</a>.\n    Tóm tắt nhanh:\n  </p>\n  <pre class=\"code-block\"><code>truncate -s 64M ota.img\nmkfs.vfat -F 32 -n OTA ota.img\nmcopy -i ota.img update.zip ::/</code></pre>\n\n  <h3 class=\"section-subtitle\">Gợi ý sử dụng</h3>\n  <ul>\n    <li>Dùng ảnh đĩa ảo để kiểm thử OTA, flash firmware, hoặc boot từ USB mà không cần phần cứng thật.</li>\n    <li>Dùng remote client để kết nối USB thật từ máy tính trong phòng lab vào VM trên cloud.</li>\n    <li>Xem API Lua trong <a href=\"#mod-script-node-device-proxy\">Device Proxy — Lua API</a>.</li>\n  </ul>\n</section>\n",
    "en": "<section id=\"mod-device-proxy-node-en\">\n  <h2 class=\"section-title\">Device Proxy Node</h2>\n  <p class=\"paragraph\">\n    The <strong>Device Proxy</strong> node lets a VM in the room (usually Skycraft) see and interact with a USB device\n    as if it were plugged directly into the guest. It supports two modes:\n  </p>\n  <ul>\n    <li><strong>Virtual image</strong>: mount an <code>.img</code> file (FAT32) as a virtual USB mass-storage device.</li>\n    <li><strong>Remote proxy</strong>: forward a physical USB device from a workstation/laptop over the network into the VM.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Configuration</h3>\n  <pre class=\"code-block\"><code>{\n  \"deviceProxy\": {\n    \"mediaImageDir\": \"/var/lib/device-proxy/images\",\n    \"inventoryPort\": 28100,\n    \"pollIntervalSeconds\": 5,\n    \"remoteClients\": [\n      {\n        \"id\": \"lab-laptop-1\",\n        \"baseUrl\": \"http://192.168.1.50:7000\",\n        \"authToken\": \"optional-token\"\n      }\n    ]\n  }\n}</code></pre>\n\n  <table>\n    <thead><tr><th>Field</th><th>Description</th></tr></thead>\n    <tbody>\n      <tr><td><code>deviceProxy.mediaImageDir</code></td><td>Host directory containing <code>.img</code> disk images; mounted into both the device-proxy and Skycraft pods.</td></tr>\n      <tr><td><code>deviceProxy.inventoryPort</code></td><td>Device-proxy pod gRPC port. Default <code>28100</code>.</td></tr>\n      <tr><td><code>deviceProxy.pollIntervalSeconds</code></td><td>Inventory polling interval from remote clients (seconds). Default <code>5</code>.</td></tr>\n      <tr><td><code>deviceProxy.remoteClients</code></td><td>Static list of client daemons; more can be registered dynamically from scripts.</td></tr>\n    </tbody>\n  </table>\n\n  <h3 class=\"section-subtitle\">Pin</h3>\n  <ul>\n    <li>Only <strong>usb</strong> pins are allowed.</li>\n    <li>Connect the <code>usb</code> OUTPUT pin of the Device Proxy Node to the <code>usb</code> INPUT pin of a Skycraft Node.</li>\n    <li>Each Device Proxy ↔ Skycraft pair can attach <strong>only one USB device at a time</strong>.</li>\n  </ul>\n\n  <h3 class=\"section-subtitle\">Preparing a USB disk image</h3>\n  <p class=\"paragraph\">\n    See the full guide at <a href=\"#mod-usb-image-en\">Build a USB Disk Image</a>.\n    Quick summary:\n  </p>\n  <pre class=\"code-block\"><code>truncate -s 64M ota.img\nmkfs.vfat -F 32 -n OTA ota.img\nmcopy -i ota.img update.zip ::/</code></pre>\n\n  <h3 class=\"section-subtitle\">Usage tips</h3>\n  <ul>\n    <li>Use a virtual disk image to test OTA updates, firmware flashing, or USB boot without real hardware.</li>\n    <li>Use a remote client to connect a real USB device from a lab machine into a cloud-hosted VM.</li>\n    <li>See the Lua API in <a href=\"#mod-script-node-device-proxy-en\">Device Proxy — Lua API</a>.</li>\n  </ul>\n</section>\n"
  },
  "blueprint-deploy": {
    "vi": "<section id=\"mod-deploy-workflow\">\n  <h2 class=\"section-title\">Quy Trình Deploy Blueprint</h2>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🔁</div>\n    <div class=\"banner-content\">\n      Đây là <strong>vòng lặp vận hành cốt lõi của CarSky</strong>: <strong>thiết kế → validate → deploy → theo dõi → teardown</strong>.\n      Mọi thứ bạn tạo trong <a href=\"#mod-nydus-ui-blueprint-list\">Nydus</a> — blueprint, node, pin — đều chỉ thực sự chạy khi đi qua quy trình\n      deploy này. Nếu chỉ đọc một mục trong tài liệu, hãy đọc mục này.\n    </div>\n  </div>\n\n  <p class=\"paragraph\">\n    Một <strong>Blueprint</strong> chỉ là bản thiết kế; để chạy thực tế bạn cần tạo một <strong>Deployment</strong> —\n    một Room Kubernetes được Operator của Nydus reconcile từ blueprint thành các Pod, Service và ConfigMap.\n    Mỗi blueprint có thể được triển khai nhiều lần, mỗi Deployment là một instance độc lập.\n  </p>\n\n  <ol class=\"steps-list\">\n    <li><strong>Thiết kế topology</strong> trên canvas: kéo node, nối dây, đặt tên và cấu hình pins.</li>\n    <li><strong>Cấu hình blueprint</strong>: chọn vùng trống canvas, kiểm tra Name/Description/Locked trong Inspector.</li>\n    <li><strong>New Deployment</strong>: bấm nút trong Inspector, chọn hoặc tạo Device, đặt tên Deployment.</li>\n    <li><strong>Deploy</strong>: Operator tạo Room trên K8s và báo cáo trạng thái <span class=\"table-badge badge-emerald\">Running</span>.</li>\n    <li><strong>Theo dõi &amp; quản lý</strong>: mở Deployment Viewer để xem topology chạy, log và trạng thái từng node.</li>\n  </ol>\n</section>\n\n<section id=\"mod-deploy-pin-wiring\">\n  <h2 class=\"section-title\">Tạo Pin & Nối Dây Trên Canvas</h2>\n  <p class=\"paragraph\">\n    Pin là điểm giao tiếp của node. Trên canvas bạn thêm pin, đặt tên, chọn loại, rồi kéo dây nối giữa các pin để tạo\n    kênh truyền dữ liệu giữa các node.\n  </p>\n\n  <ol class=\"steps-list\">\n    <li><strong>Chọn node</strong> trên canvas — Inspector bên phải hiển thị danh sách pin hiện có.</li>\n    <li><strong>Thêm pin</strong>: bấm <strong>+ Add Pin</strong>, chọn <code>pinType</code> (CAN, LIN, KUKSA, VIDEO, USB, TUNNEL, ETHERNET, GPIO...).</li>\n    <li><strong>Đặt tên & hướng</strong>: tên pin nên gợi ý vai trò (ví dụ <code>can</code>, <code>kuksa</code>, <code>front</code>); chọn <code>INPUT</code> hoặc <code>OUTPUT</code> theo chiều dữ liệu.</li>\n    <li><strong>Chọn target</strong> (với pin client-only như <code>kuksa</code>, <code>can</code>, <code>lin</code>): chọn node server tương ứng trong dropdown Inspector.</li>\n    <li><strong>Kéo nối dây</strong>: giữ chuột từ chấm nối của pin nguồn, kéo đến chấm nối của pin đích. Hệ thống chỉ cho phép nối khi hai loại pin tương thích.</li>\n  </ol>\n\n  <h3 class=\"section-subtitle\">Quy tắc nối dây hợp lệ</h3>\n  <ul>\n    <li><strong>Phải cùng loại pin</strong>: CAN ↔ CAN, LIN ↔ LIN, KUKSA ↔ KUKSA, VIDEO ↔ VIDEO, USB ↔ USB, ETHERNET ↔ ETHERNET.</li>\n    <li><strong>Server-only node</strong> (KUKSA Broker, CAN Bus, LIN Bus, GPIO Panel) chỉ nhận pin <code>INPUT</code>; các node client phải dùng pin <code>OUTPUT</code> trỏ về target.</li>\n    <li><strong>Container Node</strong> là client với hầu hết các pin; pin <code>can</code>/<code>lin</code> sẽ được tạo interface <code>vcan</code> tương ứng.</li>\n    <li><strong>USB</strong>: Device Proxy Node có pin <code>usb</code> OUTPUT; Skycraft/Container có pin <code>usb</code> INPUT.</li>\n    <li><strong>VIDEO</strong>: shared-memory video topic được tạo theo chiều pin; nhớ tạo Publisher trước Subscriber khi gửi video.</li>\n  </ul>\n\n  <div class=\"info-box\">\n    <strong>💡 Mẹo:</strong> Nếu kéo dây không thành công, kiểm tra lại hướng pin (INPUT/OUTPUT) và loại pin. Một số pin như <code>kuksa</code>\n    trên Container/Script Node là client-only nên không được khai báo <code>port</code>.\n  </div>\n</section>\n\n<section id=\"mod-deploy-dialog\">\n  <h2 class=\"section-title\">Hộp Thoại New Deployment</h2>\n  <p class=\"paragraph\">\n    Khi bấm <strong>New Deployment</strong>, hệ thống yêu cầu chọn <strong>Device</strong> — đại diện cho cụm phần cứng\n    (cluster K8s/hub) nơi Room sẽ được lên pod. Bạn có thể chọn device có sẵn hoặc tạo mới ngay trong dialog.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Modal</span>\n        Deploy Blueprint thành Kubernetes Room\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/deploy-dialog.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/deploy-dialog.png')\">\n      <img src=\"./images/deploy-dialog.png\" alt=\"Hộp thoại Deploy Blueprint\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Các trường quan trọng</div>\n      <ul class=\"details-list\">\n        <li><strong>Deployment Name:</strong> tên Room, mặc định là <code>&lt;blueprint&gt;-deploy</code>. Không được trùng với deployment đang tồn tại.</li>\n        <li><strong>Device:</strong> chọn device đã đăng ký trong hệ thống. Device quyết định namespace, resource pool và kết nối hub.</li>\n        <li><strong>+ Create new device:</strong> tạo nhanh device mới nếu bạn chưa có.</li>\n        <li><strong>Deploy:</strong> bắt đầu reconcile blueprint thành các tài nguyên K8s.</li>\n      </ul>\n    </div>\n  </div>\n</section>\n\n<section id=\"mod-deployment-viewer\">\n  <h2 class=\"section-title\">Deployment Viewer</h2>\n  <p class=\"paragraph\">\n    Sau khi deploy, Deployment Viewer hiển thị topology đang chạy với badge trạng thái từng node.\n    Thanh header cho biết tổng số node sẵn sàng, ví dụ <span class=\"table-badge badge-emerald\">22/22 nodes ready</span>.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Runtime</span>\n        Theo dõi Room đang chạy\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/deployment-viewer.png')\">🔍 Phóng to</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/deployment-viewer.png')\">\n      <img src=\"./images/deployment-viewer.png\" alt=\"Deployment Viewer\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Thao tác trên Deployment</div>\n      <ul class=\"details-list\">\n        <li><strong>Edit:</strong> quay lại blueprint nguồn để chỉnh sửa (có thể yêu cầu dừng deployment).</li>\n        <li><strong>Redeploy:</strong> áp dụng phiên bản blueprint mới nhất cho Room đang chạy.</li>\n        <li><strong>Restart All:</strong> khởi động lại toàn bộ pod trong Room.</li>\n        <li><strong>Delete Deployment:</strong> xoá Room và giải phóng tài nguyên K8s. Blueprint gốc vẫn được giữ lại.</li>\n      </ul>\n    </div>\n  </div>\n\n  <div class=\"info-box\">\n    <strong>⚠️ Lưu ý:</strong> Bạn không thể xoá một blueprint nếu vẫn còn Deployment đang chạy. Hãy xoá Deployment trước,\n    sau đó mới xoá blueprint trong Inspector.\n  </div>\n</section>\n",
    "en": "<section id=\"mod-deploy-workflow-en\">\n  <h2 class=\"section-title\">Blueprint Deployment Workflow</h2>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🔁</div>\n    <div class=\"banner-content\">\n      This is <strong>CarSky's core operational loop</strong>: <strong>design → validate → deploy → monitor → teardown</strong>.\n      Everything you create in <a href=\"#mod-nydus-ui-blueprint-list-en\">Nydus</a> — blueprints, nodes, pins — only actually runs\n      when it goes through this deployment workflow. If you read only one section in this guide, read this one.\n    </div>\n  </div>\n\n  <p class=\"paragraph\">\n    A <strong>Blueprint</strong> is only a design; to actually run it you create a <strong>Deployment</strong> —\n    a Kubernetes Room that the Nydus Operator reconciles from the blueprint into Pods, Services, and ConfigMaps.\n    Each blueprint can be deployed many times, and each Deployment is an independent instance.\n  </p>\n\n  <ol class=\"steps-list\">\n    <li><strong>Design the topology</strong> on the canvas: drag nodes, wire them, name and configure pins.</li>\n    <li><strong>Configure the blueprint</strong>: click an empty area of the canvas and check Name/Description/Locked in the Inspector.</li>\n    <li><strong>New Deployment</strong>: click the button in the Inspector, choose or create a Device, and set a Deployment name.</li>\n    <li><strong>Deploy</strong>: the Operator creates the Room on K8s and reports status <span class=\"table-badge badge-emerald\">Running</span>.</li>\n    <li><strong>Monitor &amp; manage</strong>: open the Deployment Viewer to see the running topology, logs, and per-node status.</li>\n  </ol>\n</section>\n\n<section id=\"mod-deploy-pin-wiring-en\">\n  <h2 class=\"section-title\">Creating Pins & Wiring on the Canvas</h2>\n  <p class=\"paragraph\">\n    A pin is a node's connection point. On the canvas you add pins, name them, pick their type, then drag wires between pins\n    to create data channels between nodes.\n  </p>\n\n  <ol class=\"steps-list\">\n    <li><strong>Select a node</strong> on the canvas — the Inspector on the right shows its existing pins.</li>\n    <li><strong>Add a pin</strong>: click <strong>+ Add Pin</strong> and choose the <code>pinType</code> (CAN, LIN, KUKSA, VIDEO, USB, TUNNEL, ETHERNET, GPIO...).</li>\n    <li><strong>Name & direction</strong>: use a descriptive name (e.g. <code>can</code>, <code>kuksa</code>, <code>front</code>); pick <code>INPUT</code> or <code>OUTPUT</code> to match data flow.</li>\n    <li><strong>Pick a target</strong> (for client-only pins such as <code>kuksa</code>, <code>can</code>, <code>lin</code>): select the corresponding server node in the Inspector dropdown.</li>\n    <li><strong>Drag to connect</strong>: click and drag from the source pin's connector dot to the destination pin's connector dot. The UI only allows compatible types to connect.</li>\n  </ol>\n\n  <h3 class=\"section-subtitle\">Valid wiring rules</h3>\n  <ul>\n    <li><strong>Same pin type only</strong>: CAN ↔ CAN, LIN ↔ LIN, KUKSA ↔ KUKSA, VIDEO ↔ VIDEO, USB ↔ USB, ETHERNET ↔ ETHERNET.</li>\n    <li><strong>Server-only nodes</strong> (KUKSA Broker, CAN Bus, LIN Bus, GPIO Panel) only accept <code>INPUT</code> pins; client nodes must use <code>OUTPUT</code> pins with a target.</li>\n    <li><strong>Container Node</strong> is a client for most pins; <code>can</code>/<code>lin</code> pins get a matching <code>vcan</code> interface.</li>\n    <li><strong>USB</strong>: Device Proxy Node has a <code>usb</code> OUTPUT pin; Skycraft/Container has a <code>usb</code> INPUT pin.</li>\n    <li><strong>VIDEO</strong>: shared-memory video topics are created according to pin direction; when publishing video, create the Publisher before any Subscriber.</li>\n  </ul>\n\n  <div class=\"info-box\">\n    <strong>💡 Tip:</strong> If a wire cannot be drawn, check the pin direction (INPUT/OUTPUT) and pin type. Some pins, such as <code>kuksa</code>\n    on Container/Script Nodes, are client-only and must not declare a <code>port</code>.\n  </div>\n</section>\n\n<section id=\"mod-deploy-dialog-en\">\n  <h2 class=\"section-title\">New Deployment Dialog</h2>\n  <p class=\"paragraph\">\n    When you click <strong>New Deployment</strong>, the system asks for a <strong>Device</strong> — representing the hardware\n    cluster (K8s cluster/hub) where the Room pods will be scheduled. You can select an existing device or create one inline.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Modal</span>\n        Deploy Blueprint as a Kubernetes Room\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/deploy-dialog.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/deploy-dialog.png')\">\n      <img src=\"./images/deploy-dialog.png\" alt=\"Deploy Blueprint dialog\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Important Fields</div>\n      <ul class=\"details-list\">\n        <li><strong>Deployment Name:</strong> the Room name, defaulting to <code>&lt;blueprint&gt;-deploy</code>. Must not conflict with an existing deployment.</li>\n        <li><strong>Device:</strong> choose a registered device. The device determines namespace, resource pool, and hub connectivity.</li>\n        <li><strong>+ Create new device:</strong> quickly create a new device if you don't have one yet.</li>\n        <li><strong>Deploy:</strong> start reconciling the blueprint into K8s resources.</li>\n      </ul>\n    </div>\n  </div>\n</section>\n\n<section id=\"mod-deployment-viewer-en\">\n  <h2 class=\"section-title\">Deployment Viewer</h2>\n  <p class=\"paragraph\">\n    After deployment, the Deployment Viewer shows the running topology with a status badge on each node.\n    The header shows the total ready count, e.g. <span class=\"table-badge badge-emerald\">22/22 nodes ready</span>.\n  </p>\n\n  <div class=\"screenshot-container\">\n    <div class=\"screenshot-header\">\n      <div class=\"screenshot-title\">\n        <span class=\"indicator-badge badge-feature\">Runtime</span>\n        Monitoring a running Room\n      </div>\n      <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/deployment-viewer.png')\">🔍 Zoom in</button>\n    </div>\n    <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/deployment-viewer.png')\">\n      <img src=\"./images/deployment-viewer.png\" alt=\"Deployment Viewer\" class=\"screenshot-img\">\n      <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n    </div>\n    <div class=\"screenshot-details\">\n      <div class=\"details-title\">🧭 Deployment Actions</div>\n      <ul class=\"details-list\">\n        <li><strong>Edit:</strong> return to the source blueprint to edit (may require stopping the deployment).</li>\n        <li><strong>Redeploy:</strong> apply the latest blueprint version to the running Room.</li>\n        <li><strong>Restart All:</strong> restart every pod in the Room.</li>\n        <li><strong>Delete Deployment:</strong> remove the Room and free K8s resources. The source blueprint is kept.</li>\n      </ul>\n    </div>\n  </div>\n\n  <div class=\"info-box\">\n    <strong>⚠️ Note:</strong> You cannot delete a blueprint while any of its Deployments is still running. Delete the Deployment first,\n    then delete the blueprint from the Inspector.\n  </div>\n</section>\n"
  },
  "sdk-overview": {
    "vi": "<section id=\"mod-sdk-intro\">\n  <h2 class=\"section-title\">CarSky SDK — Kết Nối Thiết Bị Biên</h2>\n  <p class=\"paragraph\">\n    <strong>SDK</strong> là bộ công cụ chạy trên <strong>remote hub</strong> (máy Linux PC hoặc board ARM như Raspberry Pi)\n    để kết nối phần cứng thực tế với CarSky cluster qua WebSocket bảo mật (WSS).\n    SDK đóng vai trò cầu nối giữa xe thật / bàn lab và các Room ảo trên Kubernetes.\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Thành phần</th><th>Vai trò</th><th>Dạng chạy</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><strong>scout</strong></td><td>Daemon trên hub: giữ WSS tới gateway, ghép kênh tether + lens, tự động reconnect.</td><td>Long-running process</td></tr>\n      <tr><td><strong>tether</strong></td><td>Thư viện pin runtime + driver adapter cho CAN/GPIO/LIN; liên kết vào scout.</td><td>Library</td></tr>\n      <tr><td><strong>lens</strong></td><td>Thư viện WebRTC transport cho video/audio; nhận frame đã mã hóa từ probe qua UDS.</td><td>Library</td></tr>\n      <tr><td><strong>probe</strong></td><td>Process adapter phần cứng: camera, màn hình, mic, CAN, LIN, GPIO...</td><td>Một process cho mỗi pin slot</td></tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-sdk-scout\">\n  <h2 class=\"section-title\">Scout — Hub Daemon</h2>\n  <p class=\"paragraph\">\n    Scout là điểm vào chính của hub. Nó xác thực với CarSky gateway, tạo <code>scout.json</code> và <code>pins.yaml</code>,\n    rồi duy trì kết nối WSS để gateway có thể định tuyến phần cứng tới đúng Room.\n  </p>\n\n  <pre class=\"code-block\"><code># 1. Đăng nhập\nscout login --key &lt;token&gt; --gateway https://carsky.io\n\n# 2. Khởi tạo hub và file pins.yaml\nscout init myhub\n\n# 3. Thêm pin (video / can / gpio / lin / audio)\nscout pin add cam0 --kind video\nscout pin add can0 --kind can\n\n# 4. Kiểm tra và kết nối\nscout validate\nscout connect            # thêm --insecure cho dev cluster tự ký</code></pre>\n\n  <div class=\"info-box\">\n    <strong>💡 Lưu ý:</strong> Mỗi thư mục làm việc chứa một cặp <code>scout.json</code> (credential) và <code>pins.yaml</code> (pin inventory).\n    Hai hub khác nhau nên chạy trong hai thư mục riêng biệt.\n  </div>\n</section>\n\n<section id=\"mod-sdk-probe\">\n  <h2 class=\"section-title\">Probe — Adapter Phần Cứng</h2>\n  <p class=\"paragraph\">\n    Probe là một binary đa backend: mỗi subcommand tương ứng với một loại phần cứng.\n    Một probe chỉ phụ trách <strong>một slot</strong>; bạn có thể chạy nhiều probe song song để phủ đủ CAN, camera, mic...\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Backend</th><th>Phần cứng / Mục đích</th><th>Ví dụ lệnh</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>simulate</code></td><td>Không cần HW — tạo tín hiệu CAN/GPIO/LIN/video/audio giả lập.</td><td><code>probe simulate --config pins.yaml</code></td></tr>\n      <tr><td><code>socketcan</code></td><td>Linux SocketCAN (can0 / vcan0).</td><td><code>probe socketcan --device-id can0 --iface can0 --mode classic</code></td></tr>\n      <tr><td><code>gpiod</code></td><td>Linux GPIO chardev.</td><td><code>probe gpiod --device-id panel --chip gpiochip0 --pins '[...]'</code></td></tr>\n      <tr><td><code>peak-can</code> / <code>peak-lin</code></td><td>PEAK PCAN-USB / PCAN-LIN-USB.</td><td><code>probe peak-can --device-id pcan0 --device 51 --bitrate 500000</code></td></tr>\n      <tr><td><code>kvaser</code></td><td>Kênh Kvaser <code>canlib</code> (Kvaser USBcan / Leaf / PCIe).</td><td><code>probe kvaser --device-id can0 --channel 0</code></td></tr>\n      <tr><td><code>canusb</code></td><td>Dongle LAWICEL CANUSB qua FTDI D2XX (giao thức SLCAN).</td><td><code>probe canusb --device-id can0 --serial &lt;sn&gt; --bitrate 500000</code></td></tr>\n      <tr><td><code>canoe</code></td><td>Bench Vector CANoe — mặt phẳng dữ liệu CAN qua Vector XL Driver, dùng chung kênh phần cứng với CANoe. <strong>Chỉ Windows</strong>; cần phần cứng Vector thật (VN16xx/VT/CANcaseXL), không dùng được với Simulated Bus.</td><td><code>probe canoe --device-id can0 --channel 1 --namespace A8</code></td></tr>\n      <tr><td><code>stimulus</code></td><td>Hộp relay Modbus RTU + PWM/GPIO qua sysfs (kênh xung tốc độ và encoder âm lượng).</td><td><code>probe stimulus --device-id relay0 --port /dev/ttyUSB0 --config stimulus.json</code></td></tr>\n      <tr><td><code>novalink</code> / <code>capture-video</code></td><td>Capture V4L2 / DirectShow / file video → H.264.</td><td><code>probe capture-video --pin cam0 --source /dev/video0</code></td></tr>\n      <tr><td><code>wavelink</code></td><td>Capture ALSA audio → Opus.</td><td><code>probe wavelink --pin mic0</code></td></tr>\n      <tr><td><code>droidcap</code></td><td>Mirror Android qua scrcpy, passthrough H.264/Opus.</td><td><code>probe droidcap-video --pin screen0 --server-path ...</code></td></tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>⚠️ canoe chỉ chạy trên Windows.</strong> Mặt phẳng dữ liệu CAN của nó liên kết Vector XL Driver (<code>vxlapi64.dll</code>) và mặt phẳng\n    điều khiển launch/CAPL liên kết COM automation — cả hai đều không tồn tại trên Linux/macOS, nên feature <code>canoe</code> được gate theo\n    <code>target_os = \"windows\"</code> và subcommand này không xuất hiện trên nền tảng khác. CANoe phải đang chạy với <strong>phần cứng Vector thật</strong>,\n    không phải Simulated Bus, nếu không probe sẽ không có kênh XL nào để gắn vào.\n  </div>\n\n  <h3 class=\"section-subtitle\">Ví dụ: <code>pins.yaml</code> cho <code>probe simulate</code></h3>\n  <pre class=\"code-block\"><code>name: my-sim\nadapters:\n  - hwPath: probe/can/vehicle\n    config: { socket_dir: ./.sockets }\n  - hwPath: probe/gpio/panel\n    config: { socket_dir: ./.sockets }\n\npins:\n  - { name: vehicle-bus, kind: can,  remote: probe/can/vehicle }\n  - { name: io-panel,    kind: gpio, remote: probe/gpio/panel }\n\nsimulate:\n  socket_dir: ./.sockets\n  pins:\n    - kind: can\n      device_id: vehicle\n      cycle_ms: 100\n      messages:\n        - id: 0x201\n          dlc: 4\n          cycle_ms: 100\n          fields:\n            - { name: rpm, offset: 0, bits: 16, min: 800, max: 6000, step: 100 }\n    - kind: gpio\n      device_id: panel\n      cycle_ms: 500\n      channels:\n        - { id: 0, direction: input, initial: 0, min: 0, max: 1, step: 1 }</code></pre>\n\n  <p class=\"paragraph\">\n    Chạy probe simulate:\n  </p>\n  <pre class=\"code-block\"><code>probe simulate --config pins.yaml</code></pre>\n\n  <h3 class=\"section-subtitle\">Viết adapter tùy chỉnh cho probe</h3>\n  <p class=\"paragraph\">\n    SDK được thiết kế để bên thứ ba có thể tự viết probe adapter mà không cần sửa mã nguồn CarSky.\n    Bạn chỉ cần mở socket local mà scout/tether (hoặc lens) đã bind, thực hiện một handshake nhỏ,\n    rồi trao đổi frame theo đúng wire format của từng loại pin.\n  </p>\n\n  <div class=\"info-box\">\n    <strong>🧠 Hai wire protocol riêng biệt, theo loại pin:</strong>\n    <ul>\n      <li><strong>Loại signal — <code>can</code>, <code>gpio</code>, <code>lin</code>:</strong> kết nối tới socket engine của <strong>tether</strong>,\n        handshake JSON có version + ack, frame hai chiều theo length-prefix. Đây là protocol được mô tả từng bước bên dưới.</li>\n      <li><strong>Loại media — <code>video</code>, <code>audio</code>:</strong> kết nối tới socket engine của <strong>lens</strong> thay vì tether — protocol\n        đơn giản hơn, chỉ một chiều (probe → lens), không có ack. Xem <a href=\"#mod-sdk-probe-media\">Pin kind media</a> bên dưới.</li>\n    </ul>\n  </div>\n\n  <ol class=\"steps-list\">\n    <li><strong>Socket path:</strong> signal dùng <code>&lt;socket_dir&gt;/&lt;kind&gt;-&lt;device_id&gt;.sock</code>\n      (ví dụ <code>/run/tether/can-vehicle.sock</code>); media dùng <code>&lt;socket_dir&gt;/&lt;pin&gt;.sock</code>\n      (ví dụ <code>/run/scout/cam0.sock</code>).</li>\n    <li><strong>Handshake:</strong> gửi một dòng JSON <code>{\"kind\":\"can\",\"wire_version\":1,\"probe_id\":\"my-adapter\"}\\n</code>. Trường <code>kind</code>\n      chỉ nhận <code>\"can\"</code>, <code>\"gpio\"</code>, hoặc <code>\"lin\"</code> ở protocol này.\n      Engine trả lợi <code>{\"accepted\":true,\"wire_version\":1}</code> (hoặc <code>accepted:false</code> nếu lỗi).</li>\n    <li><strong>Framing:</strong> mỗi frame sau handshake có dạng <code>u32 LE length | payload</code>.</li>\n    <li><strong>Payload:</strong> nội dung raw theo định dạng của từng loại pin (mô tả bên dưới).</li>\n  </ol>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🪟</div>\n    <div class=\"banner-content\">\n      <strong>Windows dùng named pipe, không phải Unix domain socket.</strong> \"Socket path\" ở trên là một lớp trừu tượng đa nền tảng\n      (<code>interprocess::local_socket</code> phía engine). Trên Windows, thư mục cha bị bỏ hoàn toàn, chỉ <strong>file stem</strong> của path được\n      dùng làm tên pipe: <code>/run/tether/can-vehicle.sock</code> → named pipe <code>\\\\.\\pipe\\can-vehicle</code>.\n      Adapter chạy trên Windows phải kết nối bằng named-pipe client (vd Win32 <code>CreateFile</code> trên <code>\\\\.\\pipe\\&lt;stem&gt;</code>, hoặc một\n      thư viện IPC đa nền tảng hỗ trợ named pipe) — <strong>không</strong> dùng <code>AF_UNIX</code> như ví dụ Python bên dưới (chỉ chạy trên Linux).\n      Ngoài ra, named pipe chỉ được giải phóng khi listener/instance trước đó đóng hoàn toàn; nếu probe hoặc engine crash mà không đóng handle,\n      tên pipe cũ có thể bị kẹt lại khiến lần reconnect sau thất bại với <code>ERROR_ACCESS_DENIED</code> cho tới khi process đang giữ nó thoát hẳn.\n    </div>\n  </div>\n\n  <p class=\"paragraph\">Ví dụ một CAN adapter đơn giản bằng Python:</p>\n  <pre class=\"code-block\"><code>import socket, struct, json, time\n\nSOCK = \"/run/tether/can-vehicle.sock\"\n\nsock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)\nsock.connect(SOCK)\n\n# 1. Handshake\nhello = json.dumps({\"kind\": \"can\", \"wire_version\": 1, \"probe_id\": \"my-adapter\"})\nsock.sendall((hello + \"\\n\").encode())\nack = json.loads(sock.recv(1024).decode().strip())\nprint(\"engine ack:\", ack)\n\ndef send_can(frame_id, data, extended=False, can_fd=False, brs=False):\n    flags = (1 if extended else 0) | (2 if can_fd else 0) | (4 if brs else 0)\n    payload = bytes([flags])\n    payload += struct.pack(\"&lt;I\", frame_id)\n    payload += bytes([len(data), len(data)])\n    payload += data\n    sock.sendall(struct.pack(\"&lt;I\", len(payload)) + payload)\n\n# 2. Gửi frame 0x201 10 Hz\nwhile True:\n    send_can(0x201, bytes([0x00, 0x10, 0x00, 0x00]))\n    time.sleep(0.1)</code></pre>\n\n  <p class=\"paragraph\">Định dạng payload cho từng loại pin:</p>\n  <table>\n    <thead>\n      <tr><th>Pin kind</th><th>Payload layout</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><code>can</code></td>\n        <td><code>flags(1) | id u32 LE(4) | dlc(1) | data_len(1) | data(N)</code><br>\n        flags: bit0=extended, bit1=can_fd, bit2=brs</td>\n      </tr>\n      <tr>\n        <td><code>gpio</code></td>\n        <td><code>msg_type(1) | channel(1) | direction(1) | value_i16 LE(2) | reserved(1)</code><br>\n        msg_type: 0=state_report, 1=set_output, 2=set_pwm. value = raw / 100.</td>\n      </tr>\n      <tr>\n        <td><code>lin</code></td>\n        <td><code>status(1) | checksum_type(1) | id(1) | data_len(1) | data(N)</code><br>\n        status: 0=Ok, 1=NoResponse, 2=ChecksumError, 3=SyncError, 4=Incomplete.</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>⚠️ Matching slot:</strong> Probe kết nối tới socket do scout/tether bind. Với signal, tên socket là\n    <code>&lt;kind&gt;-&lt;device-id&gt;.sock</code>; với media là <code>&lt;pin&gt;.sock</code>. Hãy đảm bảo <code>--device-id</code> khớp\n    với segment cuối của <code>hwPath</code> trong <code>pins.yaml</code>.\n  </div>\n\n  <h3 class=\"section-subtitle\" id=\"mod-sdk-probe-media\">Pin kind media — <code>video</code> / <code>audio</code> (protocol lens-probe riêng)</h3>\n  <p class=\"paragraph\">\n    Pin video và audio <strong>không</strong> dùng protocol tether-probe ở trên — chúng kết nối tới socket của <strong>lens</strong>\n    (<code>&lt;socket_dir hoặc /run/scout&gt;/&lt;pin&gt;.sock</code>) với hợp đồng đơn giản hơn, một chiều: probe chỉ gửi, không bao giờ\n    đọc frame trả lời.\n  </p>\n  <ol class=\"steps-list\">\n    <li><strong>Handshake:</strong> gửi một dòng JSON kết thúc bằng xuống dòng, không có <code>wire_version</code>/<code>probe_id</code> và lens\n      không trả ack: <code>{\"kind\":\"video\",\"codec\":\"h264\"}\\n</code> (hoặc <code>{\"kind\":\"audio\",\"codec\":\"opus\"}\\n</code>).</li>\n    <li><strong>Framing:</strong> vẫn <code>u32 LE length | payload</code> như protocol signal, nhưng chỉ một chiều (probe → lens).</li>\n    <li><strong>Payload:</strong> mỗi frame là một access unit đã được mã hóa sẵn — H.264 Annex B (kèm start code) cho <code>video</code>,\n      một Opus packet cho <code>audio</code>. Lens không tự mã hóa hộ bạn — probe phải encode trước khi ghi.</li>\n  </ol>\n  <pre class=\"code-block\"><code>import socket\n\nSOCK = \"/run/scout/cam0.sock\"\nsock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)\nsock.connect(SOCK)\nsock.sendall(b'{\"kind\":\"video\",\"codec\":\"h264\"}\\n')\n\ndef send_au(nal_unit: bytes):\n    sock.sendall(len(nal_unit).to_bytes(4, \"little\") + nal_unit)\n\n# send_au(encoded_h264_nal_unit)  # lặp lại cho mỗi frame đã encode, không đọc phản hồi</code></pre>\n</section>\n",
    "en": "<section id=\"mod-sdk-intro-en\">\n  <h2 class=\"section-title\">CarSky SDK — Connecting Edge Devices</h2>\n  <p class=\"paragraph\">\n    The <strong>SDK</strong> is the bundle that runs on a <strong>remote hub</strong> (Linux PC or ARM board such as Raspberry Pi)\n    to connect real hardware to the CarSky cluster over a secure WebSocket (WSS).\n    It acts as the bridge between a physical vehicle / lab bench and virtual Rooms on Kubernetes.\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Component</th><th>Role</th><th>Runs as</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><strong>scout</strong></td><td>Hub daemon: owns the WSS connection to the gateway, multiplexes tether + lens, auto-reconnects.</td><td>Long-running process</td></tr>\n      <tr><td><strong>tether</strong></td><td>Pin runtime library + CAN/GPIO/LIN driver adapters; linked into scout.</td><td>Library</td></tr>\n      <tr><td><strong>lens</strong></td><td>WebRTC media transport library; accepts encoded frames from probes over UDS.</td><td>Library</td></tr>\n      <tr><td><strong>probe</strong></td><td>Out-of-process hardware adapter: camera, screen, microphone, CAN, LIN, GPIO...</td><td>One process per pin slot</td></tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-sdk-scout-en\">\n  <h2 class=\"section-title\">Scout — Hub Daemon</h2>\n  <p class=\"paragraph\">\n    Scout is the main entry point on the hub. It authenticates with the CarSky gateway, creates <code>scout.json</code> and <code>pins.yaml</code>,\n    and maintains the WSS connection so the gateway can route hardware to the right Room.\n  </p>\n\n  <pre class=\"code-block\"><code># 1. Log in\nscout login --key &lt;token&gt; --gateway https://carsky.io\n\n# 2. Initialize the hub and pins.yaml\nscout init myhub\n\n# 3. Add a pin (video / can / gpio / lin / audio)\nscout pin add cam0 --kind video\nscout pin add can0 --kind can\n\n# 4. Validate and connect\nscout validate\nscout connect            # add --insecure for self-signed dev clusters</code></pre>\n\n  <div class=\"info-box\">\n    <strong>💡 Note:</strong> Each working directory holds one <code>scout.json</code> (credential) and <code>pins.yaml</code> (pin inventory) pair.\n    Keep different hubs in separate directories.\n  </div>\n</section>\n\n<section id=\"mod-sdk-probe-en\">\n  <h2 class=\"section-title\">Probe — Hardware Adapter</h2>\n  <p class=\"paragraph\">\n    Probe is a multi-backend binary: each subcommand maps to one hardware type.\n    One probe owns <strong>one slot</strong>; run several side-by-side to cover CAN, camera, microphone, etc.\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Backend</th><th>Hardware / Purpose</th><th>Example command</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><code>simulate</code></td><td>No hardware needed — generates synthetic CAN/GPIO/LIN/video/audio signals.</td><td><code>probe simulate --config pins.yaml</code></td></tr>\n      <tr><td><code>socketcan</code></td><td>Linux SocketCAN (can0 / vcan0).</td><td><code>probe socketcan --device-id can0 --iface can0 --mode classic</code></td></tr>\n      <tr><td><code>gpiod</code></td><td>Linux GPIO chardev.</td><td><code>probe gpiod --device-id panel --chip gpiochip0 --pins '[...]'</code></td></tr>\n      <tr><td><code>peak-can</code> / <code>peak-lin</code></td><td>PEAK PCAN-USB / PCAN-LIN-USB.</td><td><code>probe peak-can --device-id pcan0 --device 51 --bitrate 500000</code></td></tr>\n      <tr><td><code>kvaser</code></td><td>Kvaser <code>canlib</code> channel (Kvaser USBcan / Leaf / PCIe).</td><td><code>probe kvaser --device-id can0 --channel 0</code></td></tr>\n      <tr><td><code>canusb</code></td><td>LAWICEL CANUSB dongle over FTDI D2XX (SLCAN protocol).</td><td><code>probe canusb --device-id can0 --serial &lt;sn&gt; --bitrate 500000</code></td></tr>\n      <tr><td><code>canoe</code></td><td>Vector CANoe bench — CAN data plane via the Vector XL Driver, riding the same hardware channel CANoe uses. <strong>Windows only</strong>; requires real Vector hardware (VN16xx/VT/CANcaseXL), not the Simulated Bus.</td><td><code>probe canoe --device-id can0 --channel 1 --namespace A8</code></td></tr>\n      <tr><td><code>stimulus</code></td><td>Modbus RTU relay box + sysfs PWM/GPIO (speed-pulse and volume-encoder stimulus channels).</td><td><code>probe stimulus --device-id relay0 --port /dev/ttyUSB0 --config stimulus.json</code></td></tr>\n      <tr><td><code>novalink</code> / <code>capture-video</code></td><td>Capture V4L2 / DirectShow / file video to H.264.</td><td><code>probe capture-video --pin cam0 --source /dev/video0</code></td></tr>\n      <tr><td><code>wavelink</code></td><td>Capture ALSA audio to Opus.</td><td><code>probe wavelink --pin mic0</code></td></tr>\n      <tr><td><code>droidcap</code></td><td>Mirror Android via scrcpy, passthrough H.264/Opus.</td><td><code>probe droidcap-video --pin screen0 --server-path ...</code></td></tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>⚠️ canoe is Windows-only.</strong> Its CAN data plane links the Vector XL Driver (<code>vxlapi64.dll</code>) and its launch/CAPL control\n    plane links COM automation — neither exists on Linux/macOS, so the <code>canoe</code> feature is gated on <code>target_os = \"windows\"</code> and the\n    subcommand simply isn't present on other platforms. CANoe must be running against <strong>real Vector hardware</strong>, not a Simulated Bus, or the\n    probe has no XL channel to attach to.\n  </div>\n\n  <h3 class=\"section-subtitle\">Example: <code>pins.yaml</code> for <code>probe simulate</code></h3>\n  <pre class=\"code-block\"><code>name: my-sim\nadapters:\n  - hwPath: probe/can/vehicle\n    config: { socket_dir: ./.sockets }\n  - hwPath: probe/gpio/panel\n    config: { socket_dir: ./.sockets }\n\npins:\n  - { name: vehicle-bus, kind: can,  remote: probe/can/vehicle }\n  - { name: io-panel,    kind: gpio, remote: probe/gpio/panel }\n\nsimulate:\n  socket_dir: ./.sockets\n  pins:\n    - kind: can\n      device_id: vehicle\n      cycle_ms: 100\n      messages:\n        - id: 0x201\n          dlc: 4\n          cycle_ms: 100\n          fields:\n            - { name: rpm, offset: 0, bits: 16, min: 800, max: 6000, step: 100 }\n    - kind: gpio\n      device_id: panel\n      cycle_ms: 500\n      channels:\n        - { id: 0, direction: input, initial: 0, min: 0, max: 1, step: 1 }</code></pre>\n\n  <p class=\"paragraph\">\n    Run the simulate probe:\n  </p>\n  <pre class=\"code-block\"><code>probe simulate --config pins.yaml</code></pre>\n\n  <h3 class=\"section-subtitle\">Writing a custom probe adapter</h3>\n  <p class=\"paragraph\">\n    The SDK is built so third parties can write their own probe adapters without touching CarSky source code.\n    You only need to open the local socket that scout/tether (or lens) has bound, perform a small handshake,\n    then exchange frames in the correct wire format for the pin kind.\n  </p>\n\n  <div class=\"info-box\">\n    <strong>🧠 Two separate wire protocols, by pin kind:</strong>\n    <ul>\n      <li><strong>Signal kinds — <code>can</code>, <code>gpio</code>, <code>lin</code>:</strong> connect to <strong>tether</strong>'s engine socket, versioned\n        JSON hello with an ack, bidirectional length-prefixed frames. This is the protocol documented step-by-step below.</li>\n      <li><strong>Media kinds — <code>video</code>, <code>audio</code>:</strong> connect to <strong>lens</strong>'s engine socket instead — a simpler,\n        one-way (probe → lens only) protocol with no ack. See <a href=\"#mod-sdk-probe-media-en\">Media pin kind</a> below.</li>\n    </ul>\n  </div>\n\n  <ol class=\"steps-list\">\n    <li><strong>Socket path:</strong> signals use <code>&lt;socket_dir&gt;/&lt;kind&gt;-&lt;device_id&gt;.sock</code>\n      (e.g. <code>/run/tether/can-vehicle.sock</code>); media use <code>&lt;socket_dir&gt;/&lt;pin&gt;.sock</code>\n      (e.g. <code>/run/scout/cam0.sock</code>).</li>\n    <li><strong>Handshake:</strong> send one JSON line <code>{\"kind\":\"can\",\"wire_version\":1,\"probe_id\":\"my-adapter\"}\\n</code>. The <code>kind</code> field\n      only accepts <code>\"can\"</code>, <code>\"gpio\"</code>, or <code>\"lin\"</code> on this protocol.\n      The engine replies <code>{\"accepted\":true,\"wire_version\":1}</code> (or <code>accepted:false</code> on error).</li>\n    <li><strong>Framing:</strong> every post-handshake frame is <code>u32 LE length | payload</code>.</li>\n    <li><strong>Payload:</strong> raw bytes per pin kind (see below).</li>\n  </ol>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🪟</div>\n    <div class=\"banner-content\">\n      <strong>Windows uses named pipes, not a Unix domain socket.</strong> The \"socket path\" above is a cross-platform abstraction\n      (<code>interprocess::local_socket</code> on the engine side). On Windows, the parent directory is dropped entirely and only the\n      path's <strong>file stem</strong> becomes the pipe name: <code>/run/tether/can-vehicle.sock</code> → named pipe <code>\\\\.\\pipe\\can-vehicle</code>.\n      A Windows adapter must connect with a named-pipe client (e.g. Win32 <code>CreateFile</code> on <code>\\\\.\\pipe\\&lt;stem&gt;</code>, or a\n      cross-platform IPC crate/library that supports named pipes) — <strong>not</strong> <code>AF_UNIX</code>, which the Python example below uses on Linux.\n      Also note a named pipe is only released when the previous listener/instance is fully torn down; a probe or engine that crashes without\n      closing its handle can leave a stale pipe name that a reconnect fails to rebind (<code>ERROR_ACCESS_DENIED</code>) until the process holding it exits.\n    </div>\n  </div>\n\n  <p class=\"paragraph\">Example of a minimal CAN adapter in Python:</p>\n  <pre class=\"code-block\"><code>import socket, struct, json, time\n\nSOCK = \"/run/tether/can-vehicle.sock\"\n\nsock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)\nsock.connect(SOCK)\n\n# 1. Handshake\nhello = json.dumps({\"kind\": \"can\", \"wire_version\": 1, \"probe_id\": \"my-adapter\"})\nsock.sendall((hello + \"\\n\").encode())\nack = json.loads(sock.recv(1024).decode().strip())\nprint(\"engine ack:\", ack)\n\ndef send_can(frame_id, data, extended=False, can_fd=False, brs=False):\n    flags = (1 if extended else 0) | (2 if can_fd else 0) | (4 if brs else 0)\n    payload = bytes([flags])\n    payload += struct.pack(\"&lt;I\", frame_id)\n    payload += bytes([len(data), len(data)])\n    payload += data\n    sock.sendall(struct.pack(\"&lt;I\", len(payload)) + payload)\n\n# 2. Send frame 0x201 at 10 Hz\nwhile True:\n    send_can(0x201, bytes([0x00, 0x10, 0x00, 0x00]))\n    time.sleep(0.1)</code></pre>\n\n  <p class=\"paragraph\">Payload layout per pin kind:</p>\n  <table>\n    <thead>\n      <tr><th>Pin kind</th><th>Payload layout</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><code>can</code></td>\n        <td><code>flags(1) | id u32 LE(4) | dlc(1) | data_len(1) | data(N)</code><br>\n        flags: bit0=extended, bit1=can_fd, bit2=brs</td>\n      </tr>\n      <tr>\n        <td><code>gpio</code></td>\n        <td><code>msg_type(1) | channel(1) | direction(1) | value_i16 LE(2) | reserved(1)</code><br>\n        msg_type: 0=state_report, 1=set_output, 2=set_pwm. value = raw / 100.</td>\n      </tr>\n      <tr>\n        <td><code>lin</code></td>\n        <td><code>status(1) | checksum_type(1) | id(1) | data_len(1) | data(N)</code><br>\n        status: 0=Ok, 1=NoResponse, 2=ChecksumError, 3=SyncError, 4=Incomplete.</td>\n      </tr>\n    </tbody>\n  </table>\n\n  <div class=\"info-box\">\n    <strong>⚠️ Matching the slot:</strong> The probe connects to a socket bound by scout/tether. For signals the socket name is\n    <code>&lt;kind&gt;-&lt;device-id&gt;.sock</code>; for media it is <code>&lt;pin&gt;.sock</code>. Make sure <code>--device-id</code> matches\n    the last segment of the adapter <code>hwPath</code> in <code>pins.yaml</code>.\n  </div>\n\n  <h3 class=\"section-subtitle\" id=\"mod-sdk-probe-media-en\">Media pin kind — <code>video</code> / <code>audio</code> (separate lens-probe protocol)</h3>\n  <p class=\"paragraph\">\n    Video and audio pins do <strong>not</strong> use the tether-probe protocol above — they connect to <strong>lens</strong>'s socket\n    (<code>&lt;socket_dir or /run/scout&gt;/&lt;pin&gt;.sock</code>) with a simpler, one-way contract: the probe only ever sends, it never\n    reads a reply frame back.\n  </p>\n  <ol class=\"steps-list\">\n    <li><strong>Handshake:</strong> send one line-terminated JSON hello, no <code>wire_version</code>/<code>probe_id</code> and no ack from lens:\n      <code>{\"kind\":\"video\",\"codec\":\"h264\"}\\n</code> (or <code>{\"kind\":\"audio\",\"codec\":\"opus\"}\\n</code>).</li>\n    <li><strong>Framing:</strong> same <code>u32 LE length | payload</code> as the signal protocol, but one-way only (probe → lens).</li>\n    <li><strong>Payload:</strong> one already-encoded access unit per frame — H.264 Annex B (with start codes) for <code>video</code>,\n      one Opus packet for <code>audio</code>. Lens does not encode for you; the probe must encode before writing.</li>\n  </ol>\n  <pre class=\"code-block\"><code>import socket\n\nSOCK = \"/run/scout/cam0.sock\"\nsock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)\nsock.connect(SOCK)\nsock.sendall(b'{\"kind\":\"video\",\"codec\":\"h264\"}\\n')\n\ndef send_au(nal_unit: bytes):\n    sock.sendall(len(nal_unit).to_bytes(4, \"little\") + nal_unit)\n\n# send_au(encoded_h264_nal_unit)  # repeat per encoded frame, no reply to read</code></pre>\n</section>\n"
  },

    "vi": "<section id=\"mod-hubs-ui-hubs\">\n            <h2 class=\"section-title\">5. Hubs — Quản Lý Proxy Node Vật Lý</h2>\n            <p class=\"paragraph\">\n                \"Hub\" là tên gọi trên giao diện cho một <strong>Proxy Node</strong> vật lý — một máy/hộp phần cứng chạy\n                sẵn agent kết nối ngược vào CarSky (qua node <em>Proxy Node</em>/<em>Device Proxy</em> đã khai báo trong\n                blueprint ở mục 4). Panel này quản lý vòng đời đăng ký của các Hub đó, tách biệt với danh sách Devices\n                (vốn là các endpoint phần mềm chạy trong cluster).\n            </p>\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🔌</div>\n                <div class=\"banner-content\">\n                    <strong>Vòng đời một Hub</strong>\n                    Khi một Hub vật lý kết nối lần đầu, nó xuất hiện ở trạng thái <em>Pending</em>. Người quản trị bấm\n                    <strong>Accept</strong> để cho phép Hub tham gia hệ thống, <strong>Revoke</strong> để tạm ngắt quyền\n                    truy cập (Hub vẫn còn trong danh sách), hoặc <strong>Delete</strong> để xoá hẳn đăng ký — lần kết\n                    nối tiếp theo của cùng thiết bị sẽ tạo lại một bản ghi <em>Pending</em> mới.\n                </div>\n            </div>\n            <table>\n                <thead>\n                    <tr><th>Thành phần trên UI</th><th>Ý nghĩa</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>Search hubs...</strong></td><td>Lọc nhanh theo tên/ID Hub.</td></tr>\n                    <tr><td>Icon Wifi / Wifi-off</td><td>Hub đang Online hay Offline tính theo lần heartbeat gần nhất.</td></tr>\n                    <tr><td>Nút Accept</td><td>Chỉ hiện với Hub ở trạng thái Pending — phê duyệt cho tham gia hệ thống.</td></tr>\n                    <tr><td>Nút Revoke</td><td>Thu hồi quyền của một Hub đã Accept trước đó.</td></tr>\n                    <tr><td>Nút Delete</td><td>Xoá đăng ký; dùng để dọn dẹp một Hub đã ngừng sử dụng vĩnh viễn.</td></tr>\n                </tbody>\n            </table>\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Lỗi thường gặp: \"upstream connect error... remote connection failure\"</strong>\n                    Nếu mở panel Hubs thấy dòng đỏ này kèm chỉ báo <em>Reconnecting</em> quay vòng liên tục, nguyên nhân\n                    hầu như luôn là dịch vụ backend <code>nydus-blueprint</code> chưa được triển khai trên\n                    Kubernetes (ví dụ hạ tầng mới khởi tạo nhưng k3s/CRD/operator/blueprint chưa chạy) — xem thêm mục\n                    <a href=\"#mod-faq-faq\">FAQ</a> bên dưới.\n                </div>\n            </div>\n        </section>",
    "en": "<section id=\"mod-hubs-ui-hubs-en\">\n            <h2 class=\"section-title\">5. Hubs — Physical Proxy Node Management</h2>\n            <p class=\"paragraph\">\n                \"Hub\" is the UI name for a physical <strong>Proxy Node</strong> — a machine/hardware box already\n                running an agent that connects back into CarSky (via the <em>Proxy Node</em>/<em>Device Proxy</em>\n                node declared in a blueprint, section 4). This panel manages the registration lifecycle of those\n                Hubs, separate from the Devices list (which are software endpoints running inside the cluster).\n            </p>\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🔌</div>\n                <div class=\"banner-content\">\n                    <strong>A Hub's lifecycle</strong>\n                    When a physical Hub connects for the first time, it appears in <em>Pending</em> state. An\n                    administrator clicks <strong>Accept</strong> to let the Hub join the system, <strong>Revoke</strong>\n                    to temporarily suspend its access (it stays in the list), or <strong>Delete</strong> to remove\n                    the registration entirely — the same device's next connection attempt recreates a fresh\n                    <em>Pending</em> record.\n                </div>\n            </div>\n            <table>\n                <thead>\n                    <tr><th>UI Element</th><th>Meaning</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>Search hubs...</strong></td><td>Quick filter by Hub name/ID.</td></tr>\n                    <tr><td>Wifi / Wifi-off icon</td><td>Whether the Hub is Online or Offline, based on its last heartbeat.</td></tr>\n                    <tr><td>Accept button</td><td>Shown only for a Pending Hub — approves it to join the system.</td></tr>\n                    <tr><td>Revoke button</td><td>Withdraws access from a previously Accepted Hub.</td></tr>\n                    <tr><td>Delete button</td><td>Removes the registration; used to clean up a Hub retired for good.</td></tr>\n                </tbody>\n            </table>\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Common error: \"upstream connect error... remote connection failure\"</strong>\n                    If opening the Hubs panel shows this red line along with a spinning <em>Reconnecting</em>\n                    indicator, the cause is almost always that the <code>nydus-blueprint</code> backend\n                    service hasn't been deployed to Kubernetes (e.g. the infrastructure was just initialized but\n                    k3s/CRD/operator/blueprint hasn't run yet) — see the <a href=\"#mod-faq-faq-en\">FAQ</a> below.\n                </div>\n            </div>\n        </section>"
  },
  "registry": {
    "vi": "<section id=\"mod-registry-ui-registry\">\n            <h2 class=\"section-title\">6. Registry — Container Registry (Zot)</h2>\n            <p class=\"paragraph\">\n                CarSky cung cấp một Container Registry dùng phần mềm mã nguồn mở <strong>Zot</strong>, tách biệt\n                với Artifacts (mục 3) — Registry chỉ lưu <strong>image Docker/OCI</strong>, dùng cho node loại\n                <em>Container</em> hoặc để publish image do ngườI dùng tự build/push từ CI.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-data\">Zot UI (nhúng qua iframe)</span>\n                        Container Registry — Most popular images\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Regissry.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Regissry.png')\">\n                    <img src=\"./images/Regissry.png\" alt=\"Container Registry Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Thành Phần</div>\n                    <ul class=\"details-list\">\n                        <li>Thanh địa chỉ <code>https://registry.carsky.io/</code> — đây là endpoint có thể dùng với <code>docker login</code>/<code>docker push</code> trực tiếp từ máy CI.</li>\n                        <li><strong>Search for content:</strong> tìm image theo tên repository.</li>\n                        <li>Icon con bọ 🐛 / khiên 🛡️: kết quả quét lỗ hổng bảo mật (vulnerability scan) của image, nếu Zot đã bật tính năng này.</li>\n                        <li>Mỗi thẻ image hiển thị hệ điều hành/kiến trúc (linux/arm64), số lượt tải, và thờI điểm publish gần nhất.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <h3 style=\"font-size:16px; margin: 32px 0 12px 0; color: var(--text-primary);\">Đưa Image Từ Máy Client Lên Registry</h3>\n            <p class=\"paragraph\">\n                Registry chỉ hiển thị/duyệt image trên trình duyệt — việc <strong>đẩy image lên</strong> luôn thực hiện\n                bằng Docker CLI từ máy client (máy dev hoặc runner CI), theo 3 bước: đăng nhập, gắn tag đúng địa chỉ\n                registry, rồi push.\n            </p>\n\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🔑</div>\n                <div class=\"banner-content\">\n                    <strong>Xin thông tin đăng nhập trước khi push</strong>\n                    Registry yêu cầu xác thực — không cho push ẩn danh. Bạn có thể đăng nhập bằng tài khoản CarSky SSO\n                    (nếu OIDC đã bật cho Zot) hoặc dùng tên đăng nhập CarSky kèm API key làm password.\n                    Xem hướng dẫn tạo API key trong mục <a href=\"#mod-registry-zot-intro-vi\">Đăng Nhập Registry Zot &amp; Lấy API Key</a>.\n                </div>\n            </div>\n\n            <div class=\"code-container\">\n                <div class=\"code-header\">\n                    <span>Terminal — máy client</span>\n                    <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n                </div>\n                <div class=\"code-block\"><code>#  1. Đăng nhập vào registry (nhập API key khi được hỏi password)\ndocker login registry.carsky.io -u &lt;your_carsky_username&gt;\n\n#  Hoặc dùng --password-stdin để tránh lộ key trong lịch sử lệnh\n#  echo \"&lt;your_api_key&gt;\" | docker login registry.carsky.io -u &lt;your_carsky_username&gt; --password-stdin\n\n#  2. Gắn tag image local theo đúng địa chỉ registry đích\n#     (tên repository tuỳ ý, tag nên đặt rõ ràng — vd tên dự án hoặc số phiên bản)\ndocker tag my-app:latest registry.carsky.io/my-app:latest\n\n#  3. Đẩy image lên registry\ndocker push registry.carsky.io/my-app:latest\n\n#  4. (Tuỳ chọn) Kiểm tra lại bằng cách pull về, hoặc mở lại UI Zot\n#     và tìm \"my-app\" trong ô Search for content ở trên</code></div>\n            </div>\n\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Image không xuất hiện sau khi push thành công</strong>\n                    Kiểm tra lại đúng địa chỉ registry đã gõ. Nếu vẫn không thấy, thử bấm nút làm mới trang Zot hoặc gõ lại từ khoá ở ô Search.\n                </div>\n            </div>\n        </section>\n",
    "en": "<section id=\"mod-registry-ui-registry-en\">\n            <h2 class=\"section-title\">6. Registry — Container Registry (Zot)</h2>\n            <p class=\"paragraph\">\n                CarSky provides a Container Registry built on the open-source <strong>Zot</strong> software,\n                separate from Artifacts (section 3) — Registry stores only <strong>Docker/OCI\n                images</strong>, used by <em>Container</em>-type nodes or to publish images you build/push yourself\n                from CI.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-data\">Zot UI (embedded via iframe)</span>\n                        Container Registry — Most popular images\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Regissry.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Regissry.png')\">\n                    <img src=\"./images/Regissry.png\" alt=\"Container Registry Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Element Breakdown</div>\n                    <ul class=\"details-list\">\n                        <li>The address bar <code>https://registry.carsky.io/</code> — this is the endpoint you can <code>docker login</code>/<code>docker push</code> to directly from a CI machine.</li>\n                        <li><strong>Search for content:</strong> search images by repository name.</li>\n                        <li>Bug 🐛 / shield 🛡️ icon: the image's vulnerability scan result, if Zot has this feature enabled.</li>\n                        <li>Each image card shows its OS/architecture (linux/arm64), download count, and last publish time.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <h3 style=\"font-size:16px; margin: 32px 0 12px 0; color: var(--text-primary);\">Pushing an Image From a Client Machine to the Registry</h3>\n            <p class=\"paragraph\">\n                The Registry only lets you browse images in the browser — actually <strong>pushing an image</strong>\n                is always done with the Docker CLI from a client machine (a dev machine or CI runner), in 3 steps:\n                log in, tag the image with the registry's address, then push.\n            </p>\n\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🔑</div>\n                <div class=\"banner-content\">\n                    <strong>Get login credentials before pushing</strong>\n                    The Registry requires authentication — anonymous pushes aren't allowed. Log in with your CarSky\n                    SSO account (if OIDC is enabled for Zot) or use your CarSky username with an API key as the password.\n                    See <a href=\"#mod-registry-zot-intro-en\">Log In to Zot Registry &amp; Get API Key</a> for how to create a key.\n                </div>\n            </div>\n\n            <div class=\"code-container\">\n                <div class=\"code-header\">\n                    <span>Terminal — client machine</span>\n                    <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n                </div>\n                <div class=\"code-block\"><code>#  1. Log in to the registry (enter the password when prompted)\ndocker login registry.carsky.io -u &lt;your_carsky_username&gt;\n\n#  2. Tag the local image with the target registry address\n#     (the repository name is up to you, but pick a clear tag — e.g. the project name or a version number)\ndocker tag my-app:latest registry.carsky.io/my-app:latest\n\n#  3. Push the image to the registry\ndocker push registry.carsky.io/my-app:latest\n\n#  4. (Optional) Verify by pulling it back, or reopen the Zot UI\n#     and look up \"my-app\" in the Search for content box above</code></div>\n            </div>\n\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Image doesn't show up after a successful push</strong>\n                    Double-check the registry address you typed. If it's still missing,\n                    try refreshing the Zot page or re-typing the keyword in the Search box.\n                </div>\n            </div>\n        </section>\n"
  },
  "dashboard": {
    "vi": "<section id=\"mod-dashboard-ui-dashboard\">\n            <h2 class=\"section-title\">7. Dashboard — Giám Sát Tài Nguyên Runtime</h2>\n            <p class=\"paragraph\">\n                Dashboard tổng hợp tình trạng tài nguyên (CPU/RAM) của toàn bộ pod Kubernetes thuộc một Deployment đang\n                chạy — mỗi thẻ trên lưới tương ứng với một node ECU trong blueprint.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Dashboard theo dõi CPU/MEM từng ECU\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Dashboard.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Dashboard.png')\">\n                    <img src=\"./images/Dashboard.png\" alt=\"Dashboard Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Thành Phần</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Dropdown trên cùng (\"AI_Device01 — Started pack-deploy\"):</strong> chọn Deployment muốn xem thống kê — vì hệ thống có thể chạy song song nhiều Deployment.</li>\n                        <li><strong>CPU USAGE / MEM USAGE:</strong> tổng tài nguyên đang tiêu thụ bởi toàn bộ node trong Deployment đã chọn.</li>\n                        <li><strong>Running · 22/22 nodes ready:</strong> số pod đã sẵn sàng trên tổng số node khai báo trong blueprint.</li>\n                        <li><strong>Khung thời gian (15m):</strong> cửa sổ thời gian dùng để tính biểu đồ sử dụng tài nguyên.</li>\n                        <li><strong>Chấm tròn xanh trước tên node:</strong> pod đang ở trạng thái Running.</li>\n                        <li><strong>Badge BestEffort / Burstable:</strong> lớp QoS (Quality of Service) Kubernetes gán cho pod — Burstable có đặt request/limit tài nguyên, BestEffort thì không giới hạn cứng.</li>\n                        <li><strong>Icon tam giác cảnh báo ⚠️ + số (vd 126):</strong> số lần pod đã restart — số càng cao càng đáng lưu ý, có thể là dấu hiệu crash-loop.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>",
    "en": "<section id=\"mod-dashboard-ui-dashboard-en\">\n            <h2 class=\"section-title\">7. Dashboard — Runtime Resource Monitoring</h2>\n            <p class=\"paragraph\">\n                Dashboard aggregates the resource status (CPU/RAM) of every Kubernetes pod belonging to a running\n                Deployment — each card in the grid corresponds to one ECU node in the blueprint.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Dashboard tracking CPU/MEM per ECU\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Dashboard.png')\">🔍 Zoom in</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Dashboard.png')\">\n                    <img src=\"./images/Dashboard.png\" alt=\"Dashboard Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"View details\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Element Breakdown</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Top dropdown (\"AI_Device01 — Started pack-deploy\"):</strong> choose which Deployment to view stats for — the system can run several Deployments in parallel.</li>\n                        <li><strong>CPU USAGE / MEM USAGE:</strong> total resources consumed by every node in the selected Deployment.</li>\n                        <li><strong>Running · 22/22 nodes ready:</strong> number of pods ready out of the total nodes declared in the blueprint.</li>\n                        <li><strong>Time window (15m):</strong> the time window used to compute the resource-usage chart.</li>\n                        <li><strong>Green dot before a node's name:</strong> the pod is in the Running state.</li>\n                        <li><strong>BestEffort / Burstable badge:</strong> the Kubernetes QoS (Quality of Service) class assigned to the pod — Burstable has resource requests/limits set, BestEffort has none.</li>\n                        <li><strong>Warning triangle icon ⚠️ + number (e.g. 126):</strong> the pod's restart count — the higher it is, the more worth investigating, possibly a sign of a crash loop.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>"
  },
  "ai-integration": {
    "vi": "<section id=\"mod-ai-integration-intro-vi\">\n    <h2 class=\"section-title\">Tích Hợp AI & Điều Khiển Thiết Bị</h2>\n    <p class=\"paragraph\">\n        Tài liệu này hướng dẫn cách các AI agent bên ngoài, script tự động hóa và mô hình vision-language (VLM)\n        kết nối, chụp màn hình và điều khiển thiết bị ảo Android CarSky (Skycraft/Trout).\n    </p>\n\n    <div class=\"banner banner-important\">\n        <div class=\"banner-icon\">🛰️</div>\n        <div class=\"banner-content\">\n            <strong>Kiến Trúc Tương Tác</strong>\n            Bạn điều khiển HMI Android từ AI agent qua <strong>REST API</strong> stateless trên CarSky Gateway —\n            phù hợp cho agent/VLM chạy trên cloud lẫn tự động hóa local.\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-ai-integration-rest-vi\">\n    <h2 class=\"section-title\">Điều Khiển Qua REST API</h2>\n    <p class=\"paragraph\">\n        Tất cả endpoint REST nằm dưới base path <code>/api/v1/vms/{roomId}/{nodeKey}</code>.\n        Gửi kèm API key hoặc token trong header:\n    </p>\n\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>Authorization header</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>Authorization: Bearer &lt;your_api_key_or_token&gt;</code></div>\n    </div>\n\n    <table>\n        <thead>\n            <tr><th>Endpoint</th><th>Method</th><th>Mục đích</th></tr>\n        </thead>\n        <tbody>\n            <tr><td><code>/screenshot</code></td><td>GET</td><td>Chụp màn hình hiện tại dạng PNG.</td></tr>\n            <tr><td><code>/accessibility</code></td><td>GET</td><td>Lấy cây UI dạng JSON có cấu trúc.</td></tr>\n            <tr><td><code>/tap</code></td><td>POST</td><td>Chạm tại tọa độ <code>{x, y}</code>.</td></tr>\n            <tr><td><code>/swipe</code></td><td>POST</td><td>Vuốt từ <code>(x1, y1)</code> đến <code>(x2, y2)</code>.</td></tr>\n            <tr><td><code>/text</code></td><td>POST</td><td>Gõ văn bản ASCII vào thiết bị.</td></tr>\n            <tr><td><code>/key</code></td><td>POST</td><td>Gửi phím Android (Home, Back, Volume...).</td></tr>\n            <tr><td><code>/shell</code></td><td>POST</td><td>Chạy lệnh shell tùy ý bên trong Android.</td></tr>\n        </tbody>\n    </table>\n</section>\n\n<section id=\"mod-ai-integration-example-vi\">\n    <h2 class=\"section-title\">Ví Dụ Python: AI Screen Driver Vòng Kín</h2>\n    <p class=\"paragraph\">\n        Mẫu code minh họa cách một agent GPT-4o hoặc Gemini lấy khung hình màn hình, quyết định hành động và\n        gửi chạm qua REST API.\n    </p>\n\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>ai_driver.py</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Sao chép</button>\n        </div>\n        <div class=\"code-block\"><code>import requests\nimport json\nimport base64\n\nGATEWAY = \"https://carsky.io\"\nROOM_ID = \"l4-ar9uaebz1kol901tl8\"\nNODE_KEY = \"n-2ry3o6id8oeqpvbodpzh9-n8\"\nAPI_KEY = \"your_carsky_api_key\"\n\nHEADERS = {\n    \"Authorization\": f\"Bearer {API_KEY}\",\n    \"Content-Type\": \"application/json\"\n}\n\nBASE_URL = f\"{GATEWAY}/api/v1/vms/{ROOM_ID}/{NODE_KEY}\"\n\ndef capture_screen():\n    response = requests.get(f\"{BASE_URL}/screenshot\", headers=HEADERS)\n    if response.status_code == 200:\n        return response.content\n    raise Exception(\"Failed to capture screenshot\")\n\ndef inject_tap(x, y):\n    payload = {\"x\": x, \"y\": y}\n    response = requests.post(f\"{BASE_URL}/tap\", headers=HEADERS, json=payload)\n    return response.json()\n\ndef run_ai_agent_loop(instruction):\n    print(f\"Goal: {instruction}\")\n    img_data = capture_screen()\n    ui_hierarchy = requests.get(f\"{BASE_URL}/accessibility\", headers=HEADERS).json()\n    print(\"Found UI elements:\", len(ui_hierarchy.get(\"elements\", [])))\n    x, y = 450, 300\n    print(f\"AI acting: Tapping coordinates x={x}, y={y}\")\n    inject_tap(x, y)\n\nif __name__ == \"__main__\":\n    run_ai_agent_loop(\"Open Settings app\")</code></div>\n    </div>\n</section>\n",
    "en": "<section id=\"mod-ai-integration-intro\">\n    <h2 class=\"section-title\">AI Integration & Device Control</h2>\n    <p class=\"paragraph\">\n        This document outlines how external AI agents, automation scripts, and large vision-language models (VLMs)\n        can connect to, capture, and control CarSky Android virtual devices (Skycraft/Trout).\n    </p>\n\n    <div class=\"banner banner-important\">\n        <div class=\"banner-icon\">🛰️</div>\n        <div class=\"banner-content\">\n            <strong>Interaction Architecture</strong>\n            You control the Android HMI from an AI agent through a stateless <strong>REST API</strong> exposed on\n            the CarSky Gateway — suitable for both cloud/VLM agents and local automation.\n        </div>\n    </div>\n</section>\n\n<section id=\"mod-ai-integration-rest\">\n    <h2 class=\"section-title\">Controlling Devices via REST API</h2>\n    <p class=\"paragraph\">\n        All REST endpoints are available under the base path <code>/api/v1/vms/{roomId}/{nodeKey}</code>.\n        Include the CarSky API key or authorization token in the request header:\n    </p>\n\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>Authorization header</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>Authorization: Bearer &lt;your_api_key_or_token&gt;</code></div>\n    </div>\n\n    <table>\n        <thead>\n            <tr><th>Endpoint</th><th>Method</th><th>Purpose</th></tr>\n        </thead>\n        <tbody>\n            <tr><td><code>/screenshot</code></td><td>GET</td><td>Capture current screen framebuffer as PNG.</td></tr>\n            <tr><td><code>/accessibility</code></td><td>GET</td><td>Get UI hierarchy as structured JSON.</td></tr>\n            <tr><td><code>/tap</code></td><td>POST</td><td>Tap at coordinates <code>{x, y}</code>.</td></tr>\n            <tr><td><code>/swipe</code></td><td>POST</td><td>Swipe from <code>(x1, y1)</code> to <code>(x2, y2)</code>.</td></tr>\n            <tr><td><code>/text</code></td><td>POST</td><td>Type ASCII text into the device.</td></tr>\n            <tr><td><code>/key</code></td><td>POST</td><td>Send Android key event (Home, Back, Volume, etc.).</td></tr>\n            <tr><td><code>/shell</code></td><td>POST</td><td>Execute arbitrary shell command inside Android.</td></tr>\n        </tbody>\n    </table>\n</section>\n\n\n<section id=\"mod-ai-integration-example\">\n    <h2 class=\"section-title\">Python Example: Closed-Loop AI Screen Driver</h2>\n    <p class=\"paragraph\">\n        A boilerplate demonstrating how a GPT-4o or Gemini agent can pull screen frames, decide on an action,\n        and inject touch inputs using the REST API.\n    </p>\n\n    <div class=\"code-container\">\n        <div class=\"code-header\">\n            <span>ai_driver.py</span>\n            <button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button>\n        </div>\n        <div class=\"code-block\"><code>import requests\nimport json\nimport base64\n\nGATEWAY = \"https://carsky.io\"\nROOM_ID = \"l4-ar9uaebz1kol901tl8\"\nNODE_KEY = \"n-2ry3o6id8oeqpvbodpzh9-n8\"\nAPI_KEY = \"your_carsky_api_key\"\n\nHEADERS = {\n    \"Authorization\": f\"Bearer {API_KEY}\",\n    \"Content-Type\": \"application/json\"\n}\n\nBASE_URL = f\"{GATEWAY}/api/v1/vms/{ROOM_ID}/{NODE_KEY}\"\n\ndef capture_screen():\n    response = requests.get(f\"{BASE_URL}/screenshot\", headers=HEADERS)\n    if response.status_code == 200:\n        return response.content\n    raise Exception(\"Failed to capture screenshot\")\n\ndef inject_tap(x, y):\n    payload = {\"x\": x, \"y\": y}\n    response = requests.post(f\"{BASE_URL}/tap\", headers=HEADERS, json=payload)\n    return response.json()\n\ndef run_ai_agent_loop(instruction):\n    print(f\"Goal: {instruction}\")\n    img_data = capture_screen()\n    ui_hierarchy = requests.get(f\"{BASE_URL}/accessibility\", headers=HEADERS).json()\n    print(\"Found UI elements:\", len(ui_hierarchy.get(\"elements\", [])))\n    x, y = 450, 300\n    print(f\"AI acting: Tapping coordinates x={x}, y={y}\")\n    inject_tap(x, y)\n\nif __name__ == \"__main__\":\n    run_ai_agent_loop(\"Open Settings app\")</code></div>\n    </div>\n</section>\n"
  },
  "api-mcp-tools": {
    "vi": "<div class=\"module-content\" id=\"mod-api-mcp-tools-container-vi\">\n<section id=\"mod-api-mcp-tools-intro-vi\">\n<h2 class=\"section-title\">Giới thiệu</h2>\n<blockquote>\n<p><strong>Mục đích</strong>: Giúp người dùng cuối và AI agent hiểu cách giao tiếp với hệ thống CarSky qua REST API và MCP server. Không yêu cầu biết lập trình sâu.</p>\n<p><strong>Cập nhật</strong>: 2026-07-16<br />\n<strong>Trạng thái</strong>: Tài liệu tham khảo — cập nhật khi API hoặc MCP server có thay đổi.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-1-t-ng-quan-vi\">\n<h2 class=\"section-title\">1. Tổng quan</h2>\n<p class=\"paragraph\">CarSky cung cấp hai cách chính để tự động hóa và điều khiển từ xa:</p>\n<table>\n<thead>\n<tr>\n<th>Cách tiếp cận</th>\n<th>Mô tả</th>\n<th>Khi nào dùng</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>REST API</strong></td>\n<td>Giao thức HTTP/JSON truyền thống. Bạn gọi đến các địa chỉ endpoint để lấy dữ liệu, điều khiển VM, gửi tín hiệu, v.v.</td>\n<td>Dùng cho script tự động, ứng dụng bên thứ ba, hoặc agent chạy trên cloud.</td>\n</tr>\n<tr>\n<td><strong>MCP Server</strong></td>\n<td>Một server theo chuẩn <strong>Model Context Protocol</strong> (MCP) mà các AI agent có thể kết nối. Nó đóng gói các thao tác thường dùng thành các <strong>tool</strong> có tên, mô tả và tham số rõ ràng.</td>\n<td>Dùng cho AI assistant/agent muốn điều khiển CarSky một cách tự nhiên.</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>Quan hệ giữa API và MCP</strong>: Hầu hết các MCP tool đều gọi ngầm đến REST API của CarSky. MCP chỉ là \"lớp bao bọc\" giúp AI agent dễ dùng hơn.</p>\n</blockquote>\n<hr />\n</section>\n<section id=\"mod-api-mcp-tools-2-x-c-th-c-authentication-vi\">\n<h2 class=\"section-title\">2. Xác thực (Authentication)</h2>\n<p class=\"paragraph\">Cả API và MCP đều cần một khóa API hoặc token để xác thực.</p>\n<h3>2.1 Lấy khóa API</h3>\n<ol>\n<li>Đăng nhập vào giao diện CarSky (Rework UI).</li>\n<li>Bấm vào ảnh đ
