<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarSky Platform - Hướng Dẫn Vận Hành Chi Tiết Giao Diện</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>


        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
            --sidebar-width: 300px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Sidebar Navigation */
        aside {
            width: var(--sidebar-width);
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .company-badge {
            padding: 16px 24px 0 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .company-badge img {
            height: 26px;
            width: auto;
        }

        .brand-section {
            padding: 16px 24px 24px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            flex-shrink: 0;
        }

        .brand-logo img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-name {
            font-size: 18px;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .brand-version {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .search-container {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        nav {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .nav-group {
            margin-bottom: 24px;
        }

        .nav-group-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-left: 12px;
            font-weight: 700;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, rgba(6, 182, 212, 0.05) 100%);
            color: var(--accent-cyan);
            border-left: 3px solid var(--accent-cyan);
            padding-left: 9px;
        }

        /* Sidebar Parts (Reference / Tutorial) */
        .nav-part {
            margin-bottom: 4px;
        }

        .nav-part-title {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .nav-part-title:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }

        .nav-chevron {
            display: inline-block;
            font-size: 10px;
            color: var(--accent-cyan);
            transform: rotate(90deg);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .nav-part.collapsed > .nav-part-title .nav-chevron {
            transform: rotate(0deg);
        }

        .nav-part.collapsed .nav-part-body {
            display: none;
        }

        /* Nested nav items (children of a module, e.g. Script Node pins) */
        .nav-item.has-children .nav-chevron {
            margin-left: auto;
            color: var(--text-muted);
        }

        .nav-item-wrap.collapsed > .nav-item.has-children .nav-chevron {
            transform: rotate(0deg);
        }

        .nav-item-wrap.collapsed .nav-children {
            display: none;
        }

        .nav-children {
            display: none;
            margin-left: 14px;
            padding-left: 8px;
            border-left: 1px solid var(--border-color);
        }

        .nav-item-wrap.expanded > .nav-children {
            display: block;
        }

        .nav-item.nav-subitem {
            font-size: 12px;
            padding: 6px 10px 6px 28px;
            margin-bottom: 2px;
            margin-left: 14px;
            color: var(--text-secondary);
            border-left: 1px solid var(--border-color);
        }

        .nav-item.nav-subitem.active {
            padding-left: 25px;
        }

        .nav-item.nav-section {
            font-size: 11.5px;
            padding: 5px 10px 5px 14px;
            margin-bottom: 1px;
            color: var(--text-muted);
        }

        .nav-item.nav-section.active {
            padding-left: 11px;
            color: var(--accent-cyan);
        }

        /* Cross-reference links inside content */
        main a {
            color: var(--accent-cyan);
            text-decoration: none;
            border-bottom: 1px dotted rgba(6, 182, 212, 0.4);
            transition: opacity 0.2s ease;
        }

        main a:hover {
            opacity: 0.75;
            border-bottom-style: solid;
        }

        /* Collapsible feature lists */
        details.feature-list {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px 18px;
            margin: 14px 0;
        }

        details.feature-list summary {
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        details.feature-list summary::-webkit-details-marker {
            display: none;
        }

        details.feature-list summary::before {
            content: '\25B8';
            color: var(--accent-cyan);
            font-size: 12px;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        details.feature-list[open] summary::before {
            transform: rotate(90deg);
        }

        details.feature-list details {
            margin: 6px 0 6px 16px;
            padding-left: 12px;
            border-left: 1px solid var(--border-color);
        }

        details.feature-list details summary {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 5px 0;
        }

        details.feature-list details[open] summary {
            color: var(--accent-cyan);
        }

        /* Main Content Layout */
        main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px 60px;
            max-width: 1250px;
        }

        .header-content {
            margin-bottom: 48px;
            position: relative;
        }

        .header-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 99px;
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent-cyan);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .main-title {
            font-size: 34px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Content Sections */
        section {
            margin-bottom: 80px;
            scroll-margin-top: 40px;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: linear-gradient(to bottom, var(--accent-cyan), var(--accent-blue));
            border-radius: 2px;
        }

        .paragraph {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 18px;
        }

        /* Screenshot Gallery Elements */
        .screenshot-container {
            margin: 32px 0 48px 0;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .screenshot-header {
            padding: 14px 20px;
            background-color: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .screenshot-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .screenshot-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .screenshot-view-btn {
            font-size: 12px;
            color: var(--accent-cyan);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
        }

        .screenshot-view-btn:hover {
            opacity: 0.8;
        }

        .screenshot-image-wrapper {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background-color: #0d1117;
            border-bottom: 1px solid var(--border-color);
        }

        .screenshot-img {
            max-width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .screenshot-image-wrapper:hover .screenshot-img {
            transform: scale(1.005);
        }

        .screenshot-overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 25, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .screenshot-image-wrapper:hover .screenshot-overlay {
            opacity: 1;
        }

        .screenshot-overlay-btn {
            background-color: rgba(6, 182, 212, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3);
        }

        .screenshot-overlay-btn.screenshot-overlay-icon {
            padding: 10px 12px;
            border-radius: 50%;
            font-size: 16px;
            line-height: 1;
        }

        .screenshot-details {
            padding: 24px;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .details-title {
            font-size: 14.5px;
            color: white;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 6px;
        }

        .details-sub-section {
            margin-bottom: 18px;
        }

        .details-sub-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .details-list {
            list-style: none;
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .details-list li {
            margin-bottom: 8px;
            padding-left: 18px;
            position: relative;
        }

        .details-list li strong {
            color: var(--text-primary);
        }

        .details-list li::before {
            content: '▫';
            color: var(--accent-blue);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        /* Alert Banners */
        .banner {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            border-left: 4px solid;
            background-color: rgba(17, 24, 39, 0.5);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .banner-icon {
            font-size: 20px;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .banner-content {
            font-size: 13.5px;
            line-height: 1.6;
        }

        .banner-content strong {
            display: block;
            margin-bottom: 4px;
            font-size: 14.5px;
        }

        .banner-important {
            border-color: var(--accent-cyan);
            border-left-color: var(--accent-cyan);
            box-shadow: inset 3px 0 0 var(--accent-cyan);
        }
        .banner-important .banner-icon { color: var(--accent-cyan); }
        .banner-important strong { color: var(--accent-cyan); }

        .banner-caution {
            border-color: var(--accent-rose);
            border-left-color: var(--accent-rose);
            box-shadow: inset 3px 0 0 var(--accent-rose);
        }
        .banner-caution .banner-icon { color: var(--accent-rose); }
        .banner-caution strong { color: var(--accent-rose); }

        /* Code Blocks */
        .code-container {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin: 20px 0;
            overflow: hidden;
            font-family: monospace;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .code-header {
            padding: 10px 16px;
            background-color: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--accent-cyan);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }

        .code-block {
            padding: 16px;
            overflow-x: auto;
            color: #c9d1d9;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre;
            word-wrap: normal;
        }

        /* Custom Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            font-size: 13.5px;
        }

        th {
            background-color: rgba(255, 255, 255, 0.03);
            color: white;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.01);
            color: var(--text-primary);
        }

        .table-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-cyan { background: rgba(6, 182, 212, 0.1); color: var(--accent-cyan); border: 1px solid rgba(6, 182, 212, 0.2); }
        .badge-emerald { background: rgba(16, 185, 129, 0.1); color: var(--accent-emerald); border: 1px solid rgba(16, 185, 129, 0.2); }

        /* Accordion FAQ */
        .faq-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .faq-header {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 14.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            transition: background-color 0.2s;
        }

        .faq-header:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .faq-icon {
            font-size: 15px;
            color: var(--accent-cyan);
            transition: transform 0.3s ease;
        }

        .faq-item.open .faq-icon {
            transform: rotate(90deg);
        }

        .faq-body {
            padding: 0 20px 20px 20px;
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: none;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .faq-item.open .faq-body {
            display: block;
        }

        /* Lightbox Modal */
        .lightbox {
            position: fixed;
            inset: 0;
            background-color: rgba(11, 15, 25, 0.96);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 40px;
        }

        .lightbox.show {
            display: flex;
            opacity: 1;
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .lightbox-close:hover {
            background-color: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        .lightbox-content {
            max-width: 95%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Group Indicator badges */
        .indicator-badge {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
        }
        .badge-feature {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        .badge-data {
            background-color: rgba(245, 158, 11, 0.12);
            color: var(--accent-amber);
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        /* Language Toggle */
        .lang-toggle {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .lang-btn {
            flex: 1;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .lang-btn:hover {
            color: var(--text-primary);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
        }

        /* Language content blocks — .lang-en hidden by default; body.lang-en-active flips both */
        .lang-en {
            display: none;
        }

        body.lang-en-active .lang-vi {
            display: none;
        }

        body.lang-en-active .lang-en {
            display: block;
        }

        /* ==================== UI Polish (2025-07-16) ==================== */

            margin-bottom: 12px !important;

            padding-bottom: 8px !important;
            border-bottom: 1px solid var(--border-color) !important;
            display: flex !important;
            align-items: center !important;
        }

        .nav-item {
            padding: 8px 12px 8px 24px !important;
            margin-bottom: 2px !important;
            line-height: 1.4 !important;
            position: relative !important;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--text-muted);
            opacity: 0.5;
            transition: all 0.2s ease;
        }

        .nav-item:hover::before {
            opacity: 1;
            background-color: var(--accent-cyan);
        }

        .nav-item.active {
            padding-left: 24px !important;
            border-left: none !important;
        }

        .nav-item.active::before {
            opacity: 1;
            background-color: var(--accent-cyan);
            width: 5px;
            height: 5px;
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        /* Content headings — size scale by hierarchy */
        .section-subtitle {
            font-size: 18px;
            margin: 32px 0 16px 0;
            padding-left: 14px;
            border-left: 3px solid var(--accent-blue);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        main h4 {
            font-size: 15px;
            margin: 24px 0 12px 0;
            color: var(--accent-cyan);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        main h3:not(.section-subtitle) {
            font-size: 17px;
            margin: 28px 0 14px 0;
            color: var(--text-primary);
            font-weight: 600;
            padding-left: 12px;
            border-left: 2px solid var(--text-muted);
        }

        /* Inline code */
        :not(pre) > code {
            background-color: rgba(6, 182, 212, 0.1);
            color: var(--accent-cyan);
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.88em;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            border: 1px solid rgba(6, 182, 212, 0.15);
        }

        /* Content lists */
        main ul,
        main ol {
            margin: 0 0 20px 0;
            padding-left: 24px;
        }

        main ul li,
        main ol li {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.75;
            margin-bottom: 8px;
        }

        main ul li::marker {
            color: var(--accent-blue);
        }

        main ol li::marker {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        main li strong {
            color: var(--text-primary);
        }

        /* Blockquote */
        main blockquote {
            margin: 20px 0;
            padding: 14px 20px;
            background-color: rgba(59, 130, 246, 0.06);
            border-left: 4px solid var(--accent-blue);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-size: 13.5px;
            line-height: 1.65;
        }

        main blockquote p {
            margin-bottom: 8px;
        }

        main blockquote p:last-child {
            margin-bottom: 0;
        }

        /* Horizontal rule */
        main hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
            margin: 36px 0;
        }

        /* Info box (callout) */
        .info-box {
            background-color: rgba(59, 130, 246, 0.07);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-left: 4px solid var(--accent-blue);
            padding: 14px 18px;
            border-radius: 0 10px 10px 0;
            margin: 20px 0;
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.65;
        }

        .info-box strong {
            color: var(--accent-blue);
        }

        /* Steps list (ordered workflow) */
        .steps-list {
            list-style: none;
            counter-reset: step-counter;
            padding-left: 8px;
            margin: 24px 0;
        }

        .steps-list li {
            counter-increment: step-counter;
            position: relative;
            padding-left: 48px;
            margin-bottom: 16px;
            min-height: 32px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .steps-list li::before {
            content: counter(step-counter);
            position: absolute;
            left: 0;
            top: 0;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.3);
        }

        /* Screenshot figure */
        figure.screenshot {
            margin: 24px 0;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        figure.screenshot img {
            width: 100%;
            height: auto;
            display: block;
        }

        figure.screenshot figcaption {
            padding: 12px 16px;
            font-size: 12.5px;
            color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border-color);
            font-style: italic;
        }

        /* Raw pre code block (without container) */
        pre.code-block {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            overflow-x: auto;
            color: #c9d1d9;
            font-size: 13px;
            line-height: 1.6;
            margin: 16px 0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }

        pre.code-block code {
            background: none;
            border: none;
            padding: 0;
            color: inherit;
            font-size: inherit;
        }

        /* Banner warning variant */
        .banner-warning {
            border-color: var(--accent-amber);
            border-left-color: var(--accent-amber);
            box-shadow: inset 3px 0 0 var(--accent-amber);
        }
        .banner-warning .banner-icon { color: var(--accent-amber); }
        .banner-warning strong { color: var(--accent-amber); }

        .banner {

            width: 24px;
            height: 24px;
            vertical-align: middle;
            stroke: currentColor;
            fill: none;

h>Chức năng chính</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><rect width=\"20\" height=\"14\" x=\"2\" y=\"3\" rx=\"2\"/><line x1=\"8\" x2=\"16\" y1=\"21\" y2=\"21\"/><line x1=\"12\" x2=\"12\" y1=\"17\" y2=\"21\"/></svg></td><td><strong>Devices</strong></td><td>Danh sách thiết bị đã kết nối, gắn widget theo dõi/điều khiển</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><rect width=\"18\" height=\"18\" x=\"3\" y=\"3\" rx=\"2\"/><path d=\"M7 3v18\"/><path d=\"M3 7.5h4\"/><path d=\"M3 12h18\"/><path d=\"M3 16.5h4\"/><path d=\"M17 3v18\"/><path d=\"M17 7.5h4\"/><path d=\"M17 16.5h4\"/></svg></td><td><strong>Videos</strong></td><td>Thư viện video đã ghi lại từ các phiên stream màn hình</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><path d=\"M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z\"/><path d=\"M12 22V12\"/><polyline points=\"3.29 7 12 12 20.71 7\"/><path d=\"m7.5 4.27 9 5.15\"/></svg></td><td><strong>Artifacts</strong></td><td>Kho lưu trữ image OS (Android/AGL), file DBC/LDF, script, ảnh USB</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><rect width=\"8\" height=\"8\" x=\"3\" y=\"3\" rx=\"2\"/><path d=\"M7 11v4a2 2 0 0 0 2 2h4\"/><rect width=\"8\" height=\"8\" x=\"13\" y=\"13\" rx=\"2\"/></svg></td><td><strong>Nydus</strong></td><td>Trình thiết kế Blueprint dạng canvas kéo-thả và quản lý Deployment</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><path d=\"M12 22v-5\"/><path d=\"M15 8V2\"/><path d=\"M17 8a1 1 0 0 1 1 1v4a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1z\"/><path d=\"M9 8V2\"/></svg></td><td><strong>Hubs</strong></td><td>Quản lý các Proxy Node/Hub vật lý đã đăng ký vào hệ thống</td></tr>\n                    <tr><td><svg class=\"dock-ic     "en": "<!-- Header -->\n        <header class=\"header-content\">\n            <span class=\"header-badge\">System Operation Guide</span>\n            <h1 class=\"main-title\">CarSky Platform UI User Manual</h1>\n            <p class=\"main-desc\">\n                This document walks through the CarSky platform's administration interface in detail —\n                organized in the exact order of the 7 items in the app's left navigation bar:\n                <strong>Devices → Videos → Artifacts → Nydus → Hubs → Registry → Dashboard</strong>.\n            </p>\n        </header>\n\n        <!-- 0. OVERVIEW -->\n        \n\n<section id=\"mod-overview-overview-en\">\n            <h2 class=\"section-title\">0. Workbench Layout Overview</h2>\n            <p class=\"paragraph\">\n                CarSky is the platform's central web administration app, running at <code>https://carsky.io</code>.\n                After signing in via Keycloak SSO,\n                everything happens inside a three-column \"workbench\" window that can open/close many tabs like an IDE:\n            </p>\n\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">💡</div>\n                <div class=\"banner-content\">\n                    <strong>The Workbench's 3-Column Structure</strong>\n                    The left column holds the list <strong>Panels</strong> (Devices/Nydus/Artifacts...) — each panel is\n                    a tab, and several can be open side by side. The middle column is the <strong>Stage</strong> —\n                    where the main content renders (screen stream, blueprint canvas...). The right column is the\n                    <strong>Inspector</strong> — a detailed property panel for whatever is currently selected (widget,\n                    node, blueprint...). Every tab has an <code>×</code> button to close it.\n                </div>\n            </div>\n\n            <table>\n                <thead>\n                    <tr><th>Dock Icon (far left)</th><th>Section</th><th>Main function</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><rect width=\"20\" height=\"14\" x=\"2\" y=\"3\" rx=\"2\"/><line x1=\"8\" x2=\"16\" y1=\"21\" y2=\"21\"/><line x1=\"12\" x2=\"12\" y1=\"17\" y2=\"21\"/></svg></td><td><strong>Devices</strong></td><td>List of connected devices; attach widgets to monitor/control them</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><rect width=\"18\" height=\"18\" x=\"3\" y=\"3\" rx=\"2\"/><path d=\"M7 3v18\"/><path d=\"M3 7.5h4\"/><path d=\"M3 12h18\"/><path d=\"M3 16.5h4\"/><path d=\"M17 3v18\"/><path d=\"M17 7.5h4\"/><path d=\"M17 16.5h4\"/></svg></td><td><strong>Videos</strong></td><td>Library of videos recorded from screen-stream sessions</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><path d=\"M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z\"/><path d=\"M12 22V12\"/><polyline points=\"3.29 7 12 12 20.71 7\"/><path d=\"m7.5 4.27 9 5.15\"/></svg></td><td><strong>Artifacts</strong></td><td>Storage for OS images (Android/AGL), DBC/LDF files, scripts, USB images</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><rect width=\"8\" height=\"8\" x=\"3\" y=\"3\" rx=\"2\"/><path d=\"M7 11v4a2 2 0 0 0 2 2h4\"/><rect width=\"8\" height=\"8\" x=\"13\" y=\"13\" rx=\"2\"/></svg></td><td><strong>Nydus</strong></td><td>Drag-and-drop Blueprint canvas designer and Deployment management</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><path d=\"M12 22v-5\"/><path d=\"M15 8V2\"/><path d=\"M17 8a1 1 0 0 1 1 1v4a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1z\"/><path d=\"M9 8V2\"/></svg></td><td><strong>Hubs</strong></td><td>Manage physical Proxy Node/Hub devices registered to the system</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><path d=\"M22 7.7c0-.6-.4-1.2-.8-1.5l-6.3-3.9a1.72 1.72 0 0 0-1.7 0l-10.3 6c-.5.2-.9.8-.9 1.4v6.6c0 .5.4 1.2.8 1.5l6.3 3.9a1.72 1.72 0 0 0 1.7 0l10.3-6c.5-.3.9-1 .9-1.5Z\"/><path d=\"M10 21.9V14L2.1 9.1\"/><path d=\"m10 14 11.9-6.9\"/><path d=\"M14 19.8v-8.1\"/><path d=\"M18 17.5V9.4\"/></svg></td><td><strong>Registry</strong></td><td>Container Registry (Zot) — the platform's Docker image store</td></tr>\n                    <tr><td><svg class=\"dock-icon\" viewBox=\"0 0 24 24\"><path d=\"m12 14 4-4\"/><path d=\"M3.34 19a10 10 0 1 1 17.32 0\"/></svg></td><td><strong>Dashboard</strong></td><td>Real-time CPU/RAM and per-ECU pod status monitoring</td></tr>\n                </tbody>\n            </table>\n\n            <div class=\"banner banner-important\">\n                <div class=\"banner-icon\">🧠</div>\n                <div class=\"banner-content\">\n                    Just getting started? Continue with <a href=\"#mod-concepts-mental-model-en\">Concepts & Mental Model</a> to understand how\n                    Blueprint → Deploy → Room → Device → Widget fit together, then jump straight to\n                    <a href=\"#mod-deploy-workflow-en\">Deploy a Blueprint</a> — CarSky's core operational loop.\n                </div>\n            </div>\n        </section>"
  },
  "concepts": {
    "vi": "<section id=\"mod-concepts-mental-model\">\n  <h2 class=\"section-title\">Mental Model: Các Mảnh Ghép Liên Kết Thế Nào?</h2>\n  <p class=\"paragraph\">\n    CarSky có 5 khái niệm trung tâm. Nắm được mối quan hệ giữa chúng là chìa khoá để hiểu mọi màn hình còn lại\n    trong tài liệu này:\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🗺️</div>\n    <div class=\"banner-content\">\n      <strong>Blueprint</strong> (bản thiết kế) → <strong>Deploy</strong> (triển khai) → <strong>Room</strong> (instance đang chạy trên Kubernetes)\n      → <strong>Device</strong> (phần cứng/VM kết nối vào) → <strong>Widget</strong> (cửa sổ bạn nhìn và điều khiển pin của node).\n    </div>\n  </div>\n\n  <ol class=\"steps-list\">\n    <li><strong>Blueprint</strong> là một tài liệu JSON khai báo topology: các <strong>node</strong> (thành phần chạy),\n      các <strong>pin</strong> (điểm giao tiếp của node) và các <strong>edge</strong> (dây nối giữa các pin), kèm tham chiếu\n      <strong>artifact</strong> (image OS, file DBC/VSS...). Bạn tạo blueprint bằng canvas kéo-thả trong mục\n      <a href=\"#mod-nydus-ui-blueprint-canvas\">Nydus</a>.</li>\n    <li><strong>Deploy</strong> là hành động biến bản thiết kế thành hệ thống chạy thật — xem\n      <a href=\"#mod-deploy-workflow\">Triển Khai Blueprint</a>.</li>\n    <li><strong>Room</strong> là kết quả của một lần deploy: một namespace Kubernetes nơi Operator của Nydus dựng\n      pod/service cho từng node trong blueprint. Một blueprint có thể deploy nhiều lần → nhiều Room độc lập.</li>\n    <li><strong>Device</strong> là phần cứng thật (hub, ECU, điện thoại) hoặc VM kết nối vào Room qua\n      <a href=\"#mod-hubs-ui-hubs\">Hub / Proxy Node</a> — xem mục <a href=\"#mod-devices-ui-devices\">Devices</a>.</li>\n    <li><strong>Widget</strong> (Screen, Signal, GPIO Panel...) là các ô trên Workbench đọc/ghi pin của node đang chạy —\n      xem <a href=\"#mod-devices-ui-widgets-catalog\">Bảng Widget</a>.</li>\n  </ol>\n</section>\n\n<section id=\"mod-concepts-node-types\">\n  <h2 class=\"section-title\">Các Loại Node</h2>\n  <p class=\"paragraph\">\n    Node là một thành phần chạy được trong blueprint. Bảng dưới liệt kê các loại node và trỏ tới tài liệu tham khảo tương ứng:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Loại node</th><th>Dùng khi nào</th><th>Tài liệu</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><strong>Container Node</strong></td>\n        <td>Chạy một container image bất kỳ (test harness, thuật toán, dịch vụ) bên trong Room.</td>\n        <td><a href=\"#mod-container-node\">Container Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>Script Node</strong></td>\n        <td>Viết logic bằng Luau: đọc/ghi pin, chuyển tiếp tín hiệu, mô phỏng ECU — không cần build image.</td>\n        <td><a href=\"#mod-script-node-intro\">Script Node Cơ Bản</a></td>\n      </tr>\n      <tr>\n        <td><strong>Skycraft Node</strong></td>\n        <td>Máy ảo guest đầy đủ (Android Automotive, Linux) chạy trên lớp ảo hóa của CarSky.</td>\n        <td><a href=\"#mod-skycraft-node\">Skycraft Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>Ethernet Bridge Node</strong></td>\n        <td>Cầu nối lưu lượng Ethernet giữa các node/thiết bị trong Room.</td>\n        <td><a href=\"#mod-ethernet-bridge\">Ethernet Bridge</a></td>\n      </tr>\n      <tr>\n        <td><strong>Proxy / Outpost Node</strong></td>\n        <td>Đại diện logic cho một Hub/thiết bị phần cứng vật lý bên ngoài cluster.</td>\n        <td><a href=\"#mod-proxy-node\">Proxy / Outpost</a></td>\n      </tr>\n      <tr>\n        <td><strong>GPIO Panel Node</strong></td>\n        <td>Bảng điều khiển ảo (nút bấm, slider, encoder...) phát sự kiện input như phần cứng thật.</td>\n        <td><a href=\"#mod-script-node-gpio\">GPIO Panel & Pin</a></td>\n      </tr>\n      <tr>\n        <td><strong>KUKSA Broker Node</strong></td>\n        <td>Server gRPC VSS duy nhất trong room, cung cấp tín hiệu xe cho các node khác.</td>\n        <td><a href=\"#mod-kuksa-broker-node\">KUKSA Broker Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>CAN Bus Node</strong></td>\n        <td>Server gRPC chuyển đổi frame CAN thô thành tín hiệu DBC symbolic.</td>\n        <td><a href=\"#mod-can-bus-node\">CAN Bus Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>LIN Bus Node</strong></td>\n        <td>Server gRPC chuyển đổi frame LIN thô thành tín hiệu LDF symbolic.</td>\n        <td><a href=\"#mod-lin-bus-node\">LIN Bus Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>Device Proxy Node</strong></td>\n        <td>Proxy USB: mount ảnh đĩa ảo và attach thiết bị USB vật lý từ xa vào VM.</td>\n        <td><a href=\"#mod-device-proxy-node\">Device Proxy Node</a></td>\n      </tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-concepts-pin-types\">\n  <h2 class=\"section-title\">Các Loại Pin</h2>\n  <p class=\"paragraph\">\n    Pin là điểm giao tiếp của node — nơi dữ liệu đi vào/ra. Nối hai pin bằng một <strong>edge</strong> trên canvas là\n    tạo kênh truyền giữa chúng. Mỗi loại pin nói một \"giao thức\" khác nhau:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Loại pin</th><th>Giao thức / mục đích</th><th>Tài liệu</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><strong>CAN / LIN</strong></td><td>Bus CAN/LIN với codec DBC/LDF.</td><td><a href=\"#mod-script-node-can\">CAN/LIN Pin</a></td></tr>\n      <tr><td><strong>GPIO</strong></td><td>Sự kiện input từ GPIO panel ảo.</td><td><a href=\"#mod-script-node-gpio\">GPIO Pin</a></td></tr>\n      <tr><td><strong>VHAL</strong></td><td>Android Vehicle HAL properties.</td><td><a href=\"#mod-script-node-vhal\">GPIO & VHAL</a></td></tr>\n      <tr><td><strong>KUKSA / VSS</strong></td><td>Tín hiệu xe theo cây chuẩn VSS qua KUKSA.</td><td><a href=\"#mod-script-node-kuksa\">KUKSA / VSS Pin</a></td></tr>\n      <tr><td><strong>Ethernet</strong></td><td>Mạng L2 ảo nối node vào một Ethernet Bridge.</td><td><a href=\"#mod-ethernet-bridge\">Ethernet Bridge Node</a></td></tr>\n      <tr><td><strong>Network (UDP/TCP)</strong></td><td>Socket thô cho giao thức tự định nghĩa.</td><td><a href=\"#mod-script-node-net\">Networking</a></td></tr>\n      <tr><td><strong>SOME/IP</strong></td><td>Giao thức SOME/IP + Service Discovery của ngành ô tô.</td><td><a href=\"#mod-script-node-someip\">SOME/IP Helpers</a></td></tr>\n      <tr><td><strong>UDS</strong></td><td>Chẩn đoán UDS (ISO 14229) server/client.</td><td><a href=\"#mod-uds-vsomeip\">UDS Server</a> / <a href=\"#mod-uds-client\">UDS Client</a></td></tr>\n      <tr><td><strong>Device Proxy</strong></td><td>Gọi API thiết bị vật lý qua hub từ xa.</td><td><a href=\"#mod-script-node-device-proxy\">Device Proxy</a></td></tr>\n      <tr><td><strong>Tunnel</strong></td><td>Đường hầm dữ liệu giữa các node.</td><td><a href=\"#mod-script-node-tunnel\">Tunnel</a></td></tr>\n    </tbody>\n  </table>\n  <div class=\"info-box\">\n    <strong>ℹ️ Zenoh không phải là một loại pin.</strong> Không có pin \"Zenoh\" nào để chọn trên canvas — <code>ZENOH</code> không tồn tại trong schema pin-type của Nydus.\n    Zenoh pub/sub là một giao thức ứng dụng chạy chồng lên trên pin <strong>Ethernet</strong>: nối pin <code>ethernet</code> của Script Node vào một node\n    Ethernet Bridge, nền tảng sẽ tự động tổng hợp <code>pins.zenoh</code> cho bạn (xem <a href=\"#mod-script-node-zenoh\">Zenoh Pub/Sub</a>).\n    Container node cũng có thể dùng Zenoh y hệt, chỉ cần pin <code>ethernet</code> của chính nó cùng một thư viện Zenoh client thông thường — vẫn không cần pin riêng.\n  </div>\n</section>\n\n<section id=\"mod-concepts-e2e-flow\">\n  <h2 class=\"section-title\">Luồng End-to-End Đầy Đủ</h2>\n  <p class=\"paragraph\">\n    Ghép tất cả lại: đây là hành trình của một tín hiệu từ lúc bạn thiết kế đến lúc nhìn thấy nó trên màn hình:\n  </p>\n\n  <ol class=\"steps-list\">\n    <li>Mở <strong>Nydus</strong>, kéo một <strong>Skycraft Node</strong> (Android Automotive) và một <strong>Script Node</strong> lên canvas.</li>\n    <li>Thêm pin <strong>KUKSA/VSS</strong> cho cả hai node và <strong>nối dây</strong> giữa chúng — Script Node sẽ đọc tín hiệu VSS do VM phát ra.</li>\n    <li>Bấm <strong>New Deployment</strong> và <a href=\"#mod-deploy-workflow\">deploy blueprint</a> — Operator dựng Room trên Kubernetes.</li>\n    <li>Đợi Room <span class=\"table-badge badge-emerald\">Running</span>: VM Android boot lên, Script Node nạp script Luau và subscribe pin.</li>\n    <li>Kết nối <strong>Device</strong> (ví dụ hub phần cứng cắm CAN thật) qua Proxy Node nếu cần dữ liệu vật lý.</li>\n    <li>Mở <strong>Widget Signal Watch</strong> trỏ vào pin KUKSA của Script Node để xem tín hiệu chạy real-time,\n      hoặc <strong>Widget Screen</strong> để nhìn màn hình VM — xem <a href=\"#mod-devices-ui-widgets-catalog\">Bảng Widget</a>.</li>\n    <li>Xong việc? <strong>Teardown</strong> deployment để giải phóng tài nguyên — Room và toàn bộ pod của nó biến mất,\n      blueprint vẫn còn để deploy lại bất cứ lúc nào.</li>\n  </ol>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">🎓</div>\n    <div class=\"banner-content\">\n      Muốn thực hành ngay luồng này từ đầu đến cuối? Làm theo phần <strong>🎓 Hướng Dẫn Thực Hành</strong> ở sidebar —\n      tutorial <em>Device-in-the-Loop Test Bench</em> dẫn bạn qua một blueprint hoàn chỉnh.\n    </div>\n  </div>\n</section>\n",
    "en": "<section id=\"mod-concepts-mental-model-en\">\n  <h2 class=\"section-title\">Mental Model: How the Pieces Fit Together</h2>\n  <p class=\"paragraph\">\n    CarSky has 5 central concepts. Understanding how they relate is the key to every other screen\n    in this guide:\n  </p>\n\n  <div class=\"banner banner-important\">\n    <div class=\"banner-icon\">🗺️</div>\n    <div class=\"banner-content\">\n      <strong>Blueprint</strong> (the design) → <strong>Deploy</strong> (the action) → <strong>Room</strong> (the running instance on Kubernetes)\n      → <strong>Device</strong> (hardware/VM connecting in) → <strong>Widget</strong> (the windows you use to watch and drive a node's pins).\n    </div>\n  </div>\n\n  <ol class=\"steps-list\">\n    <li>A <strong>Blueprint</strong> is a declarative JSON topology: <strong>nodes</strong> (running components),\n      <strong>pins</strong> (a node's connection points) and <strong>edges</strong> (wires between pins), plus\n      <strong>artifact</strong> references (OS images, DBC/VSS files...). You build blueprints on the drag-and-drop\n      canvas under <a href=\"#mod-nydus-ui-blueprint-canvas-en\">Nydus</a>.</li>\n    <li><strong>Deploy</strong> turns the design into a running system — see\n      <a href=\"#mod-deploy-workflow-en\">Deploy a Blueprint</a>.</li>\n    <li>A <strong>Room</strong> is the result of one deployment: a Kubernetes namespace where the Nydus Operator\n      builds pods/services for every node in the blueprint. One blueprint can be deployed many times → many independent Rooms.</li>\n    <li>A <strong>Device</strong> is real hardware (hub, ECU, phone) or a VM connecting into the Room through a\n      <a href=\"#mod-hubs-ui-hubs-en\">Hub / Proxy Node</a> — see <a href=\"#mod-devices-ui-devices-en\">Devices</a>.</li>\n    <li><strong>Widgets</strong> (Screen, Signal, GPIO Panel...) are Workbench panels that read/write the pins of running\n      nodes — see the <a href=\"#mod-devices-ui-widgets-catalog-en\">Widget Catalog</a>.</li>\n  </ol>\n</section>\n\n<section id=\"mod-concepts-node-types-en\">\n  <h2 class=\"section-title\">Node Types</h2>\n  <p class=\"paragraph\">\n    A node is a runnable component in a blueprint. The table below lists the node types and links to their reference docs:\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Node type</th><th>Use it when</th><th>Docs</th></tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td><strong>Container Node</strong></td>\n        <td>Run any container image (test harness, algorithm, service) inside the Room.</td>\n        <td><a href=\"#mod-container-node-en\">Container Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>Script Node</strong></td>\n        <td>Write logic in Luau: read/write pins, forward signals, emulate ECUs — no image build needed.</td>\n        <td><a href=\"#mod-script-node-intro-en\">Script Node Basics</a></td>\n      </tr>\n      <tr>\n        <td><strong>Skycraft Node</strong></td>\n        <td>A full guest VM (Android Automotive, Linux) running on the CarSky virtualization layer.</td>\n        <td><a href=\"#mod-skycraft-node-en\">Skycraft Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>Ethernet Bridge Node</strong></td>\n        <td>Bridge Ethernet traffic between nodes/devices in the Room.</td>\n        <td><a href=\"#mod-ethernet-bridge-en\">Ethernet Bridge</a></td>\n      </tr>\n      <tr>\n        <td><strong>Proxy / Outpost Node</strong></td>\n        <td>Logical representative of a physical Hub/hardware device outside the cluster.</td>\n        <td><a href=\"#mod-proxy-node-en\">Proxy / Outpost</a></td>\n      </tr>\n      <tr>\n        <td><strong>GPIO Panel Node</strong></td>\n        <td>A virtual control panel (buttons, sliders, encoders...) emitting input events like real hardware.</td>\n        <td><a href=\"#mod-script-node-gpio-en\">GPIO Panel & Pin</a></td>\n      </tr>\n      <tr>\n        <td><strong>KUKSA Broker Node</strong></td>\n        <td>The single VSS gRPC server in the room, supplying vehicle signals to other nodes.</td>\n        <td><a href=\"#mod-kuksa-broker-node-en\">KUKSA Broker Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>CAN Bus Node</strong></td>\n        <td>gRPC server that turns raw CAN frames into DBC symbolic signals.</td>\n        <td><a href=\"#mod-can-bus-node-en\">CAN Bus Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>LIN Bus Node</strong></td>\n        <td>gRPC server that turns raw LIN frames into LDF symbolic signals.</td>\n        <td><a href=\"#mod-lin-bus-node-en\">LIN Bus Node</a></td>\n      </tr>\n      <tr>\n        <td><strong>Device Proxy Node</strong></td>\n        <td>USB proxy: mount virtual disk images and attach remote physical USB devices to a VM.</td>\n        <td><a href=\"#mod-device-proxy-node-en\">Device Proxy Node</a></td>\n      </tr>\n    </tbody>\n  </table>\n</section>\n\n<section id=\"mod-concepts-pin-types-en\">\n  <h2 class=\"section-title\">Pin Types</h2>\n  <p class=\"paragraph\">\n    A pin is a node's connection point — where data flows in and out. Wiring two pins with an <strong>edge</strong> on the\n    canvas creates a channel between them. Each pin type speaks a different \"protocol\":\n  </p>\n\n  <table>\n    <thead>\n      <tr><th>Pin type</th><th>Protocol / purpose</th><th>Docs</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><strong>CAN / LIN</strong></td><td>CAN/LIN bus with DBC/LDF codecs.</td><td><a href=\"#mod-script-node-can-en\">CAN/LIN Pin</a></td></tr>\n      <tr><td><strong>GPIO</strong></td><td>Input events from the virtual GPIO panel.</td><td><a href=\"#mod-script-node-gpio-en\">GPIO Pin</a></td></tr>\n      <tr><td><strong>VHAL</strong></td><td>Android Vehicle HAL properties.</td><td><a href=\"#mod-script-node-vhal-en\">GPIO & VHAL</a></td></tr>\n      <tr><td><strong>KUKSA / VSS</strong></td><td>Vehicle signals in the standard VSS tree over KUKSA.</td><td><a href=\"#mod-script-node-kuksa-en\">KUKSA / VSS Pin</a></td></tr>\n      <tr><td><strong>Ethernet</strong></td><td>Virtual L2 network joining a node to an Ethernet Bridge.</td><td><a href=\"#mod-ethernet-bridge-en\">Ethernet Bridge Node</a></td></tr>\n      <tr><td><strong>Network (UDP/TCP)</strong></td><td>Raw sockets for custom protocols.</td><td><a href=\"#mod-script-node-net-en\">Networking</a></td></tr>\n      <tr><td><strong>SOME/IP</strong></td><td>Automotive SOME/IP + Service Discovery.</td><td><a href=\"#mod-script-node-someip-en\">SOME/IP Helpers</a></td></tr>\n      <tr><td><strong>UDS</strong></td><td>UDS (ISO 14229) diagnostics server/client.</td><td><a href=\"#mod-uds-vsomeip-en\">UDS Server</a> / <a href=\"#mod-uds-client-en\">UDS Client</a></td></tr>\n      <tr><td><strong>Device Proxy</strong></td><td>Call APIs on physical devices via a remote hub.</td><td><a href=\"#mod-script-node-device-proxy-en\">Device Proxy</a></td></tr>\n      <tr><td><strong>Tunnel</strong></td><td>Data tunnels between nodes.</td><td><a href=\"#mod-script-node-tunnel-en\">Tunnel</a></td></tr>\n    </tbody>\n  </table>\n  <div class=\"info-box\">\n    <strong>ℹ️ Zenoh is not a pin type.</strong> There is no selectable \"Zenoh\" pin in the canvas — <code>ZENOH</code> does not exist in the Nydus pin-type schema.\n    Zenoh pub/sub is an application protocol that rides on top of the <strong>Ethernet</strong> pin: wire a Script Node's <code>ethernet</code> pin to an\n    Ethernet Bridge node and the platform automatically synthesizes <code>pins.zenoh</code> for you (see <a href=\"#mod-script-node-zenoh-en\">Zenoh Pub/Sub</a>).\n    A Container node gets the same access simply by using its own <code>ethernet</code> pin with a regular Zenoh client library — again, no dedicated pin.\n  </div>\n</section>\n\n<section id=\"mod-concepts-e2e-flow-en\">\n  <h2 class=\"section-title\">The Full End-to-End Flow</h2>\n  <p class=\"paragraph\">\n    Putting it all together — the journey of a signal from design time to your screen:\n  </p>\n\n  <ol class=\"steps-list\">\n    <li>Open <strong>Nydus</strong>, drag a <strong>Skycraft Node</strong> (Android Automotive) and a <strong>Script Node</strong> onto the canvas.</li>\n    <li>Add a <strong>KUKSA/VSS</strong> pin to both nodes and <strong>wire them together</strong> — the Script Node will read VSS signals emitted by the VM.</li>\n    <li>Click <strong>New Deployment</strong> and <a href=\"#mod-deploy-workflow-en\">deploy the blueprint</a> — the Operator builds a Room on Kubernetes.</li>\n    <li>Wait for the Room to reach <span class=\"table-badge badge-emerald\">Running</span>: the Android VM boots, the Script Node loads its Luau script and subscribes to its pins.</li>\n    <li>Connect a <strong>Device</strong> (e.g. a hardware hub with real CAN attached) through a Proxy Node if you need physical data.</li>\n    <li>Open a <strong>Signal Watch widget</strong> pointed at the Script Node's KUKSA pin to watch signals live,\n      or a <strong>Screen widget</strong> to see the VM's display — see the <a href=\"#mod-devices-ui-widgets-catalog-en\">Widget Catalog</a>.</li>\n    <li>Done? <strong>Tear down</strong> the deployment to free resources — the Room and all its pods disappear,\n      while the blueprint stays ready to deploy again anytime.</li>\n  </ol>\n\n  <div class=\"banner banner-caution\">\n    <div class=\"banner-icon\">🎓</div>\n    <div class=\"banner-content\">\n      Want to practice this flow end to end? Follow the <strong>🎓 Tutorial</strong> part in the sidebar —\n      the <em>Device-in-the-Loop Test Bench</em> walkthrough guides you through a complete blueprint.\n    </div>\n  </div>\n</section>\n"
  },
  "devices": {
    "vi": "<section id=\"mod-devices-ui-devices\">\n            <h2 class=\"section-title\">1. Devices — Quản Lý Thiết Bị Kết Nối</h2>\n            <p class=\"paragraph\">\n                Đây là màn hình mặc định sau khi đăng nhập. Mỗi \"device\" là một endpoint runtime (ví dụ IVI Android\n                Automotive, cluster AGL) mà người dùng có thể mở widget để xem/điều khiển trực tiếp.\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Devices — Danh sách & kết nối\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Devices.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Devices.png')\">\n                    <img src=\"./images/Devices.png\" alt=\"Devices Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Thành Phần</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Search devices:</strong> lọc nhanh theo tên hoặc serial thiết bị.</li>\n                        <li><strong>Icon bút chì ✏️:</strong> đổi tên hiển thị của device.</li>\n                        <li><strong>Serial/ID</strong> (dòng chữ mờ bên dưới tên): định danh duy nhất do hệ thống cấp, dùng để tra cứu log.</li>\n                        <li><strong>Nút Connect/Switch/Disconnect:</strong> mở phiên kết nối tới device; nếu bạn đã kết nối 1 device khác, nút hiển thị <em>Switch</em> để chuyển phiên hoạt động.</li>\n                        <li><strong>Chấm tròn màu (●):</strong> trạng thái online (xanh) / offline (xám) của thiết bị.</li>\n                        <li><strong>\"🚀 Started pack-deploy\":</strong> device được tạo tự động khi một Deployment từ Nydus chạy — không xoá thủ công, muốn gỡ cần dừng Deployment tương ứng.</li>\n                    </ul>\n                </div>\n            </div>\n\n            <div class=\"banner banner-caution\">\n                <div class=\"banner-icon\">⚠️</div>\n                <div class=\"banner-content\">\n                    <strong>Lưu ý khi Disconnect</strong>\n                    Disconnect chỉ ngắt phiên điều khiển hiện tại trên trình duyệt — không tắt container/pod của\n                    device. Muốn dừng hẳn tài nguyên phải thao tác ở Deployment tương ứng trong mục Nydus.\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widgets-catalog\">\n            <h2 class=\"section-title\">Devices → Hệ Thống Widget</h2>\n            <p class=\"paragraph\">\n                Sau khi Connect vào một device, panel Devices hiển thị danh sách <strong>Widgets</strong> đã gắn cho\n                device đó. Bấm nút <code>+</code> để mở danh mục 12 loại widget và thêm mới — mỗi widget khi bấm vào\n                sẽ mở nội dung tương ứng ở Stage (cột giữa) và cấu hình chi tiết ở Inspector (cột phải).\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Panel</span>\n                        Devices — Danh mục Add Widget\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Manage%20Widgets.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Manage%20Widgets.png')\">\n                    <img src=\"./images/Manage%20Widgets.png\" alt=\"Manage Widgets Screen\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n            </div>\n\n            <table>\n                <thead>\n                    <tr><th>Loại Widget</th><th>Công dụng</th></tr>\n                </thead>\n                <tbody>\n                    <tr><td><strong>Screen</strong></td><td>Stream hình ảnh + âm thanh + điều khiển chạm/bàn phím thời gian thực của màn hình IVI/AGL.</td></tr>\n                    <tr><td><strong>ADB</strong></td><td>Terminal ADB shell kết nối trực tiếp tới thiết bị Android để chạy lệnh, cài APK, xem log.</td></tr>\n                    <tr><td><strong>Shell</strong></td><td>Terminal shell hệ thống (Linux) cho các node không phải Android (AGL, vECU...).</td></tr>\n                    <tr><td><strong>Signal Watch</strong></td><td>Theo dõi giá trị tín hiệu VSS/CAN theo thời gian thực dạng bảng/đồ thị.</td></tr>\n                    <tr><td><strong>CAN Panel</strong></td><td>Đặt một nút shortcut trên thanh công cụ phải; bấm để mở URL công cụ phân tích CAN bên ngoài trong tab trình duyệt mới. Không phụ thuộc node blueprint.</td></tr>\n                    <tr><td><strong>GPIO Panel</strong></td><td>Bảng nút bấm để giả lập giá trị cảm biến/tín hiệu GPIO đưa vào hệ thống.</td></tr>\n                    <tr><td><strong>USB Device Proxy</strong></td><td>Gắn/gỡ ảnh USB (image mode) hoặc cắm thiết bị USB thật từ máy client vào device đích.</td></tr>\n                    <tr><td><strong>CAPL TestScript</strong></td><td>Soạn thảo và chạy script CAPL test case, thường phối hợp với Hub/Proxy Node vật lý.</td></tr>\n                    <tr><td><strong>Road Simulator</strong></td><td>Video trực tiếp màn hình VM kèm điều khiển lái bằng WASD/phím mũi tên hoặc slider; tín hiệu lái được ghi vào signal source đã chọn.</td></tr>\n                    <tr><td><strong>Simulator Box</strong></td><td>Điều khiển hộp stimulus/simulator phần cứng thật (I/O vật lý, fault injection) kết nối qua Hub/Outpost — cần phần cứng.</td></tr>\n                    <tr><td><strong>Text-to-speech</strong></td><td>Tổng hợp giọng nói từ text (Azure TTS) và phát ngay trên device qua audio-play part đã chọn.</td></tr>\n                    <tr><td><strong>Log</strong></td><td>Xem log runtime trực tiếp của node/part được chọn.</td></tr>\n                </tbody>\n            </table>\n        </section>\n\n<section id=\"mod-devices-ui-widget-screen\">\n            <h2 class=\"section-title\">Devices → Widget: Screen Stream</h2>\n            <p class=\"paragraph\">\n                Widget được dùng nhiều nhất — hiển thị luồng video/audio thời gian thực của một màn hình xe (IVI Android\n                hoặc AGL Cluster) và cho phép thao tác chạm/gõ phím trực tiếp từ trình duyệt như đang cầm màn hình thật.\n            </p>\n\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Full Layout</span>\n                        Bố cục đầy đủ 3 cột khi mở Widget Screen\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Screen%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Screen%20Widget.png')\">\n                    <img src=\"./images/Screen%20Widget.png\" alt=\"Screen Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Video Part / Audio Part:</strong> chọn \"part\" nguồn video/audio của node blueprint tương ứng (ví dụ <code>face-screen</code>, <code>face-audio</code>).</li>\n                        <li><strong>Recorder Part:</strong> bật ghi hình phiên hiện tại — video sẽ xuất hiện ở mục <a href=\"#mod-videos-ui-videos\">Videos</a> sau khi dừng ghi.</li>\n                        <li><strong>Microphone:</strong> chọn micro vật lý của máy client (ví dụ \"CIA Iphone Microphone\") và bấm <em>Enable microphone</em> để nói chuyện hai chiều với thiết bị.</li>\n                        <li><strong>Touch Part / Keyboard Part:</strong> \"part\" nhận sự kiện chạm và bàn phím ảo gửi ngược vào thiết bị.</li>\n                        <li><strong>Specify Function:</strong> bật để tuỳ chỉnh câu lệnh custom thay vì hành vi mặc định.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel dưới Stage</div>\n                    <ul class=\"details-list\">\n                        <li>Một tab <strong>ADB Shell</strong> có thể mở song song bên dưới Stage để chạy lệnh trong lúc xem màn hình — hữu ích khi debug tương tác UI kết hợp log hệ thống.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-signal\">\n            <h2 class=\"section-title\">Devices → Widget: Signal Watch</h2>\n            <p class=\"paragraph\">\n                Cho phép chọn một hoặc nhiều tín hiệu VSS/CAN đã khai báo trong blueprint (ví dụ\n                <code>bcm-can-signal</code>, <code>seatbelt-sensor-signal</code>) để theo dõi giá trị thay đổi theo thời\n                gian thực — dùng để xác nhận nhanh một tín hiệu có đang chạy đúng hay không mà không cần mở CAN trace đầy đủ.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Chọn nguồn tín hiệu cho Signal Watch\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Signal%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Signal%20Widget.png')\">\n                    <img src=\"./images/Signal%20Widget.png\" alt=\"Signal Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-gpio\">\n            <h2 class=\"section-title\">Devices → Widget: GPIO Panel</h2>\n            <p class=\"paragraph\">\n                Ngược lại với Signal Watch (chỉ xem), GPIO Panel cho phép <strong>ghi giá trị</strong> vào một tín hiệu\n                nguồn (bcm-can-signal, seatbelt-sensor-signal...) — dùng để giả lập cảm biến vật lý (ví dụ mô phỏng thắt\n                dây an toàn, áp suất lốp) mà không cần phần cứng thật.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Chọn GPIO Source part để mô phỏng\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/GPIO%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/GPIO%20Widget.png')\">\n                    <img src=\"./images/GPIO%20Widget.png\" alt=\"GPIO Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-adb\">\n            <h2 class=\"section-title\">Devices → Widget: ADB</h2>\n            <p class=\"paragraph\">\n                Mở một terminal ADB shell kết nối trực tiếp vào Android VM do node\n                <a href=\"#mod-skycraft-node\">Skycraft</a> vận hành — chạy lệnh shell thật ngay trên máy ảo AAOS\n                (prompt ví dụ <code>trout_arm64:/ $</code>) để debug hệ thống, kiểm tra tiến trình hoặc cấu hình\n                thiết bị mà không cần cài công cụ nào trên máy cá nhân.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Terminal ADB tới Android VM\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/ADB%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/ADB%20Widget.png')\">\n                    <img src=\"./images/ADB%20Widget.png\" alt=\"ADB Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>ADB:</strong> chọn part ADB do node <a href=\"#mod-skycraft-node\">Skycraft</a> cung cấp (ví dụ <code>face-adb</code>) — mỗi Android VM trong blueprint expose một part tương ứng.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel trên Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>ADB SHELL + badge <code>connected</code>:</strong> terminal xterm chạy lệnh shell thật trên Android VM, prompt <code>trout_arm64:/ $</code>.</li>\n                        <li><strong>Disconnect:</strong> ngắt phiên shell hiện tại.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-shell\">\n            <h2 class=\"section-title\">Devices → Widget: Shell</h2>\n            <p class=\"paragraph\">\n                Mở một shell root bên trong container của node — dành cho các node Linux không phải Android\n                (vECU, dịch vụ nền...) do node <a href=\"#mod-container-node\">Container</a> chạy. Hữu ích để kiểm\n                tra file cấu hình, tiến trình, hay log nội bộ của node ngay trên trình duyệt.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Shell root bên trong container node\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Shell%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Shell%20Widget.png')\">\n                    <img src=\"./images/Shell%20Widget.png\" alt=\"Shell Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Shell part:</strong> chọn part shell do các node <a href=\"#mod-container-node\">Container</a> expose (ví dụ <code>seatbelt-ecu-shell</code>, <code>tcu-nad-shell</code>).</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel trên Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>SHELL &lt;node-id&gt; + badge trạng thái (connected/idle):</strong> terminal xterm với shell root bên trong container (trong ví dụ là image Debian 12 tối giản).</li>\n                        <li><strong>Reconnect:</strong> kết nối lại khi phiên bị ngắt hoặc rơi vào trạng thái idle.</li>\n                        <li><strong>Disconnect:</strong> đóng phiên shell hiện tại.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-log\">\n            <h2 class=\"section-title\">Devices → Widget: Log</h2>\n            <p class=\"paragraph\">\n                Stream trực tiếp log runtime của bất kỳ node nào trong deployment — công cụ quan sát đầu tiên khi\n                cần debug hành vi của một node mà không phải mở shell vào bên trong.\n            </p>\n            <div class=\"screenshot-container\">\n                <div class=\"screenshot-header\">\n                    <div class=\"screenshot-title\">\n                        <span class=\"indicator-badge badge-feature\">Inspector</span>\n                        Chọn nguồn log cho Log Widget\n                    </div>\n                    <button class=\"screenshot-view-btn\" onclick=\"openLightbox('./images/Log%20Widget.png')\">🔍 Phóng to</button>\n                </div>\n                <div class=\"screenshot-image-wrapper\" onclick=\"openLightbox('./images/Log%20Widget.png')\">\n                    <img src=\"./images/Log%20Widget.png\" alt=\"Log Widget\" class=\"screenshot-img\">\n                    <div class=\"screenshot-overlay\"><button class=\"screenshot-overlay-btn screenshot-overlay-icon\" title=\"Xem chi tiết\">🔍</button></div>\n                </div>\n                <div class=\"screenshot-details\">\n                    <div class=\"details-title\">🧭 Diễn Giải Inspector (cột phải)</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Log Source part:</strong> liệt kê part log của mọi node — mỗi node đều có một part dạng <code>&lt;node&gt;-main</code>; riêng các node <a href=\"#mod-skycraft-node\">Skycraft</a> có thêm <code>&lt;node&gt;-logcat</code> (ví dụ <code>face-logcat</code>, <code>agl-logcat</code>) chứa logcat của Android VM.</li>\n                    </ul>\n                    <div class=\"details-title\" style=\"margin-top:16px;\">🧭 Panel trên Stage</div>\n                    <ul class=\"details-list\">\n                        <li><strong>Filter:</strong> lọc trực tiếp các dòng log theo chuỗi con (substring) ngay khi gõ.</li>\n                        <li><strong>Auto-scroll to bottom:</strong> tự cuộn theo dòng log mới nhất.</li>\n                        <li><strong>Clear log:</strong> xoá toàn bộ nội dung đang hiển thị.</li>\n                        <li><strong>Badge Connected:</strong> các dòng log được stream liên tục theo thời gian thực.</li>\n                    </ul>\n                </div>\n            </div>\n        </section>\n\n<section id=\"mod-devices-ui-widget-can-panel\">\n            <h2 class=\"section-title\">Devices → Widget: CAN Panel</h2>\n            <p class=\"paragraph\">\n                Widget <strong>độc lập với node blueprint</strong> — toàn bộ cấu hình chỉ gồm \"Button n
